<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Retest Sehat vs Lemah</text>
    <line x1="50" y1="100" x2="350" y2="100" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="" filter="url(#glow)"/>
    
  <line x1="107.5" y1="30" x2="107.5" y2="100" stroke="#00ffaa" stroke-width="2"/>
  <rect x="100" y="40" width="15" height="50" fill="#00ffaa" rx="2"/>

    
  <line x1="125" y1="40" x2="125" y2="70" stroke="#ff4444" stroke-width="2"/>
  <rect x="120" y="50" width="10" height="15" fill="#ff4444" rx="2"/>

    
  <line x1="140" y1="55" x2="140" y2="85" stroke="#ff4444" stroke-width="2"/>
  <rect x="135" y="65" width="10" height="15" fill="#ff4444" rx="2"/>

    
  <line x1="155" y1="70" x2="155" y2="100" stroke="#ff4444" stroke-width="2"/>
  <rect x="150" y="80" width="10" height="15" fill="#ff4444" rx="2"/>

    <text x="135" y="120" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Sehat (Pelan)</text>
    
    
  <line x1="257.5" y1="30" x2="257.5" y2="100" stroke="#00ffaa" stroke-width="2"/>
  <rect x="250" y="40" width="15" height="50" fill="#00ffaa" rx="2"/>

    
  <line x1="287.5" y1="30" x2="287.5" y2="140" stroke="#ff4444" stroke-width="2"/>
  <rect x="280" y="40" width="15" height="80" fill="#ff4444" rx="2"/>

    <text x="285" y="150" fill="#ff4444" font-family="monospace" font-size="12" text-anchor="middle">Lemah (Deras)</text>
  
</svg>