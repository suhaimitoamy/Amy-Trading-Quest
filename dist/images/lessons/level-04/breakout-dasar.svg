<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <path d="M0 100 h800 M0 200 h800 M0 300 h800 M200 0 v400 M400 0 v400 M600 0 v400" 
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Title & Desc -->
  <text x="40" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Konsep Breakout Dasar</text>
  <text x="40" y="65" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14">Memahami penutupan candle di luar zona Resistance untuk validasi breakout.</text>
  
  <!-- Dynamic Elements -->
  
  <!-- Support & Resistance Lines -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="100" y="140" fill="#ff3366" font-family="Arial" font-size="14">Resistance (Atap)</text>
  
  <line x1="100" y1="300" x2="700" y2="300" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="100" y="315" fill="#00ffaa" font-family="Arial" font-size="14">Support (Lantai)</text>

  <!-- Pre-breakout wave -->
  <path d="M 150 280 L 200 170 L 250 250 L 300 160 L 350 220" fill="none" stroke="#a0a0b0" stroke-width="3"/>
  
  <!-- Breakout Candle Bullish -->
  <rect x="400" y="110" width="20" height="120" fill="#00ffaa"/>
  <!-- Wick -->
  <line x1="410" y1="90" x2="410" y2="110" stroke="#00ffaa" stroke-width="2"/>
  <line x1="410" y1="230" x2="410" y2="250" stroke="#00ffaa" stroke-width="2"/>
  
  <!-- Annotations -->
  <circle cx="410" cy="110" r="4" fill="#ffffff"/>
  <text x="435" y="115" fill="#ffffff" font-family="Arial" font-size="12">Close Body Valid di Luar Resistance</text>
  <path d="M 430 110 L 400 110" stroke="#ffffff" stroke-width="1"/>

</svg>
