<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Breakout Valid (Close Body)</text>
    <line x1="50" y1="100" x2="350" y2="100" stroke="#ff4444" stroke-width="2" stroke-dasharray="" filter="url(#glow)"/>
    
  <line x1="190" y1="110" x2="190" y2="170" stroke="#00ffaa" stroke-width="2"/>
  <rect x="180" y="120" width="20" height="40" fill="#00ffaa" rx="2"/>

    
  <line x1="230" y1="50" x2="230" y2="120" stroke="#00ffaa" stroke-width="2"/>
  <rect x="220" y="60" width="20" height="50" fill="#00ffaa" rx="2"/>

    <text x="230" y="40" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Close di luar batas</text>
  
</svg>