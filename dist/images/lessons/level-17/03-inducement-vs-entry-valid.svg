<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Inducement vs Entry Valid</text>
  <text x="400" y="70" fill="#a0a0b0" font-family="Arial" font-size="16" text-anchor="middle">Membedakan Jebakan CHoCH dengan CHoCH yang Sebenarnya</text>

  <!-- Left Side: Fake CHoCH / Inducement -->
  <text x="200" y="120" fill="#ffff00" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Fake CHoCH (Inducement)</text>
  
  <path d="M 50 150 L 150 250 L 200 220 L 250 280 L 300 180" fill="none" stroke="#ff3366" stroke-width="4"/>
  
  <!-- Fake Break -->
  <line x1="180" y1="220" x2="320" y2="220" stroke="#ffff00" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="250" y="210" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Fake CHoCH</text>
  
  <text x="200" y="320" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Belum menyentuh POI HTF.</text>
  <text x="200" y="340" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Banyak yang Buy di sini dan tersapu.</text>

  <!-- Divider -->
  <line x1="400" y1="100" x2="400" y2="400" stroke="#4a4a6e" stroke-width="2"/>

  <!-- Right Side: Valid CHoCH / Valid Entry -->
  <text x="600" y="120" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Valid CHoCH (Valid Entry)</text>
  
  <!-- HTF POI -->
  <rect x="450" y="320" width="300" height="60" fill="#00ffaa" opacity="0.2"/>
  <text x="600" y="360" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">HTF POI (Order Block)</text>

  <path d="M 450 150 L 520 220 L 560 180 L 600 340 L 650 280 L 700 300 L 750 150" fill="none" stroke="#00ffaa" stroke-width="4"/>
  
  <!-- Sweep & IDM taking -->
  <line x1="500" y1="220" x2="620" y2="220" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="520" cy="220" r="6" fill="#ffff00"/>
  <text x="520" y="205" fill="#ffff00" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">IDM</text>
  <text x="580" y="210" fill="#ff3366" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">IDM Taken</text>

  <!-- Valid CHoCH -->
  <line x1="540" y1="180" x2="680" y2="180" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="640" y="170" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Valid CHoCH</text>
  
  <!-- Valid Entry point -->
  <circle cx="700" cy="300" r="6" fill="#00ffaa"/>
  <text x="700" y="325" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Entry</text>

  <!-- Info Box -->
  <rect x="50" y="420" width="700" height="60" fill="#2a2a4e" rx="10"/>
  <text x="400" y="445" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Entry valid HANYA terjadi SETELAH harga mengambil Inducement dan menyentuh POI besar.</text>
  <text x="400" y="465" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">CHoCH tanpa pengambilan likuiditas = Jebakan (Inducement).</text>
</svg>
