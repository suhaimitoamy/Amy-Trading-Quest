<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Inducement Sebelum POI</text>
  <text x="400" y="70" fill="#a0a0b0" font-family="Arial" font-size="16" text-anchor="middle">Bahan Bakar Likuiditas untuk Mengaktifkan Order Block</text>

  <!-- High probability POI with IDM -->
  <text x="250" y="120" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Dengan Inducement (Valid POI)</text>
  
  <path d="M 100 150 L 150 250 L 200 200 L 250 350 L 300 180" fill="none" stroke="#334466" stroke-width="4" stroke-dasharray="8,8"/>
  <path d="M 100 150 L 150 250 L 200 200" fill="none" stroke="#ff3366" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- IDM creation -->
  <circle cx="200" cy="200" r="8" fill="#ffff00"/>
  <text x="200" y="180" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">IDM (Liquidity)</text>
  
  <!-- POI Box 1 -->
  <rect x="230" y="330" width="60" height="40" fill="#00ffaa" opacity="0.3"/>
  <rect x="230" y="330" width="60" height="40" fill="none" stroke="#00ffaa" stroke-width="2"/>
  <text x="260" y="390" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Valid OB</text>

  <path d="M 200 200 L 250 350 L 350 150" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linejoin="round"/>
  <line x1="170" y1="200" x2="230" y2="200" stroke="#ffff00" stroke-width="2" stroke-dasharray="4,4"/>


  <!-- Low probability POI without IDM -->
  <line x1="400" y1="100" x2="400" y2="450" stroke="#4a4a6e" stroke-width="2"/>

  <text x="600" y="120" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Tanpa Inducement (Risiko Tinggi)</text>

  <!-- POI Box 2 -->
  <rect x="580" y="330" width="60" height="40" fill="#ff3366" opacity="0.3"/>
  <rect x="580" y="330" width="60" height="40" fill="none" stroke="#ff3366" stroke-width="2"/>
  <text x="610" y="390" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Failed OB</text>

  <path d="M 450 150 L 610 350" fill="none" stroke="#ff3366" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 610 350 L 640 450" fill="none" stroke="#ff3366" stroke-width="6" stroke-linejoin="round"/>
  
  <text x="610" y="250" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Harga langsung terjun</text>
  <text x="610" y="270" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">tanpa buat swing</text>

  <!-- Info Box -->
  <rect x="50" y="420" width="700" height="60" fill="#2a2a4e" rx="10"/>
  <text x="400" y="445" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">POI dengan probabilitas tinggi HARUS memiliki likuiditas (Inducement) yang bisa disapu terlebih dahulu.</text>
  <text x="400" y="465" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Ini memberikan "bahan bakar" agar harga bisa bereaksi kuat dari POI tersebut.</text>
</svg>
