<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
    <rect width="800" height="400" fill="#1a1a2e" rx="10"/>
    <text x="400" y="40" font-family="Arial" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Tekanan Max Drawdown</text>
    
    <!-- Account Balance Chart -->
    <rect x="100" y="80" width="600" height="250" fill="#2a2a4e" stroke="#4a4a6a"/>
    <line x1="100" y1="120" x2="700" y2="120" stroke="#00ffaa" stroke-dasharray="5,5" stroke-width="2"/>
    <text x="710" y="125" font-family="Arial" font-size="14" fill="#00ffaa">Initial Balance</text>
    
    <line x1="100" y1="300" x2="700" y2="300" stroke="#ff3366" stroke-width="3"/>
    <text x="710" y="305" font-family="Arial" font-size="14" fill="#ff3366" font-weight="bold">Max Drawdown Limit (-10%)</text>
    
    <path d="M 100 120 L 200 150 L 300 130 L 400 250 L 500 220 L 600 280 L 650 270" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <circle cx="600" cy="280" r="8" fill="#ff3366"/>
    <text x="600" y="260" font-family="Arial" font-size="14" fill="#ff3366" text-anchor="middle" font-weight="bold">Revenge Trading Zone!</text>
    <text x="600" y="330" font-family="Arial" font-size="12" fill="#aaaaaa" text-anchor="middle">Rasa takut kehilangan akun memicu emosi</text>
</svg>
