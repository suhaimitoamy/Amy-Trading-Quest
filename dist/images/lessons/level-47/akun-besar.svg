<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
    <rect width="800" height="400" fill="#1a1a2e" rx="10"/>
    <text x="400" y="50" font-family="Arial" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Mental Shift: Akun Kecil vs Akun Besar</text>
    
    <!-- Scale Base -->
    <path d="M400 350 L380 300 L420 300 Z" fill="#4a4a6a"/>
    <rect x="300" y="290" width="200" height="10" fill="#4a4a6a"/>
    
    <!-- Small Account Side -->
    <circle cx="200" cy="200" r="40" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="3"/>
    <text x="200" y="195" font-family="Arial" font-size="20" fill="#00ffaa" font-weight="bold" text-anchor="middle">Akun $1K</text>
    <text x="200" y="220" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Risk 1% = -$10</text>
    <text x="200" y="240" font-family="Arial" font-size="12" fill="#aaaaaa" text-anchor="middle">(Terasa Ringan)</text>
    
    <!-- Large Account Side -->
    <circle cx="600" cy="200" r="80" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="3"/>
    <text x="600" y="185" font-family="Arial" font-size="24" fill="#ff3366" font-weight="bold" text-anchor="middle">Akun $100K</text>
    <text x="600" y="215" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Risk 1% = -$1,000</text>
    <text x="600" y="240" font-family="Arial" font-size="14" fill="#aaaaaa" text-anchor="middle">(Terasa Berat)</text>
    
    <path d="M200 245 C300 280, 500 280, 600 285" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
</svg>
