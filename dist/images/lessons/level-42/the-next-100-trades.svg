<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-accent { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-danger { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .box-win { fill: #00ffaa; opacity: 0.8; rx: 4; }
      .box-loss { fill: #ff3366; opacity: 0.8; rx: 4; }
      .box-empty { fill: #3a3a5e; opacity: 0.5; rx: 4; stroke: #e0e0e0; stroke-width: 1; stroke-opacity: 0.2; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="15" />

  <text x="400" y="40" class="text-light" font-size="24" font-weight="bold" text-anchor="middle">The Next 100 Trades</text>
  <text x="400" y="65" class="text-light" font-size="14" text-anchor="middle" opacity="0.8">Hukum Bilangan Besar: Probabilitas baru terlihat pada sampel yang besar</text>

  <!-- 10x10 Grid -->
  <g transform="translate(180, 100)">
    <!-- Let's generate a pseudo-random grid for visual effect -->
    <!-- Row 1 -->
    <rect x="0" y="0" width="20" height="20" class="box-loss" />
    <rect x="25" y="0" width="20" height="20" class="box-win" />
    <rect x="50" y="0" width="20" height="20" class="box-loss" />
    <rect x="75" y="0" width="20" height="20" class="box-loss" />
    <rect x="100" y="0" width="20" height="20" class="box-win" />
    <rect x="125" y="0" width="20" height="20" class="box-win" />
    <rect x="150" y="0" width="20" height="20" class="box-loss" />
    <rect x="175" y="0" width="20" height="20" class="box-win" />
    <rect x="200" y="0" width="20" height="20" class="box-loss" />
    <rect x="225" y="0" width="20" height="20" class="box-win" />
    
    <!-- Row 2 (Losing Streak example) -->
    <rect x="0" y="25" width="20" height="20" class="box-loss" />
    <rect x="25" y="25" width="20" height="20" class="box-loss" />
    <rect x="50" y="25" width="20" height="20" class="box-loss" />
    <rect x="75" y="25" width="20" height="20" class="box-loss" />
    <rect x="100" y="25" width="20" height="20" class="box-win" />
    <rect x="125" y="25" width="20" height="20" class="box-win" />
    <rect x="150" y="25" width="20" height="20" class="box-win" />
    <rect x="175" y="25" width="20" height="20" class="box-loss" />
    <rect x="200" y="25" width="20" height="20" class="box-win" />
    <rect x="225" y="25" width="20" height="20" class="box-win" />

    <!-- Rest of the grid with a mix -->
    <!-- Row 3 -->
    <rect x="0" y="50" width="20" height="20" class="box-win" />
    <rect x="25" y="50" width="20" height="20" class="box-loss" />
    <rect x="50" y="50" width="20" height="20" class="box-win" />
    <rect x="75" y="50" width="20" height="20" class="box-win" />
    <rect x="100" y="50" width="20" height="20" class="box-win" />
    <rect x="125" y="50" width="20" height="20" class="box-loss" />
    <rect x="150" y="50" width="20" height="20" class="box-win" />
    <rect x="175" y="50" width="20" height="20" class="box-win" />
    <rect x="200" y="50" width="20" height="20" class="box-loss" />
    <rect x="225" y="50" width="20" height="20" class="box-win" />
    
    <!-- Row 4 to 10 (Mostly empty/greyed out to show future trades) -->
    <!-- Row 4 -->
    <rect x="0" y="75" width="20" height="20" class="box-win" />
    <rect x="25" y="75" width="20" height="20" class="box-win" />
    <rect x="50" y="75" width="20" height="20" class="box-loss" />
    <rect x="75" y="75" width="20" height="20" class="box-empty" />
    <rect x="100" y="75" width="20" height="20" class="box-empty" />
    <rect x="125" y="75" width="20" height="20" class="box-empty" />
    <rect x="150" y="75" width="20" height="20" class="box-empty" />
    <rect x="175" y="75" width="20" height="20" class="box-empty" />
    <rect x="200" y="75" width="20" height="20" class="box-empty" />
    <rect x="225" y="75" width="20" height="20" class="box-empty" />

    <!-- Rows 5-10 Using loops or just simple blocks for brevity -->
    <!-- Let's just create a block of empty boxes -->
    <rect x="0" y="100" width="245" height="145" fill="none" />
    <g fill="#3a3a5e" opacity="0.5" stroke="#e0e0e0" stroke-width="1" stroke-opacity="0.2">
      <!-- Just placing some representative empty boxes -->
      <rect x="0" y="100" width="20" height="20" rx="4" />
      <rect x="25" y="100" width="20" height="20" rx="4" />
      <rect x="50" y="100" width="20" height="20" rx="4" />
      <rect x="75" y="100" width="20" height="20" rx="4" />
      <!-- (Abbreviated visual) -->
      <text x="122" y="180" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" text-anchor="middle" fill="#e0e0e0" opacity="1" stroke="none">... Sisa 67 Trades ...</text>
    </g>

    <!-- Highlight Losing streak -->
    <rect x="-5" y="20" width="100" height="30" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="4" rx="4"/>
    <text x="45" y="15" class="text-danger" font-size="12" text-anchor="middle">Losing Streak</text>
    <path d="M 45 15 L 45 20" fill="none" stroke="#ff3366" stroke-width="1" />
  </g>

  <!-- Explanation Side -->
  <g transform="translate(480, 120)">
    <rect x="0" y="0" width="20" height="20" class="box-win" />
    <text x="35" y="15" class="text-light" font-size="16">= Trade Profit (Misal: +2R)</text>

    <rect x="0" y="40" width="20" height="20" class="box-loss" />
    <text x="35" y="55" class="text-light" font-size="16">= Trade Loss (-1R)</text>

    <rect x="0" y="80" width="20" height="20" class="box-empty" />
    <text x="35" y="95" class="text-light" font-size="16">= Trade Masa Depan</text>

    <text x="0" y="150" class="text-light" font-size="14" opacity="0.9">5 Trade awal bisa saja merah semua,</text>
    <text x="0" y="175" class="text-light" font-size="14" opacity="0.9">tetapi Edge Anda bersembunyi di dalam</text>
    <text x="0" y="200" class="text-light" font-size="14" opacity="0.9">kumpulan 100 trade secara utuh.</text>
  </g>

</svg>
