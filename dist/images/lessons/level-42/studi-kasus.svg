<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-accent { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-danger { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .grid-line { stroke: #3a3a5e; stroke-width: 1; stroke-dasharray: 4,4; }
      
      .line-budi { fill: none; stroke: #00ffaa; stroke-width: 4; stroke-linejoin: round; }
      .line-andi { fill: none; stroke: #ff3366; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="15" />

  <text x="400" y="40" class="text-light" font-size="24" font-weight="bold" text-anchor="middle">Studi Kasus: 2 Trader, 1 Strategi</text>
  <text x="400" y="65" class="text-light" font-size="14" text-anchor="middle" opacity="0.8">Perbandingan Kurva Ekuitas (Trader Emosional vs Trader Probabilitas)</text>

  <g transform="translate(100, 100)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#e0e0e0" stroke-width="2" />
    <line x1="0" y1="200" x2="600" y2="200" stroke="#e0e0e0" stroke-width="2" />

    <!-- Grid lines -->
    <line x1="0" y1="50" x2="600" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="600" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="600" y2="150" class="grid-line" />

    <!-- Labels Y axis -->
    <text x="-10" y="5" class="text-light" font-size="12" text-anchor="end">+$1,500</text>
    <text x="-10" y="105" class="text-light" font-size="12" text-anchor="end">Start $1k</text>
    <text x="-10" y="200" class="text-light" font-size="12" text-anchor="end">$0 (MC)</text>

    <!-- Label X axis -->
    <text x="300" y="225" class="text-light" font-size="12" text-anchor="middle">100 Trades</text>

    <!-- Path for Budi (Trader Probabilitas) -->
    <!-- Start at 100. Goes up and down but generally trends up to y=10 (+500 maybe let's make it end at y=40) -->
    <path d="M 0 100 L 20 105 L 40 110 L 60 115 L 80 95 L 100 75 L 120 80 L 140 60 L 160 65 L 180 45 L 200 50 L 220 30 L 240 35 L 260 55 L 280 60 L 300 40 L 320 20 L 340 25 L 360 30 L 380 10 L 400 15 L 420 20 L 440 0 L 460 -5 L 480 15 L 500 -10 L 520 10 L 540 -15 L 560 -10 L 580 -30 L 600 -20" class="line-budi" />
    
    <!-- Path for Andi (Trader Emosional) -->
    <!-- Start at 100. Over-leverages, cuts profit early, ends in MC (y=200) -->
    <path d="M 0 100 L 20 105 L 40 110 L 60 140 L 80 135 L 100 130 L 120 160 L 140 165 L 160 155 L 180 170 L 200 160 L 220 190 L 240 185 L 260 210 L 300 200" class="line-andi" />

    <!-- Markers for key events -->
    <!-- Event 1: Loss Beruntun -->
    <circle cx="60" cy="115" r="5" fill="#3a3a5e" stroke="#00ffaa" stroke-width="2" />
    <circle cx="60" cy="140" r="5" fill="#3a3a5e" stroke="#ff3366" stroke-width="2" />
    <text x="60" y="165" class="text-light" font-size="10" text-anchor="middle">3x Loss beruntun</text>

    <!-- Event 2: Budi konsisten, Andi MC -->
    <circle cx="260" cy="210" r="6" fill="#ff3366" />
    <text x="260" y="235" class="text-danger" font-size="12" font-weight="bold" text-anchor="middle">Andi Margin Call</text>

    <circle cx="600" cy="-20" r="6" fill="#00ffaa" />
    <text x="600" y="-35" class="text-accent" font-size="12" font-weight="bold" text-anchor="middle">Budi Profit +$500</text>
  </g>

  <!-- Legend Box -->
  <rect x="150" y="340" width="500" height="40" rx="6" fill="#2a2a4e" />
  
  <rect x="200" y="352" width="20" height="15" fill="#00ffaa" rx="2" />
  <text x="230" y="365" class="text-light" font-size="14">Trader Probabilitas (Disiplin Eksekusi)</text>

  <rect x="460" y="352" width="20" height="15" fill="#ff3366" rx="2" />
  <text x="490" y="365" class="text-light" font-size="14">Trader Emosional (Takut & Serakah)</text>

</svg>
