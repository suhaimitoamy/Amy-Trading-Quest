<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-accent { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-danger { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .scale-line { stroke: #e0e0e0; stroke-width: 6; stroke-linecap: round; }
      .box-loss { fill: #ff3366; stroke: #fff; stroke-width: 2; opacity: 0.9;}
      .box-win { fill: #00ffaa; stroke: #fff; stroke-width: 2; opacity: 0.9;}
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="15" />

  <text x="400" y="40" class="text-light" font-size="24" font-weight="bold" text-anchor="middle">Matematika dari Sebuah "Edge"</text>
  <text x="400" y="65" class="text-light" font-size="14" text-anchor="middle" opacity="0.8">Anda bisa salah lebih sering, asalkan saat Anda benar keuntungannya lebih besar</text>

  <!-- The Scale Base -->
  <g transform="translate(400, 300)">
    <path d="M -30 60 L 0 0 L 30 60 Z" fill="#3a3a5e" stroke="#e0e0e0" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#e0e0e0" />
    
    <!-- Tilted Scale Beam (Tilted down on the Right / Win side) -->
    <g transform="rotate(15)">
      <!-- Beam -->
      <line x1="-200" y1="0" x2="200" y2="0" class="scale-line" />
      
      <!-- Left Pan (Losses) -->
      <path d="M -200 0 L -230 40 L -170 40 Z" fill="none" stroke="#e0e0e0" stroke-width="2"/>
      <line x1="-200" y1="40" x2="-200" y2="40" class="scale-line"/>

      <!-- Right Pan (Wins) -->
      <path d="M 200 0 L 170 40 L 230 40 Z" fill="none" stroke="#e0e0e0" stroke-width="2"/>
    </g>
  </g>

  <!-- Blocks on the Scale -->
  <!-- Left Side (Losses): 6 blocks, each 20x20. (60% Loss) -->
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="30" height="30" class="box-loss" />
    <rect x="0" y="-30" width="30" height="30" class="box-loss" />
    <rect x="0" y="-60" width="30" height="30" class="box-loss" />
    
    <rect x="30" y="0" width="30" height="30" class="box-loss" />
    <rect x="30" y="-30" width="30" height="30" class="box-loss" />
    <rect x="30" y="-60" width="30" height="30" class="box-loss" />

    <text x="30" y="-80" class="text-danger" font-size="18" font-weight="bold" text-anchor="middle">6 LOSS</text>
    <text x="30" y="-100" class="text-light" font-size="14" text-anchor="middle">-$600</text>
    <text x="30" y="-120" class="text-danger" font-size="14" text-anchor="middle">(Win Rate 40%)</text>
  </g>

  <!-- Right Side (Wins): 4 blocks, but each represents RR 1:3 (so height/size is bigger). Total weight is 12 (4 * 3) -->
  <g transform="translate(560, 290)">
    <!-- Instead of 20x20, let's make them 30 wide by 90 high to show RR 1:3 -->
    <rect x="0" y="-90" width="30" height="90" class="box-win" />
    <rect x="35" y="-90" width="30" height="90" class="box-win" />
    <rect x="70" y="-90" width="30" height="90" class="box-win" />
    <rect x="105" y="-90" width="30" height="90" class="box-win" />

    <text x="65" y="-110" class="text-accent" font-size="18" font-weight="bold" text-anchor="middle">4 WIN</text>
    <text x="65" y="-130" class="text-light" font-size="14" text-anchor="middle">+$1,200</text>
    <text x="65" y="-150" class="text-accent" font-size="14" text-anchor="middle">(Risk:Reward 1:3)</text>
  </g>

  <!-- Math Explanation -->
  <g transform="translate(100, 360)">
    <text x="0" y="0" class="text-light" font-size="16" font-weight="bold">Net Profit:</text>
    <text x="90" y="0" class="text-accent" font-size="16" font-weight="bold">+$1,200</text>
    <text x="160" y="0" class="text-light" font-size="16">-</text>
    <text x="180" y="0" class="text-danger" font-size="16" font-weight="bold">$600</text>
    <text x="230" y="0" class="text-light" font-size="16">=</text>
    <text x="250" y="0" class="text-accent" font-size="20" font-weight="bold">+$600 (EDGE POSITIF)</text>
  </g>

</svg>
