<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-accent { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-title { fill: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .box { fill: #2a2a4e; stroke: #e0e0e0; stroke-width: 2; rx: 8; opacity: 0.9; }
      .path-line { fill: none; stroke: #00ffaa; stroke-width: 3; stroke-dasharray: 5,5; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="15" />

  <text x="400" y="40" class="text-title" font-size="24" text-anchor="middle">Blueprint Pola Pikir Probabilitas</text>
  <text x="400" y="65" class="text-light" font-size="14" text-anchor="middle" opacity="0.8">Rangkuman Level 42</text>

  <!-- Flowchart / Mindmap layout -->
  
  <!-- Central Concept -->
  <rect x="300" y="150" width="200" height="60" class="box" fill="#3a3a5e"/>
  <text x="400" y="175" class="text-accent" font-size="16" text-anchor="middle">EDGE (Keunggulan)</text>
  <text x="400" y="195" class="text-light" font-size="12" text-anchor="middle">Win Rate x Risk:Reward</text>

  <!-- Lines connecting central to 4 pillars -->
  <path d="M 400 150 L 400 110 L 200 110 L 200 120" class="path-line" /> <!-- Top Left -->
  <path d="M 400 150 L 400 110 L 600 110 L 600 120" class="path-line" /> <!-- Top Right -->
  <path d="M 400 210 L 400 250 L 200 250 L 200 240" class="path-line" /> <!-- Bottom Left -->
  <path d="M 400 210 L 400 250 L 600 250 L 600 240" class="path-line" /> <!-- Bottom Right -->

  <!-- Top Left: 100 Trades -->
  <rect x="100" y="60" width="200" height="60" class="box" />
  <text x="200" y="85" class="text-accent" font-size="14" text-anchor="middle">The Next 100 Trades</text>
  <text x="200" y="105" class="text-light" font-size="12" text-anchor="middle">Evaluasi jangka panjang</text>

  <!-- Top Right: Acak -->
  <rect x="500" y="60" width="200" height="60" class="box" />
  <text x="600" y="85" class="text-accent" font-size="14" text-anchor="middle">1 Trade = Acak</text>
  <text x="600" y="105" class="text-light" font-size="12" text-anchor="middle">Berhenti memprediksi pasti</text>

  <!-- Bottom Left: Biaya Bisnis -->
  <rect x="100" y="240" width="200" height="60" class="box" />
  <text x="200" y="265" class="text-accent" font-size="14" text-anchor="middle">Terima Kerugian</text>
  <text x="200" y="285" class="text-light" font-size="12" text-anchor="middle">Loss = Biaya Bisnis</text>

  <!-- Bottom Right: Eksekusi Robot -->
  <rect x="500" y="240" width="200" height="60" class="box" />
  <text x="600" y="265" class="text-accent" font-size="14" text-anchor="middle">Eksekusi Tanpa Emosi</text>
  <text x="600" y="285" class="text-light" font-size="12" text-anchor="middle">Disiplin jalankan Plan</text>

  <!-- Bottom Text -->
  <text x="400" y="350" class="text-light" font-size="16" font-style="italic" text-anchor="middle">"Anda tidak bisa menaklukkan pasar. Anda hanya bisa menaklukkan diri Anda sendiri."</text>
</svg>
