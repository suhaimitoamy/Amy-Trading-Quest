<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-accent { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-danger { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .line-equity { fill: none; stroke: #00ffaa; stroke-width: 4; stroke-linejoin: round; }
      .line-drawdown { fill: none; stroke: #ff3366; stroke-width: 4; stroke-linejoin: round; }
      .bar-win { fill: #00ffaa; opacity: 0.7; }
      .bar-loss { fill: #ff3366; opacity: 0.7; }
      .grid-line { stroke: #3a3a5e; stroke-width: 1; stroke-dasharray: 5,5; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="15" />

  <text x="400" y="40" class="text-light" font-size="24" font-weight="bold" text-anchor="middle">Menerima Kerugian sebagai "Biaya Bisnis"</text>
  <text x="400" y="65" class="text-light" font-size="14" text-anchor="middle" opacity="0.8">Losing Streak adalah normal; itu hanyalah lekukan sementara pada kurva ekuitas Anda</text>

  <!-- Chart axes -->
  <g transform="translate(100, 100)">
    <!-- Y axis (Saldo) -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#e0e0e0" stroke-width="2" />
    <!-- X axis (Trades) -->
    <line x1="0" y1="200" x2="600" y2="200" stroke="#e0e0e0" stroke-width="2" />

    <!-- Grid Lines -->
    <line x1="0" y1="50" x2="600" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="600" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="600" y2="150" class="grid-line" />

    <text x="-15" y="15" class="text-light" font-size="12" text-anchor="end">+$500</text>
    <text x="-15" y="105" class="text-light" font-size="12" text-anchor="end">Breakeven</text>
    <text x="-15" y="195" class="text-light" font-size="12" text-anchor="end">-$500</text>

    <!-- Equity Curve Lines -->
    <!-- Start at 100 (breakeven in chart coords). Y goes down as value goes up in SVG! -->
    <!-- Trades: 0, 1(W), 2(W), 3(L), 4(L), 5(L), 6(L), 7(W), 8(W), 9(W) -->
    
    <!-- Win segment 1 -->
    <path d="M 0 100 L 50 70 L 100 40 L 150 60" class="line-equity" />
    
    <!-- Losing streak segment -->
    <path d="M 150 60 L 200 80 L 250 100 L 300 120 L 350 140" class="line-drawdown" />
    
    <!-- Win segment 2 recovery -->
    <path d="M 350 140 L 400 110 L 450 80 L 500 50 L 550 20 L 600 40" class="line-equity" />

    <!-- Points / Dots for each trade -->
    <circle cx="0" cy="100" r="4" fill="#e0e0e0" />
    <circle cx="50" cy="70" r="4" fill="#00ffaa" />
    <circle cx="100" cy="40" r="4" fill="#00ffaa" />
    
    <circle cx="150" cy="60" r="4" fill="#ff3366" />
    <circle cx="200" cy="80" r="4" fill="#ff3366" />
    <circle cx="250" cy="100" r="4" fill="#ff3366" />
    <circle cx="300" cy="120" r="4" fill="#ff3366" />
    <circle cx="350" cy="140" r="4" fill="#ff3366" />

    <circle cx="400" cy="110" r="4" fill="#00ffaa" />
    <circle cx="450" cy="80" r="4" fill="#00ffaa" />
    <circle cx="500" cy="50" r="4" fill="#00ffaa" />
    <circle cx="550" cy="20" r="4" fill="#00ffaa" />
    <circle cx="600" cy="40" r="4" fill="#ff3366" />

    <!-- Highlight Box for Losing Streak -->
    <rect x="130" y="40" width="240" height="120" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="6" rx="8" opacity="0.6"/>
    
    <!-- Labels -->
    <text x="250" y="25" class="text-danger" font-size="14" font-weight="bold" text-anchor="middle">Losing Streak (Drawdown)</text>
    <path d="M 250 30 L 250 80" fill="none" stroke="#ff3366" stroke-width="1" marker-end="url(#arrow-down)" opacity="0.6"/>
    
    <text x="500" y="5" class="text-accent" font-size="14" font-weight="bold" text-anchor="middle">Recovery / New High</text>

    <!-- Bottom Axis labels -->
    <text x="300" y="225" class="text-light" font-size="12" text-anchor="middle">Jumlah Trades (Waktu)</text>
  </g>

  <defs>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#ff3366" opacity="0.6"/>
    </marker>
  </defs>

  <rect x="100" y="340" width="600" height="40" rx="6" fill="#2a2a4e" />
  <text x="400" y="365" class="text-light" font-size="14" text-anchor="middle">"Trader profesional tidak hancur oleh Drawdown, karena mereka tahu Edge mereka akan memulihkannya."</text>
</svg>
