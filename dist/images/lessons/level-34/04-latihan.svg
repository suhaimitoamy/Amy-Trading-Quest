<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  <text x="50" y="50" fill="#00ffaa" font-family="Arial" font-size="24" font-weight="bold">Prosedur Cooling Down</text>
  
  <!-- Step 1 -->
  <rect x="50" y="100" width="200" height="150" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2" />
  <text x="150" y="150" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">1. Profit Besar</text>
  <text x="150" y="180" fill="#00ffaa" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">+10%</text>
  <text x="150" y="210" fill="#aaa" font-family="Arial" font-size="14" text-anchor="middle">Target Harian Tercapai</text>
  
  <path d="M 260 175 L 290 175" fill="none" stroke="#fff" stroke-width="4" marker-end="url(#arrow)" />
  
  <!-- Step 2 -->
  <rect x="300" y="100" width="200" height="150" rx="10" fill="#2a2a4e" stroke="#ffaa00" stroke-width="2" />
  <text x="400" y="150" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">2. Tutup Chart</text>
  <rect x="375" y="170" width="10" height="40" fill="#ffaa00" />
  <rect x="415" y="170" width="10" height="40" fill="#ffaa00" />
  <text x="400" y="230" fill="#aaa" font-family="Arial" font-size="14" text-anchor="middle">Jeda &amp; Istirahat</text>

  <path d="M 510 175 L 540 175" fill="none" stroke="#fff" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Step 3 -->
  <rect x="550" y="100" width="200" height="150" rx="10" fill="#2a2a4e" stroke="#00aaff" stroke-width="2" />
  <text x="650" y="150" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">3. Withdrawal</text>
  <text x="650" y="190" fill="#00aaff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">$$$</text>
  <text x="650" y="230" fill="#aaa" font-family="Arial" font-size="14" text-anchor="middle">Nikmati Hasil Nyata</text>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fff" />
    </marker>
  </defs>
</svg>
