<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <!-- Left Side: Disiplin -->
  <rect x="20" y="20" width="370" height="360" rx="10" fill="#22223a" stroke="#00ffaa" stroke-width="2" />
  <text x="205" y="60" fill="#00ffaa" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Trader Disiplin</text>
  <polyline points="50,300 100,280 150,290 200,250 250,260 300,210 350,220" fill="none" stroke="#00ffaa" stroke-width="3" />
  <text x="205" y="350" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Risk 1% konstan. Pertumbuhan lambat namun pasti.</text>

  <!-- Right Side: Overconfident -->
  <rect x="410" y="20" width="370" height="360" rx="10" fill="#22223a" stroke="#ff3366" stroke-width="2" />
  <text x="595" y="60" fill="#ff3366" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Trader Overconfident</text>
  <polyline points="440,300 490,250 540,150 590,80" fill="none" stroke="#00ffaa" stroke-width="3" />
  <polyline points="590,80 640,360 750,380" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="5,5" />
  <circle cx="590" cy="80" r="8" fill="#fff" />
  <text x="605" y="100" fill="#fff" font-family="Arial" font-size="12">Risk 10% All-in</text>
  <text x="595" y="350" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Merasa kebal, satu loss menghancurkan akun.</text>
</svg>
