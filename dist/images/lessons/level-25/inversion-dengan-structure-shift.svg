<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #ffffff; font-family: sans-serif; font-size: 16px; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .bullish { fill: #00ffaa; stroke: #00ffaa; stroke-width: 2; }
      .bearish { fill: #ff3366; stroke: #ff3366; stroke-width: 2; }
      .wick { stroke-width: 2; }
      .fvg-inv { fill: #ff3366; fill-opacity: 0.2; stroke: #ff3366; stroke-dasharray: 4; stroke-width: 2; }
      .line-mss { stroke: #ffffff; stroke-width: 2; stroke-dasharray: 5; }
      .line-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: bold; }
      .highlight { fill: #ffd700; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title" text-anchor="middle">Inversion FVG + Market Structure Shift (MSS)</text>
  <text x="400" y="70" class="text-light" text-anchor="middle">Kombinasi Probabilitas Tinggi (High Probability Setup)</text>

  <!-- Path showing market structure -->
  <path d="M 100 350 L 200 250 L 300 300 L 400 150 L 500 400 L 600 280 L 700 450" fill="none" stroke="#4a4a6a" stroke-width="4" stroke-linejoin="round" />

  <!-- Structure Points -->
  <circle cx="200" cy="250" r="5" fill="#ffffff" />
  <circle cx="300" cy="300" r="5" fill="#00ffaa" /> <!-- Higher Low -->
  <circle cx="400" cy="150" r="5" fill="#ffffff" /> <!-- Higher High / Sweep -->
  <circle cx="500" cy="400" r="5" fill="#ff3366" /> <!-- Lower Low -->
  <circle cx="600" cy="280" r="5" fill="#ffd700" /> <!-- Lower High / Entry -->

  <text x="300" y="325" fill="#00ffaa" font-family="sans-serif" font-size="12px" text-anchor="middle">Higher Low Terakhir</text>
  <text x="400" y="130" fill="#ffffff" font-family="sans-serif" font-size="12px" text-anchor="middle">Liquidity Sweep / BSL</text>

  <!-- MSS Line -->
  <line x1="280" y1="300" x2="520" y2="300" class="line-mss" />
  <text x="530" y="305" class="line-label">MSS (Structure Shift)</text>

  <!-- Bullish FVG that gets inverted -->
  <rect x="350" y="220" width="300" height="40" class="fvg-inv" />
  <text x="660" y="245" fill="#ff3366" font-family="sans-serif" font-size="14px" font-weight="bold">Inversion FVG</text>

  <!-- Drop highlighting the simultaneous break -->
  <!-- Candle breaking both FVG and MSS -->
  <line x1="450" y1="180" x2="450" y2="350" stroke="#ff3366" class="wick" />
  <rect x="440" y="200" width="20" height="130" class="bearish" />

  <text x="450" y="370" class="highlight" text-anchor="middle">Break FVG &amp; MSS</text>
  <text x="450" y="390" class="highlight" text-anchor="middle">Secara Bersamaan!</text>

  <!-- Entry Point -->
  <line x1="600" y1="350" x2="600" y2="260" stroke="#00ffaa" class="wick" />
  <rect x="590" y="270" width="20" height="60" class="bullish" />
  
  <path d="M 620 250 L 580 230" fill="none" stroke="#ffd700" stroke-width="2" />
  <text x="570" y="220" class="highlight" text-anchor="middle">Entry Sell di Sini</text>

  <!-- Continuation down -->
  <line x1="650" y1="280" x2="650" y2="420" stroke="#ff3366" class="wick" />
  <rect x="640" y="300" width="20" height="100" class="bearish" />

</svg>
