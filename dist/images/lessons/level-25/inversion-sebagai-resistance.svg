<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #ffffff; font-family: sans-serif; font-size: 16px; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .bullish { fill: #00ffaa; stroke: #00ffaa; stroke-width: 2; }
      .bearish { fill: #ff3366; stroke: #ff3366; stroke-width: 2; }
      .wick { stroke-width: 2; }
      .fvg-bullish { fill: #00ffaa; fill-opacity: 0.15; stroke: #00ffaa; stroke-dasharray: 4; stroke-width: 1; }
      .fvg-inversion { fill: #ff3366; fill-opacity: 0.25; stroke: #ff3366; stroke-dasharray: 4; stroke-width: 2; }
      .line-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; }
      .highlight { fill: #ffd700; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title" text-anchor="middle">Inversion FVG Sebagai Resistance</text>
  <text x="400" y="70" class="text-light" text-anchor="middle">Bullish FVG Ditembus Ke Bawah -> Menjadi Atap (Resistance)</text>

  <!-- Step 1: Bullish FVG Creation -->
  <rect x="100" y="190" width="150" height="60" class="fvg-bullish" />
  <text x="175" y="180" fill="#00ffaa" font-family="sans-serif" font-size="14px" text-anchor="middle">Bullish FVG</text>
  
  <line x1="130" y1="280" x2="130" y2="200" stroke="#00ffaa" class="wick" />
  <rect x="120" y="210" width="20" height="40" class="bullish" />
  
  <line x1="170" y1="260" x2="170" y2="130" stroke="#00ffaa" class="wick" />
  <rect x="160" y="150" width="20" height="80" class="bullish" />

  <line x1="210" y1="180" x2="210" y2="100" stroke="#00ffaa" class="wick" />
  <rect x="200" y="120" width="20" height="40" class="bullish" />

  <!-- Step 2: Breakout Down -->
  <rect x="250" y="190" width="200" height="60" class="fvg-inversion" />
  <text x="350" y="180" fill="#ff3366" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Inversion (Resistance)</text>

  <line x1="320" y1="130" x2="320" y2="280" stroke="#ff3366" class="wick" />
  <rect x="310" y="150" width="20" height="110" class="bearish" />
  
  <path d="M 280 160 L 320 260" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4" />
  <text x="310" y="310" class="highlight" text-anchor="middle">Body Close di bawah!</text>

  <!-- Step 3: Retest and Drop -->
  <rect x="450" y="190" width="250" height="60" class="fvg-inversion" />
  
  <!-- Bullish pullback -->
  <line x1="500" y1="300" x2="500" y2="240" stroke="#00ffaa" class="wick" />
  <rect x="490" y="250" width="20" height="30" class="bullish" />

  <line x1="550" y1="260" x2="550" y2="200" stroke="#00ffaa" class="wick" />
  <rect x="540" y="210" width="20" height="30" class="bullish" />

  <!-- Drop -->
  <line x1="620" y1="180" x2="620" y2="350" stroke="#ff3366" class="wick" />
  <rect x="610" y="210" width="20" height="120" class="bearish" />

  <!-- Explanatory lines and labels -->
  <line x1="450" y1="250" x2="700" y2="250" stroke="#ffffff" stroke-dasharray="2" />
  <text x="710" y="255" class="line-label">Batas Bawah iFVG (Entry Sell)</text>

  <line x1="450" y1="190" x2="700" y2="190" stroke="#00ffaa" stroke-dasharray="2" />
  <text x="710" y="195" fill="#00ffaa" font-family="sans-serif" font-size="14px">Batas Atas (Stop Loss)</text>

  <circle cx="580" cy="210" r="15" fill="none" stroke="#ffd700" stroke-width="2" />
  <text x="580" y="170" class="highlight" text-anchor="middle">Retest &amp; Entry</text>

  <!-- Arrow Path -->
  <path d="M 330 280 Q 450 350 550 200 Q 580 180 620 330" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="6" />

</svg>
