<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e;">
  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Equal Highs &amp; Equal Lows (EQH / EQL)</text>

  <!-- EQH Section -->
  <text x="200" y="100" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Equal Highs (EQH)</text>
  <line x1="50" y1="180" x2="350" y2="180" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="200" y="160" fill="#00ffaa" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">$$$ Liquidity $$$</text>
  <text x="200" y="175" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">(Retail Resistance / Stop Loss Mapan)</text>

  <path d="M 50 350 L 120 180 L 160 250 L 220 180 L 260 280 L 300 130 L 330 350" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <ellipse cx="300" cy="130" rx="20" ry="15" fill="none" stroke="#ffff00" stroke-width="2"/>
  <text x="350" y="125" fill="#ffff00" font-family="Arial" font-size="12" font-weight="bold">Sweep!</text>

  <!-- EQL Section -->
  <text x="600" y="100" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Equal Lows (EQL)</text>
  <line x1="450" y1="350" x2="750" y2="350" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="600" y="380" fill="#ff3366" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">$$$ Liquidity $$$</text>
  <text x="600" y="395" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">(Retail Support / Stop Loss Mapan)</text>

  <path d="M 450 180 L 520 350 L 560 250 L 620 350 L 660 220 L 700 400 L 730 150" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>

  <ellipse cx="700" cy="400" rx="20" ry="15" fill="none" stroke="#ffff00" stroke-width="2"/>
  <text x="740" y="415" fill="#ffff00" font-family="Arial" font-size="12" font-weight="bold">Sweep!</text>
</svg>
