<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">HTF Bias (Higher Time Frame)</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Menentukan Arus Utama Pasar</text>
  
  <!-- H4 Bullish Structure -->
  <polyline points="100,400 200,350 250,380 350,280 400,320 500,200 550,250 650,120" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  
  <!-- Labels -->
  <circle cx="100" cy="400" r="6" fill="#00ffaa" />
  <text x="100" y="425" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Low</text>
  
  <circle cx="200" cy="350" r="6" fill="#00ffaa" />
  <text x="200" y="335" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HH</text>
  
  <circle cx="250" cy="380" r="6" fill="#00ffaa" />
  <text x="250" y="405" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HL</text>

  <circle cx="350" cy="280" r="6" fill="#00ffaa" />
  <text x="350" y="265" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HH</text>

  <circle cx="400" cy="320" r="6" fill="#00ffaa" />
  <text x="400" y="345" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HL</text>
  
  <circle cx="500" cy="200" r="6" fill="#00ffaa" />
  <text x="500" y="185" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HH</text>
  
  <circle cx="550" cy="250" r="6" fill="#00ffaa" />
  <text x="550" y="275" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HL</text>
  
  <circle cx="650" cy="120" r="6" fill="#00ffaa" />
  <text x="650" y="105" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">HH</text>

  <!-- Explanation box -->
  <rect x="50" y="100" width="220" height="90" fill="#2a2a4e" rx="8" stroke="#00ffaa" stroke-width="2" opacity="0.9" />
  <text x="65" y="130" font-family="Arial" font-size="16" fill="#ffffff" font-weight="bold">Bullish Bias</text>
  <text x="65" y="155" font-family="Arial" font-size="14" fill="#a0a0b0">Membentuk urutan</text>
  <text x="65" y="175" font-family="Arial" font-size="14" fill="#a0a0b0">Higher High &amp; Higher Low.</text>
  
  <!-- LTF Noise indication -->
  <path d="M 400,320 Q 425,300 450,330 T 500,200" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="4" opacity="0.6" />
  <text x="480" y="290" font-family="Arial" font-size="12" fill="#ff3366" text-anchor="start">LTF Noise / Pullback</text>
</svg>
