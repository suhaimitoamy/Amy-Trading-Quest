<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">HTF Point of Interest (POI)</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Menandai Zona Reaksi Potensial di Timeframe Besar</text>
  
  <!-- Market structure -->
  <polyline points="100,350 250,350 300,150 400,250 500,100" fill="none" stroke="#555577" stroke-width="4" stroke-dasharray="6" />
  <polyline points="500,100 650,320" fill="none" stroke="#ff3366" stroke-width="4" stroke-linecap="round" />
  
  <!-- HTF POI Box (Order Block / Demand) -->
  <rect x="230" y="320" width="100" height="60" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-width="2" />
  <text x="280" y="355" font-family="Arial" font-size="14" fill="#00ffaa" text-anchor="middle" font-weight="bold">HTF POI</text>
  <text x="280" y="375" font-family="Arial" font-size="12" fill="#00ffaa" text-anchor="middle">(H4 Demand)</text>

  <!-- BOS Line -->
  <line x1="250" y1="200" x2="450" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="4" />
  <text x="400" y="190" font-family="Arial" font-size="12" fill="#ffffff">BOS</text>
  
  <!-- Price action showing pullback to POI -->
  <path d="M 650,320 C 660,330 670,360 700,340" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linecap="round" />
  
  <!-- Highlight Area -->
  <circle cx="650" cy="340" r="30" fill="none" stroke="#ffff00" stroke-width="2" stroke-dasharray="4" />
  <line x1="680" y1="340" x2="720" y2="340" stroke="#ffff00" stroke-width="2" />
  <text x="730" y="345" font-family="Arial" font-size="14" fill="#ffff00" text-anchor="start">Harga masuk POI</text>
  <text x="730" y="365" font-family="Arial" font-size="12" fill="#a0a0b0" text-anchor="start">Tunggu reaksi LTF!</text>

  <!-- Explanatory Text Box -->
  <rect x="50" y="100" width="200" height="80" fill="#2a2a4e" rx="8" stroke="#00ffaa" stroke-width="1" />
  <text x="60" y="125" font-family="Arial" font-size="14" fill="#ffffff" font-weight="bold">Mengapa POI Valid?</text>
  <text x="60" y="145" font-family="Arial" font-size="12" fill="#a0a0b0">- Memecah struktur (BOS)</text>
  <text x="60" y="165" font-family="Arial" font-size="12" fill="#a0a0b0">- Meninggalkan FVG/Impulse</text>

</svg>
