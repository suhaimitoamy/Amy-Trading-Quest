<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e; font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">RISK TO REWARD RATIO</text>

  <!-- Position Box Tool Setup -->
  
  <!-- Take Profit Area -->
  <rect x="300" y="100" width="200" height="150" fill="rgba(0, 255, 170, 0.2)" stroke="#00ffaa" stroke-width="2"/>
  <!-- Stop Loss Area -->
  <rect x="300" y="250" width="200" height="50" fill="rgba(255, 51, 102, 0.2)" stroke="#ff3366" stroke-width="2"/>

  <!-- Labels -->
  <text x="280" y="105" fill="#00ffaa" font-size="16" text-anchor="end" font-weight="bold">Take Profit</text>
  <text x="280" y="175" fill="#00ffaa" font-size="18" text-anchor="end">Reward: 3R</text>

  <text x="280" y="255" fill="#ffffff" font-size="16" text-anchor="end" font-weight="bold">Entry Point</text>
  <line x1="280" y1="250" x2="520" y2="250" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5"/>

  <text x="280" y="280" fill="#ff3366" font-size="18" text-anchor="end">Risk: 1R</text>
  <text x="280" y="305" fill="#ff3366" font-size="16" text-anchor="end" font-weight="bold">Stop Loss</text>

  <!-- Explanatory Text -->
  <rect x="550" y="150" width="200" height="120" fill="#2d2d44" rx="8"/>
  <text x="565" y="180" fill="#ffffff" font-size="14" font-weight="bold">Mathematical Edge:</text>
  <text x="565" y="205" fill="#aaaaaa" font-size="12">- 1% Risk per Trade</text>
  <text x="565" y="225" fill="#aaaaaa" font-size="12">- 3% Reward per Win</text>
  <text x="565" y="245" fill="#00ffaa" font-size="12">Win 3 of 10 = Still Profitable!</text>
</svg>
