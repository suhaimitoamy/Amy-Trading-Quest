<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e; font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">POI, ENTRY &amp; INVALIDATION</text>
  
  <!-- HTF POI Box -->
  <rect x="300" y="250" width="400" height="80" fill="rgba(0, 255, 170, 0.1)" stroke="#00ffaa" stroke-width="2"/>
  <text x="310" y="275" fill="#00ffaa" font-size="16" font-weight="bold">HTF POI (Demand / Order Block)</text>

  <!-- LTF Price Action -->
  <path d="M 100 100 L 200 200 L 250 150 L 350 300 L 450 120 L 500 180 L 650 80" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- LTF Lower High -->
  <line x1="200" y1="150" x2="500" y2="150" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="250" y="140" fill="#ff3366" font-size="14">Last Lower High</text>

  <!-- CHoCH -->
  <circle cx="430" cy="150" r="6" fill="#00ffaa"/>
  <text x="430" y="130" fill="#00ffaa" font-size="16" font-weight="bold" text-anchor="middle">CHoCH</text>

  <!-- Entry -->
  <rect x="470" y="180" width="60" height="20" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="1"/>
  <text x="530" y="195" fill="#ffffff" font-size="14" font-weight="bold">LTF Entry</text>
  <circle cx="500" cy="180" r="5" fill="#00ffaa"/>

  <!-- Invalidation / Stop Loss -->
  <line x1="300" y1="315" x2="600" y2="315" stroke="#ff3366" stroke-width="3"/>
  <text x="450" y="340" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">Invalidation Level (Stop Loss)</text>

</svg>
