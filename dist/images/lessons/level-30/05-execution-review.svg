<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e; font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">EXECUTION &amp; REVIEW LOOP</text>

  <!-- Loop Cycles -->
  <!-- Plan -->
  <circle cx="200" cy="200" r="60" fill="#2d2d44" stroke="#00ffaa" stroke-width="4"/>
  <text x="200" y="195" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">1. PLAN</text>
  <text x="200" y="215" fill="#aaaaaa" font-size="12" text-anchor="middle">HTF, Liq, POI</text>

  <!-- Execute -->
  <circle cx="400" cy="200" r="60" fill="#2d2d44" stroke="#ffaa00" stroke-width="4"/>
  <text x="400" y="195" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">2. EXECUTE</text>
  <text x="400" y="215" fill="#aaaaaa" font-size="12" text-anchor="middle">No Hesitation</text>

  <!-- Review -->
  <circle cx="600" cy="200" r="60" fill="#2d2d44" stroke="#00aaff" stroke-width="4"/>
  <text x="600" y="195" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">3. REVIEW</text>
  <text x="600" y="215" fill="#aaaaaa" font-size="12" text-anchor="middle">Journal &amp; Audit</text>

  <!-- Arrows -->
  <path d="M 270 200 L 330 200" fill="none" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 470 200 L 530 200" fill="none" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 600 270 Q 400 350, 200 270" fill="none" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Good/Bad Loss notes -->
  <rect x="500" y="280" width="180" height="70" fill="#1a1a2e" stroke="#555577" rx="5"/>
  <text x="510" y="305" fill="#00ffaa" font-size="14">Good Loss = Followed SOP</text>
  <text x="510" y="330" fill="#ff3366" font-size="14">Bad Win = Broke Rules</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
