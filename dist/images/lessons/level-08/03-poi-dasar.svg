<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Point of Interest (POI) / Area Pantauan</text>

  <!-- POI Box -->
  <rect x="150" y="100" width="600" height="60" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="450" y="135" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Area Supply Kuat (POI)</text>

  <!-- Chart line -->
  <path d="M 100 300 L 180 120 L 250 250 L 380 350 L 500 200 L 600 150 L 680 130" fill="none" stroke="#a0a0c0" stroke-width="4"/>
  
  <!-- The initial strong drop -->
  <path d="M 180 120 L 250 250" fill="none" stroke="#ff3366" stroke-width="6"/>
  <text x="250" y="180" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="start">Pergerakan kuat awal</text>
  
  <!-- Magnifying glass / Alert -->
  <circle cx="680" cy="130" r="25" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <line x1="662" y1="148" x2="640" y2="170" stroke="#00ffaa" stroke-width="4"/>
  
  <rect x="580" y="60" width="150" height="30" rx="5" fill="#00ffaa"/>
  <text x="655" y="80" fill="#1a1a2e" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">TUNGGU DI SINI!</text>

  <text x="650" y="210" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Harga masuk POI.</text>
  <text x="650" y="230" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">Cari konfirmasi di LTF.</text>
</svg>