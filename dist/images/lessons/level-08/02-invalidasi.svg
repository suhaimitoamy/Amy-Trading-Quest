<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Titik Invalidasi (Logika Stop Loss)</text>
  
  <path d="M 100 300 L 200 150 L 300 250 L 450 100 L 550 200 L 700 80" fill="none" stroke="#00ffaa" stroke-width="4"/>
  
  <circle cx="300" cy="250" r="8" fill="#ffffff"/>
  <text x="300" y="235" fill="#a0a0c0" font-family="Arial" font-size="14" text-anchor="middle">Higher Low (HL)</text>

  <circle cx="550" cy="200" r="8" fill="#ffffff"/>
  <text x="550" y="185" fill="#a0a0c0" font-family="Arial" font-size="14" text-anchor="middle">Higher Low (HL)</text>
  
  <!-- Invalidation Line -->
  <line x1="450" y1="215" x2="750" y2="215" stroke="#ff3366" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="580" y="225" width="200" height="40" rx="5" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="1"/>
  <text x="680" y="250" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Titik Invalidasi (Stop Loss)</text>
  <text x="680" y="275" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">Jika tembus = Uptrend Rusak</text>

  <circle cx="650" cy="130" r="8" fill="#00ffaa"/>
  <text x="650" y="115" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Entry Buy</text>
  
  <path d="M 650 130 L 650 215" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-down)"/>
  <text x="635" y="180" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="end">Jarak Risiko (Risk)</text>

  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,0 L5,9 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>