<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Siklus Entry Planner Profesional</text>

  <!-- Circle centers: 150, 400, 650 -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="50" fill="#24243e" stroke="#00ffaa" stroke-width="3"/>
    <text x="0" y="-5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Fase Sabar</text>
    <text x="0" y="15" fill="#00ffaa" font-family="Arial" font-size="12" text-anchor="middle">Cari POI</text>
  </g>

  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="50" fill="#24243e" stroke="#ffb347" stroke-width="3"/>
    <text x="0" y="-5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Objektif</text>
    <text x="0" y="15" fill="#ffb347" font-family="Arial" font-size="12" text-anchor="middle">Invalidasi (SL)</text>
  </g>

  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="50" fill="#24243e" stroke="#00bfff" stroke-width="3"/>
    <text x="0" y="-5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Waspada</text>
    <text x="0" y="15" fill="#00bfff" font-family="Arial" font-size="12" text-anchor="middle">Konfirmasi</text>
  </g>

  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="50" fill="#24243e" stroke="#ff3366" stroke-width="3"/>
    <text x="0" y="-5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Eksekusi</text>
    <text x="0" y="15" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">Checklist</text>
  </g>

  <!-- Arrows -->
  <!-- 1 to 2 -->
  <path d="M 185 165 L 350 115" fill="none" stroke="#505070" stroke-width="2" marker-end="url(#arrow-cycle)"/>
  <!-- 2 to 3 -->
  <path d="M 450 115 L 615 165" fill="none" stroke="#505070" stroke-width="2" marker-end="url(#arrow-cycle)"/>
  <!-- 3 to 4 -->
  <path d="M 615 235 L 450 285" fill="none" stroke="#505070" stroke-width="2" marker-end="url(#arrow-cycle)"/>
  <!-- 4 to 1 -->
  <path d="M 350 285 L 185 235" fill="none" stroke="#505070" stroke-width="2" marker-end="url(#arrow-cycle)"/>

  <defs>
    <marker id="arrow-cycle" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#505070" />
    </marker>
  </defs>
</svg>
