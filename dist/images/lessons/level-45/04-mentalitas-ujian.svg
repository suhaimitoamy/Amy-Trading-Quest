<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Psikologi Ujian Prop Firm</text>

  <!-- Left Side: Emotional Trader -->
  <rect x="50" y="100" width="300" height="400" rx="10" fill="#3a1a2e" stroke="#ff3366" stroke-width="2"/>
  <text x="200" y="140" fill="#ff3366" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Trader Emosional</text>
  
  <circle cx="200" cy="220" r="40" fill="none" stroke="#ff3366" stroke-width="3"/>
  <path d="M 185 210 Q 200 200 215 210" fill="none" stroke="#ff3366" stroke-width="2"/>
  <path d="M 185 235 Q 200 220 215 235" fill="none" stroke="#ff3366" stroke-width="2"/>
  
  <text x="200" y="300" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">"Saya harus lulus HARI INI!"</text>
  <text x="200" y="330" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">"Loss? Saya lipat gandakan lot!"</text>
  <text x="200" y="360" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Memelototi PnL berjam-jam</text>
  <rect x="100" y="400" width="200" height="40" rx="5" fill="#ff3366"/>
  <text x="200" y="425" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Hasil: Gagal (Blown Account)</text>

  <!-- Right Side: Disciplined Trader -->
  <rect x="450" y="100" width="300" height="400" rx="10" fill="#1a3a2e" stroke="#00ffaa" stroke-width="2"/>
  <text x="600" y="140" fill="#00ffaa" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Trader Disiplin</text>
  
  <circle cx="600" cy="220" r="40" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <path d="M 585 210 Q 600 200 615 210" fill="none" stroke="#00ffaa" stroke-width="2"/>
  <path d="M 585 230 Q 600 245 615 230" fill="none" stroke="#00ffaa" stroke-width="2"/>

  <text x="600" y="300" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">"Waktu tidak terbatas (Unlimited)."</text>
  <text x="600" y="330" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">"Loss? Risiko tetap 0.5%."</text>
  <text x="600" y="360" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Fokus pada Chart &amp; Setup</text>
  <rect x="500" y="400" width="200" height="40" rx="5" fill="#00ffaa"/>
  <text x="600" y="425" fill="#1a1a2e" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Hasil: Lulus &amp; Funded</text>

  <!-- Center Balance Scale Concept -->
  <path d="M 400 220 L 400 280" fill="none" stroke="#aaaaaa" stroke-width="2"/>
  <path d="M 370 250 L 430 250" fill="none" stroke="#aaaaaa" stroke-width="2"/>
  <text x="400" y="210" fill="#aaaaaa" font-family="Arial" font-size="12" text-anchor="middle">Pilihan Anda</text>

</svg>
