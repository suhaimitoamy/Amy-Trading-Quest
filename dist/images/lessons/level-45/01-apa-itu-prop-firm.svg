<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Konsep Proprietary Trading Firm (Prop Firm)</text>
  
  <rect x="50" y="150" width="200" height="300" rx="10" fill="#2d2d44" stroke="#4a4a6a" stroke-width="2"/>
  <text x="150" y="200" fill="#00ffaa" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Trader</text>
  <text x="150" y="240" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Punya Strategi (Skill)</text>
  <text x="150" y="270" fill="#ff3366" font-family="Arial" font-size="16" text-anchor="middle">Modal Terbatas</text>
  <path d="M120 320 Q150 280 180 320" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <circle cx="150" cy="360" r="40" fill="none" stroke="#ffffff" stroke-width="3"/>
  <text x="150" y="367" fill="#ffffff" font-family="Arial" font-size="20" text-anchor="middle">Skill</text>
  
  <rect x="550" y="150" width="200" height="300" rx="10" fill="#2d2d44" stroke="#4a4a6a" stroke-width="2"/>
  <text x="650" y="200" fill="#00ffaa" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Prop Firm</text>
  <text x="650" y="240" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Punya Modal Besar</text>
  <text x="650" y="270" fill="#ff3366" font-family="Arial" font-size="16" text-anchor="middle">Mencari Konsistensi</text>
  <rect x="610" y="320" width="80" height="50" rx="5" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <text x="650" y="352" fill="#00ffaa" font-family="Arial" font-size="24" text-anchor="middle">$$$</text>

  <!-- Flow -->
  <path d="M 270 200 L 530 200" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="400" y="180" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">1. Trader Bayar Biaya Ujian</text>

  <path d="M 530 280 L 270 280" fill="none" stroke="#00ffaa" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="400" y="260" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">2. Prop Firm Memberikan Modal (Mulai $10k - $200k)</text>

  <path d="M 270 360 L 530 360" fill="none" stroke="#00ffaa" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="400" y="340" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">3. Trader Trading &amp; Hasilkan Profit</text>

  <path d="M 530 440 L 270 440" fill="none" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="420" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">4. Profit Split (Trader 80% : 20% Prop Firm)</text>
  
  <rect x="250" y="480" width="300" height="80" rx="10" fill="#22223a" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="515" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Win-Win Solution</text>
  <text x="400" y="540" fill="#aaaaaa" font-family="Arial" font-size="14" text-anchor="middle">Trader tidak resiko uang besar, Prop Firm untung tanpa trading.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa"/>
    </marker>
  </defs>
</svg>
