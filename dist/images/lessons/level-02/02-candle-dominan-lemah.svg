<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="100" y="30" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Dominan</text>
    
  <line x1="100" y1="40" x2="100" y2="180" stroke="#00ffaa" stroke-width="2"/>
  <rect x="90" y="50" width="20" height="120" fill="#00ffaa" rx="2"/>

    <text x="300" y="30" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Lemah (Doji)</text>
    
  <line x1="300" y1="40" x2="300" y2="180" stroke="#00ffaa" stroke-width="2"/>
  <rect x="290" y="100" width="20" height="5" fill="#00ffaa" rx="2"/>

    <text x="100" y="190" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">Kekuatan Penuh</text>
    <text x="300" y="190" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">Keraguan</text>
  
</svg>