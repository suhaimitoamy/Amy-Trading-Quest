<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="30" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Engulfing (Menelan)</text>
    
  <line x1="160" y1="80" x2="160" y2="150" stroke="#ff4444" stroke-width="2"/>
  <rect x="150" y="100" width="20" height="40" fill="#ff4444" rx="2"/>

    
  <line x1="212.5" y1="50" x2="212.5" y2="170" stroke="#00ffaa" stroke-width="2"/>
  <rect x="200" y="70" width="25" height="80" fill="#00ffaa" rx="2"/>

    <text x="200" y="190" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Buyer mengalahkan Seller</text>
  
</svg>