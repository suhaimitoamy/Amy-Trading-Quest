<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <text x="400" y="60" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle">Dominan vs Lemah vs Rejection</text>
  
  <!-- Dominan Candle (Marubozu) -->
  <g transform="translate(150, 180)">
    <!-- Body only, no wick -->
    <rect x="-25" y="0" width="50" height="150" fill="#00ffaa" rx="3"/>
    
    <text x="0" y="190" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Dominan</text>
    <text x="0" y="215" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Full Body)</text>
    
    <text x="0" y="250" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Kontrol Penuh</text>
  </g>

  <!-- Lemah Candle (Doji) -->
  <g transform="translate(400, 180)">
    <!-- Wick seimbang -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#a0a0b0" stroke-width="4"/>
    <!-- Body sangat tipis -->
    <rect x="-20" y="70" width="40" height="10" fill="#a0a0b0" rx="2"/>
    
    <text x="0" y="190" fill="#a0a0b0" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Lemah / Doji</text>
    <text x="0" y="215" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Ragu-ragu)</text>
    
    <text x="0" y="250" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Seimbang (Seri)</text>
  </g>

  <!-- Rejection Candle (Pin bar) -->
  <g transform="translate(650, 180)">
    <!-- Wick panjang di bawah -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#00ffaa" stroke-width="4"/>
    <!-- Body kecil di atas -->
    <rect x="-20" y="0" width="40" height="30" fill="#00ffaa" rx="3"/>
    
    <!-- Anak panah menolak dari bawah -->
    <path d="M-40 140 L-10 110 L10 140" fill="none" stroke="#ffffff" stroke-width="2" />
    <line x1="-10" y1="140" x2="-10" y2="110" stroke="#ffffff" stroke-width="2" /> <!-- Fake arrow shape logic replaced by below -->
    <polygon points="-5,100 5,100 0,90" fill="#ffffff" />
    <line x1="0" y1="150" x2="0" y2="100" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
    
    <text x="0" y="190" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Rejection</text>
    <text x="0" y="215" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Penolakan)</text>
    
    <text x="0" y="250" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Harga Ditekan Naik</text>
  </g>
  
  <rect x="100" y="470" width="600" height="80" fill="#111122" rx="10" stroke="#333344" stroke-width="2"/>
  <text x="400" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">Rumus Sederhana:</text>
  <text x="400" y="525" fill="#00ffaa" font-family="sans-serif" font-size="16" text-anchor="middle">Body besar = Yakin | Body tipis = Ragu | Wick panjang = Menolak</text>

</svg>
