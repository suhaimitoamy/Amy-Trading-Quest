<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Siklus Likuiditas: Menjadi Pemburu, Bukan Mangsa</text>

  <rect x="50" y="80" width="200" height="100" fill="#2a2a4a" rx="10"/>
  <text x="150" y="110" fill="#00ffaa" font-size="16" font-weight="bold" text-anchor="middle">1. Identifikasi</text>
  <text x="150" y="135" fill="#ffffff" font-size="14" text-anchor="middle">Temukan BSL &amp; SSL</text>
  <text x="150" y="155" fill="#ffffff" font-size="14" text-anchor="middle">(Target Uang Ritel)</text>

  <path d="M 260 130 L 300 130" fill="none" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="310" y="80" width="200" height="100" fill="#2a2a4a" rx="10"/>
  <text x="410" y="110" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">2. Manipulasi</text>
  <text x="410" y="135" fill="#ffffff" font-size="14" text-anchor="middle">Tunggu Stop Hunt /</text>
  <text x="410" y="155" fill="#ffffff" font-size="14" text-anchor="middle">Liquidity Sweep (Sumbu)</text>

  <path d="M 520 130 L 560 130" fill="none" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="570" y="80" width="200" height="100" fill="#2a2a4a" rx="10"/>
  <text x="670" y="110" fill="#00ffaa" font-size="16" font-weight="bold" text-anchor="middle">3. Eksekusi</text>
  <text x="670" y="135" fill="#ffffff" font-size="14" text-anchor="middle">Masuk pasar BERSAMA</text>
  <text x="670" y="155" fill="#ffffff" font-size="14" text-anchor="middle">Institusi / Smart Money</text>

  <!-- Bottom section illustrating the flow -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="100" y="240" fill="#ff3366" font-size="14">SSL / Inducement</text>

  <path d="M 150 200 L 250 240 L 300 210 L 350 290 L 400 180 L 600 220" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
  
  <circle cx="350" cy="290" r="8" fill="#ff3366"/>
  <text x="350" y="320" fill="#ff3366" font-size="14" font-weight="bold" text-anchor="middle">SWEEP / STOP HUNT</text>
  
  <circle cx="400" cy="180" r="8" fill="#00ffaa"/>
  <text x="400" y="165" fill="#00ffaa" font-size="14" font-weight="bold" text-anchor="middle">Reaksi Valid (Ikut Beli!)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>