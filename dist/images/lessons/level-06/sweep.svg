<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Liquidity Sweep (Sapu Likuiditas)</text>

  <!-- Liquidity Line -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,6"/>
  <text x="710" y="155" fill="#00ffaa" font-size="16" font-weight="bold">BSL / Old High</text>

  <!-- Candle 1: Bullish moving up -->
  <rect x="250" y="180" width="30" height="80" fill="#00ffaa"/>
  <line x1="265" y1="160" x2="265" y2="280" stroke="#00ffaa" stroke-width="3"/>

  <!-- Candle 2: The Sweep -->
  <rect x="350" y="160" width="30" height="60" fill="#00ffaa"/>
  <!-- The long wick -->
  <line x1="365" y1="60" x2="365" y2="250" stroke="#00ffaa" stroke-width="3"/>
  <text x="390" y="90" fill="#ffffff" font-size="14" font-style="italic">Sumbu panjang (Wick) tembus garis</text>
  <text x="390" y="110" fill="#ffffff" font-size="14" font-style="italic">tapi tubuh candle tutup di bawah!</text>
  <path d="M 385 100 L 370 100" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <text x="365" y="45" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">SWEEP!</text>

  <!-- Candle 3: Reversal -->
  <rect x="450" y="160" width="30" height="120" fill="#ff3366"/>
  <line x1="465" y1="140" x2="465" y2="300" stroke="#ff3366" stroke-width="3"/>

  <!-- Candle 4: Dropping -->
  <rect x="550" y="200" width="30" height="100" fill="#ff3366"/>
  <line x1="565" y1="180" x2="565" y2="320" stroke="#ff3366" stroke-width="3"/>

</svg>