<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Mental Reset: Kembali ke Titik Netral</text>
  
  <!-- Left Side: Emotional Chaos -->
  <rect x="50" y="80" width="300" height="250" fill="#2a2a4a" rx="10"/>
  <text x="200" y="120" fill="#ff3366" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Setelah Loss (Tanpa Reset)</text>
  <path d="M 80 280 L 120 200 L 150 250 L 180 150 L 220 220 L 250 100 L 300 180 L 320 120" stroke="#ff3366" stroke-width="3" fill="none"/>
  <text x="200" y="300" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Panik, Marah, Balas Dendam</text>
  
  <!-- Arrow -->
  <path d="M 370 200 L 430 200" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- Right Side: Calm Reset -->
  <rect x="450" y="80" width="300" height="250" fill="#2a2a4a" rx="10"/>
  <text x="600" y="120" fill="#00ffaa" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Mental Reset</text>
  <path d="M 480 200 L 720 200" stroke="#00ffaa" stroke-width="4" stroke-dasharray="10, 5"/>
  <circle cx="600" cy="200" r="10" fill="#00ffaa"/>
  <text x="600" y="180" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Pikiran Objektif &amp; Netral</text>
  <text x="600" y="300" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Menerima Probabilitas</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
