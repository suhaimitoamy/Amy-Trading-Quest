<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Perbandingan Equity Curve (Trader A vs Trader B)</text>

  <!-- Graph Axes -->
  <path d="M 100 50 L 100 320 L 700 320" stroke="#ffffff" stroke-width="2" fill="none"/>
  <text x="70" y="60" fill="#ffffff" font-family="Arial" font-size="12">Equity</text>
  <text x="700" y="340" fill="#ffffff" font-family="Arial" font-size="12">Waktu / Trade</text>

  <!-- Starting point -->
  <circle cx="100" cy="150" r="5" fill="#ffffff"/>
  <text x="60" y="155" fill="#ffffff" font-family="Arial" font-size="12">$1000</text>

  <!-- Initial Loss (Both) -->
  <path d="M 100 150 L 200 180" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  <circle cx="200" cy="180" r="5" fill="#ffffff"/>
  <text x="180" y="200" fill="#ffffff" font-family="Arial" font-size="12">SL Pertama</text>

  <!-- Trader A Path (Red - Down) -->
  <path d="M 200 180 L 250 240 L 300 220 L 350 280 L 400 310" stroke="#ff3366" stroke-width="3" fill="none"/>
  <text x="410" y="315" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">Trader A (Revenge Trade)</text>

  <!-- Trader B Path (Green - Up) -->
  <path d="M 200 180 L 350 180 L 450 120 L 550 140 L 650 80" stroke="#00ffaa" stroke-width="3" fill="none"/>
  <text x="660" y="85" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold">Trader B (Mental Reset)</text>

  <!-- Label Trader B -->
  <text x="275" y="170" fill="#aaaaaa" font-family="Arial" font-size="12" text-anchor="middle">Berhenti &amp; Reset</text>
  
  <!-- Label Trader A -->
  <text x="280" y="270" fill="#aaaaaa" font-family="Arial" font-size="12" text-anchor="middle">Gandakan Lot</text>

</svg>
