<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Studi Kasus: Disiplin vs Impulsif</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Dua cara merespons satu pergerakan market yang sama</text>

  <!-- Divider -->
  <line x1="400" y1="120" x2="400" y2="550" stroke="#4a4a6a" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- Left Side: Trader A (Discipline) -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00ffaa" text-anchor="middle">Trader A (Pakai Checklist)</text>
  
  <!-- Setup Chart A -->
  <rect x="50" y="160" width="300" height="200" rx="10" fill="#24243e" stroke="#00ffaa" stroke-width="2"/>
  <path d="M70 280 L 150 180 L 200 240 L 250 190" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Waiting point -->
  <circle cx="250" cy="190" r="6" fill="#ffaa00"/>
  <text x="250" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ffaa00" text-anchor="middle">Tunggu Validasi</text>

  <!-- Checklist Paper A -->
  <rect x="100" y="380" width="200" height="150" rx="5" fill="#2d2d44" stroke="#4a4a6a" stroke-width="2"/>
  <text x="120" y="410" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Tren Searah?</text>
  <text x="120" y="440" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Harga di POI?</text>
  <text x="120" y="470" font-family="Arial, sans-serif" font-size="14" fill="#ff3366">❌ Ada CHoCH?</text>
  <text x="120" y="510" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffaa00">HASIL: NO ENTRY</text>

  <!-- Right Side: Trader B (Impulsive) -->
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">Trader B (FOMO)</text>
  
  <!-- Setup Chart B -->
  <rect x="450" y="160" width="300" height="200" rx="10" fill="#24243e" stroke="#ff3366" stroke-width="2"/>
  <path d="M470 280 L 550 180 L 600 240 L 650 190" fill="none" stroke="#444" stroke-width="3"/>
  <path d="M650 190 L 700 320" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="5,5"/> <!-- Crash -->
  <!-- Entry point -->
  <circle cx="650" cy="190" r="6" fill="#ff3366"/>
  <text x="650" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">BUY DI PUCUK</text>
  
  <!-- Boom / Stop Loss -->
  <text x="700" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ff3366" text-anchor="middle">💥 SL HIT!</text>

  <!-- Thoughts B -->
  <path d="M 480 380 Q 550 350 720 380 Q 600 450 480 380" fill="#2d2d44" opacity="0.8"/>
  <text x="600" y="405" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">"Wah candle naik kencang!"</text>
  <text x="600" y="425" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">"Pasti breakout ini!"</text>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">HASIL: RUGI KONYOL</text>

</svg>
