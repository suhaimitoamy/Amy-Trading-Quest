<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Pre-Entry Checklist: Terbang Aman</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Seperti pilot, trader wajib memiliki checklist sebelum 'lepas landas'</text>

  <!-- Clipboard Background -->
  <rect x="250" y="120" width="300" height="420" rx="15" fill="#2d2d44" stroke="#4a4a6a" stroke-width="3"/>
  
  <!-- Clipboard Clip -->
  <path d="M350 100 h100 v30 h-100 z" fill="#8888a0" rx="5"/>
  <circle cx="400" cy="115" r="8" fill="#1a1a2e"/>

  <!-- Checklist Items -->
  <g transform="translate(280, 180)">
    <!-- Item 1 -->
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    <path d="M5 12 l5 5 l10 -10" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="18" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Arah Tren Jelas?</text>
    
    <!-- Item 2 -->
    <rect x="0" y="50" width="24" height="24" rx="4" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    <path d="M5 62 l5 5 l10 -10" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="68" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Ada Area POI Valid?</text>

    <!-- Item 3 -->
    <rect x="0" y="100" width="24" height="24" rx="4" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    <path d="M5 112 l5 5 l10 -10" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="118" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Konfirmasi Entry (CHoCH)?</text>

    <!-- Item 4 -->
    <rect x="0" y="150" width="24" height="24" rx="4" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    <path d="M5 162 l5 5 l10 -10" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linecap="round"/>
    <text x="40" y="168" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Risiko Sudah Dihitung?</text>

    <!-- Item 5 (Empty) -->
    <rect x="0" y="200" width="24" height="24" rx="4" fill="#1a1a2e" stroke="#ff3366" stroke-width="2"/>
    <text x="40" y="218" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0">Emosi Sedang Stabil?</text>
    <text x="40" y="238" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">(Tunggu sampai stabil!)</text>
  </g>

  <!-- Decoration: Chart Lines -->
  <path d="M50 400 l50 -50 l30 20 l40 -60" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.3"/>
  <path d="M600 200 l40 -30 l30 40 l60 -80" fill="none" stroke="#ff3366" stroke-width="2" opacity="0.3"/>

</svg>
