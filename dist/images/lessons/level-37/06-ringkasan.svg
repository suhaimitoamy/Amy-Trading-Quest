<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <!-- Glowing Final Checklist Icon -->
  <g transform="translate(400, 250)">
    <!-- Outer Glow -->
    <circle cx="0" cy="0" r="120" fill="#00ffaa" opacity="0.1" />
    <circle cx="0" cy="0" r="90" fill="#00ffaa" opacity="0.2" />
    
    <!-- Checklist Base -->
    <path d="M-50 -70 L50 -70 L50 70 L-50 70 Z" fill="#2d2d44" stroke="#00ffaa" stroke-width="6" rx="10" />
    <path d="M-20 -80 L20 -80 L20 -60 L-20 -60 Z" fill="#ffffff" rx="3" />
    
    <!-- Checks -->
    <path d="M-30 -20 L-15 -5 L25 -40" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" />
    <path d="M-30 20 L-15 35 L25 0" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" />
    <path d="M-30 60 L-15 75 L25 40" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- Title & Subtitle -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Ringkasan Pre-Entry Checklist</text>
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="middle">Gerbang Menuju Trading yang Konsisten dan Objektif</text>

  <!-- Key Takeaways Boxes -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#24243e" stroke="#4a4a6a" stroke-width="2"/>
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffaa" text-anchor="middle">1. Objektivitas</text>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Checklist mengubah opini</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">subjektif menjadi fakta</text>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">teknikal yang solid.</text>
  </g>

  <g transform="translate(290, 420)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#24243e" stroke="#4a4a6a" stroke-width="2"/>
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffaa00" text-anchor="middle">2. Disiplin Mekanis</text>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Beri "Jeda" mental.</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Baca bersuara sebelum klik.</text>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Terapkan aturan tanpa kompromi.</text>
  </g>

  <g transform="translate(530, 420)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#24243e" stroke="#4a4a6a" stroke-width="2"/>
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">3. Perlindungan Diri</text>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Melindungi modal dari</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">jebakan FOMO, Boredom, dan</text>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Revenge Trading yang merusak.</text>
  </g>

  <!-- Stars Decoration -->
  <path d="M 220 200 L 230 220 L 250 225 L 235 240 L 240 260 L 220 250 L 200 260 L 205 240 L 190 225 L 210 220 Z" fill="#ffaa00" opacity="0.6"/>
  <path d="M 580 160 L 585 170 L 595 175 L 585 180 L 585 190 L 575 185 L 565 190 L 570 180 L 560 175 L 575 170 Z" fill="#00ffaa" opacity="0.6"/>
</svg>
