<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Displacement Setelah Liquidity Sweep</text>
  
  <line x1="100" y1="150" x2="500" y2="150" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,5" />
  <text x="110" y="140" fill="#ffcc00" font-family="Arial, sans-serif" font-size="14">Resistance / Buy-Side Liquidity</text>

  <!-- Path showing movement -->
  <!-- Creeping up -->
  <path d="M 150 250 L 200 200 L 250 230 L 320 180 L 370 210 L 420 120" fill="none" stroke="#a0a0b0" stroke-width="3" />
  <text x="400" y="100" fill="#ff3366" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Sweep (Manipulasi)</text>
  
  <!-- Displacement down -->
  <path d="M 420 120 L 450 320 L 480 300 L 520 380" fill="none" stroke="#ff3366" stroke-width="5" />
  
  <!-- Market structure shift line -->
  <line x1="350" y1="210" x2="550" y2="210" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <text x="560" y="215" fill="#00ffaa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Market Structure Shift (MSS)</text>
  
  <text x="500" y="280" fill="#ff3366" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Displacement Bearish</text>
</svg>
