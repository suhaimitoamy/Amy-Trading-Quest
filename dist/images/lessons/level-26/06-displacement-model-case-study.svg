<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Model Trading Displacement (Skenario Jual)</text>

  <!-- Liquidity Line -->
  <line x1="50" y1="120" x2="350" y2="120" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,5" />
  <text x="60" y="110" fill="#ffcc00" font-family="Arial, sans-serif" font-size="12">1. Target Likuiditas (Daily High)</text>

  <!-- Price Action -->
  <path d="M 50 250 L 150 180 L 200 220 L 250 130 L 280 150 L 320 80" fill="none" stroke="#a0a0b0" stroke-width="2" />
  <text x="330" y="90" fill="#ff3366" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2. Sweep</text>
  
  <!-- Displacement -->
  <path d="M 320 80 L 350 320" fill="none" stroke="#ff3366" stroke-width="5" />
  <text x="360" y="280" fill="#ff3366" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3. Displacement</text>

  <!-- MSS -->
  <line x1="250" y1="150" x2="450" y2="150" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <text x="460" y="155" fill="#00ffaa" font-family="Arial, sans-serif" font-size="12">Market Structure Shift (MSS)</text>

  <!-- Imbalance FVG box -->
  <rect x="335" y="160" width="150" height="50" fill="#ffffff" fill-opacity="0.15" />
  <text x="495" y="190" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">4. FVG (Entry Zone)</text>

  <!-- Pullback and Entry -->
  <path d="M 350 320 L 380 270 L 410 290 L 440 185" fill="none" stroke="#a0a0b0" stroke-width="2" />
  <circle cx="440" cy="185" r="5" fill="#ff3366" />
  <text x="420" y="175" fill="#ff3366" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SELL HERE</text>

  <!-- Continuation -->
  <path d="M 440 185 L 500 350 L 550 380" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <!-- Take Profit -->
  <line x1="450" y1="360" x2="600" y2="360" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5" />
  <text x="610" y="365" fill="#00ffaa" font-family="Arial, sans-serif" font-size="12">5. Target Likuiditas Bawah (TP)</text>

</svg>
