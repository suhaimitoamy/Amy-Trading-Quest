<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <!-- Outer glowing border -->
  <rect x="20" y="20" width="760" height="360" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.3" rx="15" />
  <rect x="30" y="30" width="740" height="340" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" rx="10" />
  
  <!-- Title -->
  <text x="400" y="70" fill="#ffffff" font-family="serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="2">THE MASTER TRADER</text>
  <text x="400" y="100" fill="#00ffaa" font-family="sans-serif" font-size="14" text-anchor="middle" letter-spacing="1">AMY TRADING QUEST - LEVEL 50</text>
  
  <!-- Three Pillars Shield -->
  <g transform="translate(400, 200)">
    <!-- Shield Background -->
    <path d="M-60,-50 L60,-50 L60,10 Q60,60 0,90 Q-60,60 -60,10 Z" fill="#252542" stroke="#00ffaa" stroke-width="3" />
    
    <!-- Star in the middle -->
    <path d="M0,-25 L10,-5 L30,-5 L15,10 L20,30 L0,20 L-20,30 L-15,10 L-30,-5 L-10,-5 Z" fill="#ffffff" />
    
    <!-- Lines radiating out to text -->
    <line x1="-60" y1="-20" x2="-150" y2="-20" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="60" y1="-20" x2="150" y2="-20" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="90" x2="0" y2="120" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="4,4" />
    
    <!-- Texts -->
    <text x="-160" y="-15" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="end">Proteksi Modal (Risk Management)</text>
    <text x="160" y="-15" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="start">Kedisiplinan Eksekusi (Edge)</text>
    <text x="0" y="140" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Keseimbangan Psikologis (Ikhlas)</text>
  </g>
  
  <text x="400" y="340" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">"Pasar adalah kanvas. Andalah yang memegang kuasnya."</text>
</svg>
