<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <!-- Zen Circle Background -->
  <circle cx="400" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" />
  <circle cx="400" cy="200" r="130" fill="none" stroke="#00ffaa" stroke-width="1" opacity="0.2" />
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Flow State (Zona Tenang)</text>
  
  <!-- Flow lines (Water/Waves) -->
  <path d="M200,280 Q300,240 400,280 T600,280" fill="none" stroke="#00ffaa" stroke-width="3" opacity="0.3" />
  <path d="M180,300 Q280,260 380,300 T620,300" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.2" />
  <path d="M220,320 Q320,280 420,320 T580,320" fill="none" stroke="#00ffaa" stroke-width="1" opacity="0.1" />
  
  <!-- Perfect Candlestick movement inside the flow -->
  <g transform="translate(250, 100)">
    <!-- Candle 1 -->
    <line x1="50" y1="120" x2="50" y2="80" stroke="#ff3366" stroke-width="2" />
    <rect x="45" y="90" width="10" height="20" fill="#ff3366" />
    
    <!-- Candle 2 -->
    <line x1="100" y1="140" x2="100" y2="100" stroke="#ff3366" stroke-width="2" />
    <rect x="95" y="110" width="10" height="20" fill="#ff3366" />
    
    <!-- FVG Mitigated -->
    <rect x="135" y="130" width="30" height="20" fill="#00ffaa" opacity="0.1" />
    <text x="150" y="170" fill="#00ffaa" font-family="sans-serif" font-size="12" text-anchor="middle">Mitigasi Tenang</text>
    
    <!-- Candle 3 (Reaction) -->
    <line x1="150" y1="150" x2="150" y2="100" stroke="#00ffaa" stroke-width="2" />
    <rect x="145" y="110" width="10" height="30" fill="#00ffaa" />
    
    <!-- Candle 4 -->
    <line x1="200" y1="120" x2="200" y2="60" stroke="#00ffaa" stroke-width="2" />
    <rect x="195" y="70" width="10" height="40" fill="#00ffaa" />
    
    <!-- Candle 5 -->
    <line x1="250" y1="80" x2="250" y2="30" stroke="#00ffaa" stroke-width="2" />
    <rect x="245" y="40" width="10" height="30" fill="#00ffaa" />
    
    <!-- Action points indicating flow -->
    <circle cx="150" cy="140" r="5" fill="#ffffff" />
    <text x="150" y="125" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Eksekusi Tanpa Emosi</text>
  </g>
  
  <text x="400" y="360" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">Tidak ada euforia, tidak ada depresi. Hanya eksekusi pada probabilitas.</text>
  
</svg>
