<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#1a1a2e" />
    <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">SBR &amp; RBS (Flip Zones)</text>
    
    <g transform="translate(50, 80)">
        <text x="150" y="0" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Resistance Become Support (RBS)</text>
        <rect x="20" y="120" width="280" height="30" fill="#00ffaa" opacity="0.3" />
        
        <path d="M 20 250 L 100 120 L 150 200 L 220 50 L 280 120 L 320 40" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        
        <circle cx="100" cy="120" r="6" fill="#ff3366" />
        <text x="100" y="105" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">Resistance</text>
        
        <circle cx="280" cy="120" r="6" fill="#00ffaa" />
        <text x="280" y="145" fill="#00ffaa" font-family="Arial" font-size="12" text-anchor="middle">Support (RBS)</text>
    </g>
    
    <line x1="400" y1="80" x2="400" y2="350" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" opacity="0.5" />

    <g transform="translate(420, 80)">
        <text x="150" y="0" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Support Become Resistance (SBR)</text>
        <rect x="20" y="160" width="280" height="30" fill="#ff3366" opacity="0.3" />
        
        <path d="M 20 50 L 100 160 L 150 80 L 220 250 L 280 160 L 320 260" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        
        <circle cx="100" cy="160" r="6" fill="#00ffaa" />
        <text x="100" y="195" fill="#00ffaa" font-family="Arial" font-size="12" text-anchor="middle">Support</text>
        
        <circle cx="280" cy="160" r="6" fill="#ff3366" />
        <text x="280" y="145" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">Resistance (SBR)</text>
    </g>
</svg>
