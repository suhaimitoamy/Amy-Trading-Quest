<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#1a1a2e" />
    <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">SNR Valid vs Lemah</text>
    
    <g transform="translate(50, 80)">
        <text x="150" y="0" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Valid (Kuat)</text>
        <rect x="0" y="180" width="300" height="40" fill="#00ffaa" opacity="0.2" />
        <path d="M 20 50 L 100 180 L 150 100 L 200 180 L 250 120 L 280 180" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        <text x="150" y="240" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Banyak Pantulan Rapi</text>
    </g>

    <line x1="400" y1="80" x2="400" y2="350" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" opacity="0.5" />

    <g transform="translate(450, 80)">
        <text x="150" y="0" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Lemah (Tembus)</text>
        <rect x="0" y="180" width="300" height="40" fill="#ff3366" opacity="0.2" />
        <path d="M 20 50 L 80 190 L 120 140 L 160 210 L 200 120 L 250 240 L 280 300" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        <text x="150" y="240" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Harga Menembus Area</text>
    </g>
</svg>
