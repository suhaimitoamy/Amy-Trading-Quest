<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="40" fill="#00ffaa" font-family="monospace" font-size="18" text-anchor="middle">TRADING = BUY LOW, SELL HIGH</text>
    
  <line x1="110" y1="70" x2="110" y2="150" stroke="#ff4444" stroke-width="2"/>
  <rect x="100" y="80" width="20" height="60" fill="#ff4444" rx="2"/>

    
  <line x1="150" y1="80" x2="150" y2="160" stroke="#00ffaa" stroke-width="2"/>
  <rect x="140" y="100" width="20" height="40" fill="#00ffaa" rx="2"/>

    
  <line x1="190" y1="50" x2="190" y2="120" stroke="#00ffaa" stroke-width="2"/>
  <rect x="180" y="60" width="20" height="50" fill="#00ffaa" rx="2"/>

    
  <line x1="230" y1="20" x2="230" y2="80" stroke="#00ffaa" stroke-width="2"/>
  <rect x="220" y="30" width="20" height="40" fill="#00ffaa" rx="2"/>

    <text x="110" y="170" fill="#8888ff" font-family="monospace" font-size="12" text-anchor="middle">Beli di sini ($60k)</text>
    <text x="230" y="100" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Jual di sini ($65k)</text>
    <line x1="120" y1="150" x2="210" y2="80" stroke="#4444ff" stroke-width="2" stroke-dasharray="5,5" filter="url(#glow)"/>
  
</svg>