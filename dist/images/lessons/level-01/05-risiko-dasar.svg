<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="30" fill="#ffffaa" font-family="monospace" font-size="14" text-anchor="middle">Risk Management</text>
    
  <line x1="200" y1="60" x2="200" y2="160" stroke="#00ffaa" stroke-width="2"/>
  <rect x="180" y="80" width="40" height="60" fill="#00ffaa" rx="2"/>

    <line x1="150" y1="80" x2="250" y2="80" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="120" y="85" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Entry</text>
    <line x1="150" y1="140" x2="250" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="120" y="145" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Stop Loss</text>
    <text x="320" y="110" fill="#ff4444" font-family="monospace" font-size="14" text-anchor="middle">Risk Maks: 1%</text>
    <text x="320" y="130" fill="#ff4444" font-family="monospace" font-size="10" text-anchor="middle">(Rugi Terukur)</text>
  
</svg>