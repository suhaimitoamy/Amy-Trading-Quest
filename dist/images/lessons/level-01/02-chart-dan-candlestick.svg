<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="100" y="30" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">BULLISH (Naik)</text>
    <text x="300" y="30" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">BEARISH (Turun)</text>
    
  <line x1="100" y1="50" x2="100" y2="170" stroke="#00ffaa" stroke-width="2"/>
  <rect x="90" y="70" width="20" height="80" fill="#00ffaa" rx="2"/>

    
  <line x1="300" y1="50" x2="300" y2="170" stroke="#ff4444" stroke-width="2"/>
  <rect x="290" y="70" width="20" height="80" fill="#ff4444" rx="2"/>

    <text x="50" y="50" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">High</text>
    <line x1="70" y1="50" x2="100" y2="50" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="2,2" filter="url(#glow)"/>
    <text x="50" y="75" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Close</text>
    <line x1="70" y1="70" x2="90" y2="70" stroke="#00ffaa" stroke-width="1" stroke-dasharray="2,2" filter="url(#glow)"/>
    <text x="50" y="145" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Open</text>
    <line x1="70" y1="150" x2="90" y2="150" stroke="#00ffaa" stroke-width="1" stroke-dasharray="2,2" filter="url(#glow)"/>
    <text x="50" y="175" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">Low</text>
    <line x1="70" y1="170" x2="100" y2="170" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="2,2" filter="url(#glow)"/>

    <text x="350" y="50" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">High</text>
    <text x="350" y="75" fill="#ff4444" font-family="monospace" font-size="12" text-anchor="middle">Open</text>
    <text x="350" y="145" fill="#ff4444" font-family="monospace" font-size="12" text-anchor="middle">Close</text>
    <text x="350" y="175" fill="#aaaaaa" font-family="monospace" font-size="12" text-anchor="middle">Low</text>
  
</svg>