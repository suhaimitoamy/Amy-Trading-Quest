<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Hitung Lot</text>
    <text x="200" y="80" fill="#ffff00" font-family="monospace" font-size="16" text-anchor="middle">Lot = Risk ($) / Jarak SL</text>
    <text x="200" y="120" fill="#00ffaa" font-family="monospace" font-size="14" text-anchor="middle">SL Makin Lebar = Lot Makin Kecil</text>
  
</svg>