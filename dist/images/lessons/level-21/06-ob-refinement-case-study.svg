<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Case Study: Order Block Refinement</text>

  <!-- Step 1: H4 Context -->
  <rect x="50" y="80" width="700" height="380" fill="#0f3460" fill-opacity="0.3" stroke="#0f3460" stroke-width="2" />
  
  <rect x="100" y="380" width="600" height="60" fill="#00ffaa" fill-opacity="0.1" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5" />
  <text x="120" y="430" fill="#00ffaa" font-size="14" font-weight="bold">H4 Bullish Order Block (POI Utama)</text>

  <!-- Step 2: Price retracing into H4 OB -->
  <path d="M 100 100 L 150 180 L 200 150 L 250 250 L 300 220 L 350 350 L 400 280 L 450 420" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <text x="250" y="140" fill="#ffffff" font-size="12">Harga turun menguji H4 OB</text>

  <!-- Step 3: Zooming into M15 -->
  <!-- M15 Area Highlight -->
  <circle cx="450" cy="420" r="40" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="480" y1="390" x2="550" y2="300" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  
  <!-- Zoom Window Box -->
  <rect x="550" y="120" width="220" height="220" fill="#16213e" stroke="#ffffff" stroke-width="2" />
  <text x="660" y="145" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">M15 Timeframe (Zoom)</text>

  <!-- Inside Zoom Window: The CHoCH and Refined OB -->
  <path d="M 560 180 L 590 260 L 620 220 L 650 300 L 680 180" fill="none" stroke="#ff3366" stroke-width="2" />
  <path d="M 680 180 L 710 270 L 750 160" fill="none" stroke="#00ffaa" stroke-width="3" />

  <!-- M15 CHoCH Line -->
  <line x1="610" y1="220" x2="700" y2="220" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3" />
  <text x="705" y="225" fill="#ffffff" font-size="10">CHoCH</text>

  <!-- M15 Refined OB -->
  <rect x="640" y="290" width="30" height="20" fill="#00ffaa" fill-opacity="0.4" stroke="#00ffaa" stroke-width="1" />
  <text x="630" y="325" fill="#00ffaa" font-size="10">M15 OB (Entry)</text>

  <!-- Entry and R:R -->
  <circle cx="710" cy="270" r="4" fill="#00ffaa" />
  <text x="720" y="275" fill="#00ffaa" font-size="10" font-weight="bold">BUY</text>

  <!-- Step 4: Outcome on Main Chart -->
  <path d="M 450 420 L 500 250 L 550 280 L 700 80" fill="none" stroke="#00ffaa" stroke-width="4" />
  <text x="600" y="90" fill="#00ffaa" font-size="14" font-weight="bold">Target Take Profit: H4 Swing High</text>

  <!-- R:R info -->
  <rect x="70" y="100" width="160" height="60" fill="#0f3460" fill-opacity="0.8" rx="4" />
  <text x="80" y="120" fill="#ffffff" font-size="12">Risk (SL M15) = 5 Pips</text>
  <text x="80" y="140" fill="#00ffaa" font-size="12">Reward (TP H4) = 100 Pips</text>
  <text x="80" y="155" fill="#00ffaa" font-size="12" font-weight="bold">R:R = 1 : 20</text>

</svg>
