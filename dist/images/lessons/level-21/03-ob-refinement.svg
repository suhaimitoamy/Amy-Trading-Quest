<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <text x="400" y="50" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Order Block Refinement (H4 ke M15)</text>

  <!-- H4 Order Block Box (Large) -->
  <rect x="100" y="100" width="600" height="350" fill="#00ffaa" fill-opacity="0.1" stroke="#00ffaa" stroke-width="2" stroke-dasharray="8,4" />
  <text x="120" y="130" fill="#00ffaa" font-size="18" font-weight="bold">Zona H4 Bullish Order Block (Lebar: 50 Pips)</text>

  <!-- Inside the H4 OB: showing M15 structure -->
  <!-- Falling price into H4 OB -->
  <path d="M 200 80 L 250 150 L 300 120 L 350 250 L 400 200 L 450 350 L 500 280 L 550 400" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <!-- M15 Refined OB at the extreme bottom -->
  <rect x="520" y="380" width="220" height="40" fill="#00ffaa" fill-opacity="0.3" stroke="#00ffaa" stroke-width="2" />
  <text x="530" y="405" fill="#00ffaa" font-size="16" font-weight="bold">M15 Refined OB (Stop Loss Kecil)</text>

  <!-- Price reacting from M15 OB -->
  <path d="M 550 400 L 600 300 L 650 320 L 750 100" fill="none" stroke="#00ffaa" stroke-width="4" />

  <!-- Annotation for Stop Loss -->
  <line x1="50" y1="100" x2="80" y2="100" stroke="#ffffff" stroke-width="2" />
  <line x1="50" y1="450" x2="80" y2="450" stroke="#ffffff" stroke-width="2" />
  <line x1="65" y1="100" x2="65" y2="450" stroke="#ffffff" stroke-width="2" />
  <text x="75" y="280" fill="#ffffff" font-size="14" transform="rotate(-90 75,280)">SL H4 = Terlalu Lebar</text>

  <!-- Annotation for Refined Stop Loss -->
  <line x1="490" y1="380" x2="510" y2="380" stroke="#ffffff" stroke-width="2" />
  <line x1="490" y1="420" x2="510" y2="420" stroke="#ffffff" stroke-width="2" />
  <line x1="500" y1="380" x2="500" y2="420" stroke="#ffffff" stroke-width="2" />
  <text x="510" y="370" fill="#ffffff" font-size="14">SL M15 (Sangat Tipis)</text>

  <!-- Info Box -->
  <rect x="250" y="160" width="250" height="90" fill="#0f3460" fill-opacity="0.8" rx="8" />
  <text x="260" y="185" fill="#ffffff" font-size="14" font-weight="bold">Kenapa Refinement?</text>
  <text x="260" y="210" fill="#00ffaa" font-size="12">1. Memperkecil Stop Loss (Risk)</text>
  <text x="260" y="230" fill="#00ffaa" font-size="12">2. Memperbesar Risk to Reward (R:R)</text>

</svg>
