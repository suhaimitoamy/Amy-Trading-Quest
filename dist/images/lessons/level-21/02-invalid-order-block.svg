<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <text x="400" y="50" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Invalid Order Block (Mitigated / No FVG)</text>

  <!-- Example 1: Mitigated OB -->
  <g transform="translate(50, 150)">
    <text x="100" y="-30" fill="#ff3366" font-size="18" font-weight="bold">1. Sudah Dimitigasi</text>
    
    <!-- Bearish Candle (The OB) -->
    <line x1="80" y1="120" x2="80" y2="200" stroke="#ff3366" stroke-width="4" />
    <rect x="65" y="140" width="30" height="40" fill="#ff3366" rx="2" />
    <rect x="40" y="120" width="220" height="80" fill="#ff3366" fill-opacity="0.1" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" />
    <text x="270" y="165" fill="#ff3366" font-size="14">Zona OB</text>

    <!-- Bullish Candle 1 -->
    <line x1="130" y1="60" x2="130" y2="150" stroke="#00ffaa" stroke-width="4" />
    <rect x="115" y="80" width="30" height="60" fill="#00ffaa" rx="2" />

    <!-- Retest Wick (Mitigation) -->
    <line x1="180" y1="100" x2="180" y2="190" stroke="#ffffff" stroke-width="4" />
    <rect x="165" y="100" width="30" height="40" fill="#ff3366" rx="2" />
    <circle cx="180" cy="190" r="6" fill="#e94560" />
    <text x="195" y="210" fill="#e94560" font-size="14" font-weight="bold">Wick mengambil order (Mitigated)</text>

    <!-- Bullish Candle 2 -->
    <line x1="230" y1="20" x2="230" y2="120" stroke="#00ffaa" stroke-width="4" />
    <rect x="215" y="40" width="30" height="70" fill="#00ffaa" rx="2" />
  </g>

  <!-- Example 2: No Displacement / No FVG -->
  <g transform="translate(450, 150)">
    <text x="100" y="-30" fill="#ff3366" font-size="18" font-weight="bold">2. Tidak Ada Displacement / FVG</text>
    
    <!-- Bearish Candle (The OB) -->
    <line x1="80" y1="120" x2="80" y2="200" stroke="#ff3366" stroke-width="4" />
    <rect x="65" y="140" width="30" height="40" fill="#ff3366" rx="2" />
    <rect x="40" y="120" width="220" height="80" fill="#ff3366" fill-opacity="0.1" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" />

    <!-- Bullish Candle 1 (Weak) -->
    <line x1="130" y1="110" x2="130" y2="170" stroke="#00ffaa" stroke-width="4" />
    <rect x="115" y="120" width="30" height="30" fill="#00ffaa" rx="2" />

    <!-- Bullish Candle 2 (Weak) -->
    <line x1="180" y1="80" x2="180" y2="140" stroke="#00ffaa" stroke-width="4" />
    <rect x="165" y="90" width="30" height="30" fill="#00ffaa" rx="2" />

    <!-- Bullish Candle 3 (Weak) -->
    <line x1="230" y1="50" x2="230" y2="110" stroke="#00ffaa" stroke-width="4" />
    <rect x="215" y="60" width="30" height="30" fill="#00ffaa" rx="2" />

    <!-- Highlight overlap -->
    <path d="M 120 110 L 240 110" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
    <text x="100" y="230" fill="#e94560" font-size="14" font-weight="bold">Wick tumpang tindih = Tidak ada FVG</text>
    <text x="100" y="250" fill="#e94560" font-size="14" font-weight="bold">Pergerakan lambat = Tidak ada momentum</text>
  </g>

  <!-- Summary Box -->
  <rect x="150" y="420" width="500" height="60" fill="#e94560" fill-opacity="0.2" rx="8" stroke="#e94560" stroke-width="2" />
  <text x="400" y="455" fill="#ffffff" font-size="16" text-anchor="middle">Menggunakan Invalid OB sangat berisiko tinggi memicu Stop Loss!</text>

</svg>
