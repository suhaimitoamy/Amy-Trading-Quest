<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">STUDI KASUS: TRADER FOMO VS TRADER DISIPLIN</text>
  
  <line x1="400" y1="80" x2="400" y2="350" stroke="#444466" stroke-width="2" />
  
  <!-- Left Side: Trader FOMO -->
  <text x="200" y="80" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">TRADER A (FOMO)</text>
  <text x="200" y="100" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Mengejar breakout secara impulsif</text>
  
  <path d="M 50 250 L 100 230 L 150 240 L 250 80" fill="none" stroke="#00ffaa" stroke-width="3" />
  <circle cx="250" cy="80" r="6" fill="#ffaa00" />
  <text x="300" y="75" fill="#ffaa00" font-family="Arial" font-size="12" font-weight="bold">BUY DI SINI</text>
  
  <path d="M 250 80 L 280 280 L 320 340" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="5,5" />
  <circle cx="320" cy="340" r="6" fill="#ff3366" />
  <text x="250" y="330" fill="#ff3366" font-family="Arial" font-size="12" font-weight="bold">MARGIN CALL</text>
  
  <!-- Right Side: Trader Disiplin -->
  <text x="600" y="80" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">TRADER B (DISIPLIN)</text>
  <text x="600" y="100" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Menunggu pullback di area diskon (FVG/OB)</text>

  <rect x="450" y="230" width="300" height="30" fill="#33334d" opacity="0.6" />
  <text x="500" y="250" fill="#00ffaa" font-family="Arial" font-size="12">Area Diskon (Order Block)</text>

  <path d="M 450 250 L 500 230 L 550 240 L 600 120" fill="none" stroke="#00ffaa" stroke-width="3" />
  <path d="M 600 120 L 650 240" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <circle cx="650" cy="240" r="6" fill="#00ffaa" />
  <text x="650" y="265" fill="#00ffaa" font-family="Arial" font-size="12" font-weight="bold">BUY DI SINI</text>
  
  <path d="M 650 240 L 700 150 L 750 60" fill="none" stroke="#00ffaa" stroke-width="3" stroke-dasharray="5,5" />
  <circle cx="750" cy="60" r="6" fill="#00ffaa" />
  <text x="750" y="45" fill="#00ffaa" font-family="Arial" font-size="12" font-weight="bold">TAKE PROFIT</text>
</svg>
