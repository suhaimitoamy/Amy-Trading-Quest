<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">FOMO: MENGAMBIL POSISI DI PUCUK HARGA</text>
  
  <!-- Candlesticks going up -->
  <rect x="150" y="250" width="20" height="50" fill="#00ffaa" />
  <line x1="160" y1="230" x2="160" y2="320" stroke="#00ffaa" stroke-width="2" />
  
  <rect x="200" y="180" width="20" height="70" fill="#00ffaa" />
  <line x1="210" y1="160" x2="210" y2="260" stroke="#00ffaa" stroke-width="2" />
  
  <rect x="250" y="100" width="20" height="80" fill="#00ffaa" />
  <line x1="260" y1="80" x2="260" y2="190" stroke="#00ffaa" stroke-width="2" />
  
  <rect x="300" y="60" width="20" height="40" fill="#00ffaa" />
  <line x1="310" y1="30" x2="310" y2="110" stroke="#00ffaa" stroke-width="2" />
  
  <!-- FOMO ENTRY LABEL -->
  <circle cx="310" cy="30" r="6" fill="#ff3366" />
  <line x1="310" y1="30" x2="400" y2="30" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />
  <rect x="400" y="15" width="200" height="30" rx="5" fill="#ff3366" />
  <text x="500" y="35" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">TRADER FOMO BUY DI SINI!</text>
  
  <!-- Reversal -->
  <rect x="350" y="70" width="20" height="60" fill="#ff3366" />
  <line x1="360" y1="60" x2="360" y2="150" stroke="#ff3366" stroke-width="2" />
  
  <rect x="400" y="130" width="20" height="90" fill="#ff3366" />
  <line x1="410" y1="110" x2="410" y2="240" stroke="#ff3366" stroke-width="2" />
  
  <rect x="450" y="220" width="20" height="100" fill="#ff3366" />
  <line x1="460" y1="200" x2="460" y2="340" stroke="#ff3366" stroke-width="2" />

  <!-- Stop Loss hitting -->
  <line x1="300" y1="280" x2="500" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="600" y="285" fill="#ffffff" font-family="Arial" font-size="14">STOP LOSS TERKENA</text>
  <text x="600" y="310" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">- LOSS BESAR -</text>
  
  <text x="400" y="380" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Pasar tidak bergerak naik selamanya. Membeli setelah tren panjang = Rawan Jebakan.</text>
</svg>
