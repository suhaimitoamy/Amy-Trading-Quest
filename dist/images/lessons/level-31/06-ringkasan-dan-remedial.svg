<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">RINGKASAN FOMO CONTROL</text>
  
  <!-- Center Node -->
  <circle cx="400" cy="200" r="60" fill="#ffaa00" />
  <text x="400" y="195" fill="#1a1a2e" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">KONTROL</text>
  <text x="400" y="215" fill="#1a1a2e" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">FOMO</text>
  
  <!-- Branches -->
  <line x1="400" y1="140" x2="250" y2="80" stroke="#ffffff" stroke-width="2" />
  <rect x="150" y="60" width="100" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="1" />
  <text x="200" y="85" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">5-Minute Rule</text>
  
  <line x1="460" y1="140" x2="550" y2="80" stroke="#ffffff" stroke-width="2" />
  <rect x="550" y="60" width="120" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="1" />
  <text x="610" y="85" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Tunggu Pullback</text>
  
  <line x1="340" y1="200" x2="200" y2="200" stroke="#ffffff" stroke-width="2" />
  <rect x="80" y="180" width="120" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="1" />
  <text x="140" y="205" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Gunakan Checklist</text>
  
  <line x1="460" y1="200" x2="600" y2="200" stroke="#ffffff" stroke-width="2" />
  <rect x="600" y="180" width="150" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="1" />
  <text x="675" y="205" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Relakan Peluang Lewat</text>
  
  <line x1="400" y1="260" x2="400" y2="320" stroke="#ffffff" stroke-width="2" />
  <rect x="330" y="320" width="140" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="1" />
  <text x="400" y="345" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Disiplin Eksekusi</text>
</svg>
