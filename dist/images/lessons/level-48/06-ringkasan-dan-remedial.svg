<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Ringkasan Modul Scaling Up</text>

  <!-- Central Node -->
  <circle cx="400" cy="250" r="60" fill="#00ffaa"/>
  <text x="400" y="245" fill="#1a1a2e" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">SCALING</text>
  <text x="400" y="265" fill="#1a1a2e" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">UP</text>

  <!-- Node 1: Kesiapan -->
  <path d="M 400 190 L 250 120" stroke="#00ffaa" stroke-width="3"/>
  <rect x="130" y="80" width="160" height="60" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="2"/>
  <text x="210" y="105" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Kesiapan Data</text>
  <text x="210" y="125" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Win Rate &amp; RR Stabil</text>

  <!-- Node 2: Prop Firm Plan -->
  <path d="M 400 190 L 550 120" stroke="#00ffaa" stroke-width="3"/>
  <rect x="510" y="80" width="180" height="60" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="2"/>
  <text x="600" y="105" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Compounding Prop</text>
  <text x="600" y="125" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Reinvestasi Payout</text>

  <!-- Node 3: Copy Trading -->
  <path d="M 340 250 L 150 250" stroke="#00ffaa" stroke-width="3"/>
  <rect x="20" y="220" width="150" height="60" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="2"/>
  <text x="95" y="245" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Trade Copier</text>
  <text x="95" y="265" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Master ke Slave</text>

  <!-- Node 4: Risiko Emosi -->
  <path d="M 460 250 L 650 250" stroke="#00ffaa" stroke-width="3"/>
  <rect x="630" y="220" width="150" height="60" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="2"/>
  <text x="705" y="245" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Cegah Over-Risk</text>
  <text x="705" y="265" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Turunkan % Risiko</text>

  <!-- Conclusion Box -->
  <rect x="200" y="380" width="400" height="80" rx="10" fill="#1a2a20" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="415" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Kunci Sukses Scaling Up:</text>
  <text x="400" y="440" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">"Besarkan Akunnya, Jangan Besarkan Egonya."</text>
</svg>
