<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Studi Kasus: Scale Up yang Benar vs Salah</text>

  <!-- Divider -->
  <path d="M 400 80 L 400 480" stroke="#4a4a6a" stroke-width="4" stroke-dasharray="10,5"/>

  <!-- Left Side: Trader A (Wrong) -->
  <text x="200" y="100" fill="#ff3366" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Trader A (Terburu-buru)</text>
  
  <rect x="50" y="130" width="300" height="320" rx="10" fill="#2a1a20" stroke="#ff3366" stroke-width="2"/>
  <text x="200" y="170" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Bulan 1: Profit $50 (Akun $1k)</text>
  <text x="200" y="200" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Merasa sudah "pro".</text>
  
  <path d="M 200 220 L 200 250" stroke="#ff3366" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <text x="200" y="280" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Beli Challenge $100k</text>
  <text x="200" y="310" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Risiko tetap 1% per trade</text>
  
  <path d="M 200 330 L 200 360" stroke="#ff3366" stroke-width="2" marker-end="url(#arrow-red)"/>

  <text x="200" y="390" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Mental Breakdown ($1k Loss)</text>
  <text x="200" y="420" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Gagal Challenge (Uang Hangus)</text>

  <!-- Right Side: Trader B (Right) -->
  <text x="600" y="100" fill="#00ffaa" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Trader B (Bertahap)</text>
  
  <rect x="450" y="130" width="300" height="320" rx="10" fill="#1a2a20" stroke="#00ffaa" stroke-width="2"/>
  <text x="600" y="170" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Bulan 1-6: Konsisten akun $1k</text>
  <text x="600" y="200" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Jurnal jelas, Win Rate 55%</text>

  <path d="M 600 220 L 600 250" stroke="#00ffaa" stroke-width="2" marker-end="url(#arrow-green)"/>

  <text x="600" y="280" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Beli Challenge $10k (Kecil dulu)</text>
  <text x="600" y="310" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Lulus. Gunakan profit u/ beli $50k</text>

  <path d="M 600 330 L 600 360" stroke="#00ffaa" stroke-width="2" marker-end="url(#arrow-green)"/>

  <text x="600" y="390" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Sukses Kelola $50k</text>
  <text x="600" y="420" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Risiko diturunkan jadi 0.5%</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

</svg>
