<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Compounding di Prop Firm</text>

  <!-- $10k Account -->
  <rect x="100" y="300" width="150" height="100" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="2"/>
  <text x="175" y="350" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">$10k</text>
  <text x="175" y="380" fill="#a0a0b0" font-family="Arial" font-size="14" text-anchor="middle">Phase 1 / Akun Awal</text>

  <!-- Arrow -->
  <path d="M 260 350 L 330 310" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="5,5"/>
  <polygon points="330,310 320,315 325,320" fill="#ffffff" transform="rotate(30, 330, 310)"/>

  <!-- $50k Account -->
  <rect x="325" y="180" width="150" height="140" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="3"/>
  <text x="400" y="240" fill="#ffffff" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle">$50k</text>
  <text x="400" y="270" fill="#a0a0b0" font-family="Arial" font-size="14" text-anchor="middle">Scale Up Program</text>
  <text x="400" y="295" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">+10% Profit Target</text>

  <!-- Arrow -->
  <path d="M 485 250 L 560 190" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="5,5"/>
  <polygon points="560,190 550,195 555,200" fill="#ffffff" transform="rotate(35, 560, 190)"/>

  <!-- $100k Account -->
  <rect x="550" y="40" width="180" height="180" rx="10" fill="#2a2a4a" stroke="#00ffaa" stroke-width="4"/>
  <text x="640" y="110" fill="#ffffff" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle">$100k</text>
  <text x="640" y="150" fill="#a0a0b0" font-family="Arial" font-size="14" text-anchor="middle">Elite Level</text>
  
  <!-- Info Box -->
  <rect x="100" y="80" width="220" height="120" rx="8" fill="#3a1a2e" stroke="#ff3366" stroke-width="2"/>
  <text x="210" y="110" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">PENTING!</text>
  <text x="115" y="140" fill="#ffffff" font-family="Arial" font-size="14">Risk/trade persentase</text>
  <text x="115" y="165" fill="#ffffff" font-family="Arial" font-size="14">harus TETAP SAMA meski</text>
  <text x="115" y="190" fill="#ffffff" font-family="Arial" font-size="14">ukuran akun membesar.</text>

</svg>
