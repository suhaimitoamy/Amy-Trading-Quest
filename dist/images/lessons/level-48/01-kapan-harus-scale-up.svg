<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Kapan Waktu yang Tepat untuk Scale Up?</text>
  
  <path d="M 100 400 L 700 400" stroke="#4a4a6a" stroke-width="2"/>
  <path d="M 100 400 L 100 100" stroke="#4a4a6a" stroke-width="2"/>
  
  <!-- Equity curve -->
  <path d="M 100 380 L 200 350 L 300 360 L 400 250 L 500 270 L 600 150" fill="none" stroke="#00ffaa" stroke-width="4"/>
  
  <!-- Highlight points -->
  <circle cx="200" cy="350" r="6" fill="#00ffaa"/>
  <circle cx="400" cy="250" r="6" fill="#00ffaa"/>
  <circle cx="600" cy="150" r="6" fill="#00ffaa"/>
  
  <!-- Annotations -->
  <rect x="150" y="270" width="160" height="40" rx="5" fill="#2a2a4a" stroke="#00ffaa"/>
  <text x="230" y="295" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Bulan 1-3 Konsisten</text>

  <rect x="330" y="170" width="160" height="40" rx="5" fill="#2a2a4a" stroke="#00ffaa"/>
  <text x="410" y="195" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Data Jurnal Solid</text>

  <rect x="530" y="70" width="180" height="40" rx="5" fill="#2a2a4a" stroke="#00ffaa"/>
  <text x="620" y="95" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">READY TO SCALE UP!</text>

  <!-- Scale Up indicators -->
  <g transform="translate(620, 160)">
    <path d="M 0 0 L 20 -30 L 40 0 Z" fill="#00ffaa"/>
    <rect x="10" y="0" width="20" height="50" fill="#00ffaa"/>
  </g>
</svg>
