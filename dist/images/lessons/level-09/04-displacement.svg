<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Displacement (Pergerakan Impulsif)</text>
  
  <!-- Structure Line -->
  <line x1="100" y1="250" x2="650" y2="250" stroke="#cccccc" stroke-width="2" stroke-dasharray="5,5" />
  <text x="660" y="255" font-family="Arial, sans-serif" font-size="16" fill="#cccccc">Market Structure Shift (MSS)</text>
  
  <!-- Liquidity Sweep -->
  <path d="M 100 200 L 150 280 L 200 240 L 250 350" fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="middle">Liquidity Sweep (Sell Side)</text>
  <circle cx="250" cy="350" r="6" fill="#ff3366" />
  
  <!-- Displacement Candles -->
  <!-- Huge Green Candle 1 -->
  <line x1="300" y1="330" x2="300" y2="180" stroke="#00ffaa" stroke-width="3" />
  <rect x="285" y="200" width="30" height="120" fill="#00ffaa" />
  
  <!-- Huge Green Candle 2 -->
  <line x1="350" y1="220" x2="350" y2="80" stroke="#00ffaa" stroke-width="3" />
  <rect x="335" y="100" width="30" height="110" fill="#00ffaa" />
  
  <!-- Text Displacement -->
  <text x="325" y="60" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" text-anchor="middle" font-weight="bold">DISPLACEMENT</text>
  
  <!-- Highlighting FVG left behind -->
  <rect x="370" y="220" width="100" height="60" fill="#ffaa00" fill-opacity="0.3" rx="3" />
  <line x1="370" y1="220" x2="330" y2="220" stroke="#ffaa00" stroke-width="1" stroke-dasharray="2,2" /> <!-- Low C3 -->
  <line x1="370" y1="280" x2="300" y2="280" stroke="#ffaa00" stroke-width="1" stroke-dasharray="2,2" /> <!-- High C1 -->
  <text x="420" y="255" font-family="Arial, sans-serif" font-size="14" fill="#ffaa00" text-anchor="middle">Meninggalkan FVG</text>
  
  <!-- Pullback and go -->
  <path d="M 370 120 L 420 250" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,4" />
  <circle cx="420" cy="250" r="6" fill="#00ffaa" />
  <text x="500" y="255" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Entry di FVG</text>
  <path d="M 420 250 L 500 100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Info Box -->
  <rect x="150" y="400" width="500" height="60" fill="#2a2a4e" rx="10" />
  <text x="400" y="435" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Displacement yang valid: Menembus struktur dengan candle kuat &amp; meninggalkan FVG.</text>
</svg>