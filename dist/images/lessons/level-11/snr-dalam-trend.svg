<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">SNR Dalam Trend (RBS / SBR)</text>
  
  <!-- Trend Path -->
  <path d="M50 350 L 200 200 L 250 250 L 400 100 L 450 150 L 600 50" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Break of Structure 1 -->
  <line x1="150" y1="200" x2="300" y2="200" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="320" y="205" fill="#ffffff" font-family="sans-serif" font-size="14">BOS</text>
  
  <!-- RBS Area 1 -->
  <rect x="220" y="195" width="60" height="60" fill="rgba(0, 255, 170, 0.2)" stroke="#00ffaa" stroke-width="1"/>
  <text x="250" y="280" fill="#00ffaa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">RBS (Buy Here)</text>
  
  <!-- Break of Structure 2 -->
  <line x1="350" y1="100" x2="500" y2="100" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="520" y="105" fill="#ffffff" font-family="sans-serif" font-size="14">BOS</text>
  
  <!-- RBS Area 2 -->
  <rect x="420" y="95" width="60" height="60" fill="rgba(0, 255, 170, 0.2)" stroke="#00ffaa" stroke-width="1"/>
  <text x="450" y="180" fill="#00ffaa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">RBS (Buy Here)</text>
  
  <text x="650" y="60" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">Uptrend</text>
</svg>
