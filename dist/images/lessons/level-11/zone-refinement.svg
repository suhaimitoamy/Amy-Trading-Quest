<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Zone Refinement (HTF vs LTF)</text>
  
  <!-- HTF Box -->
  <rect x="50" y="100" width="300" height="200" fill="rgba(255, 51, 102, 0.2)" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="130" fill="#ff3366" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">H4 Resistance (Lebar: 60 Pips)</text>
  <path d="M50 200 Q 150 150, 200 300" fill="none" stroke="#ffffff" stroke-width="3" />
  
  <!-- Arrow indicating zoom -->
  <path d="M370 200 L 430 200" fill="none" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- LTF Box -->
  <rect x="450" y="100" width="300" height="200" fill="rgba(255, 51, 102, 0.1)" stroke="#555" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="450" y="120" width="300" height="40" fill="rgba(0, 255, 170, 0.3)" stroke="#00ffaa" stroke-width="2"/>
  <text x="600" y="145" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">M15 Refined Zone (Lebar: 15 Pips)</text>
  <path d="M450 300 L 520 220 L 550 250 L 600 140 L 650 300" fill="none" stroke="#ffffff" stroke-width="3" />
  
  <circle cx="600" cy="140" r="6" fill="#00ffaa"/>
  <text x="620" y="130" fill="#ffffff" font-family="sans-serif" font-size="14">Sniper Entry</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
