<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="30" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">Case Study: Advanced Fakeout Setup</text>
  <text x="400" y="50" fill="#a0a0b0" font-size="12" text-anchor="middle">Putting it all together: Context, Manipulation, Confirmation, and Execution</text>

  <!-- HTF Context Area -->
  <rect x="30" y="70" width="740" height="400" fill="none" stroke="#505070" stroke-width="2" rx="10" />
  
  <!-- Resistance / Liquidity Line -->
  <line x1="50" y1="150" x2="750" y2="150" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="740" y="145" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="end">Major Resistance (Liquidity Pool)</text>

  <!-- Price Action Path -->
  <!-- Previous Structure (Equal Highs) -->
  <path d="M 50,300 L 120,150 L 180,250 L 250,150 L 320,350 L 400,200" fill="none" stroke="#505070" stroke-width="2" stroke-dasharray="2,2" />
  
  <text x="185" y="130" fill="#a0a0b0" font-size="12" text-anchor="middle">Equal Highs Built Up</text>

  <!-- The Fakeout Move -->
  <path d="M 400,200 L 440,180 L 480,90" fill="none" stroke="#00ffaa" stroke-width="3" filter="url(#glow)"/>
  
  <circle cx="480" cy="90" r="25" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,2" />
  <line x1="480" y1="65" x2="480" y2="40" stroke="#ffcc00" stroke-width="1" />
  <text x="480" y="35" fill="#ffcc00" font-size="12" font-weight="bold" text-anchor="middle">Liquidity Grab (Fakeout)</text>

  <!-- The Reversal and CHoCH -->
  <path d="M 480,90 L 520,240" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <!-- CHoCH Line -->
  <line x1="420" y1="200" x2="550" y2="200" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" />
  <text x="540" y="215" fill="#ff3366" font-size="12" font-weight="bold">CHoCH</text>

  <!-- The Pullback (Entry) -->
  <path d="M 520,240 L 550,165" fill="none" stroke="#00ffaa" stroke-width="2" />
  
  <!-- Entry Setup Box -->
  <rect x="550" y="165" width="10" height="235" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="1" /> <!-- SL to TP Box -->
  <rect x="550" y="70" width="10" height="95" fill="#ff3366" fill-opacity="0.4" stroke="#ff3366" stroke-width="1" /> <!-- Risk Box -->
  
  <line x1="550" y1="165" x2="680" y2="165" stroke="#ffcc00" stroke-width="2" />
  <circle cx="550" cy="165" r="5" fill="#ffcc00" />
  <text x="590" y="160" fill="#ffcc00" font-size="12" font-weight="bold">ENTRY (Sell Limit)</text>

  <line x1="550" y1="70" x2="680" y2="70" stroke="#ff3366" stroke-width="2" />
  <text x="590" y="65" fill="#ff3366" font-size="12" font-weight="bold">STOP LOSS (Above Wick)</text>

  <line x1="550" y1="400" x2="680" y2="400" stroke="#00ffaa" stroke-width="2" />
  <text x="590" y="415" fill="#00ffaa" font-size="12" font-weight="bold">TAKE PROFIT (Target Low)</text>

  <!-- Target Area -->
  <line x1="50" y1="400" x2="750" y2="400" stroke="#505070" stroke-width="2" stroke-dasharray="5,5" />
  <text x="740" y="390" fill="#a0a0b0" font-size="12" text-anchor="end">Next Liquidity Pool (Support)</text>

  <!-- Final Drop -->
  <path d="M 550,165 L 600,280 L 630,250 L 700,420" fill="none" stroke="#ff3366" stroke-width="3" />

  <!-- Annotation Note -->
  <rect x="50" y="410" width="250" height="50" fill="#303050" rx="5" />
  <text x="60" y="430" fill="#ffffff" font-size="12" font-weight="bold">Summary:</text>
  <text x="60" y="445" fill="#a0a0b0" font-size="11">Wait for grab -> See CHoCH -> Enter on pullback</text>

</svg>
