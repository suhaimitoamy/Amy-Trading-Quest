<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Failed Breakout (Fakeout) Manipulation</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Smart money trapping retail traders before reversing the price</text>

  <!-- Resistance Line -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="710" y="205" fill="#ffffff" font-size="14" font-weight="bold">Resistance</text>
  
  <!-- Support Line -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="710" y="405" fill="#ffffff" font-size="14" font-weight="bold">Support</text>

  <!-- Range candles -->
  <!-- Candle 1 -->
  <line x1="150" y1="280" x2="150" y2="350" stroke="#00ffaa" stroke-width="2" />
  <rect x="145" y="290" width="10" height="40" fill="#00ffaa" />
  
  <!-- Candle 2 -->
  <line x1="200" y1="250" x2="200" y2="320" stroke="#00ffaa" stroke-width="2" />
  <rect x="195" y="260" width="10" height="40" fill="#00ffaa" />

  <!-- Candle 3 -->
  <line x1="250" y1="220" x2="250" y2="290" stroke="#ff3366" stroke-width="2" />
  <rect x="245" y="230" width="10" height="50" fill="#ff3366" />
  
  <!-- Candle 4 -->
  <line x1="300" y1="240" x2="300" y2="330" stroke="#00ffaa" stroke-width="2" />
  <rect x="295" y="260" width="10" height="60" fill="#00ffaa" />
  
  <!-- The Trap Candle (Fakeout) -->
  <line x1="350" y1="130" x2="350" y2="270" stroke="#00ffaa" stroke-width="2" />
  <rect x="345" y="180" width="10" height="80" fill="#00ffaa" />

  <line x1="400" y1="120" x2="400" y2="200" stroke="#ff3366" stroke-width="2" />
  <rect x="395" y="160" width="10" height="40" fill="#ff3366" />
  <circle cx="400" cy="120" r="25" fill="none" stroke="#ffcc00" stroke-width="3" stroke-dasharray="4,2" />

  <!-- Post Fakeout Reversal -->
  <line x1="450" y1="180" x2="450" y2="300" stroke="#ff3366" stroke-width="2" />
  <rect x="445" y="200" width="10" height="80" fill="#ff3366" />
  
  <line x1="500" y1="260" x2="500" y2="360" stroke="#ff3366" stroke-width="2" />
  <rect x="495" y="280" width="10" height="60" fill="#ff3366" />

  <line x1="550" y1="320" x2="550" y2="420" stroke="#ff3366" stroke-width="2" />
  <rect x="545" y="340" width="10" height="60" fill="#ff3366" />
  
  <!-- Labels -->
  <rect x="300" y="90" width="200" height="30" fill="#303050" rx="5" />
  <text x="400" y="110" fill="#ffcc00" font-size="14" font-weight="bold" text-anchor="middle">Retail Trapped (Buy FOMO)</text>
  
  <text x="480" y="230" fill="#ff3366" font-size="14" font-weight="bold" text-anchor="start">Reversal back into range!</text>
  
  <path d="M 330,195 Q 350,150 430,250" fill="none" stroke="#ffcc00" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Buy Stop / Sell SL Labels -->
  <text x="200" y="180" fill="#a0a0b0" font-size="12" text-anchor="middle">Liquidity Pool: Buy Stops &amp; SLs</text>
  <rect x="100" y="160" width="600" height="30" fill="#ffcc00" fill-opacity="0.1" />

  <!-- Arrow Marker Def -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc00" />
    </marker>
  </defs>

</svg>
