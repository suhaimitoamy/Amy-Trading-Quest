<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Fakeout with Continuation (Stop Hunt)</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Manipulating against the trend to grab liquidity before continuing</text>

  <!-- Big Trend Arrow Background -->
  <path d="M 50,450 L 750,100" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.1" marker-end="url(#arrowUp)"/>
  <text x="100" y="420" fill="#ffffff" font-size="20" font-weight="bold" opacity="0.3">OVERALL BULLISH TREND</text>

  <!-- The Initial Move -->
  <path d="M 100,400 L 150,300 L 200,320 L 250,220" fill="none" stroke="#00ffaa" stroke-width="4" />
  
  <!-- Consolidation / Pause -->
  <rect x="250" y="190" width="180" height="70" fill="#ffffff" fill-opacity="0.05" />
  <line x1="230" y1="260" x2="450" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <text x="240" y="275" fill="#ffffff" font-size="12">Retail Support (SL placed here)</text>

  <path d="M 250,220 L 280,250 L 320,200 L 360,240 L 400,210" fill="none" stroke="#00ffaa" stroke-width="3" />
  
  <!-- The Stop Hunt / Fakeout against the trend -->
  <path d="M 400,210 L 430,350" fill="none" stroke="#ff3366" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Liquidity Grab Area -->
  <circle cx="430" cy="350" r="30" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,2" />
  <text x="430" y="400" fill="#ffcc00" font-size="14" font-weight="bold" text-anchor="middle">Stop Hunt (Fakeout Down)</text>
  <text x="430" y="420" fill="#a0a0b0" font-size="12" text-anchor="middle">Traps early Sellers, Hits Buyer SLs</text>

  <!-- The Continuation -->
  <path d="M 430,350 L 460,220" fill="none" stroke="#00ffaa" stroke-width="4" />
  <path d="M 460,220 L 520,150 L 580,180 L 680,80" fill="none" stroke="#00ffaa" stroke-width="4" marker-end="url(#arrowUp)" />

  <!-- Info Box -->
  <rect x="520" y="280" width="230" height="80" fill="#303050" rx="5" />
  <text x="635" y="305" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Why did this happen?</text>
  <text x="635" y="325" fill="#a0a0b0" font-size="12" text-anchor="middle">Institutions needed more</text>
  <text x="635" y="340" fill="#a0a0b0" font-size="12" text-anchor="middle">sell orders to buy aggressively</text>
  <text x="635" y="355" fill="#a0a0b0" font-size="12" text-anchor="middle">and fuel the upward trend.</text>

</svg>
