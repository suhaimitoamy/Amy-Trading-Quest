<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">How to Confirm a Fakeout</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">The 3-Step Protocol for High Probability Entries</text>

  <!-- Split screen layout -->
  <line x1="400" y1="100" x2="400" y2="480" stroke="#505070" stroke-width="2" />

  <!-- Left Side: HTF View -->
  <text x="200" y="110" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">Higher Timeframe (H1)</text>
  
  <line x1="50" y1="300" x2="350" y2="300" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <text x="340" y="295" fill="#ffffff" font-size="12" text-anchor="end">Support</text>

  <!-- Before Close Candle (Ghost) -->
  <line x1="150" y1="250" x2="150" y2="420" stroke="#ff3366" stroke-width="2" stroke-opacity="0.3" />
  <rect x="135" y="270" width="30" height="150" fill="#ff3366" fill-opacity="0.3" />
  <text x="150" y="440" fill="#ff3366" font-size="12" text-anchor="middle" opacity="0.6">While candle is open</text>
  <text x="150" y="455" fill="#ff3366" font-size="10" text-anchor="middle" opacity="0.6">(Looks like a real breakout)</text>

  <!-- Arrow transformation -->
  <path d="M 190,340 L 220,340" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Actual Close Candle -->
  <line x1="260" y1="250" x2="260" y2="420" stroke="#00ffaa" stroke-width="3" />
  <rect x="245" y="270" width="30" height="25" fill="#00ffaa" />
  <text x="260" y="440" fill="#00ffaa" font-size="12" font-weight="bold" text-anchor="middle">1. Candle Closed</text>
  <text x="260" y="455" fill="#00ffaa" font-size="10" text-anchor="middle">Body inside, long wick out</text>

  <!-- Right Side: LTF View -->
  <text x="600" y="110" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle">Lower Timeframe (M15)</text>
  
  <line x1="450" y1="300" x2="750" y2="300" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  
  <!-- LTF Price Action matching the wick -->
  <path d="M 450,250 L 500,320 L 520,280 L 560,420" fill="none" stroke="#ff3366" stroke-width="2" />
  <text x="560" y="440" fill="#a0a0b0" font-size="10" text-anchor="middle">The Fakeout Wick (LTF view)</text>

  <!-- CHoCH Move -->
  <path d="M 560,420 L 610,240" fill="none" stroke="#00ffaa" stroke-width="3" />
  
  <line x1="500" y1="280" x2="650" y2="280" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" />
  <text x="630" y="275" fill="#ffffff" font-size="12" font-weight="bold">2. CHoCH</text>
  
  <!-- Pullback and Entry -->
  <path d="M 610,240 L 650,295" fill="none" stroke="#ff3366" stroke-width="2" />
  <circle cx="650" cy="295" r="8" fill="#ffcc00" />
  <text x="700" y="295" fill="#ffcc00" font-size="14" font-weight="bold">3. Entry (Pullback)</text>

  <!-- Continuation -->
  <path d="M 650,295 L 720,150" fill="none" stroke="#00ffaa" stroke-width="3" />

  <!-- Stop Loss Label -->
  <line x1="600" y1="435" x2="700" y2="435" stroke="#ff3366" stroke-width="2" />
  <text x="650" y="450" fill="#ff3366" font-size="12" font-weight="bold" text-anchor="middle">Stop Loss (Below the wick)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>

</svg>
