<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Anatomy of a Liquidity Grab</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Sweeping retail Stop Losses to fuel institutional orders</text>

  <!-- Support Area -->
  <rect x="50" y="320" width="700" height="30" fill="#ffffff" fill-opacity="0.1" />
  <line x1="50" y1="320" x2="750" y2="320" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,4" />
  <text x="700" y="310" fill="#ffffff" font-size="14" font-weight="bold">Support Zone</text>
  
  <!-- Liquidity Pool text -->
  <rect x="250" y="360" width="300" height="30" fill="#ff3366" fill-opacity="0.2" rx="5" />
  <text x="400" y="380" fill="#ff3366" font-size="14" font-weight="bold" text-anchor="middle">Liquidity Pool ($$$) - Retail Sell Stops &amp; SLs</text>

  <!-- Previous structure -->
  <path d="M 100,150 L 150,280 L 200,180 L 250,290 L 300,200" fill="none" stroke="#505070" stroke-width="2" stroke-dasharray="4,4" />
  
  <!-- Equal Lows Formation -->
  <line x1="150" y1="230" x2="150" y2="320" stroke="#ff3366" stroke-width="2" />
  <rect x="145" y="250" width="10" height="40" fill="#ff3366" />

  <line x1="250" y1="240" x2="250" y2="320" stroke="#ff3366" stroke-width="2" />
  <rect x="245" y="260" width="10" height="40" fill="#ff3366" />
  
  <text x="200" y="310" fill="#a0a0b0" font-size="12" text-anchor="middle">Equal Lows</text>

  <!-- The Grab Candle -->
  <!-- Long wick below support -->
  <line x1="400" y1="220" x2="400" y2="420" stroke="#00ffaa" stroke-width="3" filter="url(#glow)"/>
  <!-- Candle body closed above support -->
  <rect x="390" y="250" width="20" height="60" fill="#00ffaa" />
  
  <!-- Annotation for the Grab -->
  <circle cx="400" cy="400" r="30" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,2" />
  <line x1="430" y1="400" x2="520" y2="400" stroke="#ffcc00" stroke-width="2" />
  <text x="530" y="395" fill="#ffcc00" font-size="14" font-weight="bold">Long wick sweeps liquidity</text>
  <text x="530" y="415" fill="#a0a0b0" font-size="12">Institutions buy huge volumes</text>

  <!-- Reversal Move -->
  <line x1="480" y1="200" x2="480" y2="280" stroke="#00ffaa" stroke-width="2" />
  <rect x="475" y="210" width="10" height="60" fill="#00ffaa" />

  <line x1="530" y1="120" x2="530" y2="240" stroke="#00ffaa" stroke-width="2" />
  <rect x="525" y="140" width="10" height="80" fill="#00ffaa" />

  <line x1="580" y1="50" x2="580" y2="160" stroke="#00ffaa" stroke-width="2" />
  <rect x="575" y="60" width="10" height="80" fill="#00ffaa" />
  
  <!-- Path arrow -->
  <path d="M 420,240 Q 480,180 550,130" fill="none" stroke="#00ffaa" stroke-width="3" marker-end="url(#arrow)" />
  <text x="600" y="100" fill="#00ffaa" font-size="16" font-weight="bold">Explosive move up</text>

</svg>
