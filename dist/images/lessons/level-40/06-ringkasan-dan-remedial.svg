<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <!-- Trophy Base -->
  <path d="M 350 450 L 450 450 L 430 500 L 370 500 Z" fill="#444466" />
  <rect x="330" y="500" width="140" height="30" fill="#24243e" rx="5" />
  
  <!-- Trophy Cup -->
  <path d="M 300 200 C 300 350 500 350 500 200 Z" fill="#ffcc00" />
  <rect x="280" y="180" width="240" height="20" fill="#ffaa00" rx="5" />
  
  <!-- Handles -->
  <path d="M 300 230 C 250 230 250 300 310 300" fill="none" stroke="#ffcc00" stroke-width="15" stroke-linecap="round" />
  <path d="M 500 230 C 550 230 550 300 490 300" fill="none" stroke="#ffcc00" stroke-width="15" stroke-linecap="round" />
  
  <!-- Star -->
  <polygon points="400,220 415,260 455,260 425,285 435,325 400,300 365,325 375,285 345,260 385,260" fill="#ffffff" />
  
  <text x="400" y="130" font-family="Arial" font-size="32" fill="#00ffaa" text-anchor="middle" font-weight="bold">SYSTEM MASTERED</text>
  <text x="400" y="570" font-family="Arial" font-size="18" fill="#aaaaaa" text-anchor="middle">Disiplin • Sabar • Konsisten</text>
  
  <circle cx="200" cy="150" r="40" fill="#24243e" stroke="#00aaff" stroke-width="4" />
  <text x="200" y="155" font-family="Arial" font-size="14" fill="#00aaff" text-anchor="middle">Pre-Market</text>

  <circle cx="600" cy="150" r="40" fill="#24243e" stroke="#ff3366" stroke-width="4" />
  <text x="600" y="155" font-family="Arial" font-size="14" fill="#ff3366" text-anchor="middle">Post-Market</text>

  <circle cx="400" cy="380" r="40" fill="#24243e" stroke="#00ffaa" stroke-width="4" />
  <text x="400" y="385" font-family="Arial" font-size="14" fill="#00ffaa" text-anchor="middle">Eksekusi</text>
</svg>