<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Expansion Candle</text>
    <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Ledakan harga setelah fase kompresi yang padat</text>

    <!-- Compression Zone -->
    <rect x="150" y="230" width="300" height="100" fill="#2a2a4e" opacity="0.5" stroke="#4a4a7e" stroke-dasharray="4,4" />
    <text x="300" y="220" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">Fase Compression</text>

    <!-- Small Candles (Compression) -->
    <g stroke-width="2">
        <line x1="180" y1="240" x2="180" y2="320" stroke="#ff3366" />
        <rect x="175" y="260" width="10" height="40" fill="#ff3366" />
        
        <line x1="220" y1="250" x2="220" y2="310" stroke="#00ffaa" />
        <rect x="215" y="270" width="10" height="30" fill="#00ffaa" />

        <line x1="260" y1="260" x2="260" y2="300" stroke="#ff3366" />
        <rect x="255" y="265" width="10" height="25" fill="#ff3366" />

        <line x1="300" y1="265" x2="300" y2="295" stroke="#00ffaa" />
        <rect x="295" y="270" width="10" height="20" fill="#00ffaa" />

        <line x1="340" y1="270" x2="340" y2="290" stroke="#ff3366" />
        <rect x="335" y="275" width="10" height="10" fill="#ff3366" />

        <line x1="380" y1="275" x2="380" y2="285" stroke="#00ffaa" />
        <rect x="375" y="278" width="10" height="5" fill="#00ffaa" />
    </g>

    <!-- Expansion Candle -->
    <!-- Bullish Marubozu Breakout -->
    <g stroke-width="2">
        <line x1="450" y1="120" x2="450" y2="280" stroke="#00ffaa" />
        <rect x="435" y="130" width="30" height="150" fill="#00ffaa" />
    </g>
    
    <!-- Subsequent bullish candles -->
    <g stroke-width="2">
        <line x1="520" y1="80" x2="520" y2="150" stroke="#00ffaa" />
        <rect x="505" y="90" width="30" height="40" fill="#00ffaa" />

        <line x1="590" y1="30" x2="590" y2="100" stroke="#00ffaa" />
        <rect x="575" y="40" width="30" height="50" fill="#00ffaa" />
    </g>

    <!-- Annotations for Expansion -->
    <path d="M 450 300 Q 450 350 450 380" fill="none" stroke="#ffffff" stroke-width="2" />
    <polygon points="450,300 445,310 455,310" fill="#ffffff" />
    <rect x="350" y="380" width="200" height="60" rx="5" fill="#1a1a2e" stroke="#00ffaa" stroke-width="1" />
    <text x="450" y="405" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ffaa" text-anchor="middle">Expansion Candle</text>
    <text x="450" y="425" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">Body besar memecah batas atas kompresi</text>

    <!-- Momentum Arrows -->
    <path d="M 450 120 L 450 80" fill="none" stroke="#00ffaa" stroke-width="4" />
    <polygon points="450,70 440,85 460,85" fill="#00ffaa" />

    <!-- Text for liquidity trigger -->
    <text x="600" y="200" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Stop Loss Retailers = Tersapu!</text>
    <path d="M 480 200 L 590 195" fill="none" stroke="#ff3366" stroke-width="1" stroke-dasharray="2,2" />

</svg>
