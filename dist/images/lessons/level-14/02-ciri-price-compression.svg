<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Ciri-Ciri Price Compression</text>
    <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Lower Highs &amp; Higher Lows saling mendekat</text>

    <!-- Support and Resistance lines (Trendlines) -->
    <line x1="150" y1="120" x2="600" y2="250" stroke="#ff3366" stroke-width="2" stroke-dasharray="6,6"/>
    <text x="610" y="240" font-family="Arial, sans-serif" font-size="14" fill="#ff3366">Trendline Resistance</text>

    <line x1="150" y1="400" x2="600" y2="270" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,6"/>
    <text x="610" y="280" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Trendline Support</text>

    <!-- Candles representing Price Action -->
    <g stroke-width="2">
        <!-- Big Swing -->
        <line x1="180" y1="150" x2="180" y2="380" stroke="#ff3366" />
        <rect x="175" y="170" width="10" height="190" fill="#ff3366" />
        <text x="180" y="110" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">High</text>
        <text x="180" y="420" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Low</text>

        <line x1="260" y1="360" x2="260" y2="160" stroke="#00ffaa" />
        <rect x="255" y="180" width="10" height="160" fill="#00ffaa" />
        <text x="260" y="135" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Lower High (LH)</text>

        <line x1="340" y1="180" x2="340" y2="340" stroke="#ff3366" />
        <rect x="335" y="200" width="10" height="120" fill="#ff3366" />
        <text x="340" y="380" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Higher Low (HL)</text>

        <!-- Medium Swing -->
        <line x1="420" y1="330" x2="420" y2="210" stroke="#00ffaa" />
        <rect x="415" y="220" width="10" height="90" fill="#00ffaa" />
        <text x="420" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">LH</text>

        <line x1="500" y1="220" x2="500" y2="300" stroke="#ff3366" />
        <rect x="495" y="235" width="10" height="50" fill="#ff3366" />
        <text x="500" y="340" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">HL</text>

        <!-- Tiny Swing -->
        <line x1="550" y1="290" x2="550" y2="245" stroke="#00ffaa" />
        <rect x="546" y="255" width="8" height="25" fill="#00ffaa" />
    </g>

    <!-- Annotations -->
    <path d="M 260 140 Q 300 80 400 100" fill="none" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
    <text x="410" y="105" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0">Harga gagal menembus High sebelumnya</text>

    <path d="M 340 390 Q 380 450 480 430" fill="none" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
    <text x="490" y="435" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0">Harga gagal menembus Low sebelumnya</text>
    
    <text x="550" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">Lilin makin kecil</text>

</svg>
