<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Trap Sebelum Expansion (Manipulasi)</text>
    <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Gerakan palsu untuk menjebak ritel dan mengambil likuiditas</text>

    <!-- Support and Resistance Lines for Compression -->
    <line x1="150" y1="200" x2="450" y2="240" stroke="#a0a0b0" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="150" y1="300" x2="450" y2="260" stroke="#a0a0b0" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Compression candles -->
    <g stroke-width="2">
        <line x1="200" y1="210" x2="200" y2="290" stroke="#ff3366" />
        <rect x="195" y="230" width="10" height="40" fill="#ff3366" />

        <line x1="250" y1="220" x2="250" y2="280" stroke="#00ffaa" />
        <rect x="245" y="240" width="10" height="30" fill="#00ffaa" />

        <line x1="300" y1="230" x2="300" y2="275" stroke="#ff3366" />
        <rect x="295" y="240" width="10" height="20" fill="#ff3366" />

        <line x1="350" y1="235" x2="350" y2="270" stroke="#00ffaa" />
        <rect x="345" y="245" width="10" height="15" fill="#00ffaa" />

        <line x1="400" y1="240" x2="400" y2="265" stroke="#ff3366" />
        <rect x="395" y="250" width="10" height="10" fill="#ff3366" />
    </g>

    <!-- THE TRAP (Fakeout down) -->
    <!-- Bearish trap candle -->
    <g stroke-width="2">
        <line x1="460" y1="250" x2="460" y2="380" stroke="#ff3366" />
        <rect x="450" y="255" width="20" height="50" fill="#ff3366" />
    </g>
    <!-- Highlight circle for the Trap -->
    <ellipse cx="460" cy="350" rx="30" ry="40" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4" />
    <text x="460" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff3366" text-anchor="middle">TRAP (Fake Breakout)</text>
    <text x="460" y="435" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">Memicu Stop Loss Ritel</text>

    <!-- THE REAL EXPANSION (Bullish) -->
    <g stroke-width="2">
        <line x1="530" y1="100" x2="530" y2="350" stroke="#00ffaa" />
        <rect x="515" y="110" width="30" height="200" fill="#00ffaa" />
        
        <line x1="610" y1="50" x2="610" y2="130" stroke="#00ffaa" />
        <rect x="595" y="60" width="30" height="50" fill="#00ffaa" />
    </g>

    <text x="530" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ffaa" text-anchor="middle">REAL EXPANSION</text>

    <!-- Annotation Arrows -->
    <path d="M 400 180 Q 430 160 520 160" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="430" y="150" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Arah asli yang dituju Bank</text>
    <polygon points="520,160 510,155 510,165" fill="#ffffff" />
    
    <!-- Retail trap text -->
    <text x="250" y="320" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">Kolam Likuiditas (Stop Loss)</text>
    <line x1="150" y1="310" x2="450" y2="310" stroke="#ff3366" stroke-width="1" stroke-dasharray="2,2" />

</svg>
