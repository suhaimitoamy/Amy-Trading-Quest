<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Konsep Dasar Compression</text>
    <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Harga bergerak menyempit, mengumpulkan likuiditas sebelum meledak</text>

    <!-- Grid lines -->
    <line x1="50" y1="150" x2="750" y2="150" stroke="#2a2a4e" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="50" y1="250" x2="750" y2="250" stroke="#2a2a4e" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="50" y1="350" x2="750" y2="350" stroke="#2a2a4e" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Boundary Lines (Wedge) -->
    <line x1="150" y1="180" x2="550" y2="240" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="150" y1="380" x2="550" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
    
    <!-- Path representing Price -->
    <path d="M 100 400 L 150 180 L 220 350 L 290 200 L 350 320 L 410 220 L 460 290 L 500 230 L 530 270 L 550 245 L 600 260 L 650 100 L 700 120" 
          fill="none" stroke="#00ffaa" stroke-width="3" stroke-linejoin="round" />

    <!-- Labels -->
    <text x="350" y="420" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold" text-anchor="middle">Fase Compression (Menyempit)</text>
    
    <text x="650" y="80" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" font-weight="bold" text-anchor="middle">Ledakan (Expansion)</text>

    <!-- Arrows -->
    <path d="M 550 245 L 650 100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-dasharray="4,4" />
    <polygon points="650,100 640,110 655,115" fill="#00ffaa" />

    <!-- Explanation Box -->
    <rect x="70" y="100" width="160" height="60" rx="5" fill="#2a2a4e" stroke="#4a4a7e" stroke-width="1" />
    <text x="150" y="125" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Swing Besar</text>
    <text x="150" y="145" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">Awal mula pembentukan</text>

    <rect x="350" y="130" width="160" height="40" rx="5" fill="#2a2a4e" stroke="#4a4a7e" stroke-width="1" />
    <text x="430" y="155" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Swing Mengecil</text>
    
    <circle cx="550" cy="245" r="8" fill="#ff3366" />
    <text x="550" y="275" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="middle" font-weight="bold">Tekanan Maksimal</text>
</svg>
