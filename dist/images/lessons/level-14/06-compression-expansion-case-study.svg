<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Studi Kasus Lengkap: Comp > Trap > POI > Exp</text>
    
    <!-- POI Zone -->
    <rect x="50" y="400" width="700" height="50" fill="#00ffaa" opacity="0.15" stroke="#00ffaa" stroke-dasharray="5,5" />
    <text x="100" y="430" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ffaa">Order Block (POI)</text>

    <!-- Initial Move Up -->
    <path d="M 50 420 L 150 150" fill="none" stroke="#00ffaa" stroke-width="2" stroke-dasharray="2,2"/>
    
    <!-- Phase 1: Compression -->
    <rect x="230" y="100" width="140" height="30" rx="5" fill="#2a2a4e" stroke="#4a4a7e" />
    <text x="300" y="120" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1. Compression</text>
    
    <path d="M 150 150 L 200 230 L 250 190 L 300 260 L 350 230 L 400 310 L 450 280 L 480 340" 
          fill="none" stroke="#ff3366" stroke-width="2" stroke-linejoin="round" />
    
    <line x1="120" y1="130" x2="520" y2="380" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="180" y1="260" x2="500" y2="390" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />

    <!-- Phase 2: Trap into POI -->
    <rect x="420" y="440" width="100" height="30" rx="5" fill="#2a2a4e" stroke="#4a4a7e" />
    <text x="470" y="460" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">2. TRAP</text>
    
    <!-- Trap candle wick down -->
    <g stroke-width="3">
        <line x1="500" y1="330" x2="500" y2="430" stroke="#ff3366" />
        <rect x="495" y="330" width="10" height="40" fill="#ff3366" />
    </g>
    <!-- Highlight Trap -->
    <circle cx="500" cy="420" r="25" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Phase 3: Expansion -->
    <rect x="620" y="80" width="120" height="30" rx="5" fill="#2a2a4e" stroke="#4a4a7e" />
    <text x="680" y="100" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa" text-anchor="middle">3. EXPANSION</text>

    <g stroke-width="3">
        <!-- Rejection / Start of move -->
        <line x1="530" y1="350" x2="530" y2="300" stroke="#00ffaa" />
        <rect x="525" y="300" width="10" height="40" fill="#00ffaa" />
        
        <!-- Big Expansion Candle -->
        <line x1="570" y1="310" x2="570" y2="150" stroke="#00ffaa" />
        <rect x="560" y="160" width="20" height="140" fill="#00ffaa" />
        
        <!-- Breakout Continuation -->
        <line x1="620" y1="160" x2="620" y2="100" stroke="#00ffaa" />
        <rect x="610" y="110" width="20" height="40" fill="#00ffaa" />
    </g>

    <!-- Break of Structure (BOS) Line -->
    <line x1="140" y1="150" x2="680" y2="150" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" />
    <text x="690" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">Target (TP)</text>

    <!-- Stop Loss Line -->
    <line x1="450" y1="440" x2="560" y2="440" stroke="#ff3366" stroke-width="1" stroke-dasharray="3,3" />
    <text x="570" y="445" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" font-weight="bold">Stop Loss (SL)</text>

    <!-- Entry Zone -->
    <path d="M 580 250 Q 640 280 670 230" fill="none" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="680" y="225" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Entry Buy di sini</text>

</svg>
