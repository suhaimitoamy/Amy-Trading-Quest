<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Background element -->
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#24243e" stroke="#3498db" stroke-width="2"/>
  
  <text x="400" y="90" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Buku Jurnal Trading Profesional</text>

  <!-- Table Headers -->
  <rect x="80" y="120" width="640" height="40" fill="#3498db" fill-opacity="0.3"/>
  <text x="100" y="145" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Pair</text>
  <text x="200" y="145" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Setup / Konfirmasi</text>
  <text x="400" y="145" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">R:R</text>
  <text x="500" y="145" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Hasil</text>
  <text x="600" y="145" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">Emosi / Catatan</text>

  <!-- Row 1 -->
  <line x1="80" y1="160" x2="720" y2="160" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <text x="100" y="185" fill="#ffffff" font-family="Arial" font-size="14">EURUSD</text>
  <text x="200" y="185" fill="#ffffff" font-family="Arial" font-size="14">Liq Sweep + OB</text>
  <text x="400" y="185" fill="#ffffff" font-family="Arial" font-size="14">1:3</text>
  <text x="500" y="185" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold">WIN</text>
  <text x="600" y="185" fill="#ffffff" font-family="Arial" font-size="12">Sabar tunggu CHoCH</text>

  <!-- Row 2 -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <text x="100" y="225" fill="#ffffff" font-family="Arial" font-size="14">XAUUSD</text>
  <text x="200" y="225" fill="#ffffff" font-family="Arial" font-size="14">FOMO / Early Entry</text>
  <text x="400" y="225" fill="#ffffff" font-family="Arial" font-size="14">1:2</text>
  <text x="500" y="225" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">LOSS</text>
  <text x="600" y="225" fill="#ffffff" font-family="Arial" font-size="12">Panik, tidak sesuai plan</text>

  <!-- Row 3 -->
  <line x1="80" y1="240" x2="720" y2="240" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <text x="100" y="265" fill="#ffffff" font-family="Arial" font-size="14">GBPUSD</text>
  <text x="200" y="265" fill="#ffffff" font-family="Arial" font-size="14">FVG Tap + M1 Conf</text>
  <text x="400" y="265" fill="#ffffff" font-family="Arial" font-size="14">1:4</text>
  <text x="500" y="265" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold">WIN</text>
  <text x="600" y="265" fill="#ffffff" font-family="Arial" font-size="12">Tenang, sesuai SOP</text>

  <text x="400" y="320" fill="#f1c40f" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">"Evaluasi dari kerugian (Loss) adalah kunci untuk membuang kebiasaan buruk."</text>
</svg>
