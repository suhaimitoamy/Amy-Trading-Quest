<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <!-- HTF -->
  <rect x="50" y="50" width="200" height="300" fill="none" stroke="#3498db" stroke-width="2" rx="10"/>
  <text x="150" y="80" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">HTF (Daily) - Bias</text>
  <path d="M 70 300 L 120 150 L 160 220 L 220 100" fill="none" stroke="#00ffaa" stroke-width="3"/>
  
  <!-- Arrow -->
  <path d="M 265 200 L 285 200" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- MTF -->
  <rect x="300" y="50" width="200" height="300" fill="none" stroke="#f1c40f" stroke-width="2" rx="10"/>
  <text x="400" y="80" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">MTF (H1) - Pullback</text>
  <path d="M 320 120 L 360 200 L 390 170 L 440 280" fill="none" stroke="#ff3366" stroke-width="3"/>
  <rect x="420" y="270" width="40" height="20" fill="#00ffaa" fill-opacity="0.3"/>
  <text x="440" y="310" fill="#00ffaa" font-family="Arial" font-size="12" text-anchor="middle">POI</text>

  <!-- Arrow -->
  <path d="M 515 200 L 535 200" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- LTF -->
  <rect x="550" y="50" width="200" height="300" fill="none" stroke="#00ffaa" stroke-width="2" rx="10"/>
  <text x="650" y="80" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">LTF (M5) - Execution</text>
  <path d="M 570 150 L 600 250 L 620 220 L 650 280 L 680 180 L 700 230 L 730 100" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- CHoCH Line -->
  <line x1="610" y1="220" x2="690" y2="220" stroke="#ff3366" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="650" y="210" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">CHoCH</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
