<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Eksekusi Akhir</text>
    
  <line x1="190" y1="70" x2="190" y2="130" stroke="#00ffaa" stroke-width="2"/>
  <rect x="180" y="80" width="20" height="40" fill="#00ffaa" rx="2"/>

    <text x="160" y="100" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Buy</text>
    <line x1="180" y1="140" x2="280" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="230" y="130" fill="#ff4444" font-family="monospace" font-size="14" text-anchor="middle">SL Valid</text>
    <line x1="180" y1="40" x2="280" y2="40" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="230" y="30" fill="#00ffaa" font-family="monospace" font-size="14" text-anchor="middle">TP Logis</text>
  
</svg>