<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Top-Down Analysis</text>
    <text x="200" y="60" fill="#00ffaa" font-family="monospace" font-size="14" text-anchor="middle">1. Daily (Trend Utama)</text>
    <text x="200" y="100" fill="#ffff00" font-family="monospace" font-size="14" text-anchor="middle">2. H1 (POI / Zona Sabar)</text>
    <text x="200" y="140" fill="#ff4444" font-family="monospace" font-size="14" text-anchor="middle">3. M15 (Konfirmasi Entry)</text>
  
</svg>