<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Market Structure</text>
    <path d="M30,160 L100,60 L150,110 L220,30 L270,80 L350,20" stroke="#00ffaa" fill="none" stroke-width="3" filter="url(#glow)"/>
    <text x="100" y="45" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">High</text>
    <text x="150" y="130" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Low</text>
  
</svg>