<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Change of Character (CHoCH)</text>
    <path d="M50,150 L120,60 L180,100 L230,40 L280,140" stroke="#ffaa00" fill="none" stroke-width="3" filter="url(#glow)"/>
    <line x1="180" y1="100" x2="300" y2="100" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="290" y="90" fill="#ff4444" font-family="monospace" font-size="12" text-anchor="middle">CHoCH</text>
    <text x="180" y="120" fill="#aaaaaa" font-family="monospace" font-size="10" text-anchor="middle">HL Terakhir</text>
  
</svg>