<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0,50 H800 M0,100 H800 M0,150 H800 M0,200 H800 M0,250 H800 M0,300 H800 M0,350 H800"/>
    <path d="M100,0 V400 M200,0 V400 M300,0 V400 M400,0 V400 M500,0 V400 M600,0 V400 M700,0 V400"/>
  </g>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Market Structure Basics</text>

  <!-- Trend Up -->
  <path d="M 50,350 L 150,200 L 220,250 L 320,100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="50" cy="350" r="5" fill="#00ffaa"/>
  <circle cx="150" cy="200" r="5" fill="#00ffaa"/>
  <circle cx="220" cy="250" r="5" fill="#00ffaa"/>
  <circle cx="320" cy="100" r="5" fill="#00ffaa"/>
  
  <text x="180" y="320" fill="#00ffaa" font-family="sans-serif" font-size="18" font-weight="bold">Uptrend</text>

  <!-- Consolidation -->
  <path d="M 320,100 L 370,140 L 420,90 L 470,130 L 520,100" fill="none" stroke="#f0b90b" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="370" cy="140" r="5" fill="#f0b90b"/>
  <circle cx="420" cy="90" r="5" fill="#f0b90b"/>
  <circle cx="470" cy="130" r="5" fill="#f0b90b"/>
  <circle cx="520" cy="100" r="5" fill="#f0b90b"/>

  <text x="420" y="60" fill="#f0b90b" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Sideways / Consolidation</text>
  
  <!-- Trend Down -->
  <path d="M 520,100 L 600,220 L 650,180 L 750,330" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="600" cy="220" r="5" fill="#ff3366"/>
  <circle cx="650" cy="180" r="5" fill="#ff3366"/>
  <circle cx="750" cy="330" r="5" fill="#ff3366"/>

  <text x="640" y="300" fill="#ff3366" font-family="sans-serif" font-size="18" font-weight="bold">Downtrend</text>
</svg>
