<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Apa itu Mitigation Block?</text>
  
  <!-- Bullish Mitigation Block Side -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="18" fill="#00ffaa" font-weight="bold" text-anchor="middle">Bullish Mitigation Block</text>
  
  <!-- Path Bullish -->
  <path d="M 50,150 L 120,320 L 190,180 L 260,260 L 330,100" fill="none" stroke="#555577" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Labels Bullish -->
  <circle cx="120" cy="320" r="5" fill="#ff3366"/>
  <text x="120" y="340" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Low</text>
  
  <circle cx="190" cy="180" r="5" fill="#00ffaa"/>
  <text x="190" y="170" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">High</text>
  
  <!-- Higher Low (Failure Swing) -->
  <circle cx="260" cy="260" r="5" fill="#ff3366"/>
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Higher Low</text>
  <text x="260" y="295" font-family="Arial, sans-serif" font-size="12" fill="#ffcc00" text-anchor="middle">(Failure Swing)</text>
  
  <circle cx="330" cy="100" r="5" fill="#00ffaa"/>
  <text x="330" y="90" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Higher High (BOS)</text>
  
  <!-- Mitigation Block Highlight (Bullish) -->
  <rect x="235" y="240" width="50" height="30" fill="rgba(255,51,102,0.3)" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="260" y1="255" x2="380" y2="255" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />
  <text x="360" y="245" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa" text-anchor="start">Mitigation Block</text>
  
  <!-- BOS Line Bullish -->
  <line x1="180" y1="180" x2="320" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="300" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">BOS</text>
  
  <!-- Separation Line -->
  <line x1="400" y1="70" x2="400" y2="400" stroke="#555577" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- Bearish Mitigation Block Side -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="18" fill="#ff3366" font-weight="bold" text-anchor="middle">Bearish Mitigation Block</text>
  
  <!-- Path Bearish -->
  <path d="M 450,280 L 520,120 L 590,260 L 660,180 L 730,350" fill="none" stroke="#555577" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Labels Bearish -->
  <circle cx="520" cy="120" r="5" fill="#00ffaa"/>
  <text x="520" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">High</text>
  
  <circle cx="590" cy="260" r="5" fill="#ff3366"/>
  <text x="590" y="280" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Low</text>
  
  <!-- Lower High (Failure Swing) -->
  <circle cx="660" cy="180" r="5" fill="#00ffaa"/>
  <text x="660" y="160" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Lower High</text>
  <text x="660" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffcc00" text-anchor="middle">(Failure Swing)</text>
  
  <circle cx="730" cy="350" r="5" fill="#ff3366"/>
  <text x="730" y="370" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Lower Low (BOS)</text>
  
  <!-- Mitigation Block Highlight (Bearish) -->
  <rect x="635" y="170" width="50" height="30" fill="rgba(0,255,170,0.3)" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="660" y1="185" x2="780" y2="185" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <text x="690" y="205" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="start">Mitigation Block</text>
  
  <!-- BOS Line Bearish -->
  <line x1="580" y1="260" x2="720" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="700" y="255" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">BOS</text>
</svg>