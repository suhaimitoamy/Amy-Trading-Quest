<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Case Study: The Ultimate Break &amp; Retest</text>
  
  <!-- Zones -->
  <!-- Broken HTF Resistance -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="60" y="195" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">HTF Resistance</text>
  
  <!-- FVG / Deep Retest Zone -->
  <rect x="50" y="240" width="700" height="80" fill="#3a3a5e" opacity="0.3"/>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">HTF Fair Value Gap (Deep Zone)</text>

  <!-- The Journey (Path) -->
  <!-- 1. Breakout -->
  <path d="M 80 350 L 150 220 L 200 240 L 280 80" fill="none" stroke="#00ffaa" stroke-width="4"/>
  <circle cx="280" cy="80" r="4" fill="#00ffaa"/>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">1. Breakout</text>

  <!-- 2. Shallow Retest & Fail -->
  <path d="M 280 80 L 330 160 L 360 140 L 400 250" fill="none" stroke="#a0a0b0" stroke-width="3"/>
  <text x="330" y="180" font-family="Arial, sans-serif" font-size="10" fill="#a0a0b0">Shallow Retest Fail</text>

  <!-- 3. Build Liquidity (Inducement) -->
  <path d="M 400 250 L 430 230 L 460 250" fill="none" stroke="#a0a0b0" stroke-width="3"/>
  <line x1="390" y1="250" x2="470" y2="250" stroke="#ff3366" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="10" fill="#ff3366">Retail Support</text>

  <!-- 4. Liquidity Sweep (Deep Retest) -->
  <path d="M 460 250 L 500 310" fill="none" stroke="#ff3366" stroke-width="4"/>
  <circle cx="500" cy="310" r="5" fill="#ff3366"/>
  <path d="M 500 310 L 500 290" fill="none" stroke="#ff3366" stroke-width="2"/> <!-- Wick -->
  <text x="515" y="315" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">2. Sweep (Deep Retest)</text>

  <!-- 5. CHoCH (Structure Shift) -->
  <path d="M 500 310 L 570 210" fill="none" stroke="#00ffaa" stroke-width="4"/>
  <line x1="420" y1="230" x2="580" y2="230" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="520" y="225" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">3. CHoCH</text>

  <!-- 6. Entry Pullback -->
  <path d="M 570 210 L 600 260" fill="none" stroke="#ffaa00" stroke-width="3"/>
  <circle cx="600" cy="260" r="5" fill="#ffaa00"/>
  <text x="615" y="265" font-family="Arial, sans-serif" font-size="14" fill="#ffaa00" font-weight="bold">4. Smart Entry</text>

  <!-- 7. Moon -->
  <path d="M 600 260 L 750 50" fill="none" stroke="#00ffaa" stroke-width="6"/>
  <polygon points="750,50 740,65 755,65" fill="#00ffaa" transform="rotate(30 750 50)"/>

  <!-- Legend -->
  <rect x="50" y="370" width="700" height="110" rx="10" fill="#2a2a4a"/>
  <text x="70" y="395" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">SOP Checklist:</text>
  <text x="70" y="415" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">✓ 1. Breakout Momentum Kuat (Tinggalkan FVG)</text>
  <text x="70" y="435" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">✓ 2. Harga Turun, Bentuk Inducement &amp; Sweep (Makan SL Retail)</text>
  <text x="70" y="455" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">✓ 3. Terjadi CHoCH (Structure Shift) di Lower Timeframe</text>
  <text x="450" y="435" font-family="Arial, sans-serif" font-size="14" fill="#ffaa00" font-weight="bold">✓ 4. ENTRY pada Pullback LTF!</text>

</svg>
