<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">GEJALA EKSTERNAL VS INTERNAL</text>

  <!-- Split line -->
  <line x1="400" y1="60" x2="400" y2="380" stroke="#a0a0b0" stroke-width="2" stroke-dasharray="10,10" />

  <!-- Left: External (Chart) -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="18" fill="#ff3366" text-anchor="middle" font-weight="bold">CHOPPY MARKET</text>
  <rect x="50" y="100" width="300" height="200" fill="#2a2a4e" rx="10" />
  <g stroke-width="2">
    <!-- Wicky candles -->
    <line x1="90" y1="130" x2="90" y2="270" stroke="#ff3366" />
    <rect x="85" y="180" width="10" height="20" fill="#ff3366" />
    <line x1="130" y1="120" x2="130" y2="280" stroke="#00ffaa" />
    <rect x="125" y="190" width="10" height="30" fill="#00ffaa" />
    <line x1="170" y1="140" x2="170" y2="260" stroke="#ff3366" />
    <rect x="165" y="170" width="10" height="40" fill="#ff3366" />
    <line x1="210" y1="110" x2="210" y2="290" stroke="#00ffaa" />
    <rect x="205" y="200" width="10" height="20" fill="#00ffaa" />
    <line x1="250" y1="150" x2="250" y2="250" stroke="#ff3366" />
    <rect x="245" y="180" width="10" height="30" fill="#ff3366" />
    <line x1="290" y1="120" x2="290" y2="280" stroke="#00ffaa" />
    <rect x="285" y="190" width="10" height="25" fill="#00ffaa" />
  </g>
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">Volatilitas rendah, banyak sumbu panjang</text>

  <!-- Right: Internal (Emotions) -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="18" fill="#ff3366" text-anchor="middle" font-weight="bold">EMOTIONAL TILT</text>
  <rect x="450" y="100" width="300" height="200" fill="#2a2a4e" rx="10" />
  
  <!-- Heartbeat/Chaos -->
  <path d="M470 200 L500 200 L520 120 L540 280 L560 160 L580 240 L600 200 L730 200" fill="none" stroke="#ff3366" stroke-width="3" />
  
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="16" fill="#ff3366" text-anchor="middle" font-weight="bold">FOMO!</text>
  <text x="530" y="100" font-family="Arial, sans-serif" font-size="16" fill="#ff3366" text-anchor="middle" font-weight="bold">REVENGE TRADING!</text>
  
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">Kelelahan fisik, frustrasi, terlalu percaya diri</text>

</svg>
