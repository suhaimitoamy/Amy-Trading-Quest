<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <!-- Backgrounds for Sessions -->
    <linearGradient id="bgAsia" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="bgLondon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="bgNY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.0" />
    </linearGradient>
    
    <marker id="arrowUp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Siklus AMD: Accumulation, Manipulation, Distribution</text>
  <text x="400" y="50" fill="#a0a0b0" font-size="14" text-anchor="middle">Menyatukan Asia, London, dan New York (Bullish Day Profile)</text>

  <!-- Session Dividers & Backgrounds -->
  <rect x="50" y="80" width="200" height="340" fill="url(#bgAsia)" />
  <rect x="250" y="80" width="200" height="340" fill="url(#bgLondon)" />
  <rect x="450" y="80" width="300" height="340" fill="url(#bgNY)" />
  
  <line x1="250" y1="80" x2="250" y2="440" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="450" y1="80" x2="450" y2="440" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />

  <text x="150" y="100" fill="#4a90e2" font-size="16" font-weight="bold" text-anchor="middle">ASIA</text>
  <text x="350" y="100" fill="#ff9900" font-size="16" font-weight="bold" text-anchor="middle">LONDON</text>
  <text x="600" y="100" fill="#00ccff" font-size="16" font-weight="bold" text-anchor="middle">NEW YORK</text>

  <text x="150" y="120" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.8">(Accumulation)</text>
  <text x="350" y="120" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.8">(Manipulation)</text>
  <text x="600" y="120" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.8">(Distribution)</text>

  <!-- High timeframe POI / Support zone at bottom -->
  <rect x="200" y="380" width="150" height="30" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-width="1" />
  <text x="275" y="400" fill="#00ffaa" font-size="12" font-weight="bold" text-anchor="middle">Daily Bullish Order Block</text>

  <!-- Asian Range Lines -->
  <line x1="50" y1="240" x2="350" y2="240" stroke="#4a90e2" stroke-width="2" stroke-dasharray="2,2" />
  <text x="150" y="235" fill="#4a90e2" font-size="12" font-weight="bold" text-anchor="middle">Asian High</text>
  
  <line x1="50" y1="300" x2="350" y2="300" stroke="#4a90e2" stroke-width="2" stroke-dasharray="2,2" />
  <text x="150" y="315" fill="#4a90e2" font-size="12" font-weight="bold" text-anchor="middle">Asian Low</text>

  <!-- 1. Asia Accumulation Path -->
  <path d="M50,280 L90,250 L130,290 L170,260 L210,280 L250,260" fill="none" stroke="#a0a0b0" stroke-width="3" stroke-linejoin="round" />

  <!-- 2. London Manipulation Path -->
  <!-- Dips below Asian Low into POI, creates Low of Day -->
  <path d="M250,260 L280,390 L320,290 L380,250 L450,200" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round" />
  
  <circle cx="280" cy="390" r="8" fill="#ff3366" />
  <text x="260" y="375" fill="#ff3366" font-size="12" font-weight="bold" text-anchor="end">Low of the Day (LOD)</text>
  <path d="M280,390 L265,340" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" />
  <text x="265" y="335" fill="#ffffff" font-size="10" text-anchor="end">"Sell to Buy" Liquidity Sweep</text>

  <text x="360" y="230" fill="#00ffaa" font-size="14" font-weight="bold" transform="rotate(-30, 360, 230)">TREND AWAL</text>

  <!-- 3. New York Distribution Path -->
  <!-- Pullback at NY open, then huge explosion up -->
  <path d="M450,200 L490,230 L550,140 L620,100 L700,160" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linejoin="round" marker-end="url(#arrowUp)" />
  
  <circle cx="490" cy="230" r="6" fill="#00ccff" />
  <text x="510" y="240" fill="#00ccff" font-size="12" font-weight="bold">NY Pullback (Continuation Entry)</text>
  
  <text x="600" y="160" fill="#00ffaa" font-size="18" font-weight="bold" transform="rotate(-25, 600, 160)">DISTRIBUTION (EXPANSION)</text>

  <!-- Sweep of Asian High -->
  <circle cx="510" cy="240" r="10" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="2,2" opacity="0" /> <!-- Just for spacing -->
  <path d="M510,180 L520,200 L530,180" fill="none" stroke="#ffd700" stroke-width="2" />
  <text x="520" y="175" fill="#ffd700" font-size="10" text-anchor="middle">Buy Side Swept &amp; Target Hit</text>

  <!-- High of the Day marker -->
  <circle cx="620" cy="100" r="5" fill="#00ffaa" />
  <text x="620" y="85" fill="#00ffaa" font-size="12" font-weight="bold" text-anchor="middle">High of the Day (HOD)</text>

  <!-- Timeline -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#a0a0b0" stroke-width="2" />
  
  <!-- Times -->
  <g fill="#a0a0b0" font-size="12" text-anchor="middle">
    <line x1="250" y1="455" x2="250" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="250" y="480">02:00 EST</text>
    
    <line x1="450" y1="455" x2="450" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="450" y="480">07:00 EST</text>
  </g>
</svg>
