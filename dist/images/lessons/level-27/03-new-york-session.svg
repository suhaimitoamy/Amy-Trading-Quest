<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="londonBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="nyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0.0" />
    </linearGradient>
    <pattern id="overlapPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,10 L10,0 M-2,2 L2,-2 M8,12 L12,8" stroke="#ffffff" stroke-width="1" opacity="0.1" />
    </pattern>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">New York Session: Overlap &amp; Continuation/Reversal</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Volume maksimal terjadi saat London dan New York beroperasi bersamaan</text>

  <!-- Session Backgrounds -->
  <!-- London Area -->
  <rect x="50" y="100" width="400" height="340" fill="url(#londonBg)" />
  <text x="150" y="120" fill="#ff3366" font-size="16" font-weight="bold" opacity="0.6">London Session</text>
  
  <!-- New York Area -->
  <rect x="300" y="100" width="450" height="340" fill="url(#nyBg)" />
  <text x="600" y="120" fill="#00ffaa" font-size="16" font-weight="bold" opacity="0.6">New York Session</text>

  <!-- Overlap Area -->
  <rect x="300" y="100" width="150" height="340" fill="url(#overlapPattern)" />
  <text x="375" y="150" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.8">OVERLAP</text>
  <text x="375" y="170" fill="#ffffff" font-size="12" text-anchor="middle" opacity="0.6">(High Volume)</text>

  <!-- Price Action (Scenario: Continuation) -->
  <path d="M50,300 L90,260 L140,160 L180,240 L230,350 L280,310" fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
  
  <!-- London Manipulation / High -->
  <circle cx="140" cy="160" r="5" fill="#ff3366" />
  <text x="140" y="145" fill="#ff3366" font-size="12" text-anchor="middle">London High</text>

  <!-- FVG / Order block left by London -->
  <rect x="250" y="270" width="100" height="30" fill="#ff3366" opacity="0.2" />
  <text x="220" y="290" fill="#ff3366" font-size="10" text-anchor="end">FVG Area</text>
  <line x1="250" y1="285" x2="330" y2="285" stroke="#ff3366" stroke-width="1" stroke-dasharray="2,2" />

  <!-- NY opens, pullbacks to FVG, then continues -->
  <path d="M280,310 L310,285 L350,390 L400,360 L450,430 L520,400" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <!-- NY Entry point -->
  <circle cx="310" cy="285" r="6" fill="#00ffaa" />
  <text x="345" y="270" fill="#00ffaa" font-size="12" font-weight="bold">NY Pullback Entry</text>

  <!-- Lunch time consolidation -->
  <rect x="450" y="100" width="150" height="340" fill="#1a1a2e" opacity="0.3" />
  <text x="525" y="250" fill="#a0a0b0" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, 525, 250)">NY LUNCH HOUR</text>
  <text x="545" y="250" fill="#a0a0b0" font-size="10" text-anchor="middle" transform="rotate(-90, 545, 250)">(Low Volatility)</text>

  <path d="M520,400 L550,410 L580,395 L610,405" fill="none" stroke="#a0a0b0" stroke-width="2" stroke-linejoin="round" />

  <!-- Afternoon session -->
  <path d="M610,405 L650,360 L700,380 L740,340" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linejoin="round" />

  <!-- Timeline -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#a0a0b0" stroke-width="2" />
  <line x1="50" y1="455" x2="50" y2="465" stroke="#a0a0b0" stroke-width="2" />
  <text x="50" y="480" fill="#a0a0b0" font-size="12" text-anchor="middle">03:00 EST</text>
  
  <line x1="300" y1="455" x2="300" y2="465" stroke="#a0a0b0" stroke-width="2" />
  <text x="300" y="480" fill="#a0a0b0" font-size="12" text-anchor="middle">08:00 EST</text>
  
  <line x1="450" y1="455" x2="450" y2="465" stroke="#a0a0b0" stroke-width="2" />
  <text x="450" y="480" fill="#a0a0b0" font-size="12" text-anchor="middle">12:00 EST</text>

  <line x1="600" y1="455" x2="600" y2="465" stroke="#a0a0b0" stroke-width="2" />
  <text x="600" y="480" fill="#a0a0b0" font-size="12" text-anchor="middle">13:30 EST</text>

</svg>
