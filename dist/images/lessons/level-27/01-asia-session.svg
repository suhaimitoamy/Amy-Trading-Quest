<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="asiaBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Asian Session: Accumulation &amp; Consolidation</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Harga bergerak dalam rentang sempit (Asian Range) mengumpulkan likuiditas</text>

  <!-- Asian Session Box -->
  <rect x="150" y="150" width="300" height="200" fill="url(#asiaBox)" stroke="#4a90e2" stroke-width="2" stroke-dasharray="5,5" />
  <text x="300" y="140" fill="#4a90e2" font-size="16" font-weight="bold" text-anchor="middle">Asian High (Liquidity)</text>
  <text x="300" y="370" fill="#4a90e2" font-size="16" font-weight="bold" text-anchor="middle">Asian Low (Liquidity)</text>
  <text x="300" y="390" fill="#a0a0b0" font-size="12" text-anchor="middle">Tumpukan Stop Loss Retail</text>
  <text x="300" y="120" fill="#a0a0b0" font-size="12" text-anchor="middle">Tumpukan Stop Loss Retail</text>

  <text x="300" y="255" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle" opacity="0.3">ASIAN SESSION</text>

  <!-- Price Action / Candles (Simplified) -->
  <path d="M100,280 L140,250 L180,270 L210,180 L250,220 L290,170 L330,300 L370,260 L410,320 L440,240 L480,280" fill="none" stroke="#a0a0b0" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Liquidity Pools Symbols -->
  <g transform="translate(180, 130)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>
  <g transform="translate(250, 130)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>
  <g transform="translate(380, 130)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>

  <g transform="translate(210, 375)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>
  <g transform="translate(320, 375)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>
  <g transform="translate(410, 375)">
    <circle cx="0" cy="0" r="10" fill="#ffd700" />
    <text x="0" y="4" fill="#1a1a2e" font-size="12" font-weight="bold" text-anchor="middle">$</text>
  </g>

  <!-- Timeline / Labels at the bottom -->
  <line x1="50" y1="450" x2="750" y2="450" stroke="#a0a0b0" stroke-width="2" />
  <line x1="150" y1="440" x2="150" y2="460" stroke="#a0a0b0" stroke-width="2" />
  <text x="150" y="480" fill="#a0a0b0" font-size="14" text-anchor="middle">Tokyo Open</text>
  
  <line x1="450" y1="440" x2="450" y2="460" stroke="#a0a0b0" stroke-width="2" />
  <text x="450" y="480" fill="#a0a0b0" font-size="14" text-anchor="middle">London Open</text>
  
  <!-- Pointer to London Open -->
  <path d="M480,280 Q520,280 550,200" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4" />
  <polygon points="550,190 545,205 555,205" fill="#ff3366" />
  <text x="650" y="195" fill="#ff3366" font-size="14" text-anchor="middle">Menunggu penembusan</text>
  <text x="650" y="215" fill="#ff3366" font-size="14" text-anchor="middle">(Breakout / Manipulation)</text>
</svg>
