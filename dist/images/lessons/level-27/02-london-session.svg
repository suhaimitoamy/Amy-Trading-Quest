<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="asiaBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="londonBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">London Session: Manipulation &amp; Expansion</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Menyapu likuiditas Asia sebelum membentuk tren utama hari ini</text>

  <!-- Asian Session Box (Left) -->
  <rect x="50" y="200" width="200" height="100" fill="url(#asiaBox)" stroke="#4a90e2" stroke-width="2" stroke-dasharray="5,5" />
  <text x="150" y="190" fill="#4a90e2" font-size="14" font-weight="bold" text-anchor="middle">Asian High</text>
  <text x="150" y="320" fill="#4a90e2" font-size="14" font-weight="bold" text-anchor="middle">Asian Low</text>
  <text x="150" y="255" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle" opacity="0.4">ASIAN RANGE</text>

  <!-- Asian Price Action -->
  <path d="M50,260 L90,220 L130,280 L170,210 L210,270 L250,240" fill="none" stroke="#a0a0b0" stroke-width="3" stroke-linejoin="round" />

  <!-- London Session Area -->
  <rect x="250" y="80" width="450" height="360" fill="url(#londonBg)" />
  <line x1="250" y1="80" x2="250" y2="440" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />
  <text x="260" y="430" fill="#ff3366" font-size="14" font-weight="bold">London Open</text>

  <!-- London Manipulation & Expansion Line -->
  <!-- Fakeout up, sweep liquidity, then drop -->
  <path d="M250,240 L280,180 L310,120 L350,150 L380,250 L430,350 L480,410 L540,380 L600,430 L650,400" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Manipulation part needs to be distinct (red outline maybe) -->
  <path d="M250,240 L280,180 L310,120 L330,135" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round" />

  <!-- Labels -->
  <circle cx="310" cy="120" r="6" fill="#ff3366" />
  <text x="310" y="100" fill="#ff3366" font-size="14" font-weight="bold" text-anchor="middle">Judas Swing / Fakeout</text>
  <text x="310" y="80" fill="#ffffff" font-size="12" text-anchor="middle">High of the Day Created</text>
  
  <!-- Liquidity Grab indicator -->
  <line x1="250" y1="200" x2="350" y2="200" stroke="#4a90e2" stroke-width="1" stroke-dasharray="2,2" />
  <text x="370" y="195" fill="#ffd700" font-size="12" font-weight="bold">Buyside Liquidity Swept ($)</text>

  <!-- Expansion -->
  <text x="500" y="320" fill="#00ffaa" font-size="16" font-weight="bold" text-anchor="middle" transform="rotate(30, 500, 320)">EXPANSION (Trend Harian)</text>

  <!-- Breakout Traders trapped -->
  <g transform="translate(350, 160)">
    <path d="M0,0 L-20,20 L-10,20 L-10,40 L10,40 L10,20 L20,20 Z" fill="#ff3366" transform="scale(0.5) rotate(180)" />
    <text x="20" y="5" fill="#ff3366" font-size="12">Retail Trapped!</text>
  </g>

  <!-- Timeline -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#a0a0b0" stroke-width="2" />
  <text x="150" y="480" fill="#a0a0b0" font-size="14" text-anchor="middle">Sesi Asia (Konsolidasi)</text>
  <text x="475" y="480" fill="#a0a0b0" font-size="14" text-anchor="middle">Sesi London (Manipulasi &amp; Distribusi)</text>

</svg>
