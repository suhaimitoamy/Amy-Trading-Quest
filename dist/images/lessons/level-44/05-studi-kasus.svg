<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Studi Kasus: Profit Split</text>

  <!-- Total Profit Circle -->
  <circle cx="400" cy="120" r="60" fill="#1a1a2e" stroke="#00ffaa" stroke-width="4"/>
  <text x="400" y="115" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Profit</text>
  <text x="400" y="140" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">$1000</text>

  <!-- Arrows -->
  <path d="M 360 160 L 250 240" stroke="#ffcc00" stroke-width="3" fill="none" marker-end="url(#arrow-yellow)"/>
  <path d="M 400 180 L 400 240" stroke="#00ffaa" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 440 160 L 550 240" stroke="#00ccff" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Bucket 1: Reward -->
  <rect x="150" y="250" width="160" height="80" rx="5" fill="#2a2a4e" stroke="#ffcc00"/>
  <text x="230" y="280" fill="#ffcc00" font-size="18" font-weight="bold" text-anchor="middle">50% Reward</text>
  <text x="230" y="310" fill="#ffffff" font-size="16" text-anchor="middle">$500 (Life/Bank)</text>

  <!-- Bucket 2: Compounding -->
  <rect x="330" y="250" width="140" height="80" rx="5" fill="#2a2a4e" stroke="#00ffaa"/>
  <text x="400" y="280" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">30% Grow</text>
  <text x="400" y="310" fill="#ffffff" font-size="16" text-anchor="middle">$300 (Broker)</text>

  <!-- Bucket 3: Backup -->
  <rect x="490" y="250" width="160" height="80" rx="5" fill="#2a2a4e" stroke="#00ccff"/>
  <text x="570" y="280" fill="#00ccff" font-size="18" font-weight="bold" text-anchor="middle">20% Backup</text>
  <text x="570" y="310" fill="#ffffff" font-size="16" text-anchor="middle">$200 (Safety)</text>

  <!-- Define markers -->
  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ffcc00"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00ffaa"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00ccff"/>
    </marker>
  </defs>

</svg>
