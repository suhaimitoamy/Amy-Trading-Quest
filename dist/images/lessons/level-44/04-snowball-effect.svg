<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Snowball Effect</text>

  <!-- Mountain slope -->
  <path d="M 50 100 Q 400 200 750 350" stroke="#555577" stroke-width="4" fill="none"/>

  <!-- Small snowball -->
  <circle cx="150" cy="120" r="15" fill="#ffffff" stroke="#00ffaa" stroke-width="2"/>
  <text x="150" y="90" fill="#aaaaaa" font-size="12" text-anchor="middle">Start: Slow &amp; Small</text>

  <!-- Medium snowball -->
  <circle cx="400" cy="180" r="40" fill="#ffffff" stroke="#00ffaa" stroke-width="3"/>
  <text x="400" y="125" fill="#aaaaaa" font-size="14" text-anchor="middle">Momentum Builds</text>

  <!-- Huge snowball -->
  <circle cx="650" cy="270" r="80" fill="#ffffff" stroke="#00ffaa" stroke-width="4"/>
  <text x="650" y="170" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Massive Growth</text>
  
  <path d="M 600 270 Q 650 350 700 270" fill="none" stroke="#2a2a4e" stroke-width="2"/>
  <text x="650" y="280" fill="#1a1a2e" font-size="20" font-weight="bold" text-anchor="middle">$$$</text>

  <rect x="350" y="320" width="100" height="40" rx="5" fill="#ff3366"/>
  <text x="400" y="345" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Avoid Trees!</text>
  <path d="M 450 340 L 480 340 L 470 330 M 480 340 L 470 350" stroke="#ff3366" stroke-width="2" fill="none"/>

</svg>
