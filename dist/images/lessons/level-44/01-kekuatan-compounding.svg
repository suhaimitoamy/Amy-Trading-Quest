<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Kekuatan Compounding</text>
  
  <line x1="100" y1="320" x2="700" y2="320" stroke="#ffffff" stroke-width="2"/>
  <line x1="100" y1="320" x2="100" y2="80" stroke="#ffffff" stroke-width="2"/>
  
  <text x="80" y="90" fill="#ffffff" font-size="16" text-anchor="end">Capital</text>
  <text x="700" y="340" fill="#ffffff" font-size="16" text-anchor="middle">Time</text>
  
  <!-- Linear growth -->
  <path d="M 100 320 L 650 200" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  <text x="660" y="200" fill="#aaaaaa" font-size="14">Linear Growth</text>
  
  <!-- Exponential growth -->
  <path d="M 100 320 Q 400 300 650 100" stroke="#00ffaa" stroke-width="4" fill="none"/>
  <circle cx="650" cy="100" r="6" fill="#00ffaa"/>
  <text x="660" y="100" fill="#00ffaa" font-size="16" font-weight="bold">Compounding</text>

  <rect x="150" y="270" width="100" height="40" rx="5" fill="#2a2a4e" stroke="#ffffff"/>
  <text x="200" y="295" fill="#ffffff" font-size="14" text-anchor="middle">Start: Slow</text>
  
  <rect x="450" y="120" width="140" height="40" rx="5" fill="#2a2a4e" stroke="#00ffaa"/>
  <text x="520" y="145" fill="#00ffaa" font-size="14" font-weight="bold" text-anchor="middle">Later: Explosive</text>
</svg>
