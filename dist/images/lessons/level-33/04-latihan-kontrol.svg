<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Aktifkan Kill Switch: Walk Away</text>

  <!-- Laptop / Screen -->
  <rect x="250" y="100" width="300" height="200" fill="#0f0f1a" rx="10" stroke="#ffffff" stroke-width="4"/>
  <rect x="230" y="300" width="340" height="20" fill="#ffffff" rx="5"/>
  <path d="M 350 320 L 450 320" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Screen Content: LOCKED -->
  <rect x="252" y="102" width="296" height="196" fill="#ff3366" fill-opacity="0.1" rx="8"/>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="40" fill="#ff3366" text-anchor="middle">🔒</text>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">DAILY LIMIT</text>
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">REACHED (-2%)</text>
  
  <rect x="330" y="250" width="140" height="30" fill="#ff3366" rx="5"/>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">TRADING LOCKED</text>

  <!-- Trader walking away -->
  <!-- We'll draw a simple stick/silhouette figure walking to the right -->
  <g transform="translate(600, 220)">
    <!-- Head -->
    <circle cx="20" cy="-40" r="15" fill="#00ffaa"/>
    <!-- Body -->
    <line x1="20" y1="-25" x2="20" y2="30" stroke="#00ffaa" stroke-width="6" stroke-linecap="round"/>
    <!-- Arm (walking motion) -->
    <line x1="20" y1="-15" x2="40" y2="10" stroke="#00ffaa" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="-15" x2="0" y2="10" stroke="#00ffaa" stroke-width="5" stroke-linecap="round"/>
    <!-- Legs (walking motion) -->
    <line x1="20" y1="30" x2="40" y2="70" stroke="#00ffaa" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="0" y2="70" stroke="#00ffaa" stroke-width="6" stroke-linecap="round"/>
    <!-- Moving lines -->
    <line x1="-10" y1="0" x2="-30" y2="0" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="-15" y1="20" x2="-35" y2="20" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <!-- Thought bubble -->
  <path d="M 620 140 C 620 110, 720 110, 720 140 C 720 170, 620 170, 620 140" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="1"/>
  <circle cx="625" cy="165" r="5" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="615" cy="175" r="3" fill="#ffffff" fill-opacity="0.1"/>
  <text x="670" y="135" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Mending ngopi dulu,</text>
  <text x="670" y="150" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">besok lanjut lagi.</text>

  <!-- Sticky Note -->
  <rect x="80" y="150" width="120" height="120" fill="#ffdd55" stroke="#ccaa33" stroke-width="1"/>
  <rect x="80" y="150" width="120" height="15" fill="#eec033"/>
  <text x="140" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333333" text-anchor="middle">ATURAN:</text>
  <text x="140" y="200" font-family="Arial, sans-serif" font-size="11" fill="#333333" text-anchor="middle">1. Loss 1% =</text>
  <text x="140" y="215" font-family="Arial, sans-serif" font-size="11" fill="#333333" text-anchor="middle">Jeda 15 Menit</text>
  <text x="140" y="235" font-family="Arial, sans-serif" font-size="11" fill="#333333" text-anchor="middle">2. Loss 2% =</text>
  <text x="140" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333333" text-anchor="middle">TUTUP CHART!</text>

  <!-- Progress Steps -->
  <rect x="50" y="380" width="700" height="80" fill="#ffffff" fill-opacity="0.05" rx="8"/>
  
  <text x="150" y="425" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">1. Terima Loss</text>
  <path d="M 230 418 L 270 418" fill="none" stroke="#00ffaa" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="400" y="425" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">2. Tutup Chart</text>
  <path d="M 500 418 L 540 418" fill="none" stroke="#00ffaa" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="650" y="425" font-family="Arial, sans-serif" font-size="24" fill="#00ffaa" text-anchor="middle">3. Akun Selamat</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

</svg>
