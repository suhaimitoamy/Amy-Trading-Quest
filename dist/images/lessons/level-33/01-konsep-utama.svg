<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Siklus Revenge Trading</text>

  <!-- Setup 1: Careful Analysis but Stopped Out -->
  <rect x="50" y="250" width="100" height="40" fill="#ffffff" fill-opacity="0.1" rx="5"/>
  <text x="100" y="275" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa" text-anchor="middle">Order Block</text>
  
  <!-- Candlesticks for Setup 1 -->
  <!-- Falling -->
  <line x1="80" y1="150" x2="80" y2="220" stroke="#ff3366" stroke-width="4"/>
  <rect x="75" y="170" width="10" height="40" fill="#ff3366"/>
  <!-- Touch OB and Spike Down -->
  <line x1="100" y1="210" x2="100" y2="320" stroke="#ff3366" stroke-width="4"/>
  <rect x="95" y="220" width="10" height="60" fill="#ff3366"/>
  
  <!-- Entry & SL Lines -->
  <line x1="110" y1="250" x2="180" y2="250" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="115" y="245" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">Buy 0.01 Lot</text>
  
  <line x1="110" y1="300" x2="180" y2="300" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="115" y="315" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">Stop Loss Hit!</text>

  <!-- Emotion Spark -->
  <circle cx="220" cy="275" r="30" fill="#ff3366" fill-opacity="0.2"/>
  <text x="220" y="270" font-family="Arial, sans-serif" font-size="24" fill="#ff3366" text-anchor="middle">🤬</text>
  <text x="220" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff3366" text-anchor="middle">MARAH</text>

  <!-- Path to Revenge -->
  <path d="M 260 275 C 320 275, 300 150, 350 150" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>

  <!-- Revenge Trades (No Structure, Bigger Lots) -->
  <!-- Candle goes up briefly -->
  <line x1="360" y1="200" x2="360" y2="120" stroke="#00ffaa" stroke-width="4"/>
  <rect x="355" y="140" width="10" height="50" fill="#00ffaa"/>
  
  <!-- REVENGE BUY 1 -->
  <line x1="370" y1="130" x2="450" y2="130" stroke="#00ffaa" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="375" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ffaa">Revenge Buy: 0.10 Lot</text>
  <text x="375" y="145" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Tanpa Stop Loss!</text>

  <!-- Instant Drop -->
  <line x1="410" y1="110" x2="410" y2="350" stroke="#ff3366" stroke-width="4"/>
  <rect x="405" y="130" width="10" height="200" fill="#ff3366"/>

  <!-- REVENGE SELL 2 at bottom -->
  <path d="M 430 300 C 480 300, 480 380, 520 380" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <circle cx="475" cy="340" r="25" fill="#ff3366" fill-opacity="0.2"/>
  <text x="475" y="345" font-family="Arial, sans-serif" font-size="20" fill="#ff3366" text-anchor="middle">PANIK</text>

  <line x1="530" y1="380" x2="610" y2="380" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="535" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff3366">Revenge Sell: 0.50 Lot</text>
  
  <!-- Price goes up against sell -->
  <line x1="580" y1="400" x2="580" y2="180" stroke="#00ffaa" stroke-width="4"/>
  <rect x="575" y="200" width="10" height="180" fill="#00ffaa"/>

  <!-- Margin Call -->
  <rect x="630" y="180" width="150" height="80" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="2" rx="10"/>
  <text x="705" y="215" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">MARGIN</text>
  <text x="705" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">CALL</text>

  <!-- Legend / Info box -->
  <rect x="50" y="420" width="700" height="60" fill="#ffffff" fill-opacity="0.05" rx="5"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">"Pasar tidak peduli dengan kerugian Anda. Membalas dendam hanya akan"</text>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff3366" text-anchor="middle">melipatgandakan kerugian dan menghancurkan akun Anda.</text>

</svg>
