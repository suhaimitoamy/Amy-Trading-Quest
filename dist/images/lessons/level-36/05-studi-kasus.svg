<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Studi Kasus: Disiplin vs Reaktif</text>

  <!-- Bagian Chart Background -->
  <path d="M 50 150 L 150 250 L 250 120 L 400 350 L 550 200 L 750 450" fill="none" stroke="#0f3460" stroke-width="4" stroke-opacity="0.5"/>

  <!-- Skenario Sari (Disiplin) -->
  <rect x="50" y="100" width="300" height="150" rx="10" fill="#16213e" stroke="#00ffaa" stroke-width="2"/>
  <text x="200" y="130" fill="#00ffaa" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Trader Disiplin</text>
  <text x="200" y="155" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Menunggu harga naik ke POI Supply</text>
  
  <rect x="220" y="170" width="60" height="20" fill="rgba(233, 69, 96, 0.3)" stroke="#e94560"/>
  <text x="250" y="185" fill="#e94560" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Supply</text>
  <path d="M 180 230 L 220 180 L 280 240" fill="none" stroke="#00ffaa" stroke-width="2"/>
  <circle cx="220" cy="180" r="5" fill="#00ffaa"/>
  <text x="180" y="175" fill="#00ffaa" font-family="sans-serif" font-size="12" font-weight="bold">Sell (Sesuai Plan)</text>

  <!-- Skenario Tono (Reaktif) -->
  <rect x="450" y="100" width="300" height="150" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="600" y="130" fill="#e94560" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Trader Reaktif (FOMO)</text>
  <text x="600" y="155" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Melihat koreksi kecil, panik lalu Buy</text>
  
  <path d="M 520 230 L 560 180" fill="none" stroke="#e94560" stroke-width="2"/>
  <circle cx="540" cy="205" r="5" fill="#ffcc00"/>
  <text x="500" y="200" fill="#ffcc00" font-family="sans-serif" font-size="12" font-weight="bold">Buy (Tanpa Plan)</text>
  <path d="M 560 180 L 620 280" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="4"/>
  <text x="630" y="270" fill="#e94560" font-family="sans-serif" font-size="12" font-weight="bold">Loss / MC!</text>

  <!-- Pelajaran -->
  <rect x="150" y="320" width="500" height="120" rx="10" fill="#16213e" stroke="#ffffff" stroke-width="2"/>
  <text x="400" y="350" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Kesimpulan Studi Kasus</text>
  <text x="400" y="380" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">"Pergerakan koreksi (Retracement) sering menjebak</text>
  <text x="400" y="400" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">trader emosional untuk melawan tren utama.</text>
  <text x="400" y="420" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Trader pro menunggu dengan sabar di area POI-nya."</text>
</svg>
