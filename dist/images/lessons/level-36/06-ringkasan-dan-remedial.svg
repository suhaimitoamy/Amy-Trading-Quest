<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Ringkasan Masterclass Daily Plan</text>

  <!-- Mindmap Center -->
  <circle cx="400" cy="250" r="60" fill="#0f3460" stroke="#00ffaa" stroke-width="3"/>
  <text x="400" y="245" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">DAILY</text>
  <text x="400" y="265" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">PLAN</text>

  <!-- Node 1: Pilar -->
  <path d="M 360 210 L 250 140" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="100" y="100" width="150" height="80" rx="5" fill="#16213e" stroke="#00ffaa" stroke-width="2"/>
  <text x="175" y="130" fill="#00ffaa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3 Pilar Utama</text>
  <text x="175" y="150" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Bias, Area (POI),</text>
  <text x="175" y="165" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Trigger Eksekusi</text>

  <!-- Node 2: Gejala -->
  <path d="M 440 210 L 550 140" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="550" y="100" width="150" height="80" rx="5" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="625" y="130" fill="#e94560" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Gejala Gagal</text>
  <text x="625" y="150" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Harga tembus POI,</text>
  <text x="625" y="165" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Emosi FOMO muncul</text>

  <!-- Node 3: Kesalahan -->
  <path d="M 360 290 L 250 360" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="100" y="320" width="150" height="80" rx="5" fill="#16213e" stroke="#ffcc00" stroke-width="2"/>
  <text x="175" y="350" fill="#ffcc00" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Kesalahan Umum</text>
  <text x="175" y="370" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Menggeser SL,</text>
  <text x="175" y="385" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Overcomplicating</text>

  <!-- Node 4: Kontrol -->
  <path d="M 440 290 L 550 360" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="550" y="320" width="150" height="80" rx="5" fill="#16213e" stroke="#00ffaa" stroke-width="2"/>
  <text x="625" y="350" fill="#00ffaa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Kontrol Diri</text>
  <text x="625" y="370" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Walk Away Rule,</text>
  <text x="625" y="385" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Daily Loss Limit</text>

  <!-- Teks Bawah -->
  <text x="400" y="460" fill="#ffffff" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">Trading yang baik seharusnya membosankan dan terstruktur.</text>
</svg>
