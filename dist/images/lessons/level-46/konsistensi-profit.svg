<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Konsistensi Profit vs Hoki Sesekali (Gambling)</text>
  
  <!-- Divider -->
  <line x1="400" y1="60" x2="400" y2="380" stroke="#33334d" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- LEFT SIDE: Healthy Consistency -->
  <text x="200" y="80" fill="#00ffaa" font-size="18" font-family="Arial" text-anchor="middle" font-weight="bold">Kurva yang Disetujui (Sehat)</text>
  
  <!-- Axis Left -->
  <line x1="50" y1="320" x2="350" y2="320" stroke="#555" stroke-width="2"/>
  <line x1="50" y1="120" x2="50" y2="320" stroke="#555" stroke-width="2"/>
  
  <!-- Healthy Bars (Profits distributed evenly) -->
  <rect x="70" y="270" width="30" height="50" fill="#00ffaa"/>
  <rect x="120" y="250" width="30" height="70" fill="#00ffaa"/>
  <rect x="170" y="290" width="30" height="30" fill="#ff3366"/> <!-- loss day -->
  <rect x="220" y="260" width="30" height="60" fill="#00ffaa"/>
  <rect x="270" y="240" width="30" height="80" fill="#00ffaa"/>
  <rect x="320" y="255" width="30" height="65" fill="#00ffaa"/>
  
  <text x="200" y="360" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Tidak ada hari dengan profit lebih dari 30%</text>
  
  <!-- RIGHT SIDE: Lucky Strike / Unhealthy -->
  <text x="600" y="80" fill="#ffaa00" font-size="18" font-family="Arial" text-anchor="middle" font-weight="bold">Kurva yang Ditolak (Berjudi)</text>
  
  <!-- Axis Right -->
  <line x1="450" y1="320" x2="750" y2="320" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="120" x2="450" y2="320" stroke="#555" stroke-width="2"/>
  
  <!-- Unhealthy Bars (One giant spike) -->
  <rect x="470" y="290" width="30" height="30" fill="#00ffaa"/>
  <rect x="520" y="300" width="30" height="20" fill="#00ffaa"/>
  <rect x="570" y="310" width="30" height="10" fill="#ff3366"/>
  <rect x="620" y="140" width="30" height="180" fill="#00ffaa"/> <!-- Giant spike -->
  <rect x="670" y="300" width="30" height="20" fill="#00ffaa"/>
  
  <!-- Red Cross on the spike -->
  <line x1="600" y1="120" x2="670" y2="190" stroke="#ff3366" stroke-width="5"/>
  <line x1="670" y1="120" x2="600" y2="190" stroke="#ff3366" stroke-width="5"/>
  <text x="635" y="100" fill="#ff3366" font-size="14" font-family="Arial" text-anchor="middle" font-weight="bold">> 70% Profit in 1 Day!</text>
  
  <text x="600" y="360" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Satu hari profit raksasa akibat News All-in</text>
  
</svg>
