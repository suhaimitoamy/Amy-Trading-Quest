<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="30" fill="#ffffff" font-size="22" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Studi Kasus Budi: Lolos Akun $100K</text>
  
  <!-- Grid background -->
  <line x1="60" y1="340" x2="750" y2="340" stroke="#33334d" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="340" stroke="#33334d" stroke-width="2"/>

  <!-- Target & Start line -->
  <line x1="60" y1="100" x2="750" y2="100" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="70" y="90" fill="#00ffaa" font-size="12" font-family="Arial">Target $108,000 (+8%)</text>
  
  <line x1="60" y1="220" x2="750" y2="220" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="70" y="210" fill="#ffffff" font-size="12" font-family="Arial">Start $100,000</text>
  
  <line x1="60" y1="310" x2="750" y2="310" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="70" y="300" fill="#ff3366" font-size="12" font-family="Arial">Max Drawdown $90,000 (-10%)</text>

  <!-- Equity curve line -->
  <path d="M 60 220 L 120 235 L 180 250 L 240 265 L 340 175 L 420 145 L 500 160 L 650 100 L 720 85" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Trade 1-3 (Loss streak) -->
  <circle cx="120" cy="235" r="5" fill="#ff3366"/>
  <text x="120" y="255" fill="#ff3366" font-size="10" font-family="Arial" text-anchor="middle">-1%</text>
  <circle cx="180" cy="250" r="5" fill="#ff3366"/>
  <text x="180" y="270" fill="#ff3366" font-size="10" font-family="Arial" text-anchor="middle">-1%</text>
  <circle cx="240" cy="265" r="5" fill="#ff3366"/>
  <text x="240" y="285" fill="#ff3366" font-size="10" font-family="Arial" text-anchor="middle">-1%</text>
  
  <rect x="180" y="315" width="120" height="20" fill="#2a2a4e" stroke="#ff3366"/>
  <text x="240" y="330" fill="#ffffff" font-size="10" font-family="Arial" text-anchor="middle">Losing Streak: Tenang</text>
  
  <!-- Trade 4: Win RR 1:3 -->
  <circle cx="340" cy="175" r="6" fill="#00ffaa"/>
  <text x="340" y="160" fill="#00ffaa" font-size="12" font-family="Arial" text-anchor="middle" font-weight="bold">+3% (RR 1:3)</text>
  
  <!-- Trade 5: Win RR 1:2 -->
  <circle cx="420" cy="145" r="6" fill="#00ffaa"/>
  <text x="420" y="130" fill="#00ffaa" font-size="12" font-family="Arial" text-anchor="middle" font-weight="bold">+2%</text>
  
  <!-- Trade 6: Loss -->
  <circle cx="500" cy="160" r="5" fill="#ff3366"/>
  <text x="500" y="180" fill="#ff3366" font-size="10" font-family="Arial" text-anchor="middle">-1%</text>

  <!-- Trade 7: Giant Win RR 1:5 -->
  <circle cx="650" cy="100" r="8" fill="#00ffaa"/>
  <text x="650" y="80" fill="#00ffaa" font-size="14" font-family="Arial" text-anchor="middle" font-weight="bold">+5% (RR 1:5)</text>

  <circle cx="720" cy="85" r="6" fill="#00ffaa"/>
  <text x="720" y="70" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="middle" font-weight="bold">TARGET!</text>

  <!-- Summary Box -->
  <rect x="520" y="200" width="220" height="80" rx="5" fill="#2a2a4e" stroke="#555"/>
  <text x="530" y="220" fill="#ffffff" font-size="12" font-family="Arial">- Win Rate: 42% (3 Win, 4 Loss)</text>
  <text x="530" y="240" fill="#ffffff" font-size="12" font-family="Arial">- Risk Konstan: 1%</text>
  <text x="530" y="260" fill="#ffffff" font-size="12" font-family="Arial">- Average RR: Sangat Tinggi</text>

</svg>
