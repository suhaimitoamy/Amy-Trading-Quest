<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Jebakan Daily Drawdown (Midnight Reset)</text>
  
  <!-- Grid -->
  <line x1="60" y1="350" x2="750" y2="350" stroke="#33334d" stroke-width="2"/>
  <line x1="60" y1="50" x2="60" y2="350" stroke="#33334d" stroke-width="2"/>
  
  <!-- Time divider / Server Reset Line -->
  <line x1="400" y1="60" x2="400" y2="350" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="400" y="55" fill="#aaaaaa" font-size="14" font-family="Arial" text-anchor="middle">Server Reset (00:00)</text>

  <!-- Balance Lines -->
  <line x1="60" y1="200" x2="750" y2="200" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="70" y="190" fill="#ffffff" font-size="14" font-family="Arial">Balance Awal ($100,000)</text>
  
  <!-- Limit Drawdown Hari 1 -->
  <line x1="60" y1="280" x2="400" y2="280" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="270" fill="#ff3366" font-size="12" font-family="Arial">Max Daily Loss Hari 1 ($95,000)</text>
  
  <!-- Limit Drawdown Hari 2 (Equity based calculation) -->
  <line x1="400" y1="200" x2="750" y2="200" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="410" y="190" fill="#ff3366" font-size="12" font-family="Arial">Max Daily Loss Hari 2 (Misal $98,800)</text>

  <!-- Equity Curve -->
  <path d="M 60 200 L 150 180 L 250 120 L 400 100" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <path d="M 400 100 L 500 150 L 600 220 L 650 250" fill="none" stroke="#ffaa00" stroke-width="3"/>
  
  <!-- Data Points -->
  <circle cx="60" cy="200" r="5" fill="#ffffff"/>
  <circle cx="400" cy="100" r="5" fill="#00ffaa"/>
  <circle cx="600" cy="220" r="7" fill="#ff3366"/>
  
  <text x="390" y="90" fill="#00ffaa" font-size="14" font-family="Arial" text-anchor="end">Floating Profit ($104,000)</text>
  
  <!-- Breach text -->
  <text x="615" y="215" fill="#ff3366" font-size="16" font-family="Arial" font-weight="bold">BREACH! Gagal</text>
  
  <!-- Explanation box -->
  <rect x="50" y="300" width="300" height="40" rx="5" fill="#2a2a4e" stroke="#33334d"/>
  <text x="200" y="325" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Hari 1: Floating naik pesat (Aman)</text>

  <rect x="420" y="300" width="320" height="40" rx="5" fill="#2a2a4e" stroke="#33334d"/>
  <text x="580" y="325" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Hari 2: Harga drop dari titik baru. DD tersentuh!</text>

</svg>
