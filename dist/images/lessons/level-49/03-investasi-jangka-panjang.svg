<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Trading vs Investasi Jangka Panjang</text>
  
  <!-- Left Side: Trading -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="300" height="300" fill="#2a2a4e" rx="10"/>
    <text x="150" y="30" fill="#ff3366" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Trading (Active)</text>
    <text x="150" y="55" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Fokus Harian/Mingguan. Risiko Tinggi.</text>
    
    <!-- Volatile Graph -->
    <path d="M 30,220 L 60,150 L 90,200 L 130,90 L 170,180 L 210,120 L 250,210 L 280,100" fill="none" stroke="#ff3366" stroke-width="3"/>
    
    <!-- Circles for Buy/Sell -->
    <circle cx="60" cy="150" r="5" fill="#00ffaa"/>
    <circle cx="90" cy="200" r="5" fill="#ff3366"/>
    <circle cx="130" cy="90" r="5" fill="#00ffaa"/>
    <circle cx="170" cy="180" r="5" fill="#ff3366"/>
    <circle cx="210" cy="120" r="5" fill="#00ffaa"/>
    <circle cx="280" cy="100" r="5" fill="#00ffaa"/>
    
    <text x="150" y="270" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">"Buy low, Sell high... Repeat."</text>
  </g>
  
  <!-- Right Side: Investing -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="300" height="300" fill="#2a2a4e" rx="10"/>
    <text x="150" y="30" fill="#00ffaa" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Investing (Passive)</text>
    <text x="150" y="55" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Fokus Puluhan Tahun. Compound Interest.</text>
    
    <!-- Exponential Growth Graph -->
    <path d="M 30,250 C 100,240 180,200 280,70" fill="none" stroke="#00ffaa" stroke-width="4"/>
    
    <!-- DCA points -->
    <circle cx="30" cy="250" r="4" fill="#ffffff"/>
    <circle cx="80" cy="242" r="4" fill="#ffffff"/>
    <circle cx="130" cy="225" r="4" fill="#ffffff"/>
    <circle cx="180" cy="195" r="4" fill="#ffffff"/>
    <circle cx="230" cy="145" r="4" fill="#ffffff"/>
    <circle cx="280" cy="70" r="4" fill="#ffffff"/>
    
    <text x="150" y="270" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">"Buy, Hold, DCA... Sleep."</text>
  </g>
  
  <!-- Info Bottom -->
  <rect x="20" y="420" width="760" height="60" rx="10" fill="#3a3a5e"/>
  <text x="400" y="445" fill="#f39c12" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Jangan campur aduk kedua mentalitas ini!</text>
  <text x="400" y="465" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Trading yang merugi TIDAK BOLEH diubah menjadi investasi jangka panjang karena terpaksa.</text>
</svg>
