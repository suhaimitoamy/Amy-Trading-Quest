<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-alert { fill: #ffcc00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-success { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-danger { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .fib-line { stroke: #aaaaaa; stroke-width: 2; stroke-dasharray: 5,5; }
      .price-line { stroke: #e0e0e0; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .poi-danger { fill: #ff3366; fill-opacity: 0.2; stroke: #ff3366; stroke-width: 2; }
      .poi-success { fill: #00ffaa; fill-opacity: 0.2; stroke: #00ffaa; stroke-width: 2; }
      .arrow { fill: #00ffaa; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect class="bg" width="800" height="500" rx="10" />
  
  <text x="400" y="40" class="text-light" font-size="24" text-anchor="middle" font-weight="bold">Premium Discount + POI (Point of Interest)</text>

  <!-- Fib Levels -->
  <line x1="180" y1="100" x2="620" y2="100" class="fib-line" stroke="#ff3366" />
  <text x="170" y="105" fill="#ff3366" font-size="14" text-anchor="end">100%</text>

  <line x1="180" y1="250" x2="620" y2="250" class="fib-line" stroke="#aaaaaa" />
  <text x="170" y="255" fill="#aaaaaa" font-size="14" text-anchor="end">50% (Equilibrium)</text>

  <line x1="180" y1="400" x2="620" y2="400" class="fib-line" stroke="#00ffaa" />
  <text x="170" y="405" fill="#00ffaa" font-size="14" text-anchor="end">0%</text>

  <!-- POIs -->
  <rect x="350" y="160" width="100" height="30" class="poi-danger" />
  <text x="530" y="180" class="text-danger" font-size="14" text-anchor="start">Order Block di Premium (ABAIKAN!)</text>
  <line x1="450" y1="175" x2="520" y2="175" stroke="#ff3366" stroke-width="1" stroke-dasharray="3,3" />

  <rect x="350" y="320" width="100" height="30" class="poi-success" />
  <text x="530" y="340" class="text-success" font-size="14" text-anchor="start">Order Block di Discount (VALID)</text>
  <line x1="450" y1="335" x2="520" y2="335" stroke="#00ffaa" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Price Movement -->
  <!-- Low -> High -> Reaches bad OB -> drops through it -> Reaches good OB -> up -->
  <path class="price-line" d="M 220 400 L 300 100 L 370 170 L 390 150 L 420 335 L 560 80" marker-end="url(#arrowhead)" />
  
  <circle cx="370" cy="170" r="5" fill="#ff3366" />
  <circle cx="420" cy="335" r="5" fill="#00ffaa" />
  
  <text x="420" y="370" class="text-success" font-size="14" text-anchor="middle">Entry BUY Tepat di Sini!</text>

  <!-- Labels -->
  <text x="400" y="440" class="text-light" font-size="16" text-anchor="middle">Area Premium/Discount HANYALAH FILTER.</text>
  <text x="400" y="465" class="text-light" font-size="16" text-anchor="middle">Gunakan untuk memilih Order Block atau FVG mana yang paling valid untuk di-entry.</text>

</svg>
