<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-premium { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .line { stroke: #33334d; stroke-width: 2; }
      .fib-line { stroke: #aaaaaa; stroke-width: 2; stroke-dasharray: 5,5; }
      .price-line { stroke: #e0e0e0; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .premium-box { fill: #ff3366; fill-opacity: 0.15; stroke: #ff3366; stroke-width: 1; }
      .poi-box { fill: #ff3366; fill-opacity: 0.4; stroke: none; }
      .arrow { fill: #ff3366; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect class="bg" width="800" height="500" rx="10" />
  
  <text x="400" y="40" class="text-light" font-size="24" text-anchor="middle" font-weight="bold">Sell di Area Premium</text>

  <!-- Premium Area -->
  <rect x="200" y="100" width="400" height="150" class="premium-box" />
  <!-- Discount Area -->

  <!-- Fib Levels -->
  <line x1="180" y1="100" x2="620" y2="100" class="fib-line" stroke="#ff3366" />
  <text x="170" y="105" class="text-premium" font-size="14" text-anchor="end">100%</text>

  <line x1="180" y1="250" x2="620" y2="250" class="fib-line" stroke="#aaaaaa" />
  <text x="170" y="255" fill="#aaaaaa" font-size="14" text-anchor="end" font-family="sans-serif">50%</text>
  <text x="630" y="255" fill="#aaaaaa" font-size="14" font-family="sans-serif">Equilibrium</text>

  <line x1="180" y1="400" x2="620" y2="400" class="fib-line" stroke="#00ffaa" />
  <text x="170" y="405" fill="#00ffaa" font-size="14" text-anchor="end" font-family="sans-serif">0%</text>

  <!-- POI Box -->
  <rect x="350" y="140" width="100" height="40" class="poi-box" />
  <text x="400" y="165" fill="#1a1a2e" font-size="14" text-anchor="middle" font-weight="bold">Order Block</text>

  <!-- Price Movement -->
  <!-- Start high -> impulse low -> retrace up to premium -> go down -->
  <path class="price-line" d="M 220 100 L 320 400 L 400 160 L 520 420" marker-end="url(#arrowhead)" />
  
  <circle cx="220" cy="100" r="5" fill="#ff3366" />
  <text x="220" y="80" class="text-light" font-size="14" text-anchor="middle">Swing High</text>
  
  <circle cx="320" cy="400" r="5" fill="#00ffaa" />
  <text x="320" y="425" class="text-light" font-size="14" text-anchor="middle">Swing Low</text>

  <circle cx="400" cy="160" r="6" fill="#ff3366" />
  <text x="400" y="120" class="text-premium" font-size="14" text-anchor="middle">Entry SELL di Premium</text>

  <!-- Labels -->
  <text x="400" y="460" class="text-light" font-size="16" text-anchor="middle">Saat Downtrend, tarik fibo dari Swing High ke Swing Low.</text>
  <text x="400" y="485" class="text-light" font-size="16" text-anchor="middle">Tunggu harga pullback naik melewati garis 50% untuk mendapatkan harga mahal (Premium).</text>

</svg>
