<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">FVG divalidasi oleh Displacement Kuat</text>
  
  <g transform="translate(100, 80)">
    <!-- Sideways / Consolidation before displacement -->
    <path d="M 50 300 Q 70 280, 90 310 T 130 290 T 170 300" fill="none" stroke="#888" stroke-width="3"/>
    <!-- Resistance Line (Structure) -->
    <line x1="50" y1="280" x2="300" y2="280" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="50" y="270" font-family="Arial" font-size="12" fill="#ff3366">Old Resistance / Swing High</text>

    <!-- Displacement Candle (Candle 2) -->
    <line x1="200" y1="100" x2="200" y2="300" stroke="#00ffaa" stroke-width="4"/>
    <rect x="185" y="110" width="30" height="180" fill="#00ffaa"/>
    <text x="120" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#00ffaa">DISPLACEMENT</text>
    <text x="120" y="170" font-family="Arial" font-size="12" fill="#ffffff">Momentum kuat</text>
    <text x="120" y="190" font-family="Arial" font-size="12" fill="#ffffff">menembus struktur</text>

    <!-- Candle 1 -->
    <line x1="150" y1="285" x2="150" y2="330" stroke="#00ffaa" stroke-width="4"/>
    <rect x="135" y="300" width="30" height="20" fill="#00ffaa"/>

    <!-- Candle 3 -->
    <line x1="250" y1="50" x2="250" y2="150" stroke="#00ffaa" stroke-width="4"/>
    <rect x="235" y="70" width="30" height="60" fill="#00ffaa"/>

    <!-- FVG Highlight Box -->
    <rect x="150" y="150" width="300" height="135" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="2"/>
    <text x="350" y="210" font-family="Arial" font-size="16" font-weight="bold" fill="#00ffaa">HIGH PROBABILITY FVG</text>
    <text x="350" y="230" font-family="Arial" font-size="12" fill="#ffffff">Ditinggalkan oleh pergerakan agresif</text>
    
    <!-- BOS Text -->
    <text x="215" y="275" font-family="Arial" font-size="12" font-weight="bold" fill="#ff3366">BOS / CHoCH</text>
  </g>
</svg>
