<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .text-sub { fill: #a0a0b0; font-family: sans-serif; font-size: 16px; }
      .text-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: bold; }
      .text-info { fill: #00ffaa; font-family: sans-serif; font-size: 14px; }
      .text-alert { fill: #ff3366; font-family: sans-serif; font-size: 12px; }
      .line-price { stroke: #00ffaa; stroke-width: 1; stroke-dasharray: 4 4; }
      .line-sl { stroke: #ff3366; stroke-width: 2; stroke-dasharray: 6 6; }
      .line-bep { stroke: #ffffff; stroke-width: 2; stroke-dasharray: 4 4; }
      .bullish { stroke: #00ffaa; stroke-width: 3; fill: none; stroke-linejoin: round; }
      .zone { fill: #00ffaa; opacity: 0.1; }
      .box { fill: #2a2a4e; stroke: #404060; stroke-width: 1; rx: 5; }
      .badge { fill: #00ffaa; rx: 4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg" />
  
  <!-- Title -->
  <text x="400" y="40" class="text-title" text-anchor="middle">Partial Close + Break Even Strategy</text>
  <text x="400" y="65" class="text-sub" text-anchor="middle">Securing the Bag while Letting Winners Run</text>

  <!-- Chart Area -->
  <rect x="50" y="100" width="700" height="300" class="box" />
  
  <!-- Grid/Levels -->
  <line x1="50" y1="360" x2="750" y2="360" class="line-sl" />
  <text x="60" y="355" class="text-alert">Original SL</text>

  <line x1="50" y1="300" x2="750" y2="300" class="line-price" />
  <text x="60" y="295" class="text-info">Entry Buy (Total: 1.00 Lot)</text>

  <line x1="50" y1="180" x2="750" y2="180" class="line-price" stroke="#ffffff" />
  <text x="60" y="175" fill="#ffffff" font-family="sans-serif" font-size="12">Target 1 (RR 1:2) - Minor Resistance</text>

  <line x1="50" y1="120" x2="750" y2="120" class="line-price" stroke="#00ffaa" stroke-width="2" />
  <text x="60" y="115" class="text-info" font-weight="bold">Final Target (TP Max)</text>

  <!-- Price Action Path -->
  <!-- Entry (100,300) -> Target 1 (300, 180) -> Pullback (450, 240) -> Target Max (650, 120) -->
  <path d="M 80 320 L 120 300 L 300 180 L 450 240 L 650 120 L 700 80" class="bullish" />

  <!-- The Magic Moment (Partial Close) -->
  <circle cx="300" cy="180" r="6" fill="#ffffff" />
  
  <!-- Callout Box -->
  <rect x="180" y="190" width="220" height="80" class="box" fill="#1a1a2e" stroke="#ffffff" />
  <text x="290" y="210" class="text-label" text-anchor="middle">Tindakan Ajaib di TP 1:</text>
  <text x="190" y="230" fill="#00ffaa" font-family="sans-serif" font-size="12">1. Close 50% Volume (0.50 Lot)</text>
  <text x="190" y="250" fill="#ffffff" font-family="sans-serif" font-size="12">2. Pindah SL ke Entry (BEP)</text>

  <!-- BEP Line showing up -->
  <line x1="300" y1="300" x2="750" y2="300" class="line-bep" />
  <path d="M 120 360 Q 200 360 300 300" stroke="#ffffff" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow-white)" />
  <text x="210" y="340" fill="#ffffff" font-family="sans-serif" font-size="12">SL digeser ke BEP</text>

  <!-- Runner -->
  <circle cx="650" cy="120" r="6" fill="#00ffaa" />
  <rect x="500" y="50" width="180" height="40" class="box" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" />
  <text x="590" y="65" class="text-info" text-anchor="middle" font-weight="bold">Runner TP Hit!</text>
  <text x="590" y="80" class="text-info" text-anchor="middle" font-size="11">Remaining 0.50 Lot secured</text>

  <!-- Status Bar Bottom -->
  <rect x="50" y="420" width="340" height="60" class="box" fill="#2a4e30" />
  <text x="220" y="445" class="text-label" text-anchor="middle">Hasil jika harga berbalik ke BEP:</text>
  <text x="220" y="465" class="text-label" text-anchor="middle" fill="#00ffaa">PROFIT (dari 50% awal)</text>

  <rect x="410" y="420" width="340" height="60" class="box" fill="#2a4e30" />
  <text x="580" y="445" class="text-label" text-anchor="middle">Hasil jika tren berlanjut maksimal:</text>
  <text x="580" y="465" class="text-label" text-anchor="middle" fill="#00ffaa">MAX PROFIT (Awal + Runner)</text>


  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>

</svg>
