<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .text-sub { fill: #a0a0b0; font-family: sans-serif; font-size: 16px; }
      .text-label { fill: #ffffff; font-family: sans-serif; font-size: 12px; font-weight: bold; }
      .text-info { fill: #00ffaa; font-family: sans-serif; font-size: 11px; }
      .text-alert { fill: #ff3366; font-family: sans-serif; font-size: 11px; }
      .line-grid { stroke: #2a2a4e; stroke-width: 1; }
      .line-price { stroke: #ffffff; stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.5; }
      .bullish { stroke: #00ffaa; stroke-width: 3; fill: none; stroke-linejoin: round; }
      .node { fill: #ffffff; stroke: #1a1a2e; stroke-width: 2; }
      .box { fill: #2a2a4e; stroke: #404060; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg" />
  
  <!-- Title -->
  <text x="400" y="30" class="text-title" text-anchor="middle">Trade Management SOP (Full Case Study)</text>
  <text x="400" y="55" class="text-sub" text-anchor="middle">Dari Entry hingga TP Maksimal</text>

  <!-- Grid Lines -->
  <line x1="100" y1="400" x2="750" y2="400" class="line-grid" /> <!-- SL Level -->
  <line x1="100" y1="350" x2="750" y2="350" class="line-grid" /> <!-- Entry -->
  <line x1="100" y1="200" x2="750" y2="200" class="line-grid" /> <!-- Partial TP 1:2 -->
  <line x1="100" y1="100" x2="750" y2="100" class="line-grid" /> <!-- Final TP -->

  <!-- Y-Axis Labels -->
  <text x="90" y="405" class="text-alert" text-anchor="end">Initial SL</text>
  <text x="90" y="355" class="text-info" text-anchor="end">Entry (1.0 L)</text>
  <text x="90" y="205" class="text-label" text-anchor="end">TP 1 (RR 1:2)</text>
  <text x="90" y="105" class="text-info" text-anchor="end" font-weight="bold">Final TP</text>

  <!-- Phase Dividers -->
  <line x1="250" y1="80" x2="250" y2="450" class="line-price" />
  <line x1="400" y1="80" x2="400" y2="450" class="line-price" />
  <line x1="550" y1="80" x2="550" y2="450" class="line-price" />
  
  <text x="175" y="440" class="text-sub" font-size="12" text-anchor="middle">Fase 1: HOLD</text>
  <text x="325" y="440" class="text-sub" font-size="12" text-anchor="middle">Fase 2: PARTIAL &amp; BEP</text>
  <text x="475" y="440" class="text-sub" font-size="12" text-anchor="middle">Fase 3: TRAIL SL</text>
  <text x="650" y="440" class="text-sub" font-size="12" text-anchor="middle">Fase 4: EXIT</text>

  <!-- Price Action Curve -->
  <!-- Start (120, 350) 
       Up to (200, 270)
       Down to (280, 320)
       Up to Target 1 (400, 200)
       Down to HL (480, 240)
       Up to near TP (650, 120)
       Reversal down (700, 160) -->
  <path d="M 120 350 L 200 270 L 280 320 L 400 200 L 480 240 L 650 120 L 700 160" class="bullish" />

  <!-- Action Points -->
  <!-- Entry -->
  <circle cx="120" cy="350" r="5" class="node" />
  
  <!-- Pullback Normal -->
  <circle cx="280" cy="320" r="5" fill="#ffaa00" />
  <rect x="180" y="325" width="100" height="40" class="box" fill="#1a1a2e" stroke="#ffaa00" />
  <text x="230" y="340" fill="#ffaa00" font-family="sans-serif" font-size="10" text-anchor="middle">Normal pullback</text>
  <text x="230" y="355" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">Don't panic</text>

  <!-- Target 1 Hit -->
  <circle cx="400" cy="200" r="6" fill="#00ffaa" stroke="#ffffff" stroke-width="2" />
  <rect x="330" y="140" width="140" height="50" class="box" fill="#1a1a2e" stroke="#00ffaa" />
  <text x="400" y="155" fill="#00ffaa" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Action at TP1:</text>
  <text x="400" y="170" fill="#ffffff" font-family="sans-serif" font-size="9" text-anchor="middle">- Close 50% Vol</text>
  <text x="400" y="180" fill="#ffffff" font-family="sans-serif" font-size="9" text-anchor="middle">- Move SL to Entry (BEP)</text>
  
  <!-- Arrow indicating SL moved to BEP -->
  <path d="M 180 395 Q 250 390 350 350" stroke="#00ffaa" stroke-width="1.5" fill="none" stroke-dasharray="2 2" marker-end="url(#arrow-green)" />

  <!-- Higher Low (Trailing SL) -->
  <circle cx="480" cy="240" r="5" class="node" />
  <rect x="420" y="260" width="120" height="40" class="box" fill="#1a1a2e" stroke="#ffffff" />
  <text x="480" y="275" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">New Higher Low</text>
  <text x="480" y="285" fill="#00ffaa" font-family="sans-serif" font-size="10" text-anchor="middle">Trail SL up to here</text>

  <!-- Reversal (Manual Exit) -->
  <circle cx="700" cy="160" r="6" fill="#ff3366" stroke="#ffffff" stroke-width="2" />
  <rect x="630" y="180" width="140" height="50" class="box" fill="#4e2a30" stroke="#ff3366" />
  <text x="700" y="195" fill="#ff3366" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Huge Reversal!</text>
  <text x="700" y="210" fill="#ffffff" font-family="sans-serif" font-size="9" text-anchor="middle">Don't wait for final TP.</text>
  <text x="700" y="220" fill="#ffffff" font-family="sans-serif" font-size="9" text-anchor="middle">Manual Exit Runner!</text>

  <!-- Summary Box -->
  <rect x="150" y="460" width="500" height="30" class="box" />
  <text x="400" y="478" fill="#a0a0b0" font-family="sans-serif" font-size="12" text-anchor="middle">A professional trade doesn't rely on luck. It relies on executing the SOP flawlessly.</text>


  <!-- Marker -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

</svg>
