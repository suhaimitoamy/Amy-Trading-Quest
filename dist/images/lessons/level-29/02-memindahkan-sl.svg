<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .text-sub { fill: #a0a0b0; font-family: sans-serif; font-size: 16px; }
      .text-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: bold; }
      .text-info { fill: #00ffaa; font-family: sans-serif; font-size: 12px; }
      .text-alert { fill: #ff3366; font-family: sans-serif; font-size: 12px; }
      .line-price { stroke: #404060; stroke-width: 1; stroke-dasharray: 4 4; }
      .line-sl { stroke: #ff3366; stroke-width: 2; stroke-dasharray: 6 6; }
      .line-sl-new { stroke: #00ffaa; stroke-width: 2; stroke-dasharray: 6 6; }
      .bullish { stroke: #00ffaa; stroke-width: 3; fill: none; stroke-linejoin: round; }
      .bos { stroke: #a0a0b0; stroke-width: 1; stroke-dasharray: 3 3; }
      .box { fill: #2a2a4e; stroke: #404060; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg" />
  
  <!-- Title -->
  <text x="400" y="40" class="text-title" text-anchor="middle">Memindahkan SL (Trailing Stop)</text>
  <text x="400" y="65" class="text-sub" text-anchor="middle">Menggunakan Struktur Pasar untuk Mengamankan Profit</text>

  <!-- Chart Area -->
  <rect x="50" y="100" width="700" height="320" class="box" />
  
  <!-- Grid/Levels -->
  <line x1="50" y1="360" x2="750" y2="360" class="line-sl" />
  <text x="60" y="355" class="text-alert">Original SL</text>

  <line x1="50" y1="310" x2="750" y2="310" class="line-price" />
  <text x="60" y="305" class="text-info">Entry Buy</text>

  <!-- Price Action Path -->
  <!-- Entry (100,310) -> Push up (250, 180) -> Pullback HL (350, 240) -> Push up BOS (500, 120) -> Pullback HL (600, 160) -> Push up (700, 80) -->
  <path d="M 80 340 L 100 310 L 250 180 L 350 240 L 500 120 L 600 160 L 700 80" class="bullish" />

  <!-- Structure Markers -->
  <circle cx="250" cy="180" r="4" fill="#a0a0b0" />
  <text x="250" y="170" fill="#a0a0b0" font-family="sans-serif" font-size="12" text-anchor="middle">High</text>

  <circle cx="350" cy="240" r="4" fill="#00ffaa" />
  <text x="350" y="258" class="text-info" text-anchor="middle">Higher Low (HL 1)</text>

  <!-- BOS Line -->
  <line x1="250" y1="180" x2="500" y2="180" class="bos" />
  <text x="375" y="175" fill="#a0a0b0" font-family="sans-serif" font-size="12" text-anchor="middle">BOS</text>

  <!-- Move SL 1 -->
  <line x1="350" y1="260" x2="750" y2="260" class="line-sl-new" />
  <text x="740" y="255" class="text-info" text-anchor="end">SL 1 (In Profit)</text>
  <path d="M 350 360 L 350 270" stroke="#00ffaa" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="360" y="320" class="text-info">Move SL</text>

  <!-- Structure Markers 2 -->
  <circle cx="500" cy="120" r="4" fill="#a0a0b0" />
  <text x="500" y="110" fill="#a0a0b0" font-family="sans-serif" font-size="12" text-anchor="middle">Higher High</text>

  <circle cx="600" cy="160" r="4" fill="#00ffaa" />
  <text x="600" y="180" class="text-info" text-anchor="middle">Higher Low (HL 2)</text>

  <!-- BOS Line 2 -->
  <line x1="500" y1="120" x2="700" y2="120" class="bos" />
  <text x="600" y="115" fill="#a0a0b0" font-family="sans-serif" font-size="12" text-anchor="middle">BOS</text>

  <!-- Move SL 2 -->
  <line x1="600" y1="190" x2="750" y2="190" class="line-sl-new" />
  <text x="740" y="185" class="text-info" text-anchor="end">SL 2 (More Profit)</text>
  <path d="M 600 260 L 600 200" stroke="#00ffaa" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="610" y="235" class="text-info">Move SL</text>


  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffaa" />
    </marker>
  </defs>

  <!-- Bottom Notes -->
  <rect x="50" y="430" width="700" height="50" class="box" />
  <text x="400" y="450" class="text-label" text-anchor="middle">Aturan Trailing Stop</text>
  <text x="400" y="470" class="text-sub" text-anchor="middle" font-size="12">Pindahkan SL hanya SETELAH terjadi BOS (Break of Structure), dan letakkan di bawah/atas ayunan struktur (HL/LH) terakhir.</text>

</svg>
