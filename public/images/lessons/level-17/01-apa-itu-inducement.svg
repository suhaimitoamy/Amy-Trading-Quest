<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Apa Itu Inducement?</text>
  <text x="400" y="70" fill="#a0a0b0" font-family="Arial" font-size="16" text-anchor="middle">Jebakan awal untuk memancing trader ritel masuk terlalu dini</text>

  <!-- Market Structure -->
  <path d="M 100 150 L 250 350 L 350 250 L 450 380 L 550 200 L 700 400" fill="none" stroke="#334466" stroke-width="4" stroke-dasharray="10,10"/>
  
  <!-- Actual price movement -->
  <path d="M 100 150 L 250 350 L 350 250" fill="none" stroke="#ff3366" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 350 250 L 450 380" fill="none" stroke="#ff3366" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Inducement marked -->
  <circle cx="350" cy="250" r="10" fill="#ffff00"/>
  <line x1="320" y1="250" x2="380" y2="250" stroke="#ffff00" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="350" y="230" fill="#ffff00" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Inducement (IDM)</text>
  <text x="350" y="210" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Retail Buy Here</text>

  <!-- POI below -->
  <rect x="420" y="420" width="80" height="40" fill="#00ffaa" opacity="0.3"/>
  <rect x="420" y="420" width="80" height="40" fill="none" stroke="#00ffaa" stroke-width="2"/>
  <text x="460" y="445" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">POI Utama</text>
  
  <!-- Move sweeping IDM -->
  <path d="M 450 380 L 460 430 L 550 200 L 700 100" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Stop loss sweep -->
  <path d="M 350 280 L 400 300" fill="none" stroke="#ff3366" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="310" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">Stop Loss Tersapu</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366"/>
    </marker>
  </defs>

  <!-- Info Box -->
  <rect x="50" y="400" width="250" height="80" fill="#2a2a4e" rx="10"/>
  <text x="175" y="425" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">1. Harga buat swing (IDM)</text>
  <text x="175" y="445" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">2. Retail Entry &amp; letak SL</text>
  <text x="175" y="465" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">3. Harga turun, sapu SL menuju POI</text>
</svg>
