<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Case Study: Inducement dalam Aksi</text>
  <text x="400" y="70" fill="#a0a0b0" font-family="Arial" font-size="16" text-anchor="middle">Proses Berpikir Runut Menemukan Setup High Probability</text>

  <!-- Step 1: Trend & POI -->
  <path d="M 50 250 L 100 150 L 150 280 L 300 100" fill="none" stroke="#334466" stroke-width="4" stroke-dasharray="8,8"/>
  <line x1="100" y1="150" x2="300" y2="150" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="280" y="140" fill="#00ffaa" font-family="Arial" font-size="12" font-weight="bold">BOS Naik</text>
  
  <!-- The valid POI at the bottom of the move -->
  <rect x="120" y="270" width="100" height="30" fill="#00ffaa" opacity="0.3"/>
  <text x="170" y="290" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">POI Utama (OB)</text>
  <text x="170" y="315" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Langkah 1: Identifikasi POI</text>

  <!-- Step 2: Inducement Formation -->
  <path d="M 300 100 L 400 220 L 450 180" fill="none" stroke="#ff3366" stroke-width="4"/>
  <line x1="380" y1="220" x2="520" y2="220" stroke="#ffff00" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="400" cy="220" r="6" fill="#ffff00"/>
  <text x="450" y="210" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Inducement ($$$)</text>
  <text x="450" y="235" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Langkah 2: Tunggu IDM</text>

  <!-- Step 3: Sweep & Tap -->
  <path d="M 450 180 L 500 290" fill="none" stroke="#ff3366" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="480" y="270" width="100" height="30" fill="#00ffaa" opacity="0.3"/>
  <text x="530" y="315" fill="#a0a0b0" font-family="Arial" font-size="12" text-anchor="middle">Langkah 3: Sweep &amp; Tap</text>

  <!-- Step 4: Confirmation & Entry -->
  <path d="M 500 290 L 550 200 L 580 240 L 700 80" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linejoin="round"/>
  <line x1="530" y1="200" x2="600" y2="200" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="565" y="190" fill="#00ffaa" font-family="Arial" font-size="12" font-weight="bold">CHoCH M1</text>
  
  <circle cx="580" cy="240" r="8" fill="#00ffaa"/>
  <text x="630" y="245" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold">Langkah 4: Entry</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366"/>
    </marker>
  </defs>

  <!-- Info Box -->
  <rect x="50" y="420" width="700" height="60" fill="#2a2a4e" rx="10"/>
  <text x="400" y="445" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Tren Jelas (BOS) -> Ada POI Valid -> Inducement Terbentuk -> Likuiditas Disapu -> Entry.</text>
  <text x="400" y="465" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Ini adalah SOP (Standard Operating Procedure) yang harus Anda latih berulang kali.</text>
</svg>
