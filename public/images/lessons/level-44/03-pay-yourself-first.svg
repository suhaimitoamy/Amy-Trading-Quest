<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Pay Yourself First</text>

  <!-- Step 1: Trading Profit -->
  <rect x="300" y="80" width="200" height="60" rx="5" fill="#00ffaa" stroke="#ffffff"/>
  <text x="400" y="115" fill="#1a1a2e" font-size="18" font-weight="bold" text-anchor="middle">Net Profit ($1000)</text>

  <!-- Arrows splitting -->
  <path d="M 400 140 L 400 170 L 250 170 L 250 200" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrow-white)"/>
  <path d="M 400 140 L 400 170 L 550 170 L 550 200" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrow-white)"/>

  <!-- Step 2 Left: Pay Yourself -->
  <rect x="150" y="200" width="200" height="100" rx="10" fill="#2a2a4e" stroke="#ffcc00" stroke-width="3"/>
  <text x="250" y="235" fill="#ffcc00" font-size="18" font-weight="bold" text-anchor="middle">Pay Yourself (50%)</text>
  <text x="250" y="265" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">$500</text>
  <text x="250" y="285" fill="#aaaaaa" font-size="12" text-anchor="middle">Bank / Real Life / Safety Net</text>

  <!-- Step 2 Right: Compounding -->
  <rect x="450" y="200" width="200" height="100" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="3"/>
  <text x="550" y="235" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Compounding (50%)</text>
  <text x="550" y="265" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">$500</text>
  <text x="550" y="285" fill="#aaaaaa" font-size="12" text-anchor="middle">Stay in Broker Account</text>

  <!-- Emphasize First -->
  <rect x="120" y="180" width="60" height="30" rx="15" fill="#ffcc00"/>
  <text x="150" y="200" fill="#1a1a2e" font-size="14" font-weight="bold" text-anchor="middle">#1</text>

  <!-- Define markers -->
  <defs>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ffffff"/>
    </marker>
  </defs>

</svg>
