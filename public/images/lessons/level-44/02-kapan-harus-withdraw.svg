<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Kapan Harus Withdraw</text>

  <!-- Left: Trading Account -->
  <rect x="150" y="100" width="180" height="200" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="3"/>
  <text x="240" y="140" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Broker Account</text>
  <text x="240" y="180" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">$2,800</text>
  
  <circle cx="240" cy="240" r="30" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <path d="M 230 225 L 250 240 L 230 255" fill="#00ffaa"/>
  <text x="240" y="290" fill="#aaaaaa" font-size="14" text-anchor="middle">Compounding</text>

  <!-- Middle: Arrow Split -->
  <path d="M 340 180 Q 400 180 400 130" stroke="#00ffaa" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 340 220 Q 400 220 450 220" stroke="#ffcc00" stroke-width="4" fill="none" marker-end="url(#arrow-yellow)"/>

  <!-- Right: Bank Account -->
  <rect x="470" y="100" width="180" height="200" rx="10" fill="#2a2a4e" stroke="#ffcc00" stroke-width="3"/>
  <text x="560" y="140" fill="#ffcc00" font-size="18" font-weight="bold" text-anchor="middle">Bank / Wallet</text>
  <text x="560" y="180" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">Realized</text>
  <text x="560" y="240" fill="#ffcc00" font-size="16" text-anchor="middle">Reward Yourself</text>
  <text x="560" y="270" fill="#aaaaaa" font-size="12" text-anchor="middle">Psychological Win</text>

  <!-- Define markers -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#00ffaa"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#ffcc00"/>
    </marker>
  </defs>

  <!-- Notes -->
  <rect x="330" y="320" width="140" height="40" rx="5" fill="#333355" stroke="#ffffff"/>
  <text x="400" y="345" fill="#ffffff" font-size="14" text-anchor="middle">The Balance</text>

</svg>
