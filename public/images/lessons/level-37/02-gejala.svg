<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Gejala di Chart vs Gejala di Diri Sendiri</text>
  
  <!-- Left Panel: Chart Symptoms -->
  <rect x="50" y="80" width="330" height="480" rx="10" fill="#24243e" stroke="#3a3a5a" stroke-width="2"/>
  <text x="215" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00ffaa" text-anchor="middle">Gejala di Chart (Teknikal)</text>
  
  <!-- Chart drawing -->
  <path d="M70 300 l40 -60 l30 20 l50 -80 l40 30 l50 -100" fill="none" stroke="#444" stroke-width="3"/>
  <path d="M280 110 l20 -40 l30 20" fill="none" stroke="#00ffaa" stroke-width="3"/>
  
  <!-- Labels on Chart -->
  <circle cx="140" cy="260" r="5" fill="#ffaa00"/>
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="12" fill="#ffaa00">Sweep Liquidity</text>
  
  <line x1="160" y1="180" x2="220" y2="180" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="230" y="185" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">BOS/CHoCH Jelas</text>

  <rect x="250" y="190" width="40" height="20" fill="#ff3366" opacity="0.3"/>
  <text x="220" y="220" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">POI Valid / FVG</text>

  <text x="80" y="400" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Syarat Objektif</text>
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Tidak Bisa Diperdebatkan</text>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Jelas Terlihat oleh Mata</text>

  <!-- Right Panel: Personal Symptoms -->
  <rect x="420" y="80" width="330" height="480" rx="10" fill="#24243e" stroke="#3a3a5a" stroke-width="2"/>
  <text x="585" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffaa00" text-anchor="middle">Gejala di Diri (Psikologis)</text>

  <!-- Pulse / Heart / Brain -->
  <path d="M500 250 l30 0 l10 -30 l20 60 l10 -30 l30 0" fill="none" stroke="#ff3366" stroke-width="3"/>
  <circle cx="585" cy="200" r="40" fill="none" stroke="#4a4a6a" stroke-width="4"/>
  <text x="585" y="195" font-family="Arial, sans-serif" font-size="24" fill="#ffaa00" text-anchor="middle">🧠</text>
  <text x="585" y="225" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">Fokus &amp; Tenang?</text>

  <text x="450" y="400" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Jantung Berdebar Kencang?</text>
  <text x="450" y="430" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Tangan Gemetar / Berkeringat?</text>
  <text x="450" y="460" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Pikiran: "Pokoknya harus cuan!"?</text>
  <text x="450" y="490" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">✔️ Marah dari Trade Sebelumnya?</text>

  <!-- Divider Line -->
  <line x1="400" y1="100" x2="400" y2="540" stroke="#4a4a6a" stroke-width="2" stroke-dasharray="6,6"/>

  <rect x="350" y="280" width="100" height="40" rx="20" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ffaa" text-anchor="middle">BALANCE</text>

</svg>
