<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Gejala Plan Mulai Gagal</text>

  <!-- Garis Pemisah -->
  <line x1="400" y1="90" x2="400" y2="450" stroke="#0f3460" stroke-width="4" stroke-dasharray="10"/>

  <!-- Sisi Kiri: Gejala Eksternal (Chart) -->
  <text x="200" y="100" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Gejala Eksternal (Chart)</text>
  
  <rect x="50" y="140" width="300" height="120" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="200" y="170" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Harga Tembus Area POI</text>
  <path d="M 100 200 L 150 200 L 180 240 L 220 180 L 280 250" fill="none" stroke="#e94560" stroke-width="3"/>
  <rect x="150" y="210" width="100" height="20" fill="rgba(0, 255, 170, 0.2)" stroke="#00ffaa" stroke-dasharray="4"/>
  <text x="260" y="240" fill="#e94560" font-family="sans-serif" font-size="12" font-weight="bold">Invalid!</text>

  <rect x="50" y="290" width="300" height="120" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="200" y="320" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Konsolidasi Whipsaw (Chop)</text>
  <path d="M 80 370 L 110 330 L 130 380 L 170 340 L 200 390 L 230 330 L 260 380 L 300 350" fill="none" stroke="#ffffff" stroke-width="2"/>
  <line x1="70" y1="350" x2="310" y2="350" stroke="#00ffaa" stroke-width="1" stroke-dasharray="3"/>
  <line x1="70" y1="370" x2="310" y2="370" stroke="#e94560" stroke-width="1" stroke-dasharray="3"/>

  <!-- Sisi Kanan: Gejala Internal (Diri Sendiri) -->
  <text x="600" y="100" fill="#e94560" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Gejala Internal (Psikologis)</text>
  
  <rect x="450" y="140" width="300" height="80" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="600" y="175" fill="#ffcc00" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Revenge Trading</text>
  <text x="600" y="200" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">"Saya harus balik modal sekarang!"</text>

  <rect x="450" y="240" width="300" height="80" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="600" y="275" fill="#ffcc00" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Gejala Fisik</text>
  <text x="600" y="300" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Jantung berdebar, tangan berkeringat</text>

  <rect x="450" y="340" width="300" height="80" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="600" y="375" fill="#ffcc00" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Mencari Pembenaran</text>
  <text x="600" y="400" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Pindah ke indikator yang aneh-aneh</text>

  <!-- Peringatan Bawah -->
  <text x="400" y="480" fill="#ffcc00" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">Peringatan: Jika Anda merasakan gejala ini, segera TUTUP CHART (Walk Away).</text>
</svg>
