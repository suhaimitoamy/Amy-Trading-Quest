<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Daily Trading Plan: 3 Pilar Utama</text>

  <!-- Pilar 1 -->
  <rect x="50" y="100" width="200" height="300" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="3"/>
  <text x="150" y="140" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">1. Bias &amp; Konteks</text>
  <text x="150" y="180" fill="#e94560" font-family="sans-serif" font-size="14" text-anchor="middle">Arah Pasar (HTF)</text>
  <path d="M 70 240 L 110 200 L 150 250 L 230 150" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <circle cx="230" cy="150" r="5" fill="#00ffaa"/>
  <text x="150" y="320" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Bullish? Bearish?</text>
  <text x="150" y="340" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Atau Ranging?</text>

  <!-- Pilar 2 -->
  <rect x="300" y="100" width="200" height="300" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="3"/>
  <text x="400" y="140" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">2. Area (POI)</text>
  <text x="400" y="180" fill="#e94560" font-family="sans-serif" font-size="14" text-anchor="middle">Zona Entry Strategis</text>
  <rect x="330" y="220" width="140" height="40" fill="rgba(0, 255, 170, 0.2)" stroke="#00ffaa" stroke-dasharray="4"/>
  <text x="400" y="245" fill="#00ffaa" font-family="sans-serif" font-size="16" text-anchor="middle">Order Block / FVG</text>
  <text x="400" y="320" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Dimana harga</text>
  <text x="400" y="340" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">akan bereaksi?</text>

  <!-- Pilar 3 -->
  <rect x="550" y="100" width="200" height="300" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="3"/>
  <text x="650" y="140" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">3. Trigger (LTF)</text>
  <text x="650" y="180" fill="#e94560" font-family="sans-serif" font-size="14" text-anchor="middle">Alasan Menekan Tombol</text>
  <path d="M 580 220 L 620 260 L 650 210 L 680 270 L 720 190" fill="none" stroke="#ffffff" stroke-width="2"/>
  <line x1="620" y1="210" x2="680" y2="210" stroke="#e94560" stroke-width="2" stroke-dasharray="4"/>
  <text x="690" y="205" fill="#e94560" font-family="sans-serif" font-size="12" font-weight="bold">CHoCH</text>
  <circle cx="720" cy="190" r="5" fill="#00ffaa"/>
  <text x="650" y="320" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Konfirmasi Entry</text>
  <text x="650" y="340" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">&amp; Batas Invalidation (SL)</text>

  <!-- Konektor -->
  <path d="M 260 250 L 290 250" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 510 250 L 540 250" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>

  <text x="400" y="440" fill="#ffffff" font-family="sans-serif" font-size="16" font-style="italic" text-anchor="middle">"Plan the trade, trade the plan."</text>
</svg>
