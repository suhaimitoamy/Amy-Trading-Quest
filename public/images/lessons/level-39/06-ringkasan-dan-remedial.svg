<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Alur Proses Weekly Evaluation</text>
  
  <rect x="100" y="120" width="150" height="80" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
  <text x="175" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffaa" text-anchor="middle">1. Review</text>
  <text x="175" y="175" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0" text-anchor="middle">Kumpulkan Data</text>

  <line x1="250" y1="160" x2="330" y2="160" stroke="#ffffff" stroke-width="3"/>
  <polygon points="330,160 320,155 320,165" fill="#ffffff"/>

  <rect x="330" y="120" width="150" height="80" rx="10" fill="#2a2a4e" stroke="#ffdd55" stroke-width="2"/>
  <text x="405" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffdd55" text-anchor="middle">2. Diagnosis</text>
  <text x="405" y="175" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0" text-anchor="middle">Cari Akar Masalah</text>

  <line x1="480" y1="160" x2="560" y2="160" stroke="#ffffff" stroke-width="3"/>
  <polygon points="560,160 550,155 550,165" fill="#ffffff"/>

  <rect x="560" y="120" width="150" height="80" rx="10" fill="#2a2a4e" stroke="#ff3366" stroke-width="2"/>
  <text x="635" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">3. Action Plan</text>
  <text x="635" y="175" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0" text-anchor="middle">Aturan Minggu Depan</text>

  <path d="M 635 200 L 635 250 L 175 250 L 175 200" fill="none" stroke="#b0b0b0" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="175,200 170,210 180,210" fill="#b0b0b0"/>
  <text x="405" y="270" font-family="Arial, sans-serif" font-size="14" fill="#b0b0b0" text-anchor="middle">Ulangi siklus ini setiap minggu secara konsisten</text>
