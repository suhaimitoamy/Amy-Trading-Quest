<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Studi Kasus: Bisnis Kedai Kopi vs Trader</text>
  
  <g transform="translate(50, 90)">
    <rect width="320" height="350" rx="10" fill="#2a2a4e" stroke="#cccccc" stroke-width="2"/>
    <text x="160" y="30" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Pemilik Kedai Kopi</text>
    
    <text x="20" y="70" font-family="Arial" font-size="14" fill="#00ffaa">Omzet Sehari: Rp 2.000.000</text>
    <text x="20" y="110" font-family="Arial" font-size="14" fill="#ff3366">Biaya Biji Kopi: Rp 500.000</text>
    <text x="20" y="140" font-family="Arial" font-size="14" fill="#ff3366">Sewa Harian: Rp 200.000</text>
    <text x="20" y="170" font-family="Arial" font-size="14" fill="#ff3366">Gaji Barista Harian: Rp 150.000</text>
    <text x="20" y="200" font-family="Arial" font-size="14" fill="#ff3366">Bahan terbuang (rusak): Rp 50.000</text>
    <line x1="20" y1="220" x2="300" y2="220" stroke="#ffffff" stroke-width="1"/>
    <text x="20" y="250" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Laba Bersih: Rp 1.100.000</text>
    <text x="20" y="290" font-family="Arial" font-size="12" fill="#cccccc">Pemilik tidak marah saat bahan baku</text>
    <text x="20" y="310" font-family="Arial" font-size="12" fill="#cccccc">terbuang, itu adalah bagian dari cost bisnis.</text>
  </g>
  
  <g transform="translate(430, 90)">
    <rect width="320" height="350" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="160" y="30" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Trader Profesional</text>
    
    <text x="20" y="70" font-family="Arial" font-size="14" fill="#00ffaa">Profit Trade 1 (2R): $200</text>
    <text x="20" y="100" font-family="Arial" font-size="14" fill="#00ffaa">Profit Trade 2 (3R): $300</text>
    <text x="20" y="140" font-family="Arial" font-size="14" fill="#ff3366">Loss Trade 3 (-1R): -$100</text>
    <text x="20" y="170" font-family="Arial" font-size="14" fill="#ff3366">Loss Trade 4 (-1R): -$100</text>
    <text x="20" y="200" font-family="Arial" font-size="14" fill="#ff3366">Biaya Prop Firm/Data: -$50</text>
    <line x1="20" y1="220" x2="300" y2="220" stroke="#ffffff" stroke-width="1"/>
    <text x="20" y="250" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Laba Bersih: $250</text>
    <text x="20" y="290" font-family="Arial" font-size="12" fill="#cccccc">Trader tidak baper saat kena Stop Loss.</text>
    <text x="20" y="310" font-family="Arial" font-size="12" fill="#cccccc">Loss adalah 'bahan baku rusak'</text>
    <text x="20" y="330" font-family="Arial" font-size="12" fill="#cccccc">dalam bisnis trading.</text>
  </g>
  
</svg>
