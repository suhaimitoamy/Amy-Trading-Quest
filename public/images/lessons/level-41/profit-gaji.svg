<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Profit Bulanan vs Gaji Bulanan</text>
  
  <!-- Gaji -->
  <g transform="translate(100, 100)">
    <rect width="250" height="300" rx="10" fill="#2a2a4e" stroke="#cccccc" stroke-width="2"/>
    <text x="125" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Gaji Bulanan</text>
    
    <text x="30" y="90" font-family="Arial" font-size="16" fill="#cccccc">Bulan 1: Rp 10.000.000</text>
    <text x="30" y="140" font-family="Arial" font-size="16" fill="#cccccc">Bulan 2: Rp 10.000.000</text>
    <text x="30" y="190" font-family="Arial" font-size="16" fill="#cccccc">Bulan 3: Rp 10.000.000</text>
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#cccccc">Bulan 4: Rp 10.000.000</text>
    <line x1="30" y1="260" x2="220" y2="260" stroke="#ffffff" stroke-width="1"/>
    <text x="30" y="280" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Stabil &amp; Pasti</text>
  </g>
  
  <!-- Profit Trading -->
  <g transform="translate(450, 100)">
    <rect width="250" height="300" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="125" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Profit Trading</text>
    
    <text x="30" y="90" font-family="Arial" font-size="16" fill="#00ffaa">Bulan 1: + Rp 15.000.000</text>
    <text x="30" y="140" font-family="Arial" font-size="16" fill="#ff3366">Bulan 2: - Rp 5.000.000</text>
    <text x="30" y="190" font-family="Arial" font-size="16" fill="#00ffaa">Bulan 3: + Rp 20.000.000</text>
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#cccccc">Bulan 4: Rp 0 (Break Even)</text>
    <line x1="30" y1="260" x2="220" y2="260" stroke="#ffffff" stroke-width="1"/>
    <text x="30" y="280" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Fluktuatif &amp; Dinamis</text>
  </g>

  <text x="400" y="440" font-family="Arial" font-size="16" fill="#cccccc" text-anchor="middle">Trading tidak menjanjikan income tetap. Evaluasi performa lebih baik dilakukan per kuartal/tahun.</text>
</svg>
