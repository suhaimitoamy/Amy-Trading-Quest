<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Stop Loss = Biaya Operasional (Operating Expense)</text>
  
  <g transform="translate(100, 100)">
    <rect width="250" height="200" rx="10" fill="#2a2a4e" stroke="#cccccc" stroke-width="2"/>
    <text x="125" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Bisnis Konvensional</text>
    
    <text x="30" y="80" font-family="Arial" font-size="16" fill="#cccccc">- Sewa Ruko/Kantor</text>
    <text x="30" y="110" font-family="Arial" font-size="16" fill="#cccccc">- Gaji Karyawan</text>
    <text x="30" y="140" font-family="Arial" font-size="16" fill="#cccccc">- Listrik &amp; Internet</text>
    <text x="30" y="170" font-family="Arial" font-size="16" fill="#cccccc">- Bahan Baku Rusak</text>
  </g>
  
  <g transform="translate(450, 100)">
    <rect width="250" height="200" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="125" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Bisnis Trading</text>
    
    <text x="30" y="80" font-family="Arial" font-size="16" fill="#00ffaa">- Stop Loss (Rugi)</text>
    <text x="30" y="110" font-family="Arial" font-size="16" fill="#cccccc">- Biaya Charting/Data</text>
    <text x="30" y="140" font-family="Arial" font-size="16" fill="#cccccc">- Internet</text>
    <text x="30" y="170" font-family="Arial" font-size="16" fill="#cccccc">- Listrik</text>
  </g>

  <rect x="250" y="340" width="300" height="80" rx="10" fill="#ff3366" opacity="0.2"/>
  <rect x="250" y="340" width="300" height="80" rx="10" stroke="#ff3366" stroke-width="2" fill="none"/>
  
  <text x="400" y="375" font-family="Arial" font-size="18" font-weight="bold" fill="#ff3366" text-anchor="middle">Rugi (Stop Loss) adalah bagian dari</text>
  <text x="400" y="400" font-family="Arial" font-size="18" font-weight="bold" fill="#ff3366" text-anchor="middle">BIAYA MENJALANKAN BISNIS, bukan kegagalan.</text>

</svg>
