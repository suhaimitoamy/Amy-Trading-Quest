<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Komponen Trading Business Plan</text>
  
  <!-- Plan Components -->
  <g transform="translate(150, 100)">
    <rect width="500" height="60" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="250" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">1. Modal &amp; Tujuan (Capital &amp; Goals)</text>
    <text x="250" y="52" font-family="Arial" font-size="12" fill="#cccccc" text-anchor="middle">Berapa modal awal? Apa target realistis bulanan/tahunan?</text>
  </g>
  
  <g transform="translate(150, 180)">
    <rect width="500" height="60" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="250" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">2. Strategi Trading (SOP)</text>
    <text x="250" y="52" font-family="Arial" font-size="12" fill="#cccccc" text-anchor="middle">Setup apa yang dicari? Kapan masuk? Kapan keluar?</text>
  </g>

  <g transform="translate(150, 260)">
    <rect width="500" height="60" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="250" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">3. Manajemen Risiko (Risk Management)</text>
    <text x="250" y="52" font-family="Arial" font-size="12" fill="#cccccc" text-anchor="middle">Berapa max loss per trade? Max loss per hari/minggu?</text>
  </g>

  <g transform="translate(150, 340)">
    <rect width="500" height="60" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    <text x="250" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">4. Evaluasi &amp; Jurnal (Tracking &amp; Review)</text>
    <text x="250" y="52" font-family="Arial" font-size="12" fill="#cccccc" text-anchor="middle">Bagaimana cara melacak performa? Kapan melakukan review rutin?</text>
  </g>
  
  <path d="M 400 160 L 400 180" stroke="#00ffaa" stroke-width="3" stroke-dasharray="5,5"/>
  <path d="M 400 240 L 400 260" stroke="#00ffaa" stroke-width="3" stroke-dasharray="5,5"/>
  <path d="M 400 320 L 400 340" stroke="#00ffaa" stroke-width="3" stroke-dasharray="5,5"/>
  
</svg>
