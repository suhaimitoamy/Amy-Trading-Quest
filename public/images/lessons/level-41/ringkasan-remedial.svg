<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Mindset Shift: Level 41</text>
  
  <g transform="translate(150, 120)">
    <rect width="500" height="280" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2"/>
    
    <text x="250" y="50" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Rangkuman Kunci</text>
    
    <circle cx="50" cy="100" r="8" fill="#00ffaa"/>
    <text x="80" y="105" font-family="Arial" font-size="16" fill="#cccccc">Trading adalah mengelola probabilitas, bukan kepastian.</text>
    
    <circle cx="50" cy="150" r="8" fill="#00ffaa"/>
    <text x="80" y="155" font-family="Arial" font-size="16" fill="#cccccc">Wajib punya Business Plan (Modal, Strategi, RM, Evaluasi).</text>
    
    <circle cx="50" cy="200" r="8" fill="#ff3366"/>
    <text x="80" y="205" font-family="Arial" font-size="16" fill="#cccccc">Stop Loss adalah Biaya Operasional (Operating Expense).</text>
    
    <circle cx="50" cy="250" r="8" fill="#00ffaa"/>
    <text x="80" y="255" font-family="Arial" font-size="16" fill="#cccccc">Evaluasi hasil trading dalam jangka panjang (Kuartal/Tahun).</text>
  </g>
  
  <text x="400" y="450" font-family="Arial" font-size="18" font-style="italic" fill="#00ffaa" text-anchor="middle">"Treat trading like a business, and it will pay you like a business."</text>

</svg>
