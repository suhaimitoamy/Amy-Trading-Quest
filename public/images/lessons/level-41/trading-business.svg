<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Trading vs Gambling vs Business</text>
  
  <!-- Gambling vs Trading -->
  <g transform="translate(100, 120)">
    <rect width="250" height="300" rx="10" fill="#2a2a4e" stroke="#ff3366" stroke-width="3"/>
    <text x="125" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#ff3366" text-anchor="middle">Gambling</text>
    
    <text x="30" y="80" font-family="Arial" font-size="16" fill="#cccccc">- Harapan kaya instan</text>
    <text x="30" y="120" font-family="Arial" font-size="16" fill="#cccccc">- Keputusan berdasar emosi</text>
    <text x="30" y="160" font-family="Arial" font-size="16" fill="#cccccc">- Mengabaikan manajemen risiko</text>
    <text x="30" y="200" font-family="Arial" font-size="16" fill="#cccccc">- All-in saat rugi besar</text>
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#cccccc">- Tidak punya strategi tertulis</text>
  </g>
  
  <g transform="translate(450, 120)">
    <rect width="250" height="300" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="3"/>
    <text x="125" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#00ffaa" text-anchor="middle">Business</text>
    
    <text x="30" y="80" font-family="Arial" font-size="16" fill="#cccccc">- Fokus pertumbuhan jangka panjang</text>
    <text x="30" y="120" font-family="Arial" font-size="16" fill="#cccccc">- Keputusan berbasis data &amp; probabilitas</text>
    <text x="30" y="160" font-family="Arial" font-size="16" fill="#cccccc">- Risiko terukur (1-2% per trade)</text>
    <text x="30" y="200" font-family="Arial" font-size="16" fill="#cccccc">- Disiplin pada aturan (SOP)</text>
    <text x="30" y="240" font-family="Arial" font-size="16" fill="#cccccc">- Ada Business Plan &amp; Review</text>
  </g>
  
  <path d="M 370 270 L 430 270 M 410 250 L 430 270 L 410 290" stroke="#ffffff" stroke-width="4" fill="none"/>
</svg>
