<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="30" fill="#ff4444" font-family="monospace" font-size="14" text-anchor="middle">Resistance (Atap)</text>
    <line x1="50" y1="50" x2="350" y2="50" stroke="#ff4444" stroke-width="3" stroke-dasharray="" filter="url(#glow)"/>
    <path d="M50,150 L100,50 L150,150 L200,50 L250,150 L300,50 L350,150" stroke="#00ffaa" fill="none" stroke-width="3" filter="url(#glow)"/>
    <line x1="50" y1="150" x2="350" y2="150" stroke="#00ffaa" stroke-width="3" stroke-dasharray="" filter="url(#glow)"/>
    <text x="200" y="180" fill="#00ffaa" font-family="monospace" font-size="14" text-anchor="middle">Support (Lantai)</text>
  
</svg>