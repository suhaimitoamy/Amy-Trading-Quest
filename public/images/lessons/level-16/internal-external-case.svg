<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e;">
  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Siklus: Sweep External -> Internal -> Target External</text>

  <!-- External Liquidity Low (Sweep Area) -->
  <line x1="50" y1="420" x2="350" y2="420" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="50" y="440" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold">1. Sweep External Liquidity (SSL)</text>

  <!-- Market Structure Shift -->
  <line x1="200" y1="250" x2="450" y2="250" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="320" y="240" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">2. CHoCH / BOS</text>

  <!-- Internal Liquidity Area (FVG) -->
  <rect x="400" y="320" width="80" height="60" fill="#4a90e2" opacity="0.3"/>
  <text x="440" y="355" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">3. FVG</text>
  <text x="440" y="375" fill="#ffffff" font-family="Arial" font-size="10" text-anchor="middle">(Internal)</text>

  <!-- Target External Liquidity High -->
  <line x1="550" y1="100" x2="750" y2="100" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="550" y="90" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">4. Target External Liquidity (BSL)</text>

  <!-- Price Action -->
  <path d="M 50 300 L 150 400 L 200 250 L 250 450 L 350 150 L 450 350 L 650 80" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Sweep Highlight -->
  <ellipse cx="250" cy="450" rx="20" ry="15" fill="none" stroke="#ffff00" stroke-width="2"/>
  
  <!-- Entry Highlight -->
  <circle cx="450" cy="350" r="6" fill="#ffff00"/>
  <text x="470" y="355" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold">Entry Buy</text>

  <!-- Target Highlight -->
  <circle cx="650" cy="80" r="6" fill="#ffff00"/>
  <text x="670" y="85" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold">Take Profit</text>

  <!-- Annotations connecting steps -->
  <path d="M 270 460 Q 350 500 440 390" fill="none" stroke="#ffff00" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <path d="M 450 330 Q 550 200 640 100" fill="none" stroke="#ffff00" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
    </marker>
  </defs>
</svg>
