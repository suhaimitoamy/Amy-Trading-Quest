<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e;">
  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Internal Liquidity (Likuiditas Internal)</text>
  
  <!-- Range Lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="90" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold">Swing High (External Liquidity)</text>
  
  <line x1="100" y1="420" x2="700" y2="420" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="410" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold">Swing Low (External Liquidity)</text>

  <!-- FVG Box as Internal Liquidity -->
  <rect x="300" y="250" width="100" height="80" fill="#4a90e2" opacity="0.3"/>
  <text x="350" y="295" fill="#4a90e2" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">FVG</text>
  <text x="350" y="315" fill="#4a90e2" font-family="Arial" font-size="12" text-anchor="middle">(Internal Liquidity)</text>

  <!-- Price Action -->
  <path d="M 150 420 L 250 100 L 350 250 L 500 250 L 650 80" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Arrows & Annotations -->
  <circle cx="250" cy="100" r="6" fill="#ff3366"/>
  <circle cx="150" cy="420" r="6" fill="#00ffaa"/>
  
  <path d="M 280 150 Q 350 180 350 240" fill="none" stroke="#ffff00" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowhead)"/>
  <text x="430" y="190" fill="#ffff00" font-family="Arial" font-size="14">Harga kembali (pullback)</text>
  <text x="430" y="210" fill="#ffff00" font-family="Arial" font-size="14">mengambil Internal Liquidity</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
    </marker>
  </defs>
</svg>
