<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e;">
  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">External Liquidity (Likuiditas Eksternal)</text>
  
  <!-- Old High / External Liquidity Line -->
  <line x1="150" y1="150" x2="650" y2="150" stroke="#ff3366" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="160" y="140" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold">Old High (Buy-Side Liquidity / External)</text>

  <line x1="150" y1="400" x2="650" y2="400" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="160" y="390" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold">Old Low</text>

  <!-- Price Action -->
  <path d="M 200 400 L 300 150 L 400 300 L 550 100 L 600 200" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <circle cx="300" cy="150" r="6" fill="#ff3366"/>
  <circle cx="200" cy="400" r="6" fill="#00ffaa"/>
  
  <!-- Highlight External Sweep -->
  <ellipse cx="550" cy="100" rx="30" ry="20" fill="none" stroke="#ffff00" stroke-width="3" stroke-dasharray="4,4"/>
  
  <!-- Annotations -->
  <line x1="600" y1="90" x2="560" y2="90" stroke="#ffff00" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="610" y="85" fill="#ffff00" font-family="Arial" font-size="14" font-weight="bold">Sweep External Liquidity</text>
  <text x="610" y="105" fill="#ffffff" font-family="Arial" font-size="12">(Target Take Profit)</text>
  <text x="610" y="125" fill="#ffffff" font-family="Arial" font-size="12">Stop Loss diburu, lalu harga berbalik.</text>

  <!-- Money symbols above old high -->
  <text x="350" y="120" fill="#00ffaa" font-family="Arial" font-size="20">$$$ $$$</text>
  <text x="450" y="120" fill="#00ffaa" font-family="Arial" font-size="20">$$$</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
    </marker>
  </defs>
</svg>
