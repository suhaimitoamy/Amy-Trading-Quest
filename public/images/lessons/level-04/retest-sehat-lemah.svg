<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <path d="M0 100 h800 M0 200 h800 M0 300 h800 M200 0 v400 M400 0 v400 M600 0 v400" 
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Title & Desc -->
  <text x="40" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Retest Sehat vs Retest Lemah (Berbahaya)</text>
  <text x="40" y="65" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14">Membandingkan sudut kedatangan (momentum) harga saat menguji ulang level.</text>
  
  <!-- Dynamic Elements -->
  
  <!-- Dividing line -->
  <line x1="400" y1="100" x2="400" y2="350" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Sehat Side (Left) -->
  <text x="120" y="110" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold">Retest Sehat (Korektif)</text>
  <line x1="50" y1="280" x2="350" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Impulse UP -->
  <path d="M 80 350 L 150 150" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <!-- Corrective DOWN -->
  <path d="M 150 150 L 180 180 L 170 170 L 200 200 L 190 190 L 230 230 L 220 220 L 270 280" fill="none" stroke="#a0a0b0" stroke-width="2"/>
  <text x="280" y="270" fill="#ffffff" font-family="Arial" font-size="11">Pergerakan lambat, berombak</text>
  
  <!-- Lemah Side (Right) -->
  <text x="500" y="110" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold">Retest Berbahaya (Impulsif)</text>
  <line x1="450" y1="280" x2="750" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Impulse UP -->
  <path d="M 480 350 L 550 150" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <!-- Impulsive DOWN -->
  <path d="M 550 150 L 600 280" fill="none" stroke="#ff3366" stroke-width="4"/>
  <circle cx="600" cy="280" r="5" fill="#ff3366"/>
  <text x="615" y="290" fill="#ffffff" font-family="Arial" font-size="11">Jatuh tajam, momentum masif</text>
  <text x="615" y="305" fill="#ff3366" font-family="Arial" font-size="11">Awas Tembus ke Bawah!</text>

</svg>
