<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <path d="M0 100 h800 M0 200 h800 M0 300 h800 M200 0 v400 M400 0 v400 M600 0 v400" 
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Title & Desc -->
  <text x="40" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Membedakan Fake Breakout</text>
  <text x="40" y="65" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14">Liquidity Sweep dengan ekor (wick) tajam yang menipu breakout trader.</text>
  
  <!-- Dynamic Elements -->
  
  <line x1="100" y1="180" x2="700" y2="180" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="100" y="170" fill="#ff3366" font-family="Arial" font-size="14">Resistance (Liquidity Pool)</text>
  
  <!-- Pre-breakout -->
  <path d="M 150 300 L 250 190 L 320 260 L 380 200" fill="none" stroke="#a0a0b0" stroke-width="3"/>
  
  <!-- Fake Breakout Candle -->
  <rect x="430" y="190" width="20" height="80" fill="#ff3366"/>
  <!-- Giant Upper Wick (Sweep) -->
  <line x1="440" y1="80" x2="440" y2="190" stroke="#ff3366" stroke-width="3"/>
  <line x1="440" y1="270" x2="440" y2="290" stroke="#ff3366" stroke-width="2"/>
  
  <!-- Annotations -->
  <text x="460" y="120" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">Liquidity Sweep (Sapu Bersih)</text>
  <text x="460" y="140" fill="#ffffff" font-family="Arial" font-size="12">Ekor tajam memancing Buyer FOMO,</text>
  <text x="460" y="155" fill="#ffffff" font-family="Arial" font-size="12">lalu ditarik turun.</text>
  
  <text x="460" y="230" fill="#ffffff" font-family="Arial" font-size="12">Body tetap close di bawah Resistance!</text>

</svg>
