<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <path d="M0 100 h800 M0 200 h800 M0 300 h800 M200 0 v400 M400 0 v400 M600 0 v400" 
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Title & Desc -->
  <text x="40" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Breakout yang Tidak Layak</text>
  <text x="40" y="65" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14">Menghindari breakout di ujung tren melelahkan yang menabrak Zona Supply Besar.</text>
  
  <!-- Dynamic Elements -->
  
  <!-- HTF POI Box -->
  <rect x="50" y="100" width="700" height="50" fill="#ff3366" fill-opacity="0.2" stroke="#ff3366" stroke-width="1"/>
  <text x="60" y="130" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">Higher Timeframe Supply / POI Kuat</text>
  
  <!-- Local Resistance -->
  <line x1="50" y1="250" x2="750" y2="250" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="60" y="240" fill="#ffffff" font-family="Arial" font-size="12">Resistance Kecil (M15)</text>

  <!-- Over Extended Trend -->
  <path d="M 100 380 L 150 340 L 200 300 L 250 260 L 300 310 L 350 240 L 400 280 L 450 170" fill="none" stroke="#00ffaa" stroke-width="3"/>
  
  <circle cx="450" cy="170" r="5" fill="#ffffff"/>
  <text x="470" y="170" fill="#ffffff" font-family="Arial" font-size="12">Tembus (Breakout) Resistance Kecil</text>
  <text x="470" y="185" fill="#ff3366" font-family="Arial" font-size="12">TETAPI langsung membentur Supply HTF!</text>
  <text x="470" y="200" fill="#a0a0b0" font-family="Arial" font-size="11">(Ruang gerak kehabisan napas)</text>
  
  <!-- Price Rejected Hard -->
  <path d="M 450 170 L 500 130 L 550 350" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="6,6"/>

</svg>
