<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Break & Retest</text>
    <line x1="50" y1="120" x2="350" y2="120" stroke="#ff4444" stroke-width="2" stroke-dasharray="" filter="url(#glow)"/>
    <path d="M50,180 L150,140 L180,180 L220,80 L260,120 L320,40" stroke="#00ffaa" fill="none" stroke-width="3" filter="url(#glow)"/>
    <text x="220" y="60" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">Break</text>
    <text x="260" y="140" fill="#ffffaa" font-family="monospace" font-size="12" text-anchor="middle">Retest</text>
  
</svg>