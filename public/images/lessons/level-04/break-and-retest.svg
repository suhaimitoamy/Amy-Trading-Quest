<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid -->
  <path d="M0 100 h800 M0 200 h800 M0 300 h800 M200 0 v400 M400 0 v400 M600 0 v400" 
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Title & Desc -->
  <text x="40" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Strategi Break and Retest</text>
  <text x="40" y="65" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14">Harga menembus Resistance, lalu berbalik mengujinya sebagai Support baru (SR Flip).</text>
  
  <!-- Dynamic Elements -->
  
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="100" y="190" fill="#ffffff" font-family="Arial" font-size="14">Area SR Flip (Resistance menjadi Support)</text>
  
  <!-- Breakout Impulse -->
  <path d="M 150 320 L 250 220 L 280 260 L 380 100" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <text x="390" y="120" fill="#00ffaa" font-family="Arial" font-size="12">Fase Breakout</text>

  <!-- Pullback / Retest -->
  <path d="M 380 100 L 430 140 L 460 120 L 530 200" fill="none" stroke="#ff3366" stroke-width="3"/>
  <text x="430" y="90" fill="#ff3366" font-family="Arial" font-size="12">Fase Pullback</text>
  
  <!-- Rejection at SR Flip -->
  <circle cx="530" cy="200" r="6" fill="#00ffaa"/>
  <text x="545" y="205" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold">Titik Entry Optimal</text>
  <text x="545" y="225" fill="#a0a0b0" font-family="Arial" font-size="12">(Pesanan Buy Limit / Penolakan)</text>
  
  <!-- Continuation -->
  <path d="M 530 200 L 600 80" fill="none" stroke="#00ffaa" stroke-width="4" stroke-dasharray="4,4"/>

</svg>
