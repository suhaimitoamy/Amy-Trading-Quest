<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Case Study: Eksekusi Trade Lengkap</text>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Dari Analisis hingga Take Profit</text>

  <!-- The Chart Grid -->
  <g stroke="#2a2a4e" stroke-width="1" opacity="0.5">
    <line x1="50" y1="100" x2="750" y2="100" />
    <line x1="50" y1="200" x2="750" y2="200" />
    <line x1="50" y1="300" x2="750" y2="300" />
    <line x1="50" y1="400" x2="750" y2="400" />
  </g>

  <!-- HTF Context: Bullish Breakout -->
  <polyline points="50,350 100,280 150,300 250,150" fill="none" stroke="#555577" stroke-width="3" stroke-dasharray="6" />
  <line x1="100" y1="280" x2="280" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="4" />
  <text x="180" y="270" font-family="Arial" font-size="12" fill="#ffffff">M15 Break of Structure</text>

  <!-- HTF POI Box -->
  <rect x="130" y="300" width="100" height="40" fill="#00ffaa" opacity="0.15" stroke="#00ffaa" stroke-width="1" />
  <text x="180" y="325" font-family="Arial" font-size="12" fill="#00ffaa" text-anchor="middle" font-weight="bold">M15 Order Block</text>

  <!-- LTF Price dropping into POI -->
  <polyline points="250,150 280,220 310,180 340,310" fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Liquidity Grab / Inducement text -->
  <text x="330" y="250" font-family="Arial" font-size="10" fill="#ff3366">Pullback tajam</text>

  <!-- Zoom Box showing the M5 Trigger -->
  <rect x="300" y="270" width="150" height="150" fill="none" stroke="#ffff00" stroke-width="2" stroke-dasharray="4" />
  <text x="375" y="440" font-family="Arial" font-size="12" fill="#ffff00" text-anchor="middle">Fokus M5 Trigger</text>

  <!-- The Trigger / CHoCH -->
  <polyline points="340,310 350,330 380,280" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  <line x1="330" y1="310" x2="400" y2="310" stroke="#ffff00" stroke-width="1" stroke-dasharray="2" />
  <text x="400" y="305" font-family="Arial" font-size="10" fill="#ffff00">M5 CHoCH</text>

  <!-- Entry -->
  <polyline points="380,280 370,315 420,200" fill="none" stroke="#00ffaa" stroke-width="3" />
  <circle cx="370" cy="315" r="5" fill="#00aaff" />
  <text x="370" y="335" font-family="Arial" font-size="12" fill="#00aaff" font-weight="bold" text-anchor="middle">BUY Limit</text>
  
  <!-- SL Line -->
  <line x1="320" y1="350" x2="420" y2="350" stroke="#ff3366" stroke-width="2" />
  <text x="430" y="355" font-family="Arial" font-size="12" fill="#ff3366">Stop Loss (Bawah Zona)</text>

  <!-- The Rally & TP -->
  <polyline points="420,200 450,220 500,120 550,140 650,80" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <line x1="200" y1="150" x2="700" y2="150" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6" />
  <text x="710" y="155" font-family="Arial" font-size="14" fill="#00ffaa" font-weight="bold">Take Profit (M15 High)</text>

  <!-- Risk Reward Box -->
  <rect x="600" y="300" width="150" height="70" fill="#2a2a4e" rx="8" stroke="#ffffff" stroke-width="1" />
  <text x="675" y="325" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Risk : Reward</text>
  <text x="675" y="350" font-family="Arial" font-size="18" fill="#00ffaa" text-anchor="middle" font-weight="bold">1 : 5</text>

</svg>
