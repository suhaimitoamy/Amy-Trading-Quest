<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">LTF Trigger (Konfirmasi Timeframe Kecil)</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Menunggu CHoCH di dalam HTF POI</text>
  
  <!-- HTF POI Background -->
  <rect x="50" y="300" width="700" height="150" fill="#00ffaa" opacity="0.1" />
  <rect x="50" y="300" width="700" height="150" fill="none" stroke="#00ffaa" stroke-width="2" stroke-dasharray="8" />
  <text x="80" y="330" font-family="Arial" font-size="18" fill="#00ffaa" font-weight="bold">HTF POI (H4 Demand)</text>
  
  <!-- LTF Price Action entering POI (Bearish structure) -->
  <polyline points="100,100 150,200 200,150 250,280 300,220 350,380" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round" />
  
  <circle cx="300" cy="220" r="5" fill="#ffffff" />
  <text x="300" y="205" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">Lower High Terakhir</text>

  <!-- The Trigger (CHoCH) -->
  <polyline points="350,380 450,180" fill="none" stroke="#00ffaa" stroke-width="5" stroke-linejoin="round" />
  
  <!-- CHoCH Line -->
  <line x1="280" y1="220" x2="480" y2="220" stroke="#ffff00" stroke-width="2" stroke-dasharray="4" />
  <text x="460" y="210" font-family="Arial" font-size="14" fill="#ffff00" font-weight="bold">CHoCH</text>
  
  <!-- New LTF POI formed after CHoCH -->
  <rect x="370" y="330" width="100" height="40" fill="#00aaff" opacity="0.3" stroke="#00aaff" stroke-width="1" />
  <text x="420" y="355" font-family="Arial" font-size="12" fill="#00aaff" text-anchor="middle">LTF Demand Baru</text>

  <!-- Retracement and Entry -->
  <polyline points="450,180 420,340 550,120" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <circle cx="420" cy="340" r="6" fill="#ffff00" />
  <text x="440" y="345" font-family="Arial" font-size="14" fill="#ffff00" font-weight="bold">Entry Di Sini</text>
  
  <line x1="390" y1="390" x2="450" y2="390" stroke="#ff3366" stroke-width="2" />
  <text x="420" y="410" font-family="Arial" font-size="12" fill="#ff3366" text-anchor="middle">Safe Stop Loss</text>

</svg>
