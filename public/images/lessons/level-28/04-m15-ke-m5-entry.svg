<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Kombinasi Timeframe M15 &amp; M5</text>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Sinkronisasi Day Trading</text>

  <!-- Divider Line -->
  <line x1="400" y1="90" x2="400" y2="480" stroke="#555577" stroke-width="2" stroke-dasharray="6" />
  
  <!-- Left Panel: M15 -->
  <text x="200" y="110" font-family="Arial" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Kiri: Chart M15 (Makro)</text>
  <text x="200" y="130" font-family="Arial" font-size="12" fill="#00ffaa" text-anchor="middle">Mencari Struktur &amp; POI</text>

  <polyline points="50,380 120,380 180,220 240,300 320,150" fill="none" stroke="#555577" stroke-width="4" />
  
  <!-- M15 POI -->
  <rect x="210" y="290" width="80" height="30" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-width="2" />
  <text x="250" y="310" font-family="Arial" font-size="12" fill="#00ffaa" text-anchor="middle" font-weight="bold">POI M15</text>

  <!-- Path entering POI -->
  <path d="M 320,150 Q 280,250 250,290" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4" />
  
  <!-- Arrow to Right Panel -->
  <path d="M 290,290 Q 400,200 450,300" fill="none" stroke="#ffff00" stroke-width="2" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffff00" />
    </marker>
  </defs>

  <!-- Right Panel: M5 -->
  <text x="600" y="110" font-family="Arial" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Kanan: Chart M5 (Mikro)</text>
  <text x="600" y="130" font-family="Arial" font-size="12" fill="#00ffaa" text-anchor="middle">Eksekusi di dalam Kotak M15</text>

  <!-- Magnified POI Box -->
  <rect x="450" y="200" width="300" height="250" fill="#00ffaa" opacity="0.05" stroke="#00ffaa" stroke-width="1" stroke-dasharray="4" />
  <text x="600" y="220" font-family="Arial" font-size="14" fill="#00ffaa" text-anchor="middle">Isi dari Kotak POI M15</text>

  <!-- M5 Structure -->
  <polyline points="480,250 520,380 560,330 600,420" fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
  <circle cx="560" cy="330" r="4" fill="#ffffff" />
  <text x="560" y="315" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">LH (M5)</text>

  <!-- M5 CHoCH -->
  <polyline points="600,420 660,280" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  <line x1="530" y1="330" x2="680" y2="330" stroke="#ffff00" stroke-width="2" stroke-dasharray="4" />
  <text x="690" y="335" font-family="Arial" font-size="12" fill="#ffff00">CHoCH</text>

  <!-- M5 Entry -->
  <rect x="620" y="370" width="50" height="20" fill="#00aaff" opacity="0.4" />
  <polyline points="660,280 640,380 720,200" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linejoin="round" />
  <circle cx="640" cy="380" r="5" fill="#ffff00" />
  <text x="640" y="405" font-family="Arial" font-size="12" fill="#ffff00" text-anchor="middle">Entry M5</text>

</svg>
