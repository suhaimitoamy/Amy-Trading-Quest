<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#1a1a2e" />
    <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Garis vs Area</text>
    
    <!-- Kesalahan -->
    <g transform="translate(50, 80)">
        <text x="150" y="0" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Salah (Hanya Garis)</text>
        <line x1="20" y1="180" x2="280" y2="180" stroke="#ff3366" stroke-width="2" />
        
        <path d="M 20 50 L 80 180 L 120 100 L 160 190 L 200 120 L 250 170" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        <circle cx="160" cy="190" r="6" fill="none" stroke="#ff3366" stroke-width="2" />
        <text x="160" y="215" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">Gagal kena garis!</text>
    </g>

    <line x1="400" y1="80" x2="400" y2="350" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" opacity="0.5" />

    <!-- Benar -->
    <g transform="translate(450, 80)">
        <text x="150" y="0" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Benar (Gunakan Area)</text>
        <rect x="20" y="170" width="260" height="30" fill="#00ffaa" opacity="0.2" />
        <line x1="20" y1="170" x2="280" y2="170" stroke="#00ffaa" stroke-width="1" stroke-dasharray="2,2" />
        <line x1="20" y1="200" x2="280" y2="200" stroke="#00ffaa" stroke-width="1" stroke-dasharray="2,2" />
        
        <path d="M 20 50 L 80 180 L 120 100 L 160 190 L 200 120 L 250 175" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        <circle cx="160" cy="190" r="6" fill="#00ffaa" />
        <circle cx="80" cy="180" r="6" fill="#00ffaa" />
        <circle cx="250" cy="175" r="6" fill="#00ffaa" />
        <text x="150" y="240" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">Semua masuk ke Area</text>
    </g>
</svg>
