<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <rect width="800" height="500" fill="#1a1a2e" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Compression Menuju POI</text>
    <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Pendekatan harga merangkak pelan adalah konfirmasi kuat untuk POI</text>

    <!-- POI Zone (Order Block / Support) -->
    <rect x="50" y="380" width="700" height="60" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-dasharray="5,5" />
    <text x="100" y="415" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffaa">Point Of Interest (POI) / Order Block</text>

    <!-- Compression path (descending channel) -->
    <path d="M 150 150 L 200 220 L 250 180 L 300 250 L 350 220 L 400 290 L 450 260 L 500 330 L 550 310 L 600 390 L 630 360" 
          fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Bounding trendlines for compression -->
    <line x1="120" y1="130" x2="600" y2="350" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="180" y1="240" x2="600" y2="400" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,4" />
    <text x="350" y="160" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle" transform="rotate(25, 350, 160)">Harga merangkak pelan turun</text>

    <!-- POI Touch and Expansion -->
    <circle cx="600" cy="390" r="8" fill="#ffffff" />
    <text x="600" y="440" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Tap on POI</text>

    <!-- Expansion Arrow Up -->
    <path d="M 600 390 L 700 150" fill="none" stroke="#00ffaa" stroke-width="5" />
    <polygon points="700,150 690,165 710,160" fill="#00ffaa" />
    
    <text x="730" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffaa" text-anchor="middle">EXPANSION</text>

    <!-- Explanation Note -->
    <rect x="50" y="100" width="220" height="60" rx="5" fill="#2a2a4e" stroke="#4a4a7e" stroke-width="1" />
    <text x="160" y="125" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Momentum jual habis di sini.</text>
    <text x="160" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Institusi siap membeli di bawah.</text>

</svg>
