<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Fakeout with Reversal (AMD Model)</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Accumulation, Manipulation, Distribution before trend change</text>

  <!-- Labels for AMD -->
  <rect x="50" y="100" width="200" height="360" fill="#ffffff" fill-opacity="0.05" rx="10" />
  <text x="150" y="130" fill="#a0a0b0" font-size="16" font-weight="bold" text-anchor="middle">1. ACCUMULATION</text>
  <text x="150" y="150" fill="#808090" font-size="12" text-anchor="middle">Building liquidity</text>

  <rect x="260" y="100" width="200" height="360" fill="#ffcc00" fill-opacity="0.05" rx="10" />
  <text x="360" y="130" fill="#ffcc00" font-size="16" font-weight="bold" text-anchor="middle">2. MANIPULATION</text>
  <text x="360" y="150" fill="#808090" font-size="12" text-anchor="middle">The Fakeout (Trap)</text>

  <rect x="470" y="100" width="280" height="360" fill="#ff3366" fill-opacity="0.05" rx="10" />
  <text x="610" y="130" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">3. DISTRIBUTION</text>
  <text x="610" y="150" fill="#808090" font-size="12" text-anchor="middle">Actual Trend Reversal</text>

  <!-- Trend lines -->
  <line x1="80" y1="280" x2="230" y2="280" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="80" y1="360" x2="230" y2="360" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <text x="220" y="270" fill="#ffffff" font-size="12" text-anchor="end">Resistance</text>

  <!-- Accumulation Path -->
  <path d="M 60,380 L 100,285 L 140,355 L 180,290 L 220,340" fill="none" stroke="#00ffaa" stroke-width="3" />
  
  <!-- Manipulation Path (Fakeout) -->
  <path d="M 220,340 L 260,250" fill="none" stroke="#00ffaa" stroke-width="3" />
  <path d="M 260,250 L 320,180" fill="none" stroke="#00ffaa" stroke-width="4" filter="url(#glow)" />
  <path d="M 320,180 L 360,210" fill="none" stroke="#ff3366" stroke-width="3" />
  <path d="M 360,210 L 400,160" fill="none" stroke="#00ffaa" stroke-width="3" />
  
  <!-- Fakeout Label -->
  <circle cx="360" cy="180" r="45" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,2" />
  <text x="360" y="110" fill="#ffcc00" font-size="14" font-weight="bold" text-anchor="middle">Liquidity Grab</text>

  <!-- Distribution Path -->
  <path d="M 400,160 L 440,290 L 480,260 L 520,380 L 560,330 L 650,450" fill="none" stroke="#ff3366" stroke-width="4" />

  <!-- CHoCH Label -->
  <line x1="430" y1="340" x2="550" y2="340" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />
  <text x="490" y="335" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">Previous Low</text>
  
  <text x="560" y="390" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">CHoCH</text>
  <text x="560" y="410" fill="#a0a0b0" font-size="12" text-anchor="middle">(Structure Broken)</text>
  
  <circle cx="505" cy="340" r="10" fill="#ff3366" />
  <text x="505" y="345" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">x</text>

</svg>
