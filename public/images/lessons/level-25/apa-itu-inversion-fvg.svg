<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #ffffff; font-family: sans-serif; font-size: 16px; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .bullish { fill: #00ffaa; stroke: #00ffaa; stroke-width: 2; }
      .bearish { fill: #ff3366; stroke: #ff3366; stroke-width: 2; }
      .wick { stroke-width: 2; }
      .fvg-box { fill: #ff3366; fill-opacity: 0.2; stroke: #ff3366; stroke-dasharray: 4; stroke-width: 2; }
      .fvg-box-inv { fill: #00ffaa; fill-opacity: 0.2; stroke: #00ffaa; stroke-dasharray: 4; stroke-width: 2; }
      .line-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; }
      .highlight { fill: #ffd700; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Title -->
  <text x="400" y="40" class="text-title" text-anchor="middle">Apa Itu Inversion FVG?</text>
  <text x="400" y="70" class="text-light" text-anchor="middle">Ketika Bearish FVG ditembus dan berubah menjadi Support (Inversion FVG)</text>

  <!-- Left Side: Normal Bearish FVG -->
  <text x="200" y="120" class="highlight" text-anchor="middle">1. Bearish FVG Terbentuk</text>
  
  <!-- Candle 1 (Bearish) -->
  <line x1="150" y1="160" x2="150" y2="240" stroke="#ff3366" class="wick" />
  <rect x="140" y="180" width="20" height="40" class="bearish" />
  <line x1="130" y1="240" x2="250" y2="240" stroke="#ffffff" stroke-width="1" stroke-dasharray="2" />
  <text x="125" y="245" class="line-label" text-anchor="end">Low C1</text>

  <!-- Candle 2 (Bearish big drop) -->
  <line x1="200" y1="200" x2="200" y2="340" stroke="#ff3366" class="wick" />
  <rect x="190" y="220" width="20" height="100" class="bearish" />

  <!-- Candle 3 (Bearish) -->
  <line x1="250" y1="290" x2="250" y2="380" stroke="#ff3366" class="wick" />
  <rect x="240" y="310" width="20" height="50" class="bearish" />
  <line x1="150" y1="290" x2="270" y2="290" stroke="#ffffff" stroke-width="1" stroke-dasharray="2" />
  <text x="145" y="295" class="line-label" text-anchor="end">High C3</text>

  <!-- FVG Box -->
  <rect x="150" y="240" width="600" height="50" class="fvg-box" />
  <text x="300" y="270" fill="#ff3366" font-family="sans-serif" font-size="16px" font-weight="bold">Bearish FVG (Resistance)</text>

  <!-- Middle: Breakout -->
  <text x="450" y="120" class="highlight" text-anchor="middle">2. Harga Menembus FVG (Breakout)</text>
  
  <!-- Candle 4 (Bullish Breakout) -->
  <line x1="450" y1="360" x2="450" y2="210" stroke="#00ffaa" class="wick" />
  <rect x="440" y="220" width="20" height="120" class="bullish" />
  
  <text x="450" y="195" class="text-light" text-anchor="middle">Body Close di atas FVG!</text>

  <!-- Right Side: Inversion and Retest -->
  <text x="650" y="120" class="highlight" text-anchor="middle">3. Berubah Menjadi Inversion FVG</text>
  
  <!-- Inversion label -->
  <rect x="520" y="240" width="230" height="50" class="fvg-box-inv" />
  <text x="635" y="270" fill="#00ffaa" font-family="sans-serif" font-size="16px" font-weight="bold" text-anchor="middle">iFVG (Support)</text>

  <!-- Candle 5 (Bearish Retest) -->
  <line x1="600" y1="210" x2="600" y2="260" stroke="#ff3366" class="wick" />
  <rect x="590" y="220" width="20" height="20" class="bearish" />

  <!-- Candle 6 (Bullish Bounce) -->
  <line x1="680" y1="260" x2="680" y2="150" stroke="#00ffaa" class="wick" />
  <rect x="670" y="170" width="20" height="80" class="bullish" />
  
  <!-- Path arrow showing movement -->
  <path d="M 460 220 Q 550 150 600 240 Q 640 280 680 170" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5" />
  
  <circle cx="600" cy="240" r="5" fill="#ffd700" />
  <text x="590" y="290" class="highlight" text-anchor="end">Retest &amp; Bounce</text>

</svg>
