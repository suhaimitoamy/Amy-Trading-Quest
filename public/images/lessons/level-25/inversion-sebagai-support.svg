<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #ffffff; font-family: sans-serif; font-size: 16px; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .bullish { fill: #00ffaa; stroke: #00ffaa; stroke-width: 2; }
      .bearish { fill: #ff3366; stroke: #ff3366; stroke-width: 2; }
      .wick { stroke-width: 2; }
      .fvg-bearish { fill: #ff3366; fill-opacity: 0.15; stroke: #ff3366; stroke-dasharray: 4; stroke-width: 1; }
      .fvg-inversion { fill: #00ffaa; fill-opacity: 0.25; stroke: #00ffaa; stroke-dasharray: 4; stroke-width: 2; }
      .line-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; }
      .highlight { fill: #ffd700; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title" text-anchor="middle">Inversion FVG Sebagai Support</text>
  <text x="400" y="70" class="text-light" text-anchor="middle">Bearish FVG Ditembus Ke Atas -> Menjadi Pijakan (Support)</text>

  <!-- Step 1: Bearish FVG Creation -->
  <rect x="100" y="250" width="150" height="60" class="fvg-bearish" />
  <text x="175" y="285" fill="#ff3366" font-family="sans-serif" font-size="14px" text-anchor="middle">Bearish FVG</text>
  
  <line x1="130" y1="200" x2="130" y2="280" stroke="#ff3366" class="wick" />
  <rect x="120" y="220" width="20" height="30" class="bearish" />
  
  <line x1="170" y1="230" x2="170" y2="350" stroke="#ff3366" class="wick" />
  <rect x="160" y="250" width="20" height="80" class="bearish" />

  <line x1="210" y1="290" x2="210" y2="380" stroke="#ff3366" class="wick" />
  <rect x="200" y="310" width="20" height="50" class="bearish" />

  <!-- Step 2: Breakout -->
  <rect x="250" y="250" width="200" height="60" class="fvg-inversion" />
  <text x="350" y="285" fill="#00ffaa" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Inversion (Support)</text>

  <line x1="320" y1="360" x2="320" y2="200" stroke="#00ffaa" class="wick" />
  <rect x="310" y="210" width="20" height="130" class="bullish" />
  
  <path d="M 280 340 L 320 220" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4" />
  <text x="310" y="180" class="highlight" text-anchor="middle">Body Close di atas!</text>

  <!-- Step 3: Retest and Bounce -->
  <rect x="450" y="250" width="250" height="60" class="fvg-inversion" />
  
  <!-- Bearish pullback -->
  <line x1="500" y1="200" x2="500" y2="260" stroke="#ff3366" class="wick" />
  <rect x="490" y="210" width="20" height="30" class="bearish" />

  <line x1="550" y1="230" x2="550" y2="290" stroke="#ff3366" class="wick" />
  <rect x="540" y="240" width="20" height="30" class="bearish" />

  <!-- Bounce -->
  <line x1="620" y1="310" x2="620" y2="150" stroke="#00ffaa" class="wick" />
  <rect x="610" y="160" width="20" height="110" class="bullish" />

  <!-- Explanatory lines and labels -->
  <line x1="450" y1="250" x2="700" y2="250" stroke="#ffffff" stroke-dasharray="2" />
  <text x="710" y="255" class="line-label">Batas Atas iFVG (Entry Buy)</text>

  <line x1="450" y1="310" x2="700" y2="310" stroke="#ff3366" stroke-dasharray="2" />
  <text x="710" y="315" fill="#ff3366" font-family="sans-serif" font-size="14px">Batas Bawah (Stop Loss)</text>

  <circle cx="585" cy="280" r="15" fill="none" stroke="#ffd700" stroke-width="2" />
  <text x="585" y="320" class="highlight" text-anchor="middle">Retest &amp; Entry</text>

  <!-- Arrow Path -->
  <path d="M 330 200 Q 450 150 550 280 Q 580 320 620 150" fill="none" stroke="#00ffaa" stroke-width="3" stroke-dasharray="6" />

</svg>
