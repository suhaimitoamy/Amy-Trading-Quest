<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #ffffff; font-family: sans-serif; font-size: 14px; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .bullish { fill: #00ffaa; stroke: #00ffaa; stroke-width: 2; }
      .bearish { fill: #ff3366; stroke: #ff3366; stroke-width: 2; }
      .wick { stroke-width: 2; }
      .fvg-inv { fill: #ff3366; fill-opacity: 0.2; stroke: #ff3366; stroke-dasharray: 4; stroke-width: 2; }
      .line-liq { stroke: #00ffaa; stroke-width: 2; stroke-dasharray: 4; }
      .line-mss { stroke: #ffffff; stroke-width: 2; }
      .line-tp { stroke: #ffd700; stroke-width: 2; stroke-dasharray: 4; }
      .highlight { fill: #ffd700; font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title" text-anchor="middle">Studi Kasus: Setup Lengkap iFVG Sell</text>
  <text x="400" y="65" class="text-light" text-anchor="middle">1. Sweep -> 2. MSS + Inversion -> 3. Retest (Entry) -> 4. Target (TP)</text>

  <!-- Asian High / Liquidity Line -->
  <line x1="50" y1="180" x2="350" y2="180" class="line-liq" />
  <text x="60" y="170" fill="#00ffaa" font-family="sans-serif" font-size="12px">Asian High (BSL)</text>

  <!-- Asian Low / TP Target -->
  <line x1="50" y1="420" x2="750" y2="420" class="line-tp" />
  <text x="60" y="410" fill="#ffd700" font-family="sans-serif" font-size="12px">Asian Low / SSL (Take Profit Target)</text>

  <!-- Price Action Path (Background guide) -->
  <path d="M 100 250 L 150 200 L 200 260 L 280 140 L 350 320 L 450 230 L 600 450" fill="none" stroke="#4a4a6a" stroke-width="2" stroke-linejoin="round" />

  <!-- 1. The Sweep -->
  <circle cx="280" cy="140" r="15" fill="none" stroke="#ff3366" stroke-width="2" />
  <text x="280" y="110" class="highlight" text-anchor="middle">1. Sweep BSL</text>
  
  <line x1="280" y1="180" x2="280" y2="120" stroke="#00ffaa" class="wick" />
  <rect x="270" y="140" width="20" height="40" class="bullish" />

  <!-- 2. The Drop & MSS -->
  <line x1="180" y1="260" x2="400" y2="260" class="line-mss" />
  <text x="180" y="275" fill="#ffffff" font-family="sans-serif" font-size="12px">MSS (Swing Low)</text>

  <line x1="330" y1="150" x2="330" y2="350" stroke="#ff3366" class="wick" />
  <rect x="320" y="170" width="20" height="150" class="bearish" />

  <!-- The Inverted FVG -->
  <rect x="220" y="210" width="300" height="40" class="fvg-inv" />
  <text x="400" y="235" fill="#ff3366" font-family="sans-serif" font-size="14px" font-weight="bold">2. Inversion FVG</text>

  <!-- 3. Retest & Entry -->
  <line x1="450" y1="260" x2="450" y2="210" stroke="#00ffaa" class="wick" />
  <rect x="440" y="220" width="20" height="40" class="bullish" />
  
  <circle cx="450" cy="220" r="8" fill="#ffd700" />
  <text x="450" y="190" class="highlight" text-anchor="middle">3. Entry Sell</text>
  <text x="450" y="170" fill="#ff3366" font-family="sans-serif" font-size="12px" text-anchor="middle">SL di atas iFVG</text>

  <!-- 4. Drop to Target -->
  <line x1="550" y1="250" x2="550" y2="400" stroke="#ff3366" class="wick" />
  <rect x="540" y="270" width="20" height="110" class="bearish" />

  <line x1="620" y1="350" x2="620" y2="460" stroke="#ff3366" class="wick" />
  <rect x="610" y="380" width="20" height="80" class="bearish" />

  <text x="620" y="480" class="highlight" text-anchor="middle">4. Take Profit Hit!</text>

</svg>
