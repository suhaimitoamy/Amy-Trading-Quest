<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Disiplin: Perisai Pelindung Akun Anda</text>

  <!-- Giant Shield -->
  <path d="M 400 120 C 500 120, 550 150, 550 200 C 550 350, 450 420, 400 450 C 350 420, 250 350, 250 200 C 250 150, 300 120, 400 120 Z" fill="#0f0f1a" stroke="#00ffaa" stroke-width="8"/>
  <path d="M 400 135 C 480 135, 520 160, 520 200 C 520 320, 440 390, 400 415 C 360 390, 280 320, 280 200 C 280 160, 320 135, 400 135 Z" fill="#00ffaa" fill-opacity="0.1" stroke="#00ffaa" stroke-width="2"/>
  
  <!-- Content inside shield -->
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00ffaa" text-anchor="middle">TRADING PLAN</text>
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffaa" text-anchor="middle">&amp;</text>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00ffaa" text-anchor="middle">KILL SWITCH</text>

  <!-- Protected Equity -->
  <rect x="340" y="280" width="120" height="80" fill="#ffffff" fill-opacity="0.1" rx="5"/>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Modal Aman:</text>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00ffaa" text-anchor="middle">$10,000</text>

  <!-- Attacks bouncing off the shield -->
  <!-- Attack 1: Anger -->
  <path d="M 100 150 L 220 180" fill="none" stroke="#ff3366" stroke-width="4" marker-end="url(#red-arrow)"/>
  <text x="120" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">Emosi / Marah</text>
  <!-- Bounce -->
  <path d="M 230 185 L 180 250" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- Attack 2: Martingale -->
  <path d="M 700 150 L 580 180" fill="none" stroke="#ff3366" stroke-width="4" marker-end="url(#red-arrow)"/>
  <text x="680" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">Martingale (Lot x2)</text>
  <!-- Bounce -->
  <path d="M 570 185 L 620 250" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- Attack 3: Overtrading -->
  <path d="M 150 350 L 250 300" fill="none" stroke="#ff3366" stroke-width="4" marker-end="url(#red-arrow)"/>
  <text x="130" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">Overtrading</text>
  <!-- Bounce -->
  <path d="M 260 300 L 220 250" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- Attack 4: Moving SL -->
  <path d="M 650 350 L 550 300" fill="none" stroke="#ff3366" stroke-width="4" marker-end="url(#red-arrow)"/>
  <text x="670" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">Geser Stop Loss</text>
  <!-- Bounce -->
  <path d="M 540 300 L 580 250" fill="none" stroke="#ff3366" stroke-width="3" stroke-dasharray="4,4"/>

  <defs>
    <marker id="red-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366" />
    </marker>
  </defs>

  <!-- Bottom Quote -->
  <rect x="50" y="440" width="700" height="40" fill="#ffffff" fill-opacity="0.05" rx="5"/>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#ffffff" text-anchor="middle">"Kerugian adalah biaya bisnis. Revenge trading adalah tindakan membakar toko Anda sendiri."</text>

</svg>
