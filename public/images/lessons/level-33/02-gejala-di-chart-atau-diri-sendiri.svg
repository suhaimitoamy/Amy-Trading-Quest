<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Gejala Revenge Trading</text>

  <!-- Split View -->
  <line x1="400" y1="70" x2="400" y2="450" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- LEFT SIDE: Gejala Fisik -->
  <text x="200" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff3366" text-anchor="middle">Gejala Fisik &amp; Emosional</text>
  
  <!-- Heart Rate Element -->
  <rect x="50" y="120" width="300" height="80" fill="#ff3366" fill-opacity="0.1" rx="8" stroke="#ff3366" stroke-width="2"/>
  <text x="70" y="150" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Detak Jantung Cepat</text>
  <!-- ECG Line -->
  <path d="M 70 170 L 100 170 L 110 150 L 120 190 L 130 140 L 140 180 L 150 170 L 250 170" fill="none" stroke="#ff3366" stroke-width="3"/>
  <text x="270" y="175" font-family="Arial, sans-serif" font-size="16" fill="#ff3366">❤️‍🔥</text>

  <!-- Tension Element -->
  <rect x="50" y="220" width="300" height="80" fill="#ffffff" fill-opacity="0.05" rx="8" stroke="#ffffff" stroke-width="1"/>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">😬 🤬 😤</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Rahang Kaku &amp; Mengumpat</text>

  <!-- Breathing Element -->
  <rect x="50" y="320" width="300" height="80" fill="#ffffff" fill-opacity="0.05" rx="8" stroke="#ffffff" stroke-width="1"/>
  <circle cx="100" cy="360" r="20" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="2"/>
  <circle cx="100" cy="360" r="10" fill="#00ffaa"/>
  <text x="140" y="355" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Menahan Napas saat</text>
  <text x="140" y="375" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">harga mendekati entry</text>


  <!-- RIGHT SIDE: Gejala Chart -->
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00ffaa" text-anchor="middle">Gejala di Chart</text>

  <!-- Messy Chart Window -->
  <rect x="450" y="120" width="300" height="280" fill="#0f0f1a" rx="8" stroke="#00ffaa" stroke-width="2"/>
  
  <!-- Candlesticks going strictly down -->
  <line x1="500" y1="150" x2="500" y2="190" stroke="#ff3366" stroke-width="3"/>
  <rect x="495" y="160" width="10" height="25" fill="#ff3366"/>

  <line x1="530" y1="180" x2="530" y2="230" stroke="#ff3366" stroke-width="3"/>
  <rect x="525" y="190" width="10" height="35" fill="#ff3366"/>

  <line x1="560" y1="220" x2="560" y2="300" stroke="#ff3366" stroke-width="3"/>
  <rect x="555" y="240" width="10" height="50" fill="#ff3366"/>

  <line x1="590" y1="280" x2="590" y2="360" stroke="#ff3366" stroke-width="3"/>
  <rect x="585" y="300" width="10" height="50" fill="#ff3366"/>

  <!-- Random Averaging Entries (Revenge Buy) -->
  <line x1="450" y1="180" x2="650" y2="180" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="655" y="185" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">Buy 0.1</text>

  <line x1="450" y1="230" x2="650" y2="230" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="655" y="235" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">Buy 0.2</text>

  <line x1="450" y1="280" x2="650" y2="280" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="655" y="285" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">Buy 0.5</text>

  <line x1="450" y1="340" x2="650" y2="340" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="655" y="345" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">Buy 1.0 (All In!)</text>

  <!-- Callouts -->
  <rect x="470" y="140" width="120" height="25" fill="#ff3366" rx="4"/>
  <text x="530" y="157" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Averaging Down</text>

  <!-- Bottom Message -->
  <rect x="50" y="430" width="700" height="40" fill="#ff3366" fill-opacity="0.2" rx="5"/>
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff3366" text-anchor="middle">Jika Anda mengalami salah satu dari gejala ini, TUTUP CHART SEKARANG JUGA!</text>

</svg>
