<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">4 Kesalahan Umum Revenge Trading</text>

  <!-- 1. Martingale / Lot Size Increase -->
  <rect x="40" y="80" width="340" height="180" fill="#ffffff" fill-opacity="0.05" rx="8"/>
  <text x="210" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">1. Menggandakan Lot (Martingale)</text>
  
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Trade 1 (Loss):</text>
  <rect x="200" y="135" width="40" height="20" fill="#ff3366"/>
  <text x="250" y="150" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">0.10 Lot (-$50)</text>

  <text x="80" y="185" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Trade 2 (Loss):</text>
  <rect x="200" y="170" width="80" height="20" fill="#ff3366"/>
  <text x="290" y="185" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">0.20 Lot (-$100)</text>

  <text x="80" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Trade 3 (Loss):</text>
  <rect x="200" y="205" width="120" height="20" fill="#ff3366"/>
  <text x="330" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">0.50 Lot (-$250)</text>

  <!-- 2. Moving Stop Loss -->
  <rect x="420" y="80" width="340" height="180" fill="#ffffff" fill-opacity="0.05" rx="8"/>
  <text x="590" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">2. Menggeser/Menghapus Stop Loss</text>

  <!-- Candlestick moving up against a Sell order -->
  <line x1="590" y1="240" x2="590" y2="130" stroke="#00ffaa" stroke-width="4"/>
  <rect x="585" y="150" width="10" height="80" fill="#00ffaa"/>

  <line x1="480" y1="200" x2="700" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="490" y="195" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Sell Entry</text>

  <!-- SL 1 -->
  <line x1="480" y1="170" x2="700" y2="170" stroke="#ff3366" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="490" y="165" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-decoration="line-through">Original SL</text>

  <!-- SL 2 -->
  <line x1="480" y1="140" x2="700" y2="140" stroke="#ff3366" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="490" y="135" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">Moved SL (Digeser!)</text>

  <!-- Arrow moving SL -->
  <path d="M 680 170 L 680 145" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>


  <!-- 3. Trading Random Pairs -->
  <rect x="40" y="280" width="340" height="180" fill="#ffffff" fill-opacity="0.05" rx="8"/>
  <text x="210" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">3. Pindah Pair Secara Acak</text>
  
  <text x="70" y="350" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Biasanya: EURUSD ❌ Loss</text>
  <text x="70" y="380" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Biasanya: GBPUSD ❌ Loss</text>
  
  <path d="M 270 365 L 300 365" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="310" y="340" width="60" height="50" fill="#ff3366" fill-opacity="0.2" rx="4" stroke="#ff3366" stroke-width="2"/>
  <text x="340" y="360" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff3366" text-anchor="middle">Buka</text>
  <text x="340" y="375" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff3366" text-anchor="middle">XAUUSD!</text>
  
  <text x="70" y="430" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#ffffff">"Emas geraknya cepat, pasti bisa balik modal!"</text>


  <!-- 4. Overtrading -->
  <rect x="420" y="280" width="340" height="180" fill="#ffffff" fill-opacity="0.05" rx="8"/>
  <text x="590" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">4. Overtrading (Terlalu Banyak Posisi)</text>

  <!-- Multiples entry points -->
  <path d="M 450 400 Q 500 340 550 420 T 650 340 T 730 400" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <circle cx="480" cy="365" r="4" fill="#00ffaa"/>
  <circle cx="510" cy="360" r="4" fill="#ff3366"/>
  <circle cx="530" cy="385" r="4" fill="#00ffaa"/>
  <circle cx="580" cy="405" r="4" fill="#ff3366"/>
  <circle cx="610" cy="375" r="4" fill="#00ffaa"/>
  <circle cx="630" cy="345" r="4" fill="#ff3366"/>
  <circle cx="680" cy="365" r="4" fill="#00ffaa"/>
  <circle cx="700" cy="385" r="4" fill="#ff3366"/>

  <rect x="480" y="430" width="220" height="20" fill="#ff3366" fill-opacity="0.2" rx="2"/>
  <text x="590" y="444" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">20 Trade dalam 1 Jam = Habis di Komisi</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>

</svg>
