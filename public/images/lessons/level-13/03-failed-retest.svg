<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">Failed Retest (Fakeout)</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Harga Gagal Bertahan dan Masuk Kembali Ke Dalam Range</text>
  
  <!-- Support/Resistance Line -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="240" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Resistance (Ditembus)</text>
  
  <!-- Lower Range Support -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#a0a0b0" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="110" y="395" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">Range Support</text>

  <!-- Line Chart / Candles representation -->
  <!-- Ranging inside -->
  <path d="M 120 350 L 180 260 L 220 330 L 280 270" fill="none" stroke="#a0a0b0" stroke-width="4"/>
  
  <!-- Fake Breakout -->
  <path d="M 280 270 L 350 150" fill="none" stroke="#00ffaa" stroke-width="6"/>
  <circle cx="350" cy="150" r="5" fill="#00ffaa"/>
  
  <!-- Retest & Fail -->
  <path d="M 350 150 L 420 250 L 440 230" fill="none" stroke="#ff3366" stroke-width="5"/>
  <circle cx="420" cy="250" r="4" fill="#ffffff"/>
  
  <!-- Collapse -->
  <path d="M 440 230 L 550 420" fill="none" stroke="#ff3366" stroke-width="7"/>
  <circle cx="550" cy="420" r="6" fill="#ff3366"/>

  <!-- Annotations -->
  <text x="360" y="140" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Retail Traders: "BUY!"</text>
  
  <text x="470" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" font-weight="bold">Pantulan Lemah</text>
  
  <text x="560" y="350" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">Collapse (Fakeout)</text>
  <text x="560" y="370" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">Stop Loss pembeli dihancurkan</text>

  <!-- X marks the failure -->
  <text x="450" y="270" font-family="Arial, sans-serif" font-size="24" fill="#ff3366" font-weight="bold">✗</text>
  
  <!-- Legend / Info box -->
  <rect x="50" y="440" width="700" height="40" rx="10" fill="#2a2a4a"/>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Retest gagal ketika harga tidak mampu melanjutkan pantulan dan jatuh kembali menembus struktur penahan.</text>

</svg>
