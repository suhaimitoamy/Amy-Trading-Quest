<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">Retest dengan Structure Shift</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Konfirmasi LTF (Lower Timeframe) di Zona Retest</text>
  
  <!-- HTF Support/Resistance Line -->
  <rect x="50" y="320" width="700" height="40" fill="#3a3a5e" opacity="0.4"/>
  <line x1="50" y1="340" x2="750" y2="340" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="60" y="335" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">HTF Broken Resistance (Retest Zone)</text>

  <!-- LTF Price Action (Downtrend to Uptrend) -->
  <path d="M 100 150 L 150 250 L 200 200 L 250 300 L 300 250 L 350 360" fill="none" stroke="#a0a0b0" stroke-width="3"/>
  <circle cx="350" cy="360" r="5" fill="#a0a0b0"/>

  <!-- LTF Annotations -->
  <text x="145" y="270" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">LL</text>
  <text x="195" y="190" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">LH</text>
  <text x="245" y="320" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">LL</text>
  <text x="295" y="240" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">LH (Valid)</text>
  <text x="345" y="380" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">Lowest Low</text>
  
  <!-- Line for valid LH -->
  <line x1="280" y1="250" x2="450" y2="250" stroke="#ff3366" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Structure Shift (CHoCH) -->
  <path d="M 350 360 L 450 180" fill="none" stroke="#00ffaa" stroke-width="5"/>
  <circle cx="450" cy="180" r="5" fill="#00ffaa"/>
  
  <!-- CHoCH Label -->
  <text x="460" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">CHoCH</text>
  <text x="460" y="260" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">(Structure Shift)</text>
  <ellipse cx="430" cy="250" rx="15" ry="10" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- LTF Entry Pullback -->
  <path d="M 450 180 L 520 280" fill="none" stroke="#ffaa00" stroke-width="4"/>
  <circle cx="520" cy="280" r="6" fill="#ffaa00"/>
  
  <text x="540" y="285" font-family="Arial, sans-serif" font-size="14" fill="#ffaa00" font-weight="bold">ENTRY (LTF Pullback)</text>

  <!-- Final Move Up -->
  <path d="M 520 280 L 680 100" fill="none" stroke="#00ffaa" stroke-width="6"/>

  <!-- Stop Loss Zone -->
  <line x1="490" y1="375" x2="550" y2="375" stroke="#ff3366" stroke-width="2"/>
  <text x="560" y="380" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">Safe SL di bawah Lowest Low</text>

  <!-- Legend / Info box -->
  <rect x="50" y="420" width="700" height="60" rx="10" fill="#2a2a4a"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Daripada blind entry di HTF Zone, tunggu harga di LTF mematahkan tren turunnya (CHoCH).</text>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa" text-anchor="middle">Entry dilakukan saat harga membuat pullback kecil setelah konfirmasi shift.</text>

</svg>
