<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">Retest &amp; Liquidity Sweep</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Menyapu Stop Loss Retail Sebelum Melanjutkan Tren</text>
  
  <!-- Structure Lines -->
  <line x1="100" y1="260" x2="700" y2="260" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="250" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Broken Resistance (Menjadi Support)</text>

  <!-- Line Chart / Candles -->
  <!-- Trend Up -->
  <path d="M 150 400 L 250 320 L 300 350 L 380 150" fill="none" stroke="#00ffaa" stroke-width="5"/>
  
  <!-- First fake bounce (Inducement) -->
  <path d="M 380 150 L 450 220 L 480 190" fill="none" stroke="#a0a0b0" stroke-width="4"/>
  <circle cx="450" cy="220" r="5" fill="#ffffff"/>
  
  <text x="400" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Retail Buy di sini</text>
  <line x1="430" y1="240" x2="470" y2="240" stroke="#ff3366" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="410" y="255" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">Retail SL (Liquidity)</text>

  <!-- Liquidity Sweep -->
  <path d="M 480 190 L 520 280" fill="none" stroke="#ff3366" stroke-width="5"/>
  <circle cx="520" cy="280" r="6" fill="#ff3366"/>
  
  <path d="M 520 280 L 520 255" fill="none" stroke="#ff3366" stroke-width="3"/> <!-- Wick effect -->
  
  <!-- Rocket Up -->
  <path d="M 520 280 L 680 80" fill="none" stroke="#00ffaa" stroke-width="7"/>
  <polygon points="680,80 670,95 685,95" fill="#00ffaa" transform="rotate(30 680 80)"/>

  <!-- Annotations -->
  <text x="540" y="295" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" font-weight="bold">Liquidity Sweep (Wick)</text>
  <text x="540" y="310" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">SL Dimakan, Smart Money Masuk</text>
  
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" font-weight="bold">True Retest Move</text>

  <!-- Highlight the sweep area -->
  <ellipse cx="520" cy="280" rx="30" ry="20" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Legend / Info box -->
  <rect x="50" y="420" width="700" height="60" rx="10" fill="#2a2a4a"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Harga memancing trader awam untuk beli, lalu turun sejenak menyapu Stop Loss mereka.</text>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" fill="#ffaa00" text-anchor="middle">Setelah likuiditas terkumpul, harga terbang tanpa ampun.</text>

</svg>
