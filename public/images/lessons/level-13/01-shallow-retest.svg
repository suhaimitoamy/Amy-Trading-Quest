<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">Shallow Retest</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Momentum Kuat, Retest Hanya Dangkal</text>
  
  <!-- Resistance Line / Broken Zone -->
  <rect x="100" y="280" width="600" height="30" fill="#3a3a5e" opacity="0.5"/>
  <line x1="100" y1="280" x2="700" y2="280" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="110" y="275" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Broken Resistance Zone</text>

  <!-- Line Chart / Candles representation -->
  <!-- Previous trend -->
  <path d="M 150 400 L 250 350 L 300 370" fill="none" stroke="#a0a0b0" stroke-width="4"/>
  
  <!-- Breakout -->
  <path d="M 300 370 L 400 150" fill="none" stroke="#00ffaa" stroke-width="6"/>
  <circle cx="400" cy="150" r="5" fill="#00ffaa"/>
  
  <!-- Shallow Retest -->
  <path d="M 400 150 L 450 250" fill="none" stroke="#ff3366" stroke-width="5"/>
  <circle cx="450" cy="250" r="6" fill="#ff3366"/>
  
  <!-- Continuation -->
  <path d="M 450 250 L 600 80" fill="none" stroke="#00ffaa" stroke-width="6"/>
  <circle cx="600" cy="80" r="5" fill="#00ffaa"/>

  <!-- Annotations -->
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Strong Breakout</text>
  
  <text x="465" y="240" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">Shallow Retest</text>
  <text x="465" y="260" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0">(Tidak menyentuh zona secara penuh)</text>

  <!-- Arrow pointing to the gap -->
  <line x1="450" y1="250" x2="450" y2="275" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Continuation Label -->
  <text x="610" y="75" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Rally Lanjutan</text>
  
  <!-- Legend / Info box -->
  <rect x="50" y="420" width="700" height="60" rx="10" fill="#2a2a4a"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Harga memantul sebelum mencapai level support utama, menandakan minat beli yang tinggi.</text>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="middle">Risiko: Stop Loss biasanya harus ditempatkan agak jauh (di bawah zona).</text>

</svg>
