<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Perbedaan Struktur: OB vs Breaker vs Mitigation</text>

  <!-- Section 1: Order Block -->
  <text x="133" y="90" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" font-weight="bold" text-anchor="middle">1. Order Block (OB)</text>
  <text x="133" y="110" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">Memantul di Ekstrim</text>
  
  <path d="M 40,280 L 100,160 L 160,350" fill="none" stroke="#555577" stroke-width="3" stroke-linejoin="round" />
  <path d="M 160,350 L 220,160 L 250,220" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
  <circle cx="100" cy="160" r="5" fill="#00ffaa" /> <!-- High -->
  
  <!-- OB Area -->
  <rect x="85" y="145" width="30" height="30" fill="rgba(0,255,170,0.2)" stroke="#00ffaa" stroke-width="1" />
  <line x1="100" y1="160" x2="220" y2="160" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <circle cx="220" cy="160" r="6" fill="#ffcc00" /> <!-- Tap -->

  <!-- Line separator -->
  <line x1="266" y1="70" x2="266" y2="400" stroke="#444466" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Section 2: Breaker Block -->
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="16" fill="#ffcc00" font-weight="bold" text-anchor="middle">2. Breaker Block</text>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">Ada Liquidity Sweep (Higher High)</text>

  <path d="M 290,280 L 350,180 L 400,240 L 450,140 L 510,350 L 450,240 L 520,290" fill="none" stroke="#555577" stroke-width="3" stroke-linejoin="round" />
  <circle cx="350" cy="180" r="4" fill="#00ffaa" /> <!-- High 1 -->
  <circle cx="400" cy="240" r="4" fill="#ff3366" /> <!-- Low 1 -->
  <circle cx="450" cy="140" r="6" fill="#ffcc00" /> <!-- Higher High Sweep -->
  <text x="450" y="125" font-family="Arial, sans-serif" font-size="12" fill="#ffcc00" font-weight="bold" text-anchor="middle">SWEEP</text>
  
  <!-- Breaker Block Area (at High 1) -->
  <rect x="335" y="165" width="30" height="30" fill="rgba(255,204,0,0.2)" stroke="#ffcc00" stroke-width="1" />
  <line x1="350" y1="180" x2="520" y2="180" stroke="#ffcc00" stroke-width="1" stroke-dasharray="4,4" />
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Retest OB yg tembus</text>

  <!-- Line separator -->
  <line x1="533" y1="70" x2="533" y2="400" stroke="#444466" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Section 3: Mitigation Block -->
  <text x="666" y="90" font-family="Arial, sans-serif" font-size="16" fill="#ff3366" font-weight="bold" text-anchor="middle">3. Mitigation Block</text>
  <text x="666" y="110" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">Failure Swing (Lower High)</text>

  <path d="M 560,280 L 620,140 L 670,240 L 720,180 L 770,350 L 720,240 L 780,290" fill="none" stroke="#555577" stroke-width="3" stroke-linejoin="round" />
  <circle cx="620" cy="140" r="4" fill="#00ffaa" /> <!-- High 1 -->
  <circle cx="670" cy="240" r="4" fill="#ff3366" /> <!-- Low 1 -->
  <circle cx="720" cy="180" r="6" fill="#ff3366" /> <!-- Lower High -->
  <text x="720" y="165" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" font-weight="bold" text-anchor="middle">FAIL SWING</text>

  <!-- Mitigation Block Area (at Lower High) -->
  <rect x="705" y="165" width="30" height="30" fill="rgba(255,51,102,0.2)" stroke="#ff3366" stroke-width="1" />
  <line x1="720" y1="180" x2="780" y2="180" stroke="#ff3366" stroke-width="1" stroke-dasharray="4,4" />
  <text x="750" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Retest</text>
</svg>