<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Reaction Zone: Anatomi Mitigation Block</text>

  <!-- The Mitigation Block Candle (Bearish MB -> Bullish Candle) -->
  <g transform="translate(200, 150)">
    <!-- Wick -->
    <line x1="50" y1="0" x2="50" y2="200" stroke="#00ffaa" stroke-width="4" />
    <!-- Body -->
    <rect x="25" y="40" width="50" height="120" fill="#00ffaa" />
    
    <!-- Labels for Candle Anatomy -->
    <text x="10" y="5" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">High (Stop Loss Area)</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">Close</text>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">Open (Proximal Line)</text>
    <text x="10" y="205" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">Low</text>
    
    <!-- Mean Threshold Line -->
    <line x1="25" y1="100" x2="450" y2="100" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,5" />
    <text x="460" y="105" font-family="Arial, sans-serif" font-size="14" fill="#ffcc00" text-anchor="start">50% Mean Threshold (Deep Entry)</text>
    
    <!-- Open Line (Proximal) -->
    <line x1="25" y1="160" x2="450" y2="160" stroke="#00bfff" stroke-width="2" stroke-dasharray="5,5" />
    <text x="460" y="165" font-family="Arial, sans-serif" font-size="14" fill="#00bfff" text-anchor="start">Open Level (Aggressive Entry)</text>
    
    <!-- Stop Loss Line -->
    <line x1="50" y1="-15" x2="450" y2="-15" stroke="#ff3366" stroke-width="2" stroke-dasharray="3,3" />
    <text x="460" y="-10" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="start">Stop Loss Buffer Level</text>
  </g>

  <!-- Simulating Price Action Reacting -->
  <!-- Price drops from Lower High, breaks structure, comes back up -->
  <path d="M 275,310 L 350,420 L 450,250" fill="none" stroke="#444466" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Candle returning to Open -->
  <line x1="450" y1="250" x2="450" y2="300" stroke="#00ffaa" stroke-width="3" />
  <rect x="440" y="260" width="20" height="40" fill="#00ffaa" />
  
  <!-- Candle returning to 50% Mean Threshold and reacting down -->
  <line x1="480" y1="210" x2="480" y2="280" stroke="#00ffaa" stroke-width="3" />
  <rect x="470" y="240" width="20" height="40" fill="#00ffaa" />
  
  <line x1="510" y1="230" x2="510" y2="350" stroke="#ff3366" stroke-width="3" />
  <rect x="500" y="250" width="20" height="100" fill="#ff3366" />
  
  <text x="540" y="320" font-family="Arial, sans-serif" font-size="16" fill="#ff3366" font-weight="bold">Harga ter-reject kuat</text>
  <text x="540" y="340" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa">dari Mean Threshold</text>
</svg>