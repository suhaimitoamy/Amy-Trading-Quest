<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">Studi Kasus: Eksekusi Bullish Mitigation Block</text>

  <!-- Market Structure Path -->
  <!-- Downtrend into Ranging -->
  <path d="M 50,150 L 150,300 L 250,220 L 350,260 L 450,100" fill="none" stroke="#444466" stroke-width="3" stroke-linejoin="round" />
  
  <circle cx="150" cy="300" r="5" fill="#ff3366"/>
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">Low</text>
  
  <circle cx="250" cy="220" r="5" fill="#00ffaa"/>
  <text x="250" y="210" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">High</text>
  
  <circle cx="350" cy="260" r="6" fill="#ff3366"/>
  <text x="350" y="280" font-family="Arial, sans-serif" font-size="12" fill="#ffcc00" font-weight="bold" text-anchor="middle">Higher Low (Failure Swing)</text>
  
  <circle cx="450" cy="100" r="5" fill="#00ffaa"/>
  <text x="450" y="90" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa" font-weight="bold" text-anchor="middle">Higher High (BOS)</text>
  <line x1="240" y1="220" x2="460" y2="220" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Mitigation Block Box -->
  <rect x="330" y="240" width="220" height="30" fill="rgba(0,255,170,0.15)" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4" />
  <text x="560" y="255" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa" font-weight="bold">Bullish Mitigation Block</text>
  
  <!-- Trade Setup Annotations -->
  <line x1="330" y1="240" x2="600" y2="240" stroke="#00bfff" stroke-width="1" stroke-dasharray="2,2" />
  <text x="610" y="245" font-family="Arial, sans-serif" font-size="12" fill="#00bfff">ENTRY (Buy Limit)</text>

  <line x1="330" y1="285" x2="600" y2="285" stroke="#ff3366" stroke-width="1" stroke-dasharray="2,2" />
  <text x="610" y="290" font-family="Arial, sans-serif" font-size="12" fill="#ff3366">STOP LOSS</text>
  
  <line x1="450" y1="70" x2="700" y2="70" stroke="#00ffaa" stroke-width="1" stroke-dasharray="2,2" />
  <text x="710" y="75" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">TAKE PROFIT (Liquidity Pool)</text>

  <!-- Price Action Retracement and Bounce -->
  <path d="M 450,100 L 520,245 L 650,60" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Entry Point Highlight -->
  <circle cx="520" cy="245" r="8" fill="#ffcc00"/>
  <text x="520" y="265" font-family="Arial, sans-serif" font-size="14" fill="#ffcc00" font-weight="bold" text-anchor="middle">Order Tereksekusi</text>
  
  <!-- Take Profit Highlight -->
  <circle cx="640" cy="70" r="8" fill="#00ffaa"/>
  <text x="640" y="50" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa" font-weight="bold" text-anchor="middle">TP Hit!</text>
  
  <!-- Notes Box -->
  <rect x="50" y="360" width="700" height="70" rx="10" fill="#2a2a4e" stroke="#555577" stroke-width="2" />
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Roadmap Eksekusi:</text>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa" text-anchor="middle">1. Cari Failure Swing &#8594; 2. Tunggu BOS Valid &#8594; 3. Tandai Mitigation Block &#8594; 4. Entry saat retest &#8594; 5. TP di area likuiditas.</text>
</svg>