<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">Studi Kasus: Budi (Gagal) vs Andi (Lulus)</text>

  <!-- Chart Layout -->
  <line x1="100" y1="450" x2="700" y2="450" stroke="#ffffff" stroke-width="2"/>
  <line x1="100" y1="100" x2="100" y2="450" stroke="#ffffff" stroke-width="2"/>

  <!-- Y-axis -->
  <text x="90" y="100" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="end">$108,000 (Target)</text>
  <text x="90" y="275" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="end">$100,000 (Start)</text>
  <text x="90" y="385" fill="#ff3366" font-family="Arial" font-size="14" text-anchor="end">$95,000 (Daily DD)</text>

  <line x1="100" y1="100" x2="700" y2="100" stroke="#00ffaa" stroke-dasharray="5,5" stroke-width="2"/>
  <line x1="100" y1="275" x2="700" y2="275" stroke="#ffffff" stroke-dasharray="2,2" stroke-width="1"/>
  <line x1="100" y1="385" x2="700" y2="385" stroke="#ff3366" stroke-dasharray="8,4" stroke-width="2"/>

  <!-- Budi Curve (Aggressive & Failed) -->
  <path d="M 100 275 L 120 320 L 140 300 L 160 400" fill="none" stroke="#ff3366" stroke-width="4"/>
  <circle cx="160" cy="400" r="6" fill="#ff3366"/>
  <text x="170" y="415" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold">Budi: Overleverage &amp; Gagal di Hari 1</text>
  <text x="170" y="430" fill="#ff3366" font-family="Arial" font-size="12">Risiko 2%-3% per trade</text>

  <!-- Andi Curve (Steady & Passed) -->
  <path d="M 100 275 L 150 285 L 200 295 L 250 215 L 300 225 L 350 145 L 400 155 L 450 165 L 500 85 L 550 95 L 650 90" fill="none" stroke="#00ffaa" stroke-width="3"/>
  <circle cx="650" cy="90" r="6" fill="#00ffaa"/>
  <text x="650" y="70" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Andi: LULUS!</text>
  <text x="500" y="65" fill="#00ffaa" font-family="Arial" font-size="12">Risiko Konsisten 0.5%</text>
  
  <!-- Info Box -->
  <rect x="150" y="500" width="500" height="70" rx="5" fill="#2d2d44" stroke="#4a4a6a" stroke-width="2"/>
  <text x="400" y="530" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Rahasia Kelulusan:</text>
  <text x="400" y="555" fill="#aaaaaa" font-family="Arial" font-size="14" text-anchor="middle">Bukan memenangkan setiap trade, tapi bertahan hidup saat setup gagal.</text>

</svg>
