<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <line x1="400" y1="0" x2="400" y2="400" stroke="#505070" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- LEFT: VALID ENTRY -->
  <text x="200" y="50" fill="#00ffaa" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">ENTRY VALID (SISTEM)</text>
  
  <rect x="50" y="200" width="300" height="40" fill="#00ffaa" fill-opacity="0.1" stroke="#00ffaa" stroke-width="1"/>
  <text x="80" y="225" fill="#00ffaa" font-family="Arial" font-size="14">POI Demand</text>

  <path d="M 50 100 L 150 250 L 220 210" fill="none" stroke="#a0a0c0" stroke-width="3"/>
  <circle cx="220" cy="210" r="6" fill="#00ffaa"/>
  
  <text x="200" y="250" fill="#ffffff" font-family="Arial" font-size="12">✔ Checklist Terpenuhi</text>
  <text x="200" y="270" fill="#ffffff" font-family="Arial" font-size="12">✔ Resiko Diterima</text>
  <text x="200" y="290" fill="#ffffff" font-family="Arial" font-size="12">✔ Tanpa Emosi</text>

  <!-- RIGHT: EMOTIONAL ENTRY -->
  <text x="600" y="50" fill="#ff3366" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">ENTRY EMOSIONAL (FOMO)</text>

  <!-- Giant Green Candle -->
  <rect x="580" y="100" width="40" height="180" fill="#00ffaa"/>
  <line x1="600" y1="60" x2="600" y2="100" stroke="#00ffaa" stroke-width="4"/>
  <line x1="600" y1="280" x2="600" y2="300" stroke="#00ffaa" stroke-width="4"/>
  
  <!-- FOMO Click -->
  <circle cx="600" cy="60" r="8" fill="#ff3366"/>
  <text x="700" y="65" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold">"BUY SEKARANG!"</text>
  
  <text x="600" y="320" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">Beli di pucuk karena takut tertinggal</text>
  <text x="600" y="340" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">✖ Tanpa Rencana</text>
  <text x="600" y="360" fill="#ff3366" font-family="Arial" font-size="12" text-anchor="middle">✖ Adrenalin Tinggi</text>
</svg>
