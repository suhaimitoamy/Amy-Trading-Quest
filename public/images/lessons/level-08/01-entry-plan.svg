<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <rect x="50" y="50" width="700" height="300" rx="15" fill="#24243e" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="90" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Alur Entry Plan Profesional</text>
  
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="120" height="60" rx="8" fill="#303050"/>
    <text x="60" y="35" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">1. Tren Bias</text>
    
    <path d="M 120 30 L 160 30" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="160" y="0" width="120" height="60" rx="8" fill="#303050"/>
    <text x="220" y="35" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">2. Area POI</text>
    
    <path d="M 280 30 L 320 30" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="320" y="0" width="140" height="60" rx="8" fill="#303050"/>
    <text x="390" y="35" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">3. Konfirmasi (LTF)</text>

    <path d="M 460 30 L 500 30" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="500" y="0" width="120" height="60" rx="8" fill="#303050"/>
    <text x="560" y="35" fill="#00ffaa" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">4. Eksekusi</text>
  </g>

  <g transform="translate(100, 240)">
    <text x="60" y="0" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">Bulls / Bears?</text>
    <text x="220" y="0" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">Tunggu harga tiba</text>
    <text x="390" y="0" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">Pola Candle / CHoCH</text>
    <text x="560" y="0" fill="#a0a0c0" font-family="Arial" font-size="12" text-anchor="middle">SL Logis &amp; TP</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>