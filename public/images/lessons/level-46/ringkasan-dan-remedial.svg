<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Ringkasan Checklist Prop Firm</text>
  
  <!-- Central Hub -->
  <circle cx="400" cy="200" r="60" fill="#2a2a4e" stroke="#00ffaa" stroke-width="3"/>
  <text x="400" y="195" fill="#00ffaa" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">PROP FIRM</text>
  <text x="400" y="215" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">CHALLENGE</text>
  
  <!-- Path 1: Target -->
  <line x1="400" y1="140" x2="400" y2="80" stroke="#aaaaaa" stroke-width="2"/>
  <rect x="300" y="40" width="200" height="40" rx="5" fill="#1f1f3a" stroke="#00ffaa"/>
  <text x="400" y="65" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="middle">Target: 8% (F1) / 5% (F2)</text>
  
  <!-- Path 2: Max Drawdown -->
  <line x1="340" y1="200" x2="250" y2="200" stroke="#aaaaaa" stroke-width="2"/>
  <rect x="50" y="180" width="200" height="40" rx="5" fill="#1f1f3a" stroke="#ff3366"/>
  <text x="150" y="205" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="middle">Max Drawdown: -10%</text>
  
  <!-- Path 3: Daily Drawdown -->
  <line x1="460" y1="200" x2="550" y2="200" stroke="#aaaaaa" stroke-width="2"/>
  <rect x="550" y="180" width="200" height="60" rx="5" fill="#1f1f3a" stroke="#ffaa00"/>
  <text x="650" y="200" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="middle">Daily Drawdown: -5%</text>
  <text x="650" y="220" fill="#aaaaaa" font-size="11" font-family="Arial" text-anchor="middle">(Hati-hati Midnight Reset!)</text>

  <!-- Path 4: Consistency -->
  <line x1="400" y1="260" x2="400" y2="320" stroke="#aaaaaa" stroke-width="2"/>
  <rect x="300" y="320" width="200" height="60" rx="5" fill="#1f1f3a" stroke="#00aaff"/>
  <text x="400" y="340" fill="#ffffff" font-size="14" font-family="Arial" text-anchor="middle">Konsistensi</text>
  <text x="400" y="360" fill="#aaaaaa" font-size="11" font-family="Arial" text-anchor="middle">Max Profit/Hari &lt; 30%</text>
  <text x="400" y="375" fill="#aaaaaa" font-size="11" font-family="Arial" text-anchor="middle">Lot Seragam, Risk 0.5% - 1%</text>

  <!-- Small floating icons/texts for extra detail -->
  <text x="230" y="100" fill="#555" font-size="12" font-family="Arial" text-anchor="middle" transform="rotate(-30 230,100)">Kesabaran</text>
  <text x="570" y="100" fill="#555" font-size="12" font-family="Arial" text-anchor="middle" transform="rotate(30 570,100)">Disiplin</text>
  
</svg>
