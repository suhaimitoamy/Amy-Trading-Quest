<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Fase 2: Verifikasi (Target Lebih Kecil, Konsistensi Utama)</text>
  
  <!-- Grid -->
  <line x1="60" y1="350" x2="750" y2="350" stroke="#33334d" stroke-width="2"/>
  <line x1="60" y1="50" x2="60" y2="350" stroke="#33334d" stroke-width="2"/>
  
  <!-- Target Line Phase 2 -->
  <line x1="60" y1="140" x2="750" y2="140" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="70" y="130" fill="#00ffaa" font-size="14" font-family="Arial" font-weight="bold">Target Profit +5% ($105,000)</text>

  <!-- Max Drawdown Line -->
  <line x1="60" y1="310" x2="750" y2="310" stroke="#ff3366" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="70" y="300" fill="#ff3366" font-size="14" font-family="Arial" font-weight="bold">Max Drawdown -10% ($90,000)</text>

  <!-- Starting Balance Line -->
  <line x1="60" y1="205" x2="750" y2="205" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="70" y="195" fill="#ffffff" font-size="14" font-family="Arial">Starting Balance ($100,000)</text>
  
  <!-- Equity Curve Phase 2: smoother, lower risk -->
  <path d="M 60 205 L 120 195 L 180 200 L 240 180 L 300 185 L 360 160 L 420 170 L 480 150 L 540 155 L 600 135 L 660 120" fill="none" stroke="#00ffaa" stroke-width="3"/>
  
  <!-- Data Points -->
  <circle cx="60" cy="205" r="5" fill="#ffffff"/>
  <circle cx="660" cy="120" r="7" fill="#00ffaa"/>
  
  <text x="675" y="115" fill="#00ffaa" font-size="16" font-family="Arial" font-weight="bold">AKUN FUNDED!</text>
  
  <!-- Annotation box -->
  <rect x="250" y="240" width="280" height="50" rx="8" fill="#2a2a4e" stroke="#ffffff" stroke-width="1"/>
  <text x="390" y="260" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Gunakan lot / risk lebih kecil (misal 0.5%).</text>
  <text x="390" y="275" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Pergerakan lebih lambat tapi jauh lebih aman.</text>

  <!-- Axis labels -->
  <text x="400" y="380" fill="#aaaaaa" font-size="14" font-family="Arial" text-anchor="middle">Jumlah Trade / Waktu</text>
  <text x="20" y="200" fill="#aaaaaa" font-size="14" font-family="Arial" text-anchor="middle" transform="rotate(-90 20,200)">Equity Akun</text>
</svg>
