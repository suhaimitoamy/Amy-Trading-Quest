<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">Fase 1: Evaluasi (Target Profit vs Max Drawdown)</text>
  
  <!-- Grid -->
  <line x1="60" y1="350" x2="750" y2="350" stroke="#33334d" stroke-width="2"/>
  <line x1="60" y1="50" x2="60" y2="350" stroke="#33334d" stroke-width="2"/>
  
  <!-- Target Line -->
  <line x1="60" y1="100" x2="750" y2="100" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="70" y="90" fill="#00ffaa" font-size="14" font-family="Arial" font-weight="bold">Target Profit +8% ($108,000)</text>

  <!-- Max Drawdown Line -->
  <line x1="60" y1="310" x2="750" y2="310" stroke="#ff3366" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="70" y="300" fill="#ff3366" font-size="14" font-family="Arial" font-weight="bold">Max Drawdown -10% ($90,000)</text>

  <!-- Starting Balance Line -->
  <line x1="60" y1="205" x2="750" y2="205" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="70" y="195" fill="#ffffff" font-size="14" font-family="Arial">Starting Balance ($100,000)</text>
  
  <!-- Equity Curve Phase 1 -->
  <path d="M 60 205 L 140 180 L 220 220 L 300 170 L 380 185 L 460 130 L 540 155 L 620 110 L 700 95" fill="none" stroke="#00ffaa" stroke-width="4"/>
  
  <!-- Data Points -->
  <circle cx="60" cy="205" r="5" fill="#ffffff"/>
  <circle cx="220" cy="220" r="4" fill="#ff3366"/>
  <circle cx="700" cy="95" r="7" fill="#00ffaa"/>
  
  <text x="715" y="90" fill="#00ffaa" font-size="16" font-family="Arial" font-weight="bold">LULUS FASE 1</text>
  
  <!-- Annotation box -->
  <rect x="180" y="240" width="220" height="50" rx="8" fill="#2a2a4e" stroke="#ffffff" stroke-width="1"/>
  <text x="290" y="260" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Jaga emosi saat floating di area bawah.</text>
  <text x="290" y="275" fill="#ffffff" font-size="12" font-family="Arial" text-anchor="middle">Jangan over-leverage!</text>
  
  <!-- Axis labels -->
  <text x="400" y="380" fill="#aaaaaa" font-size="14" font-family="Arial" text-anchor="middle">Jumlah Trade / Waktu</text>
  <text x="20" y="200" fill="#aaaaaa" font-size="14" font-family="Arial" text-anchor="middle" transform="rotate(-90 20,200)">Equity Akun</text>
</svg>
