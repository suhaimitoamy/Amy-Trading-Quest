<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Valid Fair Value Gap (Bullish FVG)</text>
  
  <g transform="translate(200, 100)">
    <!-- Candle 1 -->
    <line x1="50" y1="200" x2="50" y2="300" stroke="#00ffaa" stroke-width="4"/>
    <rect x="35" y="220" width="30" height="60" fill="#00ffaa"/>
    <text x="50" y="325" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Candle 1</text>
    
    <!-- Wick Line Candle 1 High -->
    <line x1="50" y1="200" x2="350" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="360" y="205" font-family="Arial" font-size="14" fill="#ffffff">High Candle 1</text>
    
    <!-- Candle 2 -->
    <line x1="150" y1="50" x2="150" y2="250" stroke="#00ffaa" stroke-width="4"/>
    <rect x="135" y="60" width="30" height="180" fill="#00ffaa"/>
    <text x="150" y="325" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Candle 2</text>
    
    <!-- Candle 3 -->
    <line x1="250" y1="20" x2="250" y2="100" stroke="#00ffaa" stroke-width="4"/>
    <rect x="235" y="40" width="30" height="50" fill="#00ffaa"/>
    <text x="250" y="325" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Candle 3</text>
    
    <!-- Wick Line Candle 3 Low -->
    <line x1="250" y1="100" x2="350" y2="100" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="360" y="105" font-family="Arial" font-size="14" fill="#ffffff">Low Candle 3</text>
    
    <!-- FVG Highlight Box -->
    <rect x="50" y="100" width="300" height="100" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="2"/>
    <text x="200" y="155" font-family="Arial" font-size="18" font-weight="bold" fill="#00ffaa" text-anchor="middle">FAIR VALUE GAP (FVG)</text>
    <text x="200" y="175" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">Area ketidakseimbangan tanpa interaksi wick 1 &amp; 3</text>
  </g>
</svg>
