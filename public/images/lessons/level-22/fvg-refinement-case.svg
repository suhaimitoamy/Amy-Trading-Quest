<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Refinement: Memilih FVG Terbaik (Premium/Discount)</text>
  
  <g transform="translate(100, 70)">
    
    <!-- Swing High to Swing Low Range -->
    <line x1="50" y1="20" x2="50" y2="380" stroke="#ffffff" stroke-width="2"/>
    <line x1="40" y1="20" x2="60" y2="20" stroke="#ffffff" stroke-width="2"/>
    <text x="65" y="25" font-family="Arial" font-size="12" fill="#ffffff">Swing High (0%)</text>
    <line x1="40" y1="380" x2="60" y2="380" stroke="#ffffff" stroke-width="2"/>
    <text x="65" y="385" font-family="Arial" font-size="12" fill="#ffffff">Swing Low (100%)</text>
    
    <!-- 50% Equilibrium Line -->
    <line x1="30" y1="200" x2="600" y2="200" stroke="#ffff00" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="610" y="205" font-family="Arial" font-size="14" font-weight="bold" fill="#ffff00">50% Equilibrium</text>

    <!-- Zone Backgrounds -->
    <rect x="150" y="20" width="450" height="180" fill="#ff3366" fill-opacity="0.05"/>
    <text x="160" y="40" font-family="Arial" font-size="12" font-weight="bold" fill="#ff3366">ZONA PREMIUM (Untuk Sell)</text>

    <rect x="150" y="200" width="450" height="180" fill="#00ffaa" fill-opacity="0.05"/>
    <text x="160" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#00ffaa">ZONA DISCOUNT (Murah)</text>

    <!-- Extreme OB -->
    <rect x="250" y="30" width="40" height="40" fill="#888888"/>
    <text x="300" y="55" font-family="Arial" font-size="12" fill="#ffffff">Extreme Order Block</text>

    <!-- FVG A (Extreme, High Probability) -->
    <rect x="230" y="70" width="100" height="50" fill="#ff3366" fill-opacity="0.3" stroke="#ff3366" stroke-width="2"/>
    <text x="340" y="95" font-family="Arial" font-size="14" font-weight="bold" fill="#ff3366">FVG "A" (High Prob)</text>
    <text x="340" y="115" font-family="Arial" font-size="12" fill="#ffffff">- Premium Zone &amp; Nempel OB</text>

    <!-- FVG B (Middle) -->
    <rect x="230" y="160" width="100" height="40" fill="#ff3366" fill-opacity="0.1" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="340" y="185" font-family="Arial" font-size="12" fill="#888">FVG "B" (Medium/Low Prob)</text>

    <!-- FVG C (Inducement, Lowest Probability) -->
    <rect x="230" y="260" width="100" height="60" fill="#ff3366" fill-opacity="0.1" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="340" y="285" font-family="Arial" font-size="12" fill="#888">FVG "C" (Inducement Trap!)</text>
    <text x="340" y="305" font-family="Arial" font-size="12" fill="#ffffff">- Discount Zone (Jangan Sell di sini)</text>

    <!-- Price Path -->
    <path d="M 280 380 Q 300 320, 270 260 T 320 180 T 250 100" fill="none" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- Sell Rejection at A -->
    <path d="M 250 100 Q 230 150, 280 400" fill="none" stroke="#ff3366" stroke-width="4"/>
    <polygon points="270,390 290,395 280,410" fill="#ff3366"/>

    <text x="290" y="405" font-family="Arial" font-size="14" font-weight="bold" fill="#ff3366">Terjun Bebas</text>

  </g>
</svg>
