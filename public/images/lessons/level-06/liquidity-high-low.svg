<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">BSL (Buy-Side Liquidity) &amp; SSL (Sell-Side Liquidity)</text>

  <!-- BSL Area -->
  <line x1="250" y1="120" x2="600" y2="120" stroke="#00ffaa" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="610" y="125" fill="#00ffaa" font-size="18" font-weight="bold">BSL (Old High)</text>
  <text x="610" y="145" fill="#ffffff" font-size="12">Kumpulan Buy Stops</text>

  <!-- SSL Area -->
  <line x1="150" y1="280" x2="500" y2="280" stroke="#ff3366" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="285" fill="#ff3366" font-size="18" font-weight="bold">SSL (Old Low)</text>
  <text x="40" y="305" fill="#ffffff" font-size="12">Kumpulan Sell Stops</text>

  <!-- Price line -->
  <path d="M 50 200 L 150 280 L 250 120 L 350 220 L 450 140" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>

  <!-- Market taking BSL -->
  <path d="M 450 140 L 520 90 L 580 180" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  
  <circle cx="520" cy="90" r="8" fill="#ff3366"/>
  <text x="500" y="75" fill="#ff3366" font-size="14" font-weight="bold">Institusi Sell</text>
  <text x="500" y="60" fill="#ffffff" font-size="12">(Memakan BSL)</text>

  <!-- Market took SSL -->
  <circle cx="150" cy="280" r="8" fill="#00ffaa"/>
  
</svg>