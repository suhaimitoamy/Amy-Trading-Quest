<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <defs>
    <linearGradient id="bullish" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bearish" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff3366" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Konsep Dasar Liquidity = Uang (Pesanan Tertunda)</text>

  <!-- Resistance Area -->
  <rect x="100" y="80" width="600" height="40" fill="url(#bearish)" rx="5"/>
  <text x="400" y="105" fill="#ff3366" font-size="18" font-weight="bold" text-anchor="middle">Resistance (Area Stop Loss Penjual &amp; Buy Stop Ritel)</text>
  
  <!-- Dollar signs representing liquidity pool -->
  <text x="200" y="70" fill="#00ffaa" font-size="20" font-weight="bold">$$$</text>
  <text x="400" y="70" fill="#00ffaa" font-size="20" font-weight="bold" text-anchor="middle">$$$</text>
  <text x="600" y="70" fill="#00ffaa" font-size="20" font-weight="bold">$$$</text>
  <text x="400" y="55" fill="#ffffff" font-size="14" text-anchor="middle">KOLAM LIKUIDITAS ATAS</text>

  <!-- Support Area -->
  <rect x="100" y="280" width="600" height="40" fill="url(#bullish)" rx="5"/>
  <text x="400" y="305" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Support (Area Stop Loss Pembeli &amp; Sell Stop Ritel)</text>

  <!-- Dollar signs representing liquidity pool -->
  <text x="200" y="340" fill="#ff3366" font-size="20" font-weight="bold">$$$</text>
  <text x="400" y="340" fill="#ff3366" font-size="20" font-weight="bold" text-anchor="middle">$$$</text>
  <text x="600" y="340" fill="#ff3366" font-size="20" font-weight="bold">$$$</text>
  <text x="400" y="360" fill="#ffffff" font-size="14" text-anchor="middle">KOLAM LIKUIDITAS BAWAH</text>

  <!-- Price Action -->
  <path d="M 150 200 L 250 120 L 350 200 L 450 120 L 550 280 L 650 150" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Smart Money label -->
  <circle cx="550" cy="280" r="10" fill="#00ffaa"/>
  <text x="565" y="275" fill="#00ffaa" font-size="14" font-weight="bold">Smart Money Beli di Sini</text>
  <text x="565" y="290" fill="#ffffff" font-size="12">(Memanfaatkan SL Ritel)</text>

  <circle cx="250" cy="120" r="8" fill="#ff3366"/>
  <circle cx="450" cy="120" r="8" fill="#ff3366"/>

</svg>