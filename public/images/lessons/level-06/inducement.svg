<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Inducement (IDM) - Jebakan Ritel</text>

  <!-- Demand / OB Zone -->
  <rect x="50" y="320" width="700" height="40" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="345" fill="#00ffaa" font-size="16" font-weight="bold" text-anchor="middle">Order Block Ekstrem (POI Valid)</text>

  <!-- Price structure going up and retracing -->
  <!-- Uptrend move -->
  <path d="M 100 320 L 250 80" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  <text x="250" y="65" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">High</text>
  
  <!-- Fake Pullback / Inducement creation -->
  <path d="M 250 80 L 350 200 L 450 140" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  
  <circle cx="350" cy="200" r="6" fill="#ff3366"/>
  <line x1="330" y1="200" x2="600" y2="200" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="350" y="225" fill="#ff3366" font-size="16" font-weight="bold" text-anchor="middle">IDM (Inducement / Fake Support)</text>
  
  <!-- Retail reaction (buying too early) vs Smart Money move -->
  <path d="M 450 140 L 520 320 L 650 50" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Stop Loss taken cross -->
  <path d="M 510 190 L 530 210 M 530 190 L 510 210" stroke="#ff3366" stroke-width="3"/>
  <text x="545" y="205" fill="#ffffff" font-size="14">Ritel Buy di IDM -&gt; SL Dimakan</text>

  <circle cx="520" cy="320" r="10" fill="#00ffaa"/>
  <text x="540" y="315" fill="#00ffaa" font-size="14" font-weight="bold">Smart Money Buy di POI asli</text>
  <text x="540" y="330" fill="#00ffaa" font-size="14" font-weight="bold">setelah mengambil IDM</text>

</svg>