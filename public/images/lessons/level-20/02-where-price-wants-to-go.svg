<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Draw on Liquidity (Ke Mana Harga Pergi?)</text>
  
  <rect x="550" y="80" width="200" height="60" fill="#ff3366" opacity="0.2" stroke="#ff3366" stroke-width="2"/>
  <text x="650" y="105" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Old High / Equal Highs</text>
  <text x="650" y="125" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">(Magnet Likuiditas Kuat)</text>
  
  <rect x="350" y="180" width="100" height="40" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-width="2"/>
  <text x="400" y="205" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">FVG (Internal)</text>
  
  <path d="M 100 150 L 150 250 L 250 100 L 350 300 L 400 190" fill="none" stroke="#555577" stroke-width="4"/>
  <circle cx="400" cy="190" r="6" fill="#00ffaa"/>
  
  <!-- Magnet effect -->
  <path d="M 410 180 Q 500 130 540 110" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="545,115 540,105 555,108" fill="#ffffff"/>
  
  <text x="480" y="130" fill="#ffffff" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">"Draw" / Tarikan</text>
  
  <g transform="translate(100, 320)">
    <rect width="600" height="60" rx="10" fill="#2a2a40"/>
    <text x="300" y="25" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Harga selalu tertarik dari satu area likuiditas ke area lainnya.</text>
    <text x="300" y="45" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Setelah menyentuh Imbalance (Internal), target selanjutnya adalah Eksternal.</text>
  </g>
</svg>
