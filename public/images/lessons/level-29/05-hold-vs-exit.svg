<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 24px; font-weight: bold; }
      .text-sub { fill: #a0a0b0; font-family: sans-serif; font-size: 16px; }
      .text-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: bold; }
      .text-info { fill: #00ffaa; font-family: sans-serif; font-size: 12px; }
      .text-alert { fill: #ff3366; font-family: sans-serif; font-size: 12px; }
      .line-price { stroke: #404060; stroke-width: 1; stroke-dasharray: 4 4; }
      .line-sl { stroke: #ff3366; stroke-width: 2; stroke-dasharray: 6 6; }
      .bullish { stroke: #00ffaa; stroke-width: 3; fill: none; stroke-linejoin: round; }
      .bearish { stroke: #ff3366; stroke-width: 3; fill: none; stroke-linejoin: round; }
      .struct-line { stroke: #a0a0b0; stroke-width: 1; stroke-dasharray: 3 3; }
      .box { fill: #2a2a4e; stroke: #404060; stroke-width: 1; rx: 5; }
      .box-alert { fill: #4e2a30; stroke: #ff3366; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg" />
  
  <!-- Title -->
  <text x="400" y="40" class="text-title" text-anchor="middle">Hold vs Exit (Manual Intervention)</text>
  <text x="400" y="65" class="text-sub" text-anchor="middle">Merespons Bukti Baru di Market</text>

  <!-- Split View -->

  <!-- LEFT: Hold Scenario (Structure intact) -->
  <rect x="30" y="100" width="350" height="300" class="box" />
  <text x="205" y="130" class="text-label" text-anchor="middle">Scenario A: HOLD (Keep Calm)</text>
  
  <!-- Levels -->
  <line x1="40" y1="360" x2="370" y2="360" class="line-sl" />
  <text x="50" y="355" class="text-alert">Stop Loss (SL)</text>
  <line x1="40" y1="300" x2="370" y2="300" class="line-price" />
  <text x="50" y="295" class="text-info">Entry Buy</text>

  <!-- Price path holding structure -->
  <path d="M 80 320 L 120 300 L 200 180 L 260 240" class="bullish" />
  <!-- Current price location -->
  <circle cx="260" cy="240" r="5" fill="#ff3366" />
  
  <!-- Structural support line (Higher Low) -->
  <line x1="100" y1="240" x2="350" y2="240" class="struct-line" />
  <text x="110" y="235" fill="#a0a0b0" font-family="sans-serif" font-size="10">Higher Low Defense</text>

  <rect x="80" y="140" width="250" height="40" class="box" fill="#1a1a2e" stroke="#00ffaa" />
  <text x="205" y="155" class="text-info" font-weight="bold" text-anchor="middle">Normal Pullback</text>
  <text x="205" y="170" fill="#ffffff" font-size="10" text-anchor="middle">Struktur belum patah. Jangan panik. HOLD.</text>

  <!-- Projected move -->
  <path d="M 260 240 L 320 120" stroke="#00ffaa" stroke-width="2" fill="none" stroke-dasharray="4 4" />


  <!-- RIGHT: Exit Scenario (Structure broken) -->
  <rect x="420" y="100" width="350" height="300" class="box-alert" />
  <text x="595" y="130" class="text-label" text-anchor="middle" fill="#ff3366">Scenario B: EXIT MANUAL (Cut Loss)</text>
  
  <!-- Levels -->
  <line x1="430" y1="360" x2="760" y2="360" class="line-sl" />
  <text x="440" y="355" class="text-alert">Stop Loss (Full 1R Risk)</text>
  <line x1="430" y1="300" x2="760" y2="300" class="line-price" />
  <text x="440" y="295" class="text-info">Entry Buy</text>

  <!-- Price path breaking structure -->
  <path d="M 460 320 L 500 300 L 580 180 L 640 330" class="bearish" />
  <!-- Higher low line -->
  <line x1="480" y1="250" x2="730" y2="250" class="struct-line" />
  <text x="490" y="245" fill="#a0a0b0" font-family="sans-serif" font-size="10">Higher Low (BROKEN!)</text>
  
  <!-- CHoCH Label -->
  <text x="640" y="270" fill="#ff3366" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">CHoCH / Shift</text>

  <!-- Current price location -->
  <circle cx="640" cy="330" r="6" fill="#ff3366" />
  
  <!-- Callout -->
  <rect x="520" y="380" width="230" height="40" class="box" fill="#1a1a2e" stroke="#ff3366" />
  <text x="635" y="395" class="text-alert" font-weight="bold" text-anchor="middle">Manual Exit Here</text>
  <text x="635" y="410" fill="#ffffff" font-size="10" text-anchor="middle">Terima rugi kecil sebelum kena full SL.</text>

  <!-- Bottom Notes -->
  <rect x="30" y="435" width="740" height="50" class="box" />
  <text x="400" y="455" class="text-label" text-anchor="middle">Aturan Emas</text>
  <text x="400" y="475" class="text-sub" text-anchor="middle" font-size="12">Hold selama analisis masih valid. Exit jika pasar membuktikan bahwa opinimu salah.</text>

</svg>
