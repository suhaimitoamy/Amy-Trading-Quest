<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Jurnal Trading</text>
    <rect x="120" y="50" width="160" height="120" fill="none" stroke="#00ffaa" stroke-width="2"/>
    <line x1="130" y1="70" x2="270" y2="70" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="" filter="url(#glow)"/>
    <line x1="130" y1="90" x2="270" y2="90" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="" filter="url(#glow)"/>
    <line x1="130" y1="110" x2="270" y2="110" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="" filter="url(#glow)"/>
    <text x="200" y="150" fill="#00ffaa" font-family="monospace" font-size="14" text-anchor="middle">Cermin dirimu</text>
  
</svg>