<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Central Hub -->
  <circle cx="400" cy="200" r="70" fill="#00ffaa" fill-opacity="0.2" stroke="#00ffaa" stroke-width="4"/>
  <text x="400" y="195" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">GOD LEVEL</text>
  <text x="400" y="215" fill="#00ffaa" font-family="Arial" font-size="14" text-anchor="middle">CANDIDATE</text>

  <!-- Node 1: Top-Down -->
  <circle cx="200" cy="100" r="50" fill="#34495e" stroke="#3498db" stroke-width="2"/>
  <text x="200" y="95" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Top-Down</text>
  <text x="200" y="115" fill="#bdc3c7" font-family="Arial" font-size="10" text-anchor="middle">Analysis</text>
  <line x1="240" y1="130" x2="340" y2="170" stroke="#3498db" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Node 2: Precision Entry -->
  <circle cx="600" cy="100" r="50" fill="#34495e" stroke="#f1c40f" stroke-width="2"/>
  <text x="600" y="95" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Precision</text>
  <text x="600" y="115" fill="#bdc3c7" font-family="Arial" font-size="10" text-anchor="middle">Entry</text>
  <line x1="560" y1="130" x2="460" y2="170" stroke="#f1c40f" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Node 3: Risk Mastery -->
  <circle cx="200" cy="300" r="50" fill="#34495e" stroke="#e74c3c" stroke-width="2"/>
  <text x="200" y="295" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Risk</text>
  <text x="200" y="315" fill="#bdc3c7" font-family="Arial" font-size="10" text-anchor="middle">Mastery</text>
  <line x1="240" y1="270" x2="340" y2="230" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Node 4: Discipline -->
  <circle cx="600" cy="300" r="50" fill="#34495e" stroke="#9b59b6" stroke-width="2"/>
  <text x="600" y="295" fill="#ffffff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Discipline</text>
  <text x="600" y="315" fill="#bdc3c7" font-family="Arial" font-size="10" text-anchor="middle">&amp; Routine</text>
  <line x1="560" y1="270" x2="460" y2="230" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4,4"/>

  <text x="400" y="370" fill="#ffffff" font-family="Arial" font-size="16" font-style="italic" text-anchor="middle">"Trading bukan tentang prediksi, melainkan probabilitas dan reaksi."</text>
</svg>
