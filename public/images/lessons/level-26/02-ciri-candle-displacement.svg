<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Ciri Candle Displacement</text>
  
  <!-- Left: Displacement Bullish -->
  <g>
    <line x1="250" y1="90" x2="250" y2="330" stroke="#00ffaa" stroke-width="4" />
    <rect x="220" y="110" width="60" height="200" fill="#00ffaa" stroke="#00ffaa" stroke-width="2"/>
    
    <text x="150" y="110" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="end">Sumbu Atas (Wick) Kecil</text>
    <line x1="160" y1="105" x2="245" y2="105" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
    
    <text x="150" y="210" fill="#00ffaa" font-family="Arial, sans-serif" font-size="14" text-anchor="end" font-weight="bold">Body Besar (Ekspansif)</text>
    <line x1="160" y1="205" x2="215" y2="205" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
    
    <text x="150" y="320" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" text-anchor="end">Sumbu Bawah (Wick) Kecil</text>
    <line x1="160" y1="315" x2="245" y2="315" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
    
    <text x="350" y="115" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14" text-anchor="start">Penutupan Kuat (Close dekat High)</text>
  </g>
  
  <line x1="450" y1="80" x2="450" y2="350" stroke="#4a4a6e" stroke-dasharray="5,5" stroke-width="2" />
  
  <!-- Right: NOT Displacement (Doji/Pinbar) -->
  <g>
    <text x="625" y="70" fill="#ff3366" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">BUKAN Displacement</text>
    <line x1="625" y1="100" x2="625" y2="320" stroke="#ff3366" stroke-width="4" />
    <rect x="605" y="180" width="40" height="40" fill="#ff3366" stroke="#ff3366" stroke-width="2"/>
    <text x="625" y="350" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Wick sangat panjang, Body kecil</text>
  </g>
</svg>
