<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Displacement Sebagai Konfirmasi Entry</text>
  
  <!-- HTF POI Box -->
  <rect x="200" y="280" width="500" height="80" fill="#00ffaa" fill-opacity="0.15" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5" />
  <text x="210" y="305" fill="#00ffaa" font-family="Arial, sans-serif" font-size="16">HTF Point of Interest (Support / OB)</text>
  
  <!-- Price coming down -->
  <path d="M 150 100 L 220 160 L 260 130 L 320 220 L 350 180 L 400 320" fill="none" stroke="#a0a0b0" stroke-width="3" />
  
  <!-- Displacement Up -->
  <path d="M 400 320 L 440 120" fill="none" stroke="#00ffaa" stroke-width="5" />
  <text x="450" y="160" fill="#00ffaa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Displacement Bullish (Konfirmasi)</text>
  
  <!-- MSS Line -->
  <line x1="330" y1="180" x2="500" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3" />
  <text x="510" y="185" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">CHoCH / MSS</text>
  
  <!-- Pullback to FVG -->
  <rect x="420" y="200" width="150" height="40" fill="#ffffff" fill-opacity="0.2" />
  <text x="580" y="225" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">FVG Baru (Area Entry)</text>
  
  <path d="M 440 120 L 470 220" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4" />
  <circle cx="470" cy="220" r="5" fill="#00ffaa" />
  <text x="460" y="245" fill="#00ffaa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ENTRY</text>
  
  <path d="M 470 220 L 520 80" fill="none" stroke="#00ffaa" stroke-width="3" />
</svg>
