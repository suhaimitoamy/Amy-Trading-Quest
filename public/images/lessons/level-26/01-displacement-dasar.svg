<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Normal vs Displacement</text>
  
  <!-- Normal Price Action -->
  <text x="200" y="90" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Pergerakan Normal / Lambat</text>
  <!-- Candles: overlapping, small bodies, wicks -->
  <g stroke="#ffffff" stroke-width="2">
    <!-- Candle 1 -->
    <line x1="120" y1="180" x2="120" y2="280" />
    <rect x="110" y="210" width="20" height="40" fill="#00ffaa" stroke="#00ffaa"/>
    <!-- Candle 2 -->
    <line x1="160" y1="160" x2="160" y2="250" />
    <rect x="150" y="190" width="20" height="30" fill="#ff3366" stroke="#ff3366"/>
    <!-- Candle 3 -->
    <line x1="200" y1="170" x2="200" y2="260" />
    <rect x="190" y="195" width="20" height="35" fill="#00ffaa" stroke="#00ffaa"/>
    <!-- Candle 4 -->
    <line x1="240" y1="140" x2="240" y2="240" />
    <rect x="230" y="170" width="20" height="40" fill="#ff3366" stroke="#ff3366"/>
    <!-- Candle 5 -->
    <line x1="280" y1="130" x2="280" y2="220" />
    <rect x="270" y="150" width="20" height="45" fill="#00ffaa" stroke="#00ffaa"/>
  </g>
  
  <line x1="400" y1="100" x2="400" y2="350" stroke="#4a4a6e" stroke-dasharray="5,5" stroke-width="2" />
  
  <!-- Displacement -->
  <text x="600" y="90" fill="#00ffaa" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Displacement (Momentum Kuat)</text>
  <g stroke="#ffffff" stroke-width="2">
    <!-- Base candle -->
    <line x1="520" y1="280" x2="520" y2="320" />
    <rect x="510" y="290" width="20" height="20" fill="#ff3366" stroke="#ff3366"/>
    
    <!-- Displacement Candle 1 -->
    <line x1="570" y1="185" x2="570" y2="300" />
    <rect x="560" y="190" width="20" height="100" fill="#00ffaa" stroke="#00ffaa"/>
    
    <!-- Displacement Candle 2 -->
    <line x1="620" y1="105" x2="620" y2="195" />
    <rect x="610" y="110" width="20" height="80" fill="#00ffaa" stroke="#00ffaa"/>
    
    <!-- Displacement Candle 3 -->
    <line x1="670" y1="50" x2="670" y2="115" />
    <rect x="660" y="55" width="20" height="55" fill="#00ffaa" stroke="#00ffaa"/>
  </g>
  <text x="600" y="360" fill="#a0a0b0" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Body besar, minim wick (sumbu), arah tegas</text>
</svg>
