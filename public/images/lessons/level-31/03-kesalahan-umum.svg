<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">KESALAHAN UMUM SETELAH FOMO</text>
  
  <!-- Downward trend -->
  <rect x="100" y="100" width="20" height="50" fill="#ff3366" />
  <line x1="110" y1="80" x2="110" y2="170" stroke="#ff3366" stroke-width="2" />
  
  <rect x="150" y="160" width="20" height="80" fill="#ff3366" />
  <line x1="160" y1="140" x2="160" y2="260" stroke="#ff3366" stroke-width="2" />
  
  <rect x="200" y="240" width="20" height="60" fill="#ff3366" />
  <line x1="210" y1="220" x2="210" y2="320" stroke="#ff3366" stroke-width="2" />
  
  <!-- FOMO Sell Here -->
  <circle cx="210" cy="320" r="6" fill="#00ffaa" />
  <text x="210" y="340" fill="#00ffaa" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">1. FOMO SELL DI LEMBAH</text>
  
  <!-- Reversal Up -->
  <rect x="250" y="230" width="20" height="80" fill="#00ffaa" />
  <line x1="260" y1="210" x2="260" y2="330" stroke="#00ffaa" stroke-width="2" />
  
  <!-- Averaging Loser -->
  <circle cx="260" cy="220" r="6" fill="#ffaa00" />
  <line x1="260" y1="220" x2="400" y2="200" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4,4" />
  <text x="410" y="200" fill="#ffaa00" font-family="Arial" font-size="12" font-weight="bold">2. AVERAGING LOSER (Nambah Sell Lagi)</text>
  
  <rect x="300" y="150" width="20" height="80" fill="#00ffaa" />
  <line x1="310" y1="130" x2="310" y2="250" stroke="#00ffaa" stroke-width="2" />
  
  <!-- Moving SL -->
  <line x1="150" y1="120" x2="350" y2="120" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="360" y="125" fill="#ffffff" font-family="Arial" font-size="12">SL Awal</text>
  
  <path d="M 330 120 L 330 80" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <line x1="150" y1="80" x2="350" y2="80" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" />
  <text x="360" y="85" fill="#ff3366" font-family="Arial" font-size="12">3. MENGGESER SL MAKIN JAUH</text>

  <!-- Big Reversal -->
  <rect x="350" y="60" width="20" height="90" fill="#00ffaa" />
  <line x1="360" y1="40" x2="360" y2="170" stroke="#00ffaa" stroke-width="2" />
  
  <text x="500" y="60" fill="#ff3366" font-family="Arial" font-size="20" font-weight="bold">4. AKUN TERKENA MARGIN CALL</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
