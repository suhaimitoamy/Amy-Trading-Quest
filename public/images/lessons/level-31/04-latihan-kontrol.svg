<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">SOP LATIHAN KONTROL FOMO</text>
  
  <!-- Flowchart nodes -->
  <rect x="300" y="80" width="200" height="40" rx="10" fill="#ffaa00" />
  <text x="400" y="105" fill="#1a1a2e" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Melihat Candle Hijau Masif</text>
  
  <line x1="400" y1="120" x2="400" y2="160" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  
  <rect x="250" y="160" width="300" height="40" rx="5" fill="#33334d" stroke="#00ffaa" stroke-width="2" />
  <text x="400" y="185" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Tunggu 5 Menit (5-Minute Rule)</text>
  
  <line x1="400" y1="200" x2="400" y2="240" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  
  <polygon points="400,240 500,280 400,320 300,280" fill="#33334d" stroke="#ff3366" stroke-width="2" />
  <text x="400" y="285" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Di Area POI?</text>
  
  <line x1="300" y1="280" x2="200" y2="280" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  <text x="250" y="270" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">TIDAK</text>
  <rect x="50" y="260" width="150" height="40" rx="5" fill="#ff3366" />
  <text x="125" y="285" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">JANGAN ENTRY!</text>
  
  <line x1="500" y1="280" x2="600" y2="280" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
  <text x="550" y="270" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">YA</text>
  <rect x="600" y="260" width="150" height="40" rx="5" fill="#00ffaa" />
  <text x="675" y="285" fill="#1a1a2e" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Cari Konfirmasi</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
