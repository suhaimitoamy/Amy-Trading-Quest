  <line x1="400" y1="80" x2="400" y2="350" stroke="#444466" stroke-width="2" />
  
  <!-- Left Side: Chart (Eksternal) -->
  <text x="200" y="80" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">GEJALA EKSTERNAL (DI CHART)</text>
  
  <rect x="80" y="250" width="20" height="40" fill="#00ffaa" />
  <line x1="90" y1="230" x2="90" y2="300" stroke="#00ffaa" stroke-width="2" />
  
