  <circle cx="480" cy="250" r="5" fill="#ffaa00" />
  <text x="500" y="255" fill="#ffffff" font-family="Arial" font-size="14">Mengabaikan aturan / sistem</text>

  <circle cx="480" cy="290" r="5" fill="#ffaa00" />
