  <line x1="170" y1="80" x2="170" y2="190" stroke="#00ffaa" stroke-width="2" />
  
  <rect x="250" y="130" width="120" height="60" rx="5" fill="#33334d" stroke="#ffffff" stroke-width="1"/>
  <text x="310" y="155" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">- Candle momentum masif</text>
  <text x="310" y="175" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">- Rilis berita volatil</text>
  
