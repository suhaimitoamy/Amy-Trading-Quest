<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Mengenali Gejala Kehilangan Kendali</text>

  <!-- Physical Symptoms -->
  <rect x="50" y="80" width="320" height="280" fill="#2a2a4a" rx="8"/>
  <text x="210" y="120" fill="#ffaa00" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Gejala pada Diri Sendiri</text>
  <path d="M 100 180 Q 120 130 150 180 T 200 180 T 250 180 T 300 180" stroke="#ff3366" stroke-width="3" fill="none"/>
  <text x="210" y="220" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Jantung Berdebar (Heart Rate Naik)</text>
  <text x="210" y="250" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Keringat Dingin &amp; Gelisah</text>
  <text x="210" y="280" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Menyalahkan Market</text>

  <!-- Chart Symptoms -->
  <rect x="430" y="80" width="320" height="280" fill="#2a2a4a" rx="8"/>
  <text x="590" y="120" fill="#ffaa00" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Gejala di Chart (Revenge Trading)</text>
  
  <!-- Erratic Candles / Entries -->
  <rect x="470" y="180" width="10" height="50" fill="#ff3366"/>
  <rect x="510" y="150" width="10" height="60" fill="#00ffaa"/>
  <rect x="550" y="190" width="10" height="70" fill="#ff3366"/>
  <rect x="590" y="140" width="10" height="40" fill="#00ffaa"/>
  
  <!-- Multiple entry lines -->
  <path d="M 450 160 L 680 160" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="690" y="165" fill="#ffaa00" font-family="Arial" font-size="12">Buy 1</text>
  
  <path d="M 450 180 L 680 180" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="690" y="185" fill="#ffaa00" font-family="Arial" font-size="12">Buy 2</text>
  
  <path d="M 450 200 L 680 200" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="690" y="205" fill="#ffaa00" font-family="Arial" font-size="12">Buy 3</text>

  <text x="590" y="280" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Overtrading &amp; Entry Impulsif</text>
</svg>
