<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#1a1a2e"/>
  <text x="400" y="60" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle">Kesalahan: Tidak Menunggu Close</text>

  <!-- Candle saat belum close -->
  <g transform="translate(200, 150)">
    <text x="50" y="-20" fill="#00ffaa" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Waktu: 14:15</text>
    <text x="50" y="0" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Belum Close)</text>
    
    <!-- Body -->
    <rect x="15" y="50" width="70" height="200" fill="#00ffaa" rx="2"/>
    <line x1="50" y1="30" x2="50" y2="280" stroke="#00ffaa" stroke-width="4"/>
    
    <text x="-40" y="270" fill="#ffffff" font-family="sans-serif" font-size="16">Entry Buy di Sini!</text>
    <path d="M 80 260 L 110 260" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <!-- Panah Transisi -->
  <path d="M 370 250 L 430 250" fill="none" stroke="#ffffff" stroke-width="4"/>
  <polygon points="430,240 445,250 430,260" fill="#ffffff"/>

  <!-- Candle saat sudah close -->
  <g transform="translate(500, 150)">
    <text x="50" y="-20" fill="#ff3366" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Waktu: 14:30</text>
    <text x="50" y="0" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Candle Close)</text>
    
    <!-- Wick panjang -->
    <line x1="50" y1="30" x2="50" y2="280" stroke="#ff3366" stroke-width="4"/>
    
    <!-- Body -->
    <rect x="15" y="250" width="70" height="30" fill="#ff3366" rx="2"/>
    
    <text x="140" y="270" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold">Rugi Besar!</text>
    <path d="M 90 260 L 130 260" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <rect x="100" y="470" width="600" height="80" fill="#111122" rx="10" stroke="#ff3366" stroke-width="3"/>
  <text x="400" y="505" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Pelajaran Penting:</text>
  <text x="400" y="530" fill="#ff3366" font-family="sans-serif" font-size="16" text-anchor="middle">Jangan pernah mengambil keputusan jika candle belum CLOSE.</text>
</svg>
