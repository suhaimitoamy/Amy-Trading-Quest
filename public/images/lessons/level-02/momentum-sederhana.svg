<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#1a1a2e"/>
  <text x="400" y="60" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle">Membaca Momentum Candlestick</text>

  <!-- Akselerasi (Bertambah) -->
  <g transform="translate(150, 200)">
    <text x="75" y="-30" fill="#00ffaa" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Akselerasi</text>
    <text x="75" y="-10" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Momentum Menguat)</text>
    
    <!-- Candle 1 -->
    <line x1="15" y1="90" x2="15" y2="130" stroke="#00ffaa" stroke-width="3"/>
    <rect x="0" y="100" width="30" height="20" fill="#00ffaa" rx="2"/>
    
    <!-- Candle 2 -->
    <line x1="65" y1="35" x2="65" y2="120" stroke="#00ffaa" stroke-width="3"/>
    <rect x="50" y="50" width="30" height="60" fill="#00ffaa" rx="2"/>

    <!-- Candle 3 -->
    <line x1="115" y1="-50" x2="115" y2="80" stroke="#00ffaa" stroke-width="3"/>
    <rect x="100" y="-40" width="30" height="100" fill="#00ffaa" rx="2"/>
    
    <!-- Arrow -->
    <path d="M 0 160 Q 75 160 130 110" fill="none" stroke="#00ffaa" stroke-width="4" stroke-dasharray="5,5"/>
    <polygon points="135,105 125,115 130,115" fill="#00ffaa"/>
    
    <text x="75" y="210" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Body Semakin Membesar = Tren Kuat</text>
  </g>

  <!-- Deselerasi (Melemah) -->
  <g transform="translate(500, 200)">
    <text x="75" y="-30" fill="#ff3366" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Deselerasi</text>
    <text x="75" y="-10" fill="#a0a0b0" font-family="sans-serif" font-size="14" text-anchor="middle">(Momentum Melemah)</text>
    
    <!-- Candle 1 -->
    <line x1="15" y1="-50" x2="15" y2="80" stroke="#ff3366" stroke-width="3"/>
    <rect x="0" y="-40" width="30" height="100" fill="#ff3366" rx="2"/>
    
    <!-- Candle 2 -->
    <line x1="65" y1="60" x2="65" y2="130" stroke="#ff3366" stroke-width="3"/>
    <rect x="50" y="70" width="30" height="50" fill="#ff3366" rx="2"/>

    <!-- Candle 3 -->
    <line x1="115" y1="120" x2="115" y2="160" stroke="#ff3366" stroke-width="3"/>
    <rect x="100" y="130" width="30" height="10" fill="#ff3366" rx="2"/>
    
    <!-- Arrow -->
    <path d="M 0 120 Q 60 190 130 190" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="5,5"/>
    <polygon points="135,190 125,185 125,195" fill="#ff3366"/>
    
    <text x="75" y="240" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Body Semakin Mengecil = Tren Melemah</text>
  </g>

</svg>
