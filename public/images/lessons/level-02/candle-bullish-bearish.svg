<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <text x="400" y="60" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle">Anatomi Candlestick Dasar</text>
  
  <!-- Bullish Candle -->
  <g transform="translate(200, 150)">
    <!-- Wick -->
    <line x1="50" y1="20" x2="50" y2="280" stroke="#00ffaa" stroke-width="6"/>
    <!-- Body -->
    <rect x="20" y="80" width="60" height="150" fill="#00ffaa" rx="5"/>
    
    <!-- Labels -->
    <text x="-60" y="30" fill="#ffffff" font-family="sans-serif" font-size="18">High</text>
    <line x1="-15" y1="25" x2="45" y2="25" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="-60" y="90" fill="#ffffff" font-family="sans-serif" font-size="18">Close</text>
    <line x1="-10" y1="85" x2="15" y2="85" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="-60" y="230" fill="#ffffff" font-family="sans-serif" font-size="18">Open</text>
    <line x1="-10" y1="225" x2="15" y2="225" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="-60" y="280" fill="#ffffff" font-family="sans-serif" font-size="18">Low</text>
    <line x1="-15" y1="275" x2="45" y2="275" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>

    <text x="50" y="350" fill="#00ffaa" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Bullish Candle</text>
    <text x="50" y="380" fill="#a0a0b0" font-family="sans-serif" font-size="16" text-anchor="middle">(Buyer Menang)</text>
  </g>

  <!-- Bearish Candle -->
  <g transform="translate(500, 150)">
    <!-- Wick -->
    <line x1="50" y1="20" x2="50" y2="280" stroke="#ff3366" stroke-width="6"/>
    <!-- Body -->
    <rect x="20" y="80" width="60" height="150" fill="#ff3366" rx="5"/>
    
    <!-- Labels -->
    <text x="100" y="30" fill="#ffffff" font-family="sans-serif" font-size="18">High</text>
    <line x1="55" y1="25" x2="90" y2="25" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="100" y="90" fill="#ffffff" font-family="sans-serif" font-size="18">Open</text>
    <line x1="85" y1="85" x2="95" y2="85" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="100" y="230" fill="#ffffff" font-family="sans-serif" font-size="18">Close</text>
    <line x1="85" y1="225" x2="95" y2="225" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="100" y="280" fill="#ffffff" font-family="sans-serif" font-size="18">Low</text>
    <line x1="55" y1="275" x2="90" y2="275" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>

    <text x="50" y="350" fill="#ff3366" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Bearish Candle</text>
    <text x="50" y="380" fill="#a0a0b0" font-family="sans-serif" font-size="16" text-anchor="middle">(Seller Menang)</text>
  </g>
</svg>
