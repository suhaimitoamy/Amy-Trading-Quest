<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">KESALAHAN UMUM: FOMO &amp; FORCING TRADES</text>

  <!-- Giant bullish candle (news) -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#00ffaa" stroke-width="4" />
  <rect x="180" y="80" width="40" height="250" fill="#00ffaa" />

  <!-- Buy button clicked at the top -->
  <circle cx="200" cy="50" r="10" fill="#ff3366" />
  <path d="M 220 30 L 260 20" stroke="#ffffff" stroke-width="2" />
  <rect x="270" y="0" width="120" height="40" rx="5" fill="#ff3366" />
  <text x="330" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">BUY HERE!</text>
  
  <text x="330" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">(FOMO / Takut Ketinggalan)</text>

  <!-- Immediate pullback -->
  <path d="M 200 50 Q 250 150 350 150" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="350,150 340,145 340,155" fill="#ff3366" />
  
  <!-- Text explaining -->
  <rect x="450" y="100" width="300" height="150" fill="#2a2a4e" rx="10" stroke="#a0a0b0" stroke-width="2" />
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="16" fill="#ff3366" text-anchor="middle" font-weight="bold">KESALAHAN FATAL:</text>
  <text x="470" y="160" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">1. Mengejar harga yang sudah lari</text>
  <text x="470" y="190" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">2. Bertrading di tengah rilis berita</text>
  <text x="470" y="220" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">3. Menurunkan standar setup</text>

</svg>
