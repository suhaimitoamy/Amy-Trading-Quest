<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">CASH IS A POSITION</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">Menghindari pasar yang buruk adalah sebuah keuntungan</text>

  <!-- Choppy Candles -->
  <g stroke-width="2">
    <line x1="200" y1="180" x2="200" y2="280" stroke="#00ffaa" />
    <rect x="190" y="210" width="20" height="40" fill="#00ffaa" />
    <line x1="250" y1="150" x2="250" y2="250" stroke="#ff3366" />
    <rect x="240" y="170" width="20" height="60" fill="#ff3366" />
    <line x1="300" y1="200" x2="300" y2="300" stroke="#00ffaa" />
    <rect x="290" y="230" width="20" height="30" fill="#00ffaa" />
    <line x1="350" y1="160" x2="350" y2="280" stroke="#ff3366" />
    <rect x="340" y="190" width="20" height="50" fill="#ff3366" />
    <line x1="400" y1="140" x2="400" y2="260" stroke="#00ffaa" />
    <rect x="390" y="180" width="20" height="40" fill="#00ffaa" />
    <line x1="450" y1="170" x2="450" y2="300" stroke="#ff3366" />
    <rect x="440" y="200" width="20" height="60" fill="#ff3366" />
    <line x1="500" y1="150" x2="500" y2="280" stroke="#00ffaa" />
    <rect x="490" y="220" width="20" height="40" fill="#00ffaa" />
    <line x1="550" y1="130" x2="550" y2="270" stroke="#ff3366" />
    <rect x="540" y="160" width="20" height="70" fill="#ff3366" />
    <line x1="600" y1="160" x2="600" y2="290" stroke="#00ffaa" />
    <rect x="590" y="210" width="20" height="30" fill="#00ffaa" />
  </g>

  <!-- Big X -->
  <line x1="150" y1="120" x2="650" y2="320" stroke="#ff3366" stroke-width="8" opacity="0.7" />
  <line x1="150" y1="320" x2="650" y2="120" stroke="#ff3366" stroke-width="8" opacity="0.7" />

  <!-- Shield/Safe -->
  <rect x="330" y="340" width="140" height="40" rx="10" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2" />
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" text-anchor="middle" font-weight="bold">0% RISK</text>

</svg>
