<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Hedging Kehidupan Nyata</text>
  
  <!-- Central Shield -->
  <g transform="translate(400, 250)">
    <!-- Base Shield -->
    <path d="M 0,-120 L 90,-90 L 90,30 C 90,90 40,140 0,160 C -40,140 -90,90 -90,30 L -90,-90 Z" fill="#2a2a4e" stroke="#00ffaa" stroke-width="5"/>
    <!-- Inner Cross -->
    <rect x="-20" y="-30" width="40" height="100" fill="#00ffaa"/>
    <rect x="-50" y="0" width="100" height="40" fill="#00ffaa"/>
    
    <text x="0" y="190" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Pertahanan Finansial</text>
  </g>
  
  <!-- Threats (Red Arrows pointing to Shield) -->
  <g transform="translate(400, 250)">
    <!-- Threat 1: Medical Bills -->
    <g transform="translate(-250, -80)">
      <path d="M 0,0 L 100,30" stroke="#ff3366" stroke-width="4" marker-end="url(#arrowhead-red)"/>
      <rect x="-80" y="-20" width="100" height="40" rx="5" fill="#ff3366"/>
      <text x="-30" y="5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Sakit Keras</text>
    </g>

    <!-- Threat 2: Job Loss / Bad Trading Month -->
    <g transform="translate(-250, 60)">
      <path d="M 0,0 L 100,-20" stroke="#ff3366" stroke-width="4" marker-end="url(#arrowhead-red)"/>
      <rect x="-90" y="-20" width="110" height="40" rx="5" fill="#ff3366"/>
      <text x="-35" y="5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Trading MC</text>
    </g>

    <!-- Threat 3: Inflation -->
    <g transform="translate(250, -80)">
      <path d="M 0,0 L -100,30" stroke="#ff3366" stroke-width="4" marker-end="url(#arrowhead-red)"/>
      <rect x="-20" y="-20" width="100" height="40" rx="5" fill="#ff3366"/>
      <text x="30" y="5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Inflasi</text>
    </g>

    <!-- Threat 4: Accidents -->
    <g transform="translate(250, 60)">
      <path d="M 0,0 L -100,-20" stroke="#ff3366" stroke-width="4" marker-end="url(#arrowhead-red)"/>
      <rect x="-20" y="-20" width="100" height="40" rx="5" fill="#ff3366"/>
      <text x="30" y="5" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Kecelakaan</text>
    </g>
  </g>
  
  <!-- Shields Explanations -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="220" height="70" rx="8" fill="#3a3a5e" stroke="#00ffaa" stroke-width="2"/>
    <text x="110" y="25" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Asuransi Kesehatan</text>
    <text x="110" y="45" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Hedge untuk biaya RS</text>
  </g>

  <g transform="translate(290, 410)">
    <rect x="0" y="0" width="220" height="70" rx="8" fill="#3a3a5e" stroke="#4a90e2" stroke-width="2"/>
    <text x="110" y="25" fill="#4a90e2" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Dana Darurat (6-12 Bln)</text>
    <text x="110" y="45" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Hedge untuk hilangnya income</text>
  </g>

  <g transform="translate(530, 410)">
    <rect x="0" y="0" width="220" height="70" rx="8" fill="#3a3a5e" stroke="#f39c12" stroke-width="2"/>
    <text x="110" y="25" fill="#f39c12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Aset Fisik / Emas</text>
    <text x="110" y="45" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Hedge terhadap Inflasi</text>
  </g>

  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff3366" />
    </marker>
  </defs>
</svg>
