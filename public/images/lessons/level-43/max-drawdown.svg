<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Maximum Drawdown</text>
  
  <!-- Grid -->
  <line x1="50" y1="350" x2="750" y2="350" stroke="#444" stroke-width="2" />
  <line x1="50" y1="50" x2="50" y2="350" stroke="#444" stroke-width="2" />
  
  <!-- Equity curve -->
  <path d="M 50 250 L 150 150 L 250 180 L 350 100 L 450 320 L 550 200 L 650 80 L 750 150" fill="none" stroke="#00ffaa" stroke-width="4" />
  
  <line x1="350" y1="100" x2="450" y2="100" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="450" y1="100" x2="450" y2="320" stroke="#ff3366" stroke-width="4" />
  
  <text x="350" y="80" fill="#ffffff" font-size="16" text-anchor="middle">Peak Tertinggi</text>
  <text x="450" y="340" fill="#ffffff" font-size="16" text-anchor="middle">Lembah Terdalam</text>
  
  <rect x="470" y="180" width="160" height="60" fill="#ff3366" rx="5" />
  <text x="550" y="205" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">Max Drawdown</text>
  <text x="550" y="225" fill="#ffffff" font-size="14" text-anchor="middle">-22% Drop</text>
  
</svg>