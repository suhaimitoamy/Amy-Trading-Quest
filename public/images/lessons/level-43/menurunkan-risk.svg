<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e;font-family:sans-serif;">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Strategi Menurunkan Risiko (Halving Risk)</text>
  
  <!-- Axis -->
  <line x1="50" y1="350" x2="750" y2="350" stroke="#444" stroke-width="2" />
  
  <!-- Without Risk Management -->
  <path d="M 100 100 L 150 150 L 200 200 L 250 250 L 300 300 L 350 350 L 400 400" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" />
  <text x="250" y="330" fill="#ff3366" font-size="14" font-style="italic">Revenge/Flat Risk (Akun Hancur)</text>
  
  <!-- With Risk Management -->
  <path d="M 100 100 L 150 150 L 200 200 L 280 230 L 380 250 L 500 260 L 650 265" fill="none" stroke="#00ffaa" stroke-width="4" />
  
  <circle cx="200" cy="200" r="6" fill="#ffffff" />
  <text x="210" y="180" fill="#ffffff" font-size="14">Drawdown -5%</text>
  <text x="210" y="200" fill="#00ffaa" font-size="14">Potong risiko jadi 0.5%</text>
  
  <circle cx="380" cy="250" r="6" fill="#ffffff" />
  <text x="390" y="230" fill="#ffffff" font-size="14">Drawdown -8%</text>
  <text x="390" y="250" fill="#00ffaa" font-size="14">Potong risiko jadi 0.25%</text>
  
  <text x="500" y="300" fill="#00ffaa" font-size="16" font-weight="bold">Bertahan hidup (Survival Mode)</text>
</svg>