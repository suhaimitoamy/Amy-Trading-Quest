<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-premium { fill: #ff3366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-discount { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .text-eq { fill: #aaaaaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .line { stroke: #33334d; stroke-width: 2; }
      .fib-line { stroke: #aaaaaa; stroke-width: 2; stroke-dasharray: 5,5; }
      .premium-box { fill: #ff3366; fill-opacity: 0.15; stroke: #ff3366; stroke-width: 1; }
      .discount-box { fill: #00ffaa; fill-opacity: 0.15; stroke: #00ffaa; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="800" height="500" rx="10" />
  
  <text x="400" y="40" class="text-light" font-size="24" text-anchor="middle" font-weight="bold">Konsep Premium &amp; Discount</text>

  <!-- Premium Area -->
  <rect x="250" y="80" width="300" height="150" class="premium-box" />
  <!-- Discount Area -->
  <rect x="250" y="230" width="300" height="150" class="discount-box" />

  <!-- Fib Levels -->
  <line x1="230" y1="80" x2="570" y2="80" class="fib-line" stroke="#ff3366" />
  <text x="210" y="85" class="text-premium" font-size="16" text-anchor="end">1.000 (100%)</text>
  <text x="590" y="85" class="text-light" font-size="16">High</text>

  <line x1="230" y1="230" x2="570" y2="230" class="fib-line" stroke="#aaaaaa" />
  <text x="210" y="235" class="text-eq" font-size="16" text-anchor="end">0.500 (50%)</text>
  <text x="590" y="235" class="text-light" font-size="16">Equilibrium</text>

  <line x1="230" y1="380" x2="570" y2="380" class="fib-line" stroke="#00ffaa" />
  <text x="210" y="385" class="text-discount" font-size="16" text-anchor="end">0.000 (0%)</text>
  <text x="590" y="385" class="text-light" font-size="16">Low</text>

  <!-- Labels -->
  <text x="400" y="160" class="text-premium" font-size="28" text-anchor="middle">PREMIUM AREA</text>
  <text x="400" y="190" class="text-light" font-size="14" text-anchor="middle">Harga Mahal = Waktunya SELL</text>

  <text x="400" y="310" class="text-discount" font-size="28" text-anchor="middle">DISCOUNT AREA</text>
  <text x="400" y="340" class="text-light" font-size="14" text-anchor="middle">Harga Murah = Waktunya BUY</text>

  <!-- Explanation -->
  <text x="400" y="440" class="text-light" font-size="16" text-anchor="middle">Dalam sebuah range pergerakan (Swing High ke Swing Low),</text>
  <text x="400" y="465" class="text-light" font-size="16" text-anchor="middle">kita membaginya menjadi dua area utama untuk mencari probabilitas terbaik.</text>

</svg>
