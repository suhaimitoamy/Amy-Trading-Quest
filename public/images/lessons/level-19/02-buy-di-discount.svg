<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .text-light { fill: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .text-discount { fill: #00ffaa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; }
      .line { stroke: #33334d; stroke-width: 2; }
      .fib-line { stroke: #aaaaaa; stroke-width: 2; stroke-dasharray: 5,5; }
      .price-line { stroke: #e0e0e0; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .discount-box { fill: #00ffaa; fill-opacity: 0.15; stroke: #00ffaa; stroke-width: 1; }
      .poi-box { fill: #00ffaa; fill-opacity: 0.4; stroke: none; }
      .arrow { fill: #00ffaa; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect class="bg" width="800" height="500" rx="10" />
  
  <text x="400" y="40" class="text-light" font-size="24" text-anchor="middle" font-weight="bold">Buy di Area Discount</text>

  <!-- Premium Area -->
  <!-- Discount Area -->
  <rect x="200" y="250" width="400" height="150" class="discount-box" />

  <!-- Fib Levels -->
  <line x1="180" y1="100" x2="620" y2="100" class="fib-line" stroke="#ff3366" />
  <text x="170" y="105" fill="#ff3366" font-size="14" text-anchor="end" font-family="sans-serif">100%</text>

  <line x1="180" y1="250" x2="620" y2="250" class="fib-line" stroke="#aaaaaa" />
  <text x="170" y="255" fill="#aaaaaa" font-size="14" text-anchor="end" font-family="sans-serif">50%</text>
  <text x="630" y="255" fill="#aaaaaa" font-size="14" font-family="sans-serif">Equilibrium</text>

  <line x1="180" y1="400" x2="620" y2="400" class="fib-line" stroke="#00ffaa" />
  <text x="170" y="405" class="text-discount" font-size="14" text-anchor="end">0%</text>

  <!-- POI Box -->
  <rect x="350" y="320" width="100" height="40" class="poi-box" />
  <text x="400" y="345" fill="#1a1a2e" font-size="14" text-anchor="middle" font-weight="bold">Order Block</text>

  <!-- Price Movement -->
  <!-- Start low -> impulse high -> retrace to discount -> go up -->
  <path class="price-line" d="M 220 400 L 320 100 L 400 340 L 520 80" marker-end="url(#arrowhead)" />
  
  <circle cx="220" cy="400" r="5" fill="#00ffaa" />
  <text x="220" y="425" class="text-light" font-size="14" text-anchor="middle">Swing Low</text>
  
  <circle cx="320" cy="100" r="5" fill="#ff3366" />
  <text x="320" y="80" class="text-light" font-size="14" text-anchor="middle">Swing High</text>

  <circle cx="400" cy="340" r="6" fill="#00ffaa" />
  <text x="400" y="380" class="text-discount" font-size="14" text-anchor="middle">Entry BUY di Discount</text>

  <!-- Labels -->
  <text x="400" y="450" class="text-light" font-size="16" text-anchor="middle">Saat Uptrend, tarik fibo dari Swing Low ke Swing High.</text>
  <text x="400" y="475" class="text-light" font-size="16" text-anchor="middle">Tunggu harga pullback melewati garis 50% untuk mendapatkan harga diskon.</text>

</svg>
