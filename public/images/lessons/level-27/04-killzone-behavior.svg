<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <!-- Background highlight for killzones -->
    <linearGradient id="kzLondon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="kzNY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Killzone Behavior: High Probability Time Windows</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">Volume dan volatilitas meledak hanya pada jam-jam spesifik (Killzones)</text>

  <!-- Dead Zone (Pre-London) -->
  <text x="120" y="250" fill="#a0a0b0" font-size="16" font-weight="bold" text-anchor="middle" opacity="0.4">DEAD ZONE</text>
  <text x="120" y="270" fill="#a0a0b0" font-size="12" text-anchor="middle" opacity="0.4">(Low Volatility)</text>

  <!-- London Killzone Highlight Box -->
  <rect x="220" y="100" width="150" height="340" fill="url(#kzLondon)" stroke="#ff9900" stroke-width="2" stroke-dasharray="4,4" />
  <text x="295" y="130" fill="#ff9900" font-size="14" font-weight="bold" text-anchor="middle">LONDON KILLZONE</text>
  <text x="295" y="150" fill="#ff9900" font-size="12" text-anchor="middle">02:00 - 05:00 EST</text>
  <text x="295" y="170" fill="#ffffff" font-size="10" text-anchor="middle">Manipulation &amp; Setup</text>

  <!-- NY Killzone Highlight Box -->
  <rect x="480" y="100" width="150" height="340" fill="url(#kzNY)" stroke="#00ccff" stroke-width="2" stroke-dasharray="4,4" />
  <text x="555" y="130" fill="#00ccff" font-size="14" font-weight="bold" text-anchor="middle">NEW YORK KILLZONE</text>
  <text x="555" y="150" fill="#00ccff" font-size="12" text-anchor="middle">07:00 - 10:00 EST</text>
  <text x="555" y="170" fill="#ffffff" font-size="10" text-anchor="middle">Continuation / Reversal</text>

  <!-- Price Action -->
  <!-- Slow moving in dead zone -->
  <path d="M50,300 L80,290 L110,305 L140,280 L180,295 L220,285" fill="none" stroke="#a0a0b0" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Violent move in London Killzone -->
  <path d="M220,285 L240,260 L260,200 L280,350 L320,320 L370,400" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Highlight setup inside London KZ -->
  <circle cx="260" cy="200" r="8" fill="none" stroke="#ffffff" stroke-width="2" />
  <line x1="260" y1="192" x2="280" y2="160" stroke="#ffffff" stroke-width="1" />
  <text x="285" y="155" fill="#ffffff" font-size="10">High Volatility Sweep</text>

  <!-- Transition between Killzones -->
  <path d="M370,400 L410,380 L450,410 L480,390" fill="none" stroke="#a0a0b0" stroke-width="2" stroke-linejoin="round" />

  <!-- Violent move/Continuation in NY Killzone -->
  <path d="M480,390 L510,340 L530,350 L560,430 L600,410 L630,450" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />

  <!-- Highlight setup inside NY KZ -->
  <circle cx="510" cy="340" r="8" fill="none" stroke="#ffffff" stroke-width="2" />
  <line x1="510" y1="332" x2="490" y2="300" stroke="#ffffff" stroke-width="1" />
  <text x="485" y="295" fill="#ffffff" font-size="10" text-anchor="end">Retracement Setup</text>

  <!-- Post-Killzone -->
  <path d="M630,450 L680,440 L720,445 L760,430" fill="none" stroke="#a0a0b0" stroke-width="2" stroke-linejoin="round" />
  <text x="700" y="380" fill="#a0a0b0" font-size="16" font-weight="bold" text-anchor="middle" opacity="0.4">DEAD ZONE</text>

  <!-- Timeline at bottom -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#a0a0b0" stroke-width="2" />
  
  <!-- Tick marks and times -->
  <g fill="#a0a0b0" font-size="12" text-anchor="middle">
    <line x1="220" y1="455" x2="220" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="220" y="480">02:00</text>
    
    <line x1="370" y1="455" x2="370" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="370" y="480">05:00</text>
    
    <line x1="480" y1="455" x2="480" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="480" y="480">07:00</text>
    
    <line x1="630" y1="455" x2="630" y2="465" stroke="#a0a0b0" stroke-width="2" />
    <text x="630" y="480">10:00 (EST)</text>
  </g>
</svg>
