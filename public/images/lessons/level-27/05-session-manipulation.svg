<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="asiaBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.0" />
    </linearGradient>
    <!-- Arrow marker for paths -->
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Judas Swing (Session Manipulation)</text>
  <text x="400" y="65" fill="#a0a0b0" font-size="14" text-anchor="middle">"Buy to Sell" - Memancing retail ke arah yang salah sebelum pergerakan asli</text>

  <!-- Asian Range Box -->
  <rect x="50" y="220" width="250" height="100" fill="url(#asiaBox)" stroke="#4a90e2" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="50" y1="220" x2="350" y2="220" stroke="#4a90e2" stroke-width="2" />
  <text x="175" y="210" fill="#4a90e2" font-size="14" font-weight="bold" text-anchor="middle">Asian High (Buy-Side Liquidity)</text>

  <!-- Stop Losses depicted as dollar signs above Asian High -->
  <g fill="#ffd700" font-size="16" font-weight="bold">
    <text x="250" y="195">$</text>
    <text x="280" y="195">$</text>
    <text x="310" y="195">$</text>
  </g>
  <text x="280" y="170" fill="#a0a0b0" font-size="12" text-anchor="middle">Retail Buy Stops &amp; Breakout Traders</text>

  <!-- Order Block / POI higher up -->
  <rect x="300" y="80" width="100" height="40" fill="#ff3366" opacity="0.2" stroke="#ff3366" stroke-width="1" />
  <text x="350" y="105" fill="#ff3366" font-size="14" font-weight="bold" text-anchor="middle">HTF Bearish POI</text>

  <!-- Price Action Paths -->
  <!-- Asian Session chop -->
  <path d="M50,270 L100,240 L150,300 L200,250 L250,290 L300,240" fill="none" stroke="#a0a0b0" stroke-width="3" stroke-linejoin="round" />

  <!-- Judas Swing! -->
  <path d="M300,240 L320,100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-dasharray="6,4" />
  <text x="230" y="130" fill="#00ffaa" font-size="16" font-weight="bold" transform="rotate(-70, 230, 130)">JUDAS SWING (Fakeout)</text>
  
  <!-- Liquidity Grab explosion graphic -->
  <circle cx="320" cy="100" r="15" fill="#ffd700" opacity="0.4" />
  <path d="M320,100 L310,80 M320,100 L330,80 M320,100 L295,95 M320,100 L345,95" stroke="#ffd700" stroke-width="2" />
  <text x="400" y="145" fill="#ffffff" font-size="12" font-weight="bold">"Buy to Sell"</text>
  <text x="440" y="160" fill="#a0a0b0" font-size="12">Institusi menyerap Buy Stop untuk menjual</text>

  <!-- The Real Move -->
  <path d="M320,100 L340,160 L355,140 L400,280 L430,240 L480,380 L520,340 L580,450" fill="none" stroke="#ff3366" stroke-width="5" stroke-linejoin="round" marker-end="url(#arrowRed)" />

  <text x="480" y="220" fill="#ff3366" font-size="18" font-weight="bold" transform="rotate(35, 480, 220)">REAL TREND (Distribution)</text>

  <!-- Timeline Dividers -->
  <line x1="300" y1="420" x2="300" y2="470" stroke="#a0a0b0" stroke-width="2" stroke-dasharray="2,2" />
  <text x="290" y="460" fill="#a0a0b0" font-size="12" font-weight="bold" text-anchor="end">London Open</text>

  <rect x="300" y="440" width="80" height="20" fill="#ff9900" opacity="0.3" />
  <text x="340" y="455" fill="#ff9900" font-size="10" font-weight="bold" text-anchor="middle">Killzone</text>

  <!-- Explanation box at bottom left -->
  <rect x="30" y="380" width="220" height="90" fill="#2a2a40" stroke="#a0a0b0" stroke-width="1" rx="5" />
  <text x="40" y="405" fill="#ffffff" font-size="12" font-weight="bold">Logika Judas Swing:</text>
  <text x="40" y="425" fill="#a0a0b0" font-size="11">1. Pompa harga ke area likuiditas.</text>
  <text x="40" y="440" fill="#a0a0b0" font-size="11">2. Pancing trader Retail (FOMO).</text>
  <text x="40" y="455" fill="#a0a0b0" font-size="11">3. Balik arah &amp; sikat Stop Loss mereka.</text>

</svg>
