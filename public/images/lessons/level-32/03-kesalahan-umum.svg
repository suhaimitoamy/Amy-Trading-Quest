<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <rect width="800" height="400" fill="#1a1a2e"/>
    <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">Siklus Kehancuran: Kesalahan Umum</text>
    
    <!-- Circle nodes -->
    <circle cx="400" cy="100" r="50" fill="#ff3366" opacity="0.2" stroke="#ff3366" stroke-width="3"/>
    <text x="400" y="105" fill="#ff3366" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Kena SL (Rugi)</text>
    
    <circle cx="600" cy="250" r="60" fill="#ffaa00" opacity="0.2" stroke="#ffaa00" stroke-width="3"/>
    <text x="600" y="245" fill="#ffaa00" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Emosi &amp;</text>
    <text x="600" y="265" fill="#ffaa00" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Takut Rugi</text>
    
    <circle cx="400" cy="350" r="50" fill="#00aaff" opacity="0.2" stroke="#00aaff" stroke-width="3"/>
    <text x="400" y="345" fill="#00aaff" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Revenge</text>
    <text x="400" y="365" fill="#00aaff" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Trading</text>
    
    <circle cx="200" cy="250" r="60" fill="#ff0000" opacity="0.2" stroke="#ff0000" stroke-width="3"/>
    <text x="200" y="245" fill="#ff0000" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Lot Besar &amp;</text>
    <text x="200" y="265" fill="#ff0000" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">Rugi Lebih Besar</text>
    
    <!-- Arrows -->
    <path d="M450 115 Q550 150 580 195" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M580 305 Q500 350 450 350" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M350 350 Q250 320 220 305" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M220 195 Q300 120 350 115" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>
</svg>
