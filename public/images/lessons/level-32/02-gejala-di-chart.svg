<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <rect width="800" height="400" fill="#1a1a2e"/>
    <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">Gejala Fear of Loss di Chart</text>
    
    <!-- Price Line -->
    <path d="M100 200 L200 250 L300 220 L400 300 L500 350" fill="none" stroke="#ff3366" stroke-width="4"/>
    
    <!-- Entry -->
    <line x1="250" y1="220" x2="600" y2="220" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="620" y="225" fill="#00ffaa" font-size="16" font-family="Arial">Buy Entry</text>
    
    <!-- Original SL -->
    <line x1="250" y1="260" x2="600" y2="260" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="620" y="265" fill="#ff3366" font-size="16" font-family="Arial">SL Awal</text>
    <path d="M350 260 L350 290" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
    
    <!-- Moved SL 1 -->
    <line x1="350" y1="310" x2="600" y2="310" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
    <text x="620" y="315" fill="#ff3366" font-size="16" font-family="Arial" opacity="0.7">SL Digeser (Harap Harga Naik)</text>
    <path d="M450 310 L450 360" stroke="#ffffff" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
    
    <!-- Moved SL 2 -->
    <line x1="450" y1="370" x2="600" y2="370" stroke="#ff3366" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
    <text x="620" y="375" fill="#ff3366" font-size="16" font-family="Arial" opacity="0.4">SL Dihapus / Makin Jauh</text>
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>
</svg>
