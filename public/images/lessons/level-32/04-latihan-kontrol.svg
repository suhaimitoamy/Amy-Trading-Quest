<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <rect width="800" height="400" fill="#1a1a2e"/>
    <text x="400" y="40" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">Latihan Mengendalikan Fear</text>
    
    <!-- Shield -->
    <path d="M400 80 L500 120 L500 220 Q500 320 400 360 Q300 320 300 220 L300 120 Z" fill="#00ffaa" opacity="0.2" stroke="#00ffaa" stroke-width="4"/>
    <text x="400" y="200" fill="#00ffaa" font-size="20" font-family="Arial" text-anchor="middle" font-weight="bold">Manajemen</text>
    <text x="400" y="230" fill="#00ffaa" font-size="20" font-family="Arial" text-anchor="middle" font-weight="bold">Risiko (1%)</text>
    
    <!-- Attacks -->
    <path d="M150 150 L270 170" fill="none" stroke="#ff3366" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="100" y="145" fill="#ff3366" font-size="16" font-family="Arial">Fear of Loss</text>
    
    <path d="M150 250 L270 230" fill="none" stroke="#ff3366" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="100" y="265" fill="#ff3366" font-size="16" font-family="Arial">Panik / Fomo</text>
    
    <path d="M650 150 L530 170" fill="none" stroke="#ff3366" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="700" y="145" fill="#ff3366" font-size="16" font-family="Arial">Revenge</text>
    
    <path d="M650 250 L530 230" fill="none" stroke="#ff3366" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="700" y="265" fill="#ff3366" font-size="16" font-family="Arial">Overlot</text>
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3366" />
        </marker>
    </defs>
</svg>
