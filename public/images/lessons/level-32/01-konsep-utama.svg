<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <rect width="800" height="400" fill="#1a1a2e"/>
    <text x="400" y="50" fill="#ffffff" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">Konsep Utama: Fear of Loss</text>
    
    <!-- Balance Scale -->
    <path d="M400 100 L400 350" stroke="#4a4a6a" stroke-width="8"/>
    <path d="M350 350 L450 350" stroke="#4a4a6a" stroke-width="8"/>
    <path d="M200 150 L600 150" stroke="#4a4a6a" stroke-width="8"/>
    
    <!-- Left side: Logic -->
    <path d="M200 150 L200 250" stroke="#4a4a6a" stroke-width="4"/>
    <rect x="150" y="250" width="100" height="20" fill="#00ffaa"/>
    <text x="200" y="300" fill="#00ffaa" font-size="20" font-family="Arial" text-anchor="middle">Logika &amp; Trading Plan</text>
    
    <!-- Right side: Fear -->
    <path d="M600 150 L600 280" stroke="#4a4a6a" stroke-width="4"/>
    <rect x="550" y="280" width="100" height="20" fill="#ff3366"/>
    <text x="600" y="330" fill="#ff3366" font-size="20" font-family="Arial" text-anchor="middle">Takut Rugi (Fear)</text>
    <circle cx="600" cy="240" r="30" fill="#ff3366" opacity="0.3"/>
    
    <text x="400" y="200" fill="#ffffff" font-size="16" font-family="Arial" text-anchor="middle">Ketidakseimbangan Psikologi</text>
</svg>
