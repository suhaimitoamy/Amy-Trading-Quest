<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <text x="400" y="50" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Pentingnya Displacement pada Order Block</text>

  <!-- Split Screen Comparison -->
  
  <!-- Left Side: Tanpa Displacement (Lemah) -->
  <g transform="translate(50, 100)">
    <text x="150" y="20" fill="#ff3366" font-size="18" font-weight="bold" text-anchor="middle">Tanpa Displacement (LEMAH)</text>
    <rect x="20" y="40" width="260" height="300" fill="none" stroke="#ff3366" stroke-width="2" rx="8" stroke-dasharray="4,4" />
    
    <!-- Bearish OB -->
    <line x1="80" y1="280" x2="80" y2="320" stroke="#ff3366" stroke-width="4" />
    <rect x="65" y="290" width="30" height="20" fill="#ff3366" rx="2" />
    <rect x="50" y="280" width="200" height="40" fill="#ff3366" fill-opacity="0.2" />
    
    <!-- Weak Bullish movement -->
    <line x1="120" y1="260" x2="120" y2="300" stroke="#00ffaa" stroke-width="3" />
    <rect x="110" y="270" width="20" height="20" fill="#00ffaa" rx="2" />
    
    <line x1="150" y1="240" x2="150" y2="280" stroke="#00ffaa" stroke-width="3" />
    <rect x="140" y="250" width="20" height="20" fill="#00ffaa" rx="2" />
    
    <line x1="180" y1="220" x2="180" y2="260" stroke="#00ffaa" stroke-width="3" />
    <rect x="170" y="230" width="20" height="20" fill="#00ffaa" rx="2" />

    <text x="150" y="360" fill="#ffffff" font-size="12" text-anchor="middle">Candle kecil, tumpang tindih,</text>
    <text x="150" y="380" fill="#ffffff" font-size="12" text-anchor="middle">Tidak ada FVG. Sangat rawan jebol.</text>
  </g>

  <!-- Right Side: Dengan Displacement (Kuat) -->
  <g transform="translate(450, 100)">
    <text x="150" y="20" fill="#00ffaa" font-size="18" font-weight="bold" text-anchor="middle">Dengan Displacement (KUAT)</text>
    <rect x="20" y="40" width="260" height="300" fill="none" stroke="#00ffaa" stroke-width="2" rx="8" />
    
    <!-- Bearish OB -->
    <line x1="80" y1="280" x2="80" y2="320" stroke="#ff3366" stroke-width="4" />
    <rect x="65" y="290" width="30" height="20" fill="#ff3366" rx="2" />
    <rect x="50" y="280" width="200" height="40" fill="#00ffaa" fill-opacity="0.2" />

    <!-- Strong Bullish movement (Displacement) -->
    <line x1="130" y1="180" x2="130" y2="300" stroke="#00ffaa" stroke-width="5" />
    <rect x="115" y="200" width="30" height="90" fill="#00ffaa" rx="2" />

    <line x1="180" y1="80" x2="180" y2="190" stroke="#00ffaa" stroke-width="5" />
    <rect x="165" y="100" width="30" height="80" fill="#00ffaa" rx="2" />

    <!-- FVG Highlight -->
    <rect x="120" y="190" width="70" height="90" fill="#e94560" fill-opacity="0.4" />
    <text x="200" y="240" fill="#e94560" font-size="12" font-weight="bold">Meninggalkan FVG Besar</text>

    <text x="150" y="360" fill="#ffffff" font-size="12" text-anchor="middle">Momentum sangat kuat (Big Body),</text>
    <text x="150" y="380" fill="#ffffff" font-size="12" text-anchor="middle">Suntikan dana institusi terlihat jelas.</text>
  </g>

  <!-- Footer -->
  <text x="400" y="480" fill="#00ffaa" font-size="16" font-style="italic" text-anchor="middle">"Displacement adalah kunci utama validitas sebuah Order Block."</text>
</svg>
