<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color:#1a1a2e; font-family:sans-serif;">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <text x="400" y="50" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">Valid Order Block (Bullish)</text>

  <!-- Bearish Candle (The OB) -->
  <line x1="200" y1="360" x2="200" y2="440" stroke="#ff3366" stroke-width="4" />
  <rect x="185" y="380" width="30" height="40" fill="#ff3366" rx="2" />
  
  <!-- The OB Zone -->
  <rect x="150" y="360" width="500" height="80" fill="#00ffaa" fill-opacity="0.1" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5" />
  <text x="660" y="405" fill="#00ffaa" font-size="16" font-weight="bold">Valid Bullish OB</text>

  <!-- Strong Bullish Candle 1 (Displacement) -->
  <line x1="260" y1="280" x2="260" y2="400" stroke="#00ffaa" stroke-width="4" />
  <rect x="245" y="300" width="30" height="80" fill="#00ffaa" rx="2" />

  <!-- Strong Bullish Candle 2 -->
  <line x1="320" y1="180" x2="320" y2="310" stroke="#00ffaa" stroke-width="4" />
  <rect x="305" y="200" width="30" height="100" fill="#00ffaa" rx="2" />

  <!-- Strong Bullish Candle 3 -->
  <line x1="380" y1="100" x2="380" y2="220" stroke="#00ffaa" stroke-width="4" />
  <rect x="365" y="120" width="30" height="80" fill="#00ffaa" rx="2" />

  <!-- Fair Value Gap -->
  <rect x="250" y="310" width="80" height="50" fill="#e94560" fill-opacity="0.2" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="340" y="340" fill="#e94560" font-size="16">Fair Value Gap (FVG)</text>

  <!-- Break of Structure -->
  <line x1="150" y1="250" x2="450" y2="250" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="460" y="255" fill="#ffffff" font-size="16" font-weight="bold">BOS (Break of Structure)</text>

  <!-- Criteria List -->
  <rect x="50" y="80" width="220" height="150" fill="#0f3460" fill-opacity="0.8" rx="8" />
  <text x="60" y="105" fill="#ffffff" font-size="16" font-weight="bold">Kriteria Valid OB:</text>
  <text x="60" y="135" fill="#00ffaa" font-size="14">✓ Menyebabkan BOS</text>
  <text x="60" y="165" fill="#00ffaa" font-size="14">✓ Meninggalkan FVG</text>
  <text x="60" y="195" fill="#00ffaa" font-size="14">✓ Displacement kuat</text>
  <text x="60" y="220" fill="#00ffaa" font-size="14">✓ Belum dimitigasi</text>

  <!-- Return to OB arrow -->
  <path d="M 450 180 Q 550 180 500 360" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
