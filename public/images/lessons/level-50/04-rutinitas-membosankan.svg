<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Trading: Rutinitas yang Membosankan</text>
  
  <!-- Loop/Calendar visual -->
  <g transform="translate(150, 80)">
    <!-- Day 1 -->
    <rect x="0" y="0" width="120" height="150" fill="#252542" rx="5" />
    <rect x="0" y="0" width="120" height="30" fill="#3a3a5e" rx="5" />
    <text x="60" y="20" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Hari 1</text>
    
    <circle cx="20" cy="50" r="5" fill="#00ffaa" />
    <text x="35" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tandai Area</text>
    <circle cx="20" cy="80" r="5" fill="#00ffaa" />
    <text x="35" y="85" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tunggu Harga</text>
    <circle cx="20" cy="110" r="5" fill="#00ffaa" />
    <text x="35" y="115" fill="#aaaaaa" font-family="sans-serif" font-size="12">Eksekusi Setup</text>
    <circle cx="20" cy="140" r="5" fill="#ff3366" />
    <text x="35" y="145" fill="#aaaaaa" font-family="sans-serif" font-size="12">Loss 1R</text>
    
    <!-- Arrow -->
    <path d="M130,75 L160,75 M150,65 L160,75 L150,85" fill="none" stroke="#aaaaaa" stroke-width="2" />
    
    <!-- Day 2 -->
    <rect x="180" y="0" width="120" height="150" fill="#252542" rx="5" />
    <rect x="180" y="0" width="120" height="30" fill="#3a3a5e" rx="5" />
    <text x="240" y="20" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Hari 2</text>
    
    <circle cx="200" cy="50" r="5" fill="#00ffaa" />
    <text x="215" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tandai Area</text>
    <circle cx="200" cy="80" r="5" fill="#aaaaaa" />
    <text x="215" y="85" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tunggu Harga</text>
    <circle cx="200" cy="110" r="5" fill="#aaaaaa" />
    <text x="215" y="115" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tidak Ada Setup</text>
    <circle cx="200" cy="140" r="5" fill="#aaaaaa" />
    <text x="215" y="145" fill="#aaaaaa" font-family="sans-serif" font-size="12">No Trade</text>

    <!-- Arrow -->
    <path d="M310,75 L340,75 M330,65 L340,75 L330,85" fill="none" stroke="#aaaaaa" stroke-width="2" />
    
    <!-- Day 3 -->
    <rect x="360" y="0" width="120" height="150" fill="#252542" rx="5" />
    <rect x="360" y="0" width="120" height="30" fill="#3a3a5e" rx="5" />
    <text x="420" y="20" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Hari 3</text>
    
    <circle cx="380" cy="50" r="5" fill="#00ffaa" />
    <text x="395" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tandai Area</text>
    <circle cx="380" cy="80" r="5" fill="#00ffaa" />
    <text x="395" y="85" fill="#aaaaaa" font-family="sans-serif" font-size="12">Tunggu Harga</text>
    <circle cx="380" cy="110" r="5" fill="#00ffaa" />
    <text x="395" y="115" fill="#aaaaaa" font-family="sans-serif" font-size="12">Eksekusi Setup</text>
    <circle cx="380" cy="140" r="5" fill="#00ffaa" />
    <text x="395" y="145" fill="#aaaaaa" font-family="sans-serif" font-size="12">Win +3R</text>
  </g>
  
  <!-- Loop arrow -->
  <path d="M 500,260 Q 400,320 200,260" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M 200,260 L 220,270 M 200,260 L 215,245" fill="none" stroke="#ffffff" stroke-width="2" />
  <text x="400" y="320" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle" font-style="italic">Ulangi Proses Ratusan Kali</text>
  
  <text x="400" y="370" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Hasil yang Konsisten Datang dari Tindakan yang Konsisten</text>
</svg>
