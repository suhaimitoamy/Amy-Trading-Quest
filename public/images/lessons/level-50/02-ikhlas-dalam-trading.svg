<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Keseimbangan Mental: Ikhlas Dalam Probabilitas</text>
  
  <!-- Scales of Justice (Balance) -->
  <g transform="translate(400, 100)">
    <!-- Stand -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <path d="M-50,200 L50,200 L30,170 L-30,170 Z" fill="#3a3a5e" />
    <circle cx="0" cy="0" r="10" fill="#ffffff" />
    
    <!-- Beam -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    
    <!-- Left Plate (Win / TP) -->
    <line x1="-200" y1="0" x2="-250" y2="80" stroke="#aaaaaa" stroke-width="2" />
    <line x1="-200" y1="0" x2="-150" y2="80" stroke="#aaaaaa" stroke-width="2" />
    <path d="M-260,80 Q-200,100 -140,80 Z" fill="#3a3a5e" />
    
    <!-- Right Plate (Loss / SL) -->
    <line x1="200" y1="0" x2="150" y2="80" stroke="#aaaaaa" stroke-width="2" />
    <line x1="200" y1="0" x2="250" y2="80" stroke="#aaaaaa" stroke-width="2" />
    <path d="M140,80 Q200,100 260,80 Z" fill="#3a3a5e" />
    
    <!-- TP Object -->
    <g transform="translate(-200, 50)">
      <circle cx="0" cy="0" r="25" fill="#00ffaa" opacity="0.2" />
      <circle cx="0" cy="0" r="15" fill="#00ffaa" />
      <text x="0" y="-35" fill="#00ffaa" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">WIN</text>
      <text x="0" y="35" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">Take Profit</text>
    </g>
    
    <!-- SL Object -->
    <g transform="translate(200, 50)">
      <circle cx="0" cy="0" r="25" fill="#ff3366" opacity="0.2" />
      <circle cx="0" cy="0" r="15" fill="#ff3366" />
      <text x="0" y="-35" fill="#ff3366" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">LOSS</text>
      <text x="0" y="35" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">Stop Loss</text>
    </g>
    
    <!-- Status Text -->
    <text x="0" y="240" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle" font-style="italic">"Satu hasil trade tidak menentukan identitas Anda."</text>
  </g>
  
  <!-- Aura of calmness -->
  <circle cx="400" cy="200" r="200" fill="none" stroke="#00ffaa" stroke-width="1" opacity="0.2" stroke-dasharray="10,10" />
</svg>
