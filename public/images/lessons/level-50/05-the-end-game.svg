<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e" />
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">The End Game: Wealth Management</text>
  
  <!-- Step Pyramid / Mountain -->
  <g transform="translate(150, 300)">
    <!-- Base Layer -->
    <rect x="0" y="-40" width="500" height="40" fill="#3a3a5e" />
    <text x="250" y="-15" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Level 1: Active Trading (Pencetak Kas)</text>
    
    <!-- Middle Layer -->
    <rect x="75" y="-100" width="350" height="40" fill="#5a5a8e" />
    <text x="250" y="-75" fill="#dddddd" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Level 2: Passive Investments (Aset Aman)</text>
    
    <!-- Top Layer -->
    <rect x="150" y="-160" width="200" height="40" fill="#00ffaa" />
    <text x="250" y="-135" fill="#1a1a2e" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">The End Game</text>
    
    <!-- Flag -->
    <line x1="250" y1="-160" x2="250" y2="-230" stroke="#ffffff" stroke-width="3" />
    <path d="M250,-230 L310,-215 L250,-200 Z" fill="#ff3366" />
    <text x="320" y="-210" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">Kebebasan Waktu &amp; Pikiran</text>
    
    <!-- Arrows showing flow of money -->
    <path d="M300,-40 Q350,-70 300,-100" fill="none" stroke="#00ffaa" stroke-width="2" />
    <path d="M300,-100 L290,-90 M300,-100 L310,-90" fill="none" stroke="#00ffaa" stroke-width="2" />
    <text x="360" y="-65" fill="#00ffaa" font-family="sans-serif" font-size="12">Withdraw &amp; Alihkan</text>
    
  </g>
  
  <text x="400" y="360" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">Tujuan akhir bukanlah trading seumur hidup, tapi membangun aset yang bekerja untuk Anda.</text>
</svg>
