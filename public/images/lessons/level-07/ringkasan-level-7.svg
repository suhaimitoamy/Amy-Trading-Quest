<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Ringkasan Level 7: Risk Guardian</text>
  
  <circle cx="400" cy="220" r="140" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <g transform="translate(400, 220)">
    <!-- Top -->
    <circle cx="0" cy="-140" r="40" fill="#2a2a4e" stroke="#00ffaa" stroke-width="3"/>
    <text x="0" y="-135" fill="#00ffaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Risk 1%</text>
    
    <!-- Right -->
    <circle cx="140" cy="0" r="40" fill="#2a2a4e" stroke="#00aaff" stroke-width="3"/>
    <text x="140" y="-5" fill="#00aaff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">SL &amp; TP</text>
    <text x="140" y="15" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Wajib</text>
    
    <!-- Bottom -->
    <circle cx="0" cy="140" r="40" fill="#2a2a4e" stroke="#ffcc00" stroke-width="3"/>
    <text x="0" y="135" fill="#ffcc00" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Lot Size</text>
    <text x="0" y="155" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Sesuai SL</text>

    <!-- Left -->
    <circle cx="-140" cy="0" r="40" fill="#2a2a4e" stroke="#ff3366" stroke-width="3"/>
    <text x="-140" y="-5" fill="#ff3366" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">No</text>
    <text x="-140" y="15" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Overtrade</text>
    
    <text x="0" y="-5" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">HOLY</text>
    <text x="0" y="15" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">GRAIL</text>
  </g>
  
</svg>
