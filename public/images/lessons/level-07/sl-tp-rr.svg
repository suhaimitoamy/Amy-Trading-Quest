<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Stop Loss (SL), Take Profit (TP), dan Risk:Reward (RR)</text>
  
  <!-- RR Box 1:2 -->
  <rect x="250" y="100" width="300" height="200" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- TP Area -->
  <rect x="250" y="100" width="300" height="133" fill="#00ffaa" fill-opacity="0.3"/>
  <text x="400" y="170" fill="#00ffaa" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Take Profit (Reward: 2)</text>
  
  <!-- Entry Line -->
  <line x1="250" y1="233" x2="550" y2="233" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="560" y="238" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold">Entry Point</text>
  
  <!-- SL Area -->
  <rect x="250" y="233" width="300" height="67" fill="#ff3366" fill-opacity="0.3"/>
  <text x="400" y="275" fill="#ff3366" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Stop Loss (Risk: 1)</text>
  
  <!-- Candles -->
  <rect x="350" y="240" width="10" height="30" fill="#ff3366"/>
  <line x1="355" y1="235" x2="355" y2="280" stroke="#ff3366" stroke-width="2"/>
  
  <rect x="370" y="200" width="10" height="40" fill="#00ffaa"/>
  <line x1="375" y1="180" x2="375" y2="245" stroke="#00ffaa" stroke-width="2"/>
  
  <rect x="390" y="150" width="10" height="60" fill="#00ffaa"/>
  <line x1="395" y1="130" x2="395" y2="220" stroke="#00ffaa" stroke-width="2"/>
  
  <rect x="410" y="120" width="10" height="40" fill="#00ffaa"/>
  <line x1="415" y1="100" x2="415" y2="170" stroke="#00ffaa" stroke-width="2"/>

  <text x="400" y="350" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Rasio Risk:Reward 1:2 artinya Potensi Profit 2x lebih besar dari Risiko</text>
</svg>
