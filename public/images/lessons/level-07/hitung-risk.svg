<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Kalkulator Risk Sederhana</text>
  
  <!-- Example case -->
  <rect x="50" y="80" width="700" height="260" fill="#2a2a4e" stroke="#00aaff" stroke-width="2" rx="10"/>
  
  <text x="100" y="120" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold">Langkah-langkah Menghitung:</text>
  
  <text x="100" y="160" fill="#ffffff" font-family="Arial" font-size="16">1. Tentukan Modal Anda (Contoh: $500)</text>
  <text x="100" y="190" fill="#ffffff" font-family="Arial" font-size="16">2. Tentukan Risiko per Trade dalam Persen (Contoh: 1%)</text>
  <text x="100" y="220" fill="#ffffff" font-family="Arial" font-size="16">   -> Risiko dalam Dollar = 1% x $500 = $5</text>
  <text x="100" y="250" fill="#ffffff" font-family="Arial" font-size="16">3. Tentukan Jarak Pips SL dari Entry Point ke area batalnya setup (Contoh: 20 pips)</text>
  <text x="100" y="280" fill="#ffffff" font-family="Arial" font-size="16">4. Hitung Lot: $5 / (20 pips x $10/lot_std) = $5 / $200 = 0.025 lot -> Dibulatkan: 0.02 Lot</text>
  
  <text x="400" y="320" fill="#00ffaa" font-family="Arial" font-size="16" font-style="italic" text-anchor="middle">Dengan Lot 0.02, jika SL 20 pips tersentuh, kerugian hanya $4 (kurang dari $5).</text>

  <text x="400" y="380" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Gunakan Position Size Calculator agar lebih cepat dan akurat.</text>
</svg>
