<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Bahaya Overtrade dan Layering</text>
  
  <!-- Left side: The right way -->
  <rect x="50" y="80" width="300" height="250" fill="none" stroke="#00ffaa" stroke-width="2" rx="10"/>
  <text x="200" y="110" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Disiplin (Single Entry)</text>
  
  <line x1="80" y1="180" x2="320" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="170" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Entry 1 (Risk 1%)</text>
  
  <line x1="80" y1="240" x2="320" y2="240" stroke="#ff3366" stroke-width="2"/>
  <text x="200" y="260" fill="#ff3366" font-family="Arial" font-size="14" text-anchor="middle">SL Hit: Rugi 1%</text>

  <!-- Right side: The wrong way (Layering) -->
  <rect x="450" y="80" width="300" height="250" fill="none" stroke="#ff3366" stroke-width="2" rx="10"/>
  <text x="600" y="110" fill="#ff3366" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Overtrade / Layering</text>
  
  <line x1="480" y1="140" x2="720" y2="140" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="135" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Entry 1 (Buy)</text>
  
  <line x1="480" y1="160" x2="720" y2="160" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="155" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Entry 2 (Aduh turun, Buy lagi)</text>

  <line x1="480" y1="180" x2="720" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="175" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Entry 3 (Pasti naik, Buy!)</text>

  <line x1="480" y1="200" x2="720" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="195" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">Entry 4 (All in!)</text>

  <line x1="480" y1="260" x2="720" y2="260" stroke="#ff3366" stroke-width="4"/>
  <text x="600" y="290" fill="#ff3366" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">SL Hit / MC: Margin Call (Rugi 100%)</text>
  
  <text x="400" y="370" fill="#ffffff" font-family="Arial" font-size="16" text-anchor="middle">Jangan mencoba "menyerang balik" market saat posisi sedang minus (Floating Loss).</text>
</svg>
