<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <text x="400" y="50" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Lot Size dan Risk per Trade</text>

  <!-- Balance Box -->
  <rect x="50" y="100" width="200" height="150" fill="#2a2a4e" stroke="#00ffaa" stroke-width="2" rx="10"/>
  <text x="150" y="140" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Modal (Balance)</text>
  <text x="150" y="180" fill="#00ffaa" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">$1,000</text>
  
  <!-- Arrow -->
  <line x1="260" y1="175" x2="330" y2="175" stroke="#ffffff" stroke-width="3"/>
  <polygon points="330,165 350,175 330,185" fill="#ffffff"/>
  <text x="305" y="160" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Risk 1%</text>

  <!-- Risk Box -->
  <rect x="360" y="100" width="150" height="150" fill="#2a2a4e" stroke="#ff3366" stroke-width="2" rx="10"/>
  <text x="435" y="140" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Risiko/Trade</text>
  <text x="435" y="180" fill="#ff3366" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">$10</text>

  <!-- Arrow -->
  <line x1="520" y1="175" x2="570" y2="175" stroke="#ffffff" stroke-width="3"/>
  <polygon points="570,165 590,175 570,185" fill="#ffffff"/>
  <text x="555" y="160" fill="#ffffff" font-family="Arial" font-size="14" text-anchor="middle">Pips SL</text>

  <!-- Lot Box -->
  <rect x="600" y="100" width="150" height="150" fill="#2a2a4e" stroke="#00aaff" stroke-width="2" rx="10"/>
  <text x="675" y="140" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Lot Size</text>
  <text x="675" y="180" fill="#00aaff" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">0.10 Lot</text>
  <text x="675" y="210" fill="#ffffff" font-family="Arial" font-size="12" text-anchor="middle">(Jika SL 10 Pips)</text>

  <!-- Formula -->
  <text x="400" y="320" fill="#00ffaa" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">Formula: Lot Size = Nilai Risiko ($) / (Pip Value x Jarak SL Pips)</text>
  
</svg>
