<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Sesi Trading (Time &amp; Price) - Model POI</text>
  
  <!-- Session Boxes -->
  <!-- Asian Session -->
  <rect x="100" y="200" width="150" height="80" fill="#cccccc" fill-opacity="0.2" rx="5" />
  <text x="175" y="190" font-family="Arial, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">Sesi Asia (Konsolidasi)</text>
  <line x1="100" y1="200" x2="350" y2="200" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,3" />
  <text x="360" y="205" font-family="Arial, sans-serif" font-size="12" fill="#ffaa00">Asian High</text>
  <line x1="100" y1="280" x2="350" y2="280" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,3" />
  <text x="360" y="285" font-family="Arial, sans-serif" font-size="12" fill="#ffaa00">Asian Low</text>
  
  <!-- Asian Price Action -->
  <path d="M 100 240 L 130 210 L 160 270 L 190 220 L 220 260 L 250 240" fill="none" stroke="#cccccc" stroke-width="2" stroke-linejoin="round" />
  
  <!-- London Killzone -->
  <rect x="250" y="100" width="200" height="300" fill="#3366ff" fill-opacity="0.1" rx="5" />
  <text x="350" y="90" font-family="Arial, sans-serif" font-size="14" fill="#3366ff" text-anchor="middle" font-weight="bold">London Killzone</text>
  
  <!-- London Price Action (Manipulation & Displacement) -->
  <path d="M 250 240 L 280 320" fill="none" stroke="#ff3366" stroke-width="3" stroke-linejoin="round" />
  <text x="280" y="340" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">Manipulasi (Sweep Low)</text>
  
  <!-- Higher Timeframe POI (Order Block) -->
  <rect x="250" y="310" width="200" height="30" fill="#00ffaa" fill-opacity="0.3" rx="3" />
  <text x="460" y="330" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">HTF POI (Order Block)</text>

  <!-- Reversal & Displacement up -->
  <path d="M 280 320 L 320 150 L 380 200 L 450 120" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linejoin="round" />
  <circle cx="380" cy="200" r="6" fill="#00ffaa" />
  <text x="390" y="220" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">FVG Entry</text>
  
  <!-- New York Killzone -->
  <rect x="450" y="100" width="250" height="300" fill="#ff3366" fill-opacity="0.1" rx="5" />
  <text x="575" y="90" font-family="Arial, sans-serif" font-size="14" fill="#ff3366" text-anchor="middle" font-weight="bold">New York Killzone</text>

  <!-- NY Price Action (Continuation) -->
  <path d="M 450 120 L 500 180 L 650 80" fill="none" stroke="#00ffaa" stroke-width="3" stroke-linejoin="round" />
  <circle cx="500" cy="180" r="6" fill="#00ffaa" />
  <text x="510" y="200" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa">NY Retracement Entry</text>

  <!-- Time Axis info -->
  <line x1="50" y1="420" x2="750" y2="420" stroke="#ffffff" stroke-width="2" />
  <text x="175" y="440" font-family="Arial, sans-serif" font-size="12" fill="#cccccc" text-anchor="middle">06:00 - 13:00 WIB</text>
  <text x="350" y="440" font-family="Arial, sans-serif" font-size="12" fill="#3366ff" text-anchor="middle">13:00 - 16:00 WIB</text>
  <text x="575" y="440" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">19:00 - 22:00 WIB</text>
  
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">POI yang baik adalah ketika Harga bertemu dengan Waktu yang tepat (Killzone).</text>

</svg>