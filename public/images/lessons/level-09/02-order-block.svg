<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Bullish Order Block (OB)</text>
  
  <!-- Market Structure Line (BOS) -->
  <line x1="100" y1="200" x2="600" y2="200" stroke="#cccccc" stroke-width="2" stroke-dasharray="5,5" />
  <text x="610" y="205" font-family="Arial, sans-serif" font-size="16" fill="#cccccc">Break of Structure (BOS)</text>
  
  <!-- Price Action Paths -->
  <!-- Down trend -->
  <path d="M 100 250 L 150 180 L 200 280 L 250 200" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <!-- The Bearish Candle (Order Block) -->
  <rect x="240" y="290" width="20" height="70" fill="#ff3366" /> <!-- Body -->
  <line x1="250" y1="270" x2="250" y2="380" stroke="#ff3366" stroke-width="3" /> <!-- Wick -->
  
  <!-- The Order Block Zone -->
  <rect x="230" y="270" width="300" height="110" fill="#00ffaa" fill-opacity="0.2" rx="5" />
  <text x="490" y="360" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" font-weight="bold">Bullish Order Block</text>
  <text x="490" y="380" font-family="Arial, sans-serif" font-size="12" fill="#cccccc">(Candle turun terakhir sebelum BOS)</text>

  <!-- Displacement / Strong Bullish Move -->
  <rect x="280" y="200" width="20" height="90" fill="#00ffaa" />
  <rect x="310" y="100" width="20" height="100" fill="#00ffaa" />
  <line x1="290" y1="180" x2="290" y2="300" stroke="#00ffaa" stroke-width="3" />
  <line x1="320" y1="80" x2="320" y2="210" stroke="#00ffaa" stroke-width="3" />
  
  <!-- Pullback and Mitigation -->
  <path d="M 330 150 L 380 230 L 420 180 L 460 320" fill="none" stroke="#ffaa00" stroke-width="4" stroke-linejoin="round" stroke-dasharray="4,4"/>
  <circle cx="460" cy="320" r="8" fill="#00ffaa" />
  <text x="460" y="300" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Mitigasi OB</text>

  <!-- Final Push up -->
  <path d="M 460 320 L 520 120" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
</svg>