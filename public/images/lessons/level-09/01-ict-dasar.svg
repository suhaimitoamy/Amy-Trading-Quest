<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Konsep Dasar ICT: Likuiditas (Liquidity Sweep)</text>
  
  <!-- Resistance Line -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5,5" />
  <text x="710" y="205" font-family="Arial, sans-serif" font-size="16" fill="#ffaa00">Resistance Ritel</text>
  
  <!-- Buy Side Liquidity Area -->
  <rect x="250" y="140" width="300" height="50" fill="#ff3366" fill-opacity="0.2" rx="5" />
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="18" fill="#ff3366" text-anchor="middle" font-weight="bold">Buy Side Liquidity (BSL) / Stop Loss</text>
  
  <!-- Price Path -->
  <!-- Start -> touch res -> down -> up sweep -> down hard -->
  <path d="M 150 400 L 250 200 L 350 300 L 450 150 L 550 450" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Market Maker Move Text -->
  <circle cx="450" cy="150" r="8" fill="#ff3366" />
  <text x="450" y="130" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Liquidity Sweep (False Breakout)</text>
  
  <!-- Smart Money Move -->
  <text x="560" y="400" font-family="Arial, sans-serif" font-size="14" fill="#00ffaa">Smart Money Sell-off</text>
  
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">Harga memanipulasi ke atas untuk mengambil bensin (likuiditas) sebelum turun.</text>
</svg>