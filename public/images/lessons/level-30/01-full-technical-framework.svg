<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#1a1a2e; font-family:sans-serif;">
  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">FULL TECHNICAL FRAMEWORK</text>
  
  <!-- Boxes -->
  <rect x="50" y="100" width="150" height="80" rx="10" fill="#2d2d44" stroke="#00ffaa" stroke-width="2"/>
  <text x="125" y="135" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">1. HTF BIAS</text>
  <text x="125" y="160" fill="#aaaaaa" font-size="12" text-anchor="middle">Trend &amp; Narrative</text>

  <line x1="200" y1="140" x2="250" y2="140" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="100" width="150" height="80" rx="10" fill="#2d2d44" stroke="#00ffaa" stroke-width="2"/>
  <text x="325" y="135" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">2. LIQUIDITY</text>
  <text x="325" y="160" fill="#aaaaaa" font-size="12" text-anchor="middle">Sweep &amp; Targets</text>

  <line x1="400" y1="140" x2="450" y2="140" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="450" y="100" width="150" height="80" rx="10" fill="#2d2d44" stroke="#00ffaa" stroke-width="2"/>
  <text x="525" y="135" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">3. POI</text>
  <text x="525" y="160" fill="#aaaaaa" font-size="12" text-anchor="middle">Order Block &amp; FVG</text>

  <line x1="600" y1="140" x2="650" y2="140" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="650" y="100" width="130" height="80" rx="10" fill="#2d2d44" stroke="#ff3366" stroke-width="2"/>
  <text x="715" y="135" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">4. ENTRY</text>
  <text x="715" y="160" fill="#aaaaaa" font-size="12" text-anchor="middle">LTF CHoCH</text>

  <!-- Flowchart chart visualization below -->
  <path d="M100 320 Q 200 220, 300 320 T 500 250 T 700 180" fill="none" stroke="#555577" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="300" cy="320" r="8" fill="#ff3366"/>
  <text x="300" y="345" fill="#ff3366" font-size="14" text-anchor="middle">Liquidity Sweep</text>
  
  <rect x="470" y="240" width="60" height="20" fill="rgba(0,255,170,0.2)" stroke="#00ffaa" stroke-width="1"/>
  <text x="500" y="235" fill="#00ffaa" font-size="14" text-anchor="middle">HTF POI</text>

  <circle cx="500" cy="250" r="5" fill="#ffffff"/>
  <text x="550" y="270" fill="#ffffff" font-size="12">LTF Entry Here</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
