<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Bullish to Bearish Structure Shift</text>

  <!-- Bullish Phase -->
  <path d="M 50,300 L 150,150 L 220,220 L 350,80" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Labels for Bullish -->
  <circle cx="150" cy="150" r="5" fill="#00ffaa"/>
  <text x="150" y="135" fill="#00ffaa" font-family="sans-serif" font-size="14" text-anchor="middle">HH</text>
  
  <circle cx="220" cy="220" r="5" fill="#00ffaa"/>
  <text x="220" y="245" fill="#00ffaa" font-family="sans-serif" font-size="14" text-anchor="middle">HL</text>

  <circle cx="350" cy="80" r="5" fill="#00ffaa"/>
  <text x="350" y="65" fill="#00ffaa" font-family="sans-serif" font-size="14" text-anchor="middle">HH</text>

  <line x1="150" y1="150" x2="300" y2="150" stroke="#00ffaa" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="225" y="140" fill="#00ffaa" font-family="sans-serif" font-size="12" text-anchor="middle">BOS</text>

  <!-- CHoCH transition -->
  <path d="M 350,80 L 450,260" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  <line x1="220" y1="220" x2="500" y2="220" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="480" y="210" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">CHoCH</text>
  
  <!-- Bearish Phase -->
  <circle cx="450" cy="260" r="5" fill="#ff3366"/>
  <text x="450" y="285" fill="#ff3366" font-family="sans-serif" font-size="14" text-anchor="middle">LL</text>

  <path d="M 450,260 L 530,160 L 650,330" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  
  <circle cx="530" cy="160" r="5" fill="#ff3366"/>
  <text x="530" y="145" fill="#ff3366" font-family="sans-serif" font-size="14" text-anchor="middle">LH</text>

  <line x1="450" y1="260" x2="600" y2="260" stroke="#ff3366" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="525" y="250" fill="#ff3366" font-family="sans-serif" font-size="12" text-anchor="middle">BOS</text>

  <circle cx="650" cy="330" r="5" fill="#ff3366"/>
  <text x="650" y="355" fill="#ff3366" font-family="sans-serif" font-size="14" text-anchor="middle">LL</text>

  <rect x="150" y="350" width="150" height="30" fill="#00ffaa" fill-opacity="0.2" rx="5"/>
  <text x="225" y="370" fill="#00ffaa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Bullish Structure</text>

  <rect x="500" y="350" width="150" height="30" fill="#ff3366" fill-opacity="0.2" rx="5"/>
  <text x="575" y="370" fill="#ff3366" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Bearish Structure</text>

</svg>
