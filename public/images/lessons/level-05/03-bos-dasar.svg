<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">Break of Structure (BOS)</text>
    <path d="M50,150 L150,70 L200,120 L300,40" stroke="#00ffaa" fill="none" stroke-width="3" filter="url(#glow)"/>
    <line x1="150" y1="70" x2="300" y2="70" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4,4" filter="url(#glow)"/>
    <text x="250" y="60" fill="#00ffaa" font-family="monospace" font-size="12" text-anchor="middle">BOS</text>
  
</svg>