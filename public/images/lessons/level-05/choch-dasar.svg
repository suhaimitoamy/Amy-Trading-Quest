<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Change of Character (CHoCH)</text>

  <!-- Uptrend -->
  <path d="M 100,320 L 250,200 L 330,260 L 480,100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- High 1 -->
  <circle cx="250" cy="200" r="5" fill="#00ffaa"/>
  <!-- HL 1 -->
  <circle cx="330" cy="260" r="5" fill="#00ffaa"/>
  <!-- High 2 (HH) -->
  <circle cx="480" cy="100" r="5" fill="#00ffaa"/>
  
  <!-- BOS -->
  <line x1="250" y1="200" x2="420" y2="200" stroke="#00ffaa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="310" y="190" fill="#00ffaa" font-family="sans-serif" font-size="12">BOS</text>

  <!-- Downtrend Start -->
  <path d="M 480,100 L 550,290" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- CHoCH Line -->
  <line x1="330" y1="260" x2="650" y2="260" stroke="#ff3366" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="560" y="250" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold">CHoCH</text>
  <circle cx="550" cy="290" r="5" fill="#ff3366"/>

  <text x="330" y="285" fill="#00ffaa" font-family="sans-serif" font-size="14">Last Higher Low (HL)</text>
  
  <!-- Continuation Down -->
  <path d="M 550,290 L 620,210 L 720,350" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="620" cy="210" r="5" fill="#ff3366"/>
  <text x="620" y="195" fill="#ff3366" font-family="sans-serif" font-size="14">Lower High (LH)</text>
  
  <text x="400" y="380" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">CHoCH terjadi saat struktur gagal mempertahankan HL terakhir dan membentuk Lower Low (LL)</text>
</svg>
