<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="200" style="background-color: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a; margin-top: 10px; margin-bottom: 20px;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
    <text x="200" y="20" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">HH, HL, LH, LL</text>
    <path d="M30,160 L100,60 L150,110 L220,30" stroke="#00ffaa" fill="none" stroke-width="3" filter="url(#glow)"/>
    <text x="100" y="45" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">HH</text>
    <text x="150" y="130" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">HL</text>
    <text x="220" y="15" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">HH</text>
    
    <path d="M250,80 L300,160 L330,120 L380,180" stroke="#ff4444" fill="none" stroke-width="3" filter="url(#glow)"/>
    <text x="250" y="65" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">LH</text>
    <text x="300" y="180" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">LL</text>
    <text x="330" y="105" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">LH</text>
  
</svg>