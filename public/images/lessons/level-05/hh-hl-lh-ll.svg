<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0,50 H800 M0,100 H800 M0,150 H800 M0,200 H800 M0,250 H800 M0,300 H800 M0,350 H800"/>
    <path d="M100,0 V400 M200,0 V400 M300,0 V400 M400,0 V400 M500,0 V400 M600,0 V400 M700,0 V400"/>
  </g>

  <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">HH, HL, LH, LL Anatomy</text>

  <!-- Uptrend side -->
  <path d="M 80,350 L 160,200 L 220,260 L 320,100" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Low -->
  <circle cx="80" cy="350" r="6" fill="#00ffaa"/>
  <text x="80" y="375" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">L</text>
  
  <!-- High -->
  <circle cx="160" cy="200" r="6" fill="#00ffaa"/>
  <text x="160" y="185" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">H</text>

  <!-- Higher Low -->
  <circle cx="220" cy="260" r="6" fill="#00ffaa"/>
  <text x="220" y="285" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">HL</text>

  <!-- Higher High -->
  <circle cx="320" cy="100" r="6" fill="#00ffaa"/>
  <text x="320" y="85" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">HH</text>

  <line x1="400" y1="60" x2="400" y2="380" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="6,6" />

  <!-- Downtrend side -->
  <path d="M 460,100 L 560,250 L 620,180 L 720,330" fill="none" stroke="#ff3366" stroke-width="4" stroke-linejoin="round"/>

  <!-- High -->
  <circle cx="460" cy="100" r="6" fill="#ff3366"/>
  <text x="460" y="85" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">H</text>

  <!-- Low -->
  <circle cx="560" cy="250" r="6" fill="#ff3366"/>
  <text x="560" y="275" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">L</text>

  <!-- Lower High -->
  <circle cx="620" cy="180" r="6" fill="#ff3366"/>
  <text x="620" y="165" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LH</text>

  <!-- Lower Low -->
  <circle cx="720" cy="330" r="6" fill="#ff3366"/>
  <text x="720" y="355" fill="#ff3366" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LL</text>

  <text x="200" y="130" fill="#00ffaa" font-family="sans-serif" font-size="14" opacity="0.8">HH = Higher High</text>
  <text x="200" y="150" fill="#00ffaa" font-family="sans-serif" font-size="14" opacity="0.8">HL = Higher Low</text>
  
  <text x="500" y="300" fill="#ff3366" font-family="sans-serif" font-size="14" opacity="0.8">LH = Lower High</text>
  <text x="500" y="320" fill="#ff3366" font-family="sans-serif" font-size="14" opacity="0.8">LL = Lower Low</text>

</svg>
