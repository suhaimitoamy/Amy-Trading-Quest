<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Comprehensive Multi Timeframe Setup</text>
  
  <!-- HTF Context -->
  <path d="M 50 400 L 300 100 L 750 100" fill="none" stroke="rgba(0, 255, 170, 0.2)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />
  <text x="150" y="250" font-family="Arial, sans-serif" font-size="18" fill="rgba(0, 255, 170, 0.4)" font-weight="bold" transform="rotate(-55 150 250)">Daily Bullish Impulse</text>
  
  <!-- Daily POI -->
  <rect x="230" y="380" width="300" height="80" fill="rgba(0, 255, 170, 0.1)" stroke="#00ffaa" stroke-width="2" stroke-dasharray="10,5" />
  <text x="380" y="440" font-family="Arial, sans-serif" font-size="16" fill="#00ffaa" text-anchor="middle">Daily Order Block (HTF POI)</text>
  
  <!-- H4 / M15 Pullback (Bearish) -->
  <path d="M 300 100 L 360 180 L 320 220 L 400 320 L 360 360 L 450 420" fill="none" stroke="#ff3366" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  
  <circle cx="450" cy="420" r="6" fill="#ff3366" />
  <text x="490" y="415" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Harga menabrak HTF POI</text>
  
  <!-- M15 CHoCH (Bullish Reversal) -->
  <path d="M 450 420 L 550 280 L 500 330 L 700 80" fill="none" stroke="#00ffaa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- CHoCH Line -->
  <line x1="360" y1="360" x2="600" y2="360" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" />
  <text x="500" y="350" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">M15 CHoCH</text>
  
  <!-- M15 Entry OB -->
  <rect x="470" y="310" width="40" height="30" fill="rgba(0, 255, 170, 0.3)" stroke="#00ffaa" stroke-width="1" />
  <text x="490" y="380" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa" text-anchor="middle">M15 OB</text>
  <text x="490" y="395" font-family="Arial, sans-serif" font-size="12" fill="#00ffaa" text-anchor="middle">(Entry)</text>
  
  <circle cx="500" cy="330" r="5" fill="#fff" />
  
  <!-- Target Line -->
  <line x1="300" y1="100" x2="750" y2="100" stroke="#ffcc00" stroke-width="2" stroke-dasharray="8,8" />
  <text x="650" y="90" font-family="Arial, sans-serif" font-size="14" fill="#ffcc00" font-weight="bold">Daily Target (Take Profit)</text>
  
  <!-- Info Box -->
  <rect x="50" y="50" width="220" height="90" fill="rgba(255, 255, 255, 0.05)" stroke="#fff" stroke-width="1" rx="5" />
  <text x="160" y="70" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Risk to Reward: 1:10+</text>
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">SL kecil karena entry di M15</text>
  <text x="160" y="110" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">TP raksasa mengikuti struktur Daily</text>
  
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">Kunci keberhasilan: Kesabaran menunggu harga menyentuh zona HTF lalu menunggu konfirmasi LTF.</text>
</svg>
